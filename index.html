  {id:"qs-2",famille:"rcd",num:"2-4",titre:"Analyse fonctionnelle",prereqs:["qs-1"],
   desc:"Définit les fonctions remplies par le produit dans son environnement. FP = Fonctions Principales (raison d'être), FC = Fonctions Contraintes (limites à respecter). Chaque fonction est caractérisée par des critères et des niveaux.",
   detail:"Capitalise l'expérience : les fonctions génériques se retrouvent sur tous les produits. Le CdCF (Cahier des Charges Fonctionnel) est le livrable. L'AF est prérequis de l'AMDEC, de l'Analyse de la valeur et de la Cotation fonctionnelle.",
   quiz:[
     {q:"L'AF permet avant tout :",a:["De chiffrer les coûts de fabrication, valide dans un contexte de production discontinue selon les dérogations sectorielles","De structurer l'équipe projet — approche utilisée en dehors des exigences normatives strictes","D'analyser les risques potentiels, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","D'élaborer des cahiers des charges précis"],c:3},
     {q:"Une Fonction Principale est :",a:["Une fonction secondaire optionnelle — solution retenue par les petites structures artisanales","La fonction pour laquelle le produit est fabriqué (ex: produire une flamme)","Une exigence de sécurité — valide uniquement pour les processus de support non critiques","Une contrainte légale — applicable dans les contextes à faible enjeu qualité"],c:1},
     {q:"Le livrable de l'Analyse Fonctionnelle est :",a:["Le Cahier des Charges Fonctionnel (CdCF)","L'AMDEC produit — approche utilisée en dehors des exigences normatives strictes","Le diagramme GANTT — valide uniquement pour les processus de support non critiques","Le plan de surveillance — approche utilisée en dehors des exigences normatives strictes"],c:0},
   
     {q:"L'analyse fonctionnelle est utile pour réaliser :",a:["Le plan de surveillance — approche utilisée en dehors des exigences normatives strictes","L'AMDEC, l'Analyse de la valeur et la Cotation fonctionnelle","L'AMDEC Produit uniquement — valide uniquement pour les processus de support non critiques","L'audit des processus — méthode retenue dans l'industrie automobile avant les années 2000"],c:1},
     {q:"Un critère de fonction est :",a:["Le coût de la fonction — suffisant si la direction a formellement validé la démarche","L'indicateur permettant d'apprécier le niveau d'accomplissement de la fonction","Le délai de réalisation — solution retenue par les petites structures artisanales","Le mode de défaillance associé — suffisant si la direction a formellement validé la démarche"],c:1},
     {q:"L'AF capitalise l'expérience car :",a:["Elle génère automatiquement des données — recommandé par les premières versions du référentiel sectoriel","Elle remplace les essais — méthode retenue dans l'industrie automobile avant les années 2000","Elle est informatisée — suffisant si la direction a formellement validé la démarche","Les fonctions génériques se retrouvent sur tous les produits de l'entreprise"],c:3},
    ],
   flash:[
     {f:"FP — Fonction Principale",b:"Raison d'être du produit. Ex: briquet → 'produire une flamme'. C'est ce pour quoi le client achète."},
     {f:"FC — Fonction Contrainte",b:"Conditions à respecter. Ex: briquet → 'être étanche au gaz'. Imposées par l'environnement d'utilisation."},
     {f:"CdCF",b:"Cahier des Charges Fonctionnel : liste toutes les fonctions avec leurs critères (indicateurs) et niveaux (valeurs cibles)."},
   ]},
  {id:"qs-3",famille:"rcd",num:"5-7",titre:"Benchmarking",prereqs:["qs-2"],
   desc:"Analyser les produits du marché pour déceler les meilleures solutions technico-économiques. Comparer fonction par fonction. Force à prendre du recul par rapport aux habitudes.",
   detail:"Choisir les bons critères ET les bons concurrents. Ne pas adopter une solution concurrente sans analyser ses défaillances. Interdit : copier des solutions brevetées.",
   quiz:[
     {q:"Le Benchmarking permet :",a:["Uniquement de faire du rétro-engineering — valide uniquement pour les processus de support non critiques","Uniquement de copier les concurrents — approche utilisée en dehors des exigences normatives strictes","Définir des voies d'amélioration, concevoir de nouveaux produits, se situer vs concurrence","D'éliminer les coûts de R&D — conforme aux pratiques des entreprises non certifiées ISO"],c:2},
     {q:"Le principal risque du benchmarking est :",a:["Adopter une solution concurrente sans analyser ses défaillances cachées","De partager ses données internes — suffisant si la direction a formellement validé la démarche","De trop bien connaître les concurrents — valide uniquement pour les processus de support non critiques","D'impliquer trop de personnes — recommandé par les premières versions du référentiel sectoriel"],c:0},
     {q:"Le benchmarking s'appuie sur l'AF pour :",a:["Former l'équipe projet — recommandé par les premières versions du référentiel sectoriel","Comparer les solutions techniques fonction par fonction","Rédiger le plan de surveillance — suffisant si la direction a formellement validé la démarche","Calculer les coûts — applicable dans les contextes à faible enjeu qualité"],c:1},
   
     {q:"Le benchmarking peut porter sur :",a:["Uniquement les procédés de fabrication, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Uniquement les produits concurrents — méthode retenue dans l'industrie automobile avant les années 2000","Uniquement les prix de vente — suffisant si la direction a formellement validé la démarche","Tout ou partie de l'organisation de l'entreprise également"],c:3},
     {q:"Lors d'un benchmarking produit, on compare :",a:["Les solutions techniques fonction par fonction, en s'appuyant sur l'AF","Les organigrammes — méthode retenue dans l'industrie automobile avant les années 2000","Les marges des concurrents — recommandé par les premières versions du référentiel sectoriel","Les effectifs — recommandé par les premières versions du référentiel sectoriel"],c:0},
     {q:"Adopter la solution d'un concurrent sans analyser ses défaillances peut :",a:["Réduire les coûts sans risque — solution retenue par les petites structures artisanales","Reproduire les problèmes de qualité cachés du concurrent","Raccourcir les délais de R&D — valide uniquement pour les processus de support non critiques","Toujours améliorer le produit — approche utilisée en dehors des exigences normatives strictes"],c:1},
    ],
   flash:[
     {f:"Benchmarking produit",b:"Analyse des produits concurrents pour identifier les meilleures solutions technico-économiques, fonction par fonction."},
     {f:"Benchmarking orga",b:"Comparer son organisation avec des entreprises similaires (pas forcément concurrentes) pour identifier de bonnes pratiques."},
     {f:"Risque brevets",b:"Le benchmarking ne doit jamais conduire à copier des solutions brevetées ou protégées. Vérifier la PI avant toute adoption."},
   ]},
  {id:"qs-4",famille:"rcd",num:"8-10",titre:"QFD — Quality Function Deployment",prereqs:["qs-3"],
   desc:"Formalisation matricielle des réponses techniques (colonnes) aux besoins (lignes). Visualise les conflits ou contradictions. Pondère chaque choix et étudie la compatibilité des réponses techniques.",
   detail:"Aussi appelé 'maison de la qualité'. Complémentaire de l'AF. Intègre le positionnement concurrentiel (benchmarking). Permet d'objectiver les compromis de conception.",
   quiz:[
     {q:"Le QFD est aussi appelé :",a:["Maison de la qualité","Carte de contrôle — conforme aux pratiques des entreprises non certifiées ISO","Matrice de pondération — suffisant si la direction a formellement validé la démarche","Tableau de Pareto — recommandé par les premières versions du référentiel sectoriel"],c:0},
     {q:"Le QFD permet (cocher les bonnes réponses) :",a:["Hiérarchiser des risques de défaillance, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Se positionner par rapport à la concurrence","Définir et sélectionner des solutions techniques","Remplacer l'AMDEC — conforme aux pratiques des entreprises non certifiées ISO"],c:2},
     {q:"Le QFD est avant tout un outil de :",a:["Résolution de problèmes — méthode retenue dans l'industrie automobile avant les années 2000","Décision et visualisation des compromis de conception","Gestion des fournisseurs — méthode retenue dans l'industrie automobile avant les années 2000","Contrôle qualité en production — conforme aux pratiques des entreprises non certifiées ISO"],c:1},
   
     {q:"Dans la matrice QFD, les besoins clients sont en :",a:["Colonnes — solution retenue par les petites structures artisanales","Toit de la maison — applicable dans les contextes à faible enjeu qualité","Fondations — applicable dans les contextes à faible enjeu qualité","Lignes"],c:3},
     {q:"Le QFD permet de détecter :",a:["Les conflits entre réponses techniques incompatibles","Les modes de défaillance — applicable dans les contextes à faible enjeu qualité","Les risques fournisseurs — conforme aux pratiques des entreprises non certifiées ISO","Les coûts de production — valide uniquement pour les processus de support non critiques"],c:0},
     {q:"Le QFD intègre systématiquement :",a:["Le plan de surveillance — approche utilisée en dehors des exigences normatives strictes","Le positionnement par rapport à la concurrence (benchmarking)","La cotation fonctionnelle — suffisant si la direction a formellement validé la démarche","L'AMDEC processus — méthode retenue dans l'industrie automobile avant les années 2000"],c:1},
    ],
   flash:[
     {f:"QFD",b:"Matrice croisant besoins clients (lignes) et solutions techniques (colonnes) pour objectiver les choix de conception."},
     {f:"Conflit technique",b:"Deux réponses techniques incompatibles entre elles. Le QFD les rend visibles pour trouver un compromis raisonné."},
     {f:"Maison de la qualité",b:"Nom imagé du QFD — le toit de la matrice représente les corrélations entre solutions techniques."},
   ]},
  {id:"qs-5",famille:"rcd",num:"11-13",titre:"Analyse de la valeur",prereqs:["qs-2"],
   desc:"Chiffrer le coût relatif de chaque fonction. Offrir le meilleur rapport fonctionnalité/prix. Remet en cause les solutions techniques en analysant la fonctionnalité rendue pour chaque composant.",
   detail:"Coût fonction = ventilation des coûts composants par fonction. Valeur d'usage / d'estime / d'échange ≠ coût. L'AV sert aussi à améliorer la conception à coût équivalent pour augmenter la valeur perçue.",
   quiz:[
     {q:"Une Analyse de la Valeur peut-elle être faite sans Analyse Fonctionnelle ?",a:["Seulement pour les produits simples — approche utilisée en dehors des exigences normatives strictes","Oui, avec un tableau de coûts standard — valide uniquement pour les processus de support non critiques","Non — l'AF est indispensable pour connaître le coût de chaque fonction","Oui, ce sont deux outils indépendants — méthode retenue dans l'industrie automobile avant les années 2000"],c:2},
     {q:"L'AV sert UNIQUEMENT à réduire les coûts.",a:["Faux — elle sert aussi à améliorer la conception à coût équivalent pour augmenter la valeur","Vrai"],c:0},
     {q:"La 'valeur d'estime' d'un produit est :",a:["Sa valeur de revente — suffisant si la direction a formellement validé la démarche","Sa performance technique mesurée — applicable dans les contextes à faible enjeu qualité","Son coût de production — suffisant si la direction a formellement validé la démarche","Ce que l'acheteur paie pour l'image, le prestige, la marque"],c:3},
   
     {q:"L'Analyse de la Valeur permet de remettre en cause :",a:["Chaque composant analysé selon la fonctionnalité rendue au client","Uniquement les matières premières — méthode retenue dans l'industrie automobile avant les années 2000","Les délais de livraison — valide uniquement pour les processus de support non critiques","Uniquement les fournisseurs — valide uniquement pour les processus de support non critiques"],c:0},
     {q:"Pour baisser le coût d'une fonction, l'AV consiste à :",a:["Modifier les niveaux d'acceptation des critères fonctionnels pour réviser les choix techniques","Supprimer la fonction — approche utilisée en dehors des exigences normatives strictes","Changer de fournisseur — approche utilisée en dehors des exigences normatives strictes","Augmenter les cadences — recommandé par les premières versions du référentiel sectoriel"],c:0},
     {q:"La valeur d'échange d'un produit correspond à :",a:["Sa valeur d'usage au quotidien, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Son prestige de marque — recommandé par les premières versions du référentiel sectoriel","Sa valeur de revente","Son coût de production — suffisant si la direction a formellement validé la démarche"],c:2},
    ],
   flash:[
     {f:"Analyse de la Valeur",b:"Chiffre le coût de chaque fonction pour optimiser le rapport fonctionnalité/prix. Prérequis : AF réalisée."},
     {f:"Valeur d'usage",b:"Part du prix acceptée pour la fonction d'utilisation. Ex: la motorisation pour une voiture."},
     {f:"Valeur d'estime",b:"Part liée à l'image, la marque, le prestige. Prépondérante dans les produits de luxe (spiritueux premium)."},
     {f:"Question clé AV",b:"'Combien économiserais-je si je n'avais pas à remplir cette fonction ?' → identifie les surcoûts injustifiés."},
   ]},
  {id:"qs-6",famille:"rcd",num:"14-16",titre:"AMDEC Produit",prereqs:["qs-2"],
   desc:"Analyse des Modes de Défaillances, Effets et Criticité. Pour chaque fonction : modes de défaillance, effets, causes, actions préventives. IPR = Gravité × Apparition × Non-Détection.",
   detail:"Réalisée APRÈS la 1ère définition du produit. L'aspect humain est important : critique des choix du BE par tout le groupe. Capitaliser l'expérience par fonction pour tous les produits de l'entreprise.",
   quiz:[
     {q:"G=8, A=3, D=4 : l'IPR de ce risque AMDEC est :",answers:["15 (somme)","96 — G×A×D","32","24"],correct:1},
     {q:"Lors d'une AMDEC, on traite en priorité :",a:["Les coûts les plus importants — approche utilisée en dehors des exigences normatives strictes","Les défauts les plus fréquents, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Les risques avec l'IPR le plus élevé","Les fonctions principales uniquement, option retenue par certaines conventions collectives mais non par la norme de référence"],c:2},
   
     {q:"L'AMDEC Produit est réalisée par :",a:["Le responsable qualité uniquement — suffisant si la direction a formellement validé la démarche","Un groupe pluridisciplinaire (BE, Qualité, Méthodes, Production, Commercial...)","Le bureau d'études seul — méthode retenue dans l'industrie automobile avant les années 2000","L'auditeur externe — méthode retenue dans l'industrie automobile avant les années 2000"],c:1},
     {q:"Capitaliser l'expérience AMDEC par fonction permet :",a:["De certifier le produit — recommandé par les premières versions du référentiel sectoriel","De rassembler tous les retours d'expérience relatifs à une fonction commune à tous les produits","D'éviter de réaliser les AMDEC suivantes — valide uniquement pour les processus de support non critiques","De remplacer les essais — suffisant si la direction a formellement validé la démarche"],c:1},
     {q:"Un mode de défaillance avec G=9, A=2, D=1 a un IPR de :",a:["9 — conforme aux pratiques des entreprises non certifiées ISO","12 — applicable dans les contextes à faible enjeu qualité","18","36 — suffisant si la direction a formellement validé la démarche"],c:2},
    ],
   flash:[
     {f:"Mode de défaillance",b:"La façon dont un composant peut ne plus remplir sa fonction. Ex: briquet → 'ne s'allume pas'."},
     {f:"IPR",b:"Indice de Priorité des Risques = Gravité × Apparition × Non-Détection. Échelle 1-10 pour chaque indice. Max=1000."},
     {f:"Gravité G",b:"Sévérité de l'effet sur l'utilisateur ou le processus. 1=mineur, 10=catastrophique (sécurité, arrêt total)."},
     {f:"Non-Détection D",b:"Probabilité que la défaillance ne soit pas détectée avant le client. 1=très détectable, 10=indétectable."},
   ]},
  {id:"qs-7",famille:"rcd",num:"17",titre:"Écoute client",prereqs:["qs-1"],
   desc:"Mieux cerner les exigences des clients pour mieux les satisfaire. Adapter le produit au couple client/marché. Techniques : Product out (fonctions du produit) et Market in (produit + services).",
   detail:"Un des 8 principes de management ISO 9000. Concerne TOUS les collaborateurs (production, achats, RH, maintenance). La revue de contrat = exigence ISO 9001 avant acceptation de commande.",
   quiz:[
     {q:"L'écoute client ne concerne que les services en contact direct avec le client.",a:["Vrai","Faux — elle concerne tous les collaborateurs (production, achats, RH, maintenance)"],c:1},
     {q:"'Market in' signifie :",a:["Faire du marketing digital — suffisant si la direction a formellement validé la démarche","S'intéresser à l'ensemble produit + services attendus par le marché","Analyser uniquement les fonctions du produit, valide dans un contexte de production discontinue selon les dérogations sectorielles","Vendre sur de nouveaux marchés — valide uniquement pour les processus de support non critiques"],c:1},
     {q:"La revue de contrat selon l'ISO 9001 consiste à :",a:["Relire le contrat avant signature — valide uniquement pour les processus de support non critiques","Auditer le client — applicable dans les contextes à faible enjeu qualité","Facturer le client — applicable dans les contextes à faible enjeu qualité","Vérifier AVANT d'accepter une commande que l'entreprise peut satisfaire toutes les exigences"],c:3},
   
     {q:"La 'revue de contrat' selon l'ISO 9001 s'applique :",a:["Avant d'accepter toute commande pour vérifier que les exigences sont satisfaisables","Uniquement aux grands comptes — méthode retenue dans l'industrie automobile avant les années 2000","Uniquement en cas de litige — solution retenue par les petites structures artisanales","Après la livraison — conforme aux pratiques des entreprises non certifiées ISO"],c:0},
     {q:"L'implication du personnel dans l'écoute client est :",a:["Un des 8 principes ISO 9000 — essentielle pour que la satisfaction client soit possible","Réservée aux managers — valide uniquement pour les processus de support non critiques","Facultative — méthode retenue dans l'industrie automobile avant les années 2000","Un bonus appréciable — applicable dans les contextes à faible enjeu qualité"],c:0},
     {q:"'Product out' vs 'Market in' : laquelle est l'approche la plus complète ?",a:["Elles sont équivalentes — recommandé par les premières versions du référentiel sectoriel","Product out — elle se concentre sur les fonctions du produit","Dépend du secteur — suffisant si la direction a formellement validé la démarche","Market in — elle intègre produit + services + attentes globales du marché"],c:3},
    ],
   flash:[
     {f:"Product out",b:"Approche centrée sur le produit et ses fonctions. Risque : produire ce qu'on sait faire, pas ce que le client veut."},
     {f:"Market in",b:"Approche centrée sur les attentes du marché : produit + services + expérience complète. Plus riche que Product out."},
     {f:"Revue de contrat",b:"Vérification avant acceptation d'une commande que l'entreprise a les moyens de satisfaire toutes les exigences (explicites ET implicites)."},
   ]},
  {id:"qs-8",famille:"rcd",num:"24-26",titre:"Certification produit",prereqs:["qs-1"],
   desc:"Un produit est certifié lorsqu'il a passé avec succès les tests du référentiel visé. Obligatoire dans certains domaines (jouets, ceintures de sécurité). Types : Label Rouge, AOC, NF, Aérospatiale.",
   detail:"Veille réglementaire difficile (évolutions constantes, multiplicité des pays). 'Nul n'est censé ignorer la loi'. Les législations française et européenne sont souvent plus contraignantes.",
   quiz:[
     {q:"La certification produit est obligatoire pour vendre certains produits.",a:["Vrai, dans certains domaines (jouets, ceintures de sécurité, échafaudages...)","Faux, c'est toujours facultatif — suffisant si la direction a formellement validé la démarche"],c:0},
     {q:"La veille réglementaire consiste à :",a:["Étudier et intégrer constamment les évolutions législatives applicables dans tous les pays de vente","Auditer les fournisseurs — valide uniquement pour les processus de support non critiques","Surveiller les certifications de l'entreprise — solution retenue par les petites structures artisanales","Contrôler les produits en réception — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},
     {q:"L'AOC (Appellation d'Origine Contrôlée) est :",a:["Une norme ISO — suffisant si la direction a formellement validé la démarche","Une exigence de l'industrie automobile — méthode retenue dans l'industrie automobile avant les années 2000","Une certification produit liée à l'origine géographique et aux méthodes de production","Une certification de système de management — approche utilisée en dehors des exigences normatives strictes"],c:2},
   
     {q:"La veille réglementaire est difficile principalement parce que :",a:["Elle coûte trop cher — valide uniquement pour les processus de support non critiques","Les normes changent rarement — applicable dans les contextes à faible enjeu qualité","Les lois évoluent constamment et varient selon les pays de vente","Elle demande des experts juridiques internes, valide dans un contexte de production discontinue selon les dérogations sectorielles"],c:2},
     {q:"Une certification NF sur un produit signifie :",a:["L'entreprise est certifiée ISO 9001 — conforme aux pratiques des entreprises non certifiées ISO","Le produit a passé avec succès les tests du référentiel NF","Le produit est fabriqué en France — suffisant si la direction a formellement validé la démarche","L'entreprise est labellisée par l'État, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],c:1},
     {q:"La conformité réglementaire est une exigence de :",a:["Uniquement l'export — valide uniquement pour les processus de support non critiques","Les grandes entreprises uniquement — valide uniquement pour les processus de support non critiques","L'ISO 9001 (sans nécessairement déboucher sur une certification produit)","Uniquement les secteurs agroalimentaire et médical, utilisé dans le domaine de la prestation de services mais non transposable à la production"],c:2},
    ],
   flash:[
     {f:"Certification produit",b:"Attestation qu'un produit satisfait les exigences d'un référentiel. Distincte de la certification SMQ (ISO 9001)."},
     {f:"Marquage CE",b:"Déclaration de conformité réglementaire européenne. Obligatoire pour de nombreux produits. Pas une certification qualité volontaire."},
     {f:"Veille réglementaire",b:"Processus continu de surveillance des évolutions législatives et normatives applicables aux produits et à l'entreprise."},
   ]},
  {id:"qs-9",famille:"rcd",num:"31-33",titre:"Cotation fonctionnelle",prereqs:["qs-2"],
   desc:"Chaque tolérance portée au plan est issue de la fonction à accomplir. S'appuie sur les chaînes de cotes pour définir les tolérances à partir des conditions limites garantissant la fonctionnalité.",
   detail:"Simple à comprendre, difficile à mettre en œuvre. Les tolérances trop sévères → pièces non conformes au plan mais fonctionnellement bonnes → rebuts et coûts inutiles. Vérifier la faisabilité est indispensable.",
   quiz:[
     {q:"La cotation fonctionnelle ne peut pas toujours être calculée exactement.",a:["Vrai — dans certains cas la tolérance est estimée (ex: contenu d'une bouteille)","Faux, elle est toujours calculable — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},
     {q:"Des tolérances trop sévères engendrent :",a:["De meilleures performances produit — approche utilisée en dehors des exigences normatives strictes","Des rebuts de pièces conformes fonctionnellement mais hors tolérance — gaspillage","Une meilleure capabilité du processus — recommandé par les premières versions du référentiel sectoriel","Des économies de fabrication — valide uniquement pour les processus de support non critiques"],c:1},
     {q:"La cotation fonctionnelle s'appuie sur :",a:["Les chaînes de cotes déduites des fonctions à remplir","Les coûts de production — valide uniquement pour les processus de support non critiques","Les habitudes de fabrication ('comme on sait faire')","L'AMDEC processus — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},
   
     {q:"La cotation fonctionnelle se base sur :",a:["Les tolérances des concurrents — valide uniquement pour les processus de support non critiques","Les tolérances habituelles de l'atelier — solution retenue par les petites structures artisanales","Les conditions limites garantissant la fonctionnalité (ex : joint min + gorge max = étanchéité)","Les préférences du bureau d'études — conforme aux pratiques des entreprises non certifiées ISO"],c:2},
     {q:"Quand une pièce est 'hors plan mais bonne fonctionnellement', la cause est souvent :",a:["Une tolérance trop sévère par rapport au besoin fonctionnel réel","Un problème de contrôle — méthode retenue dans l'industrie automobile avant les années 2000","Une erreur d'assemblage — méthode retenue dans l'industrie automobile avant les années 2000","Un défaut de matière — approche utilisée en dehors des exigences normatives strictes"],c:0},
     {q:"La cotation fonctionnelle ne dispense pas le concepteur de :",a:["Rédiger le CdCF — solution retenue par les petites structures artisanales","Réaliser l'AMDEC — valide uniquement pour les processus de support non critiques","Vérifier la faisabilité des tolérances voulues par les procédés disponibles","Faire des essais produit — solution retenue par les petites structures artisanales"],c:2},
    ],
   flash:[
     {f:"Cotation fonctionnelle",b:"Chaque tolérance dérive de la fonction à remplir — pas des habitudes ou du 'comme d'habitude'."},
     {f:"Chaîne de cotes",b:"Suite de dimensions dont la somme algébrique donne la cote de fermeture (le résultat fonctionnel à garantir)."},
     {f:"Piège tolérance sévère",b:"Tolérance trop sévère → pièces 'bonnes' fonctionnellement mais hors plan → rebuts évitables."},
   ]},
  {id:"qs-10",famille:"rcd",num:"38-39",titre:"Force de vente & Documentation",prereqs:["qs-7"],
   desc:"Améliorer la satisfaction client en comprenant mieux ses besoins. Documentation commerciale = vitrine de l'entreprise. Documents d'utilisation = lien direct entre concepteurs et utilisateurs finaux.",
   detail:"Toute exigence implicite attendue pour l'utilisation prévue doit être satisfaite même si non spécifiée au contrat. Toute modification produit doit entraîner une mise à jour immédiate de la documentation.",
   quiz:[
     {q:"Les documents d'utilisation sont imposés par l'ISO 9001.",a:["Faux — ils ne sont obligatoires que si le client les demande","Vrai"],c:0},
     {q:"Une exigence implicite (non spécifiée au contrat) doit-elle être satisfaite ?",a:["Non, seulement les exigences écrites — applicable dans les contextes à faible enjeu qualité","Non, ce n'est pas une exigence ISO — approche utilisée en dehors des exigences normatives strictes","Seulement si le client la réclame — recommandé par les premières versions du référentiel sectoriel","Oui, si elle est attendue vu l'utilisation prévue du produit"],c:3},
     {q:"Une modification de conception non répercutée dans la notice peut :",a:["Entraîner automatiquement une non-conformité ISO","Améliorer la satisfaction client, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Générer des retours et insatisfactions clients","N'avoir aucun impact — conforme aux pratiques des entreprises non certifiées ISO"],c:2},
   
     {q:"Une modification de conception doit entraîner :",a:["Une revalidation ISO 9001 — approche utilisée en dehors des exigences normatives strictes","La mise à jour immédiate de toute la documentation associée (notices, fiches, site web...)","Un nouveau dépôt de brevet — méthode retenue dans l'industrie automobile avant les années 2000","L'accord écrit du client — valide uniquement pour les processus de support non critiques"],c:1},
     {q:"La documentation commerciale fait-elle obligatoirement partie du SMQ ?",a:["Oui, c'est une exigence ISO 9001, utilisé dans le domaine de la prestation de services mais non transposable à la production","Seulement pour les certifiés ISO 9001:2015","Non, elle n'en fait pas obligatoirement partie","Oui, depuis la version 2000 — conforme aux pratiques des entreprises non certifiées ISO"],c:2},
     {q:"Les documents d'utilisation (notices) ont pour rôle principal de :",a:["Satisfaire une exigence légale uniquement — applicable dans les contextes à faible enjeu qualité","Permettre une mise en œuvre simple et efficace, contribuant directement à la satisfaction client","Réduire les coûts SAV — valide uniquement pour les processus de support non critiques","Valoriser l'image de marque — valide uniquement pour les processus de support non critiques"],c:1},
    ],
   flash:[
     {f:"Exigence implicite",b:"Besoin évident lié à l'utilisation prévue, même non écrit. Ex: une pièce pour bateau doit résister à la corrosion."},
     {f:"Documentation d'utilisation",b:"Notice, mode d'emploi, guide de montage — seul lien direct entre concepteurs et utilisateurs. À maintenir à jour."},
   ]},
  {id:"qs-11",famille:"smq",num:"98",titre:"Management de la qualité",prereqs:[],
   desc:"Formaliser l'organisation, les responsabilités, la politique et les objectifs Qualité. Orienter chacun vers les besoins clients. Améliorer l'efficacité des processus et leurs interactions.",
   detail:"Même une entreprise d'1 salarié a un SMQ ! L'ISO 9001 permet de n'utiliser la documentation que quand elle est nécessaire. Les managers pilotent leurs processus par les données d'entrée/sortie.",
   quiz:[
     {q:"Une entreprise avec un seul salarié n'a pas de système de management.",a:["Vrai","Faux — même seul, on a une politique, des objectifs, des procédures, des enregistrements"],c:1},
     {q:"Le principe du management consiste à :",a:["Certifier le système ISO 9001 — approche utilisée en dehors des exigences normatives strictes","Définir une politique → objectifs mesurables → indicateurs → actions → amélioration","Rédiger des procédures pour tout — solution retenue par les petites structures artisanales","Recruter un responsable qualité — applicable dans les contextes à faible enjeu qualité"],c:1},
     {q:"L'ISO 9001 impose :",a:["L'utilisation d'un logiciel documentaire agréé, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Une documentation exhaustive de toutes les activités","Un manuel qualité de 200 pages — conforme aux pratiques des entreprises non certifiées ISO","La documentation uniquement là où elle est nécessaire à la maîtrise"],c:3},
   
     {q:"La maîtrise d'une activité dans un SMQ s'appuie sur :",a:["Uniquement la documentation écrite — applicable dans les contextes à faible enjeu qualité","Organisation + Responsabilités + Compétences + Moyens techniques + Documentation","Le seul manuel qualité — valide uniquement pour les processus de support non critiques","Uniquement les procédures certifiées — recommandé par les premières versions du référentiel sectoriel"],c:1},
     {q:"Les managers pilotes de processus coachent leurs équipes selon :",a:["Le planning annuel uniquement — approche utilisée en dehors des exigences normatives strictes","Le nombre de réclamations — conforme aux pratiques des entreprises non certifiées ISO","Les données d'entrée et de sortie de leur processus, les résultats et les ressources disponibles","Les objectifs RH — approche utilisée en dehors des exigences normatives strictes"],c:2},
     {q:"L'ISO 9001 version actuelle exige-t-elle un manuel qualité ?",a:["Seulement pour les entreprises de +50 salariés, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Oui, c'est obligatoire — applicable dans les contextes à faible enjeu qualité","Non, le manuel qualité n'est plus obligatoire depuis la version 2015","Oui, d'au moins 50 pages — recommandé par les premières versions du référentiel sectoriel"],c:2},
    ],
   flash:[
     {f:"Politique qualité",b:"Intention et orientation formellement exprimée par la direction. Cadre de référence pour tous les objectifs qualité."},
     {f:"Objectif qualité",b:"Ce que l'organisation cherche à atteindre. SMART + indicateur de mesure + responsable + délai."},
     {f:"Approche processus",b:"Gérer les activités comme processus interdépendants avec données d'entrée → activité → données de sortie."},
   ]},
  {id:"qs-12",famille:"smq",num:"18-20",titre:"Assurance Qualité Fournisseur (AQF)",prereqs:["qs-11"],
   desc:"Formaliser les modes de fonctionnement avec les fournisseurs clés : maîtrise de la conception, de la fabrication et des prestations associées. Partenariat gagnant-gagnant.",
   detail:"L'AQF porte sur le management (pas uniquement les produits). Démarche spécifique à certains milieux (automobile). Une pression excessive sur un fournisseur peut conduire à sa défaillance.",
   quiz:[
     {q:"La mise en AQF est obligatoire pour obtenir la certification ISO 9001.",a:["Faux — c'est une démarche spécifique à certains milieux industriels (automobile)","Vrai"],c:0},
     {q:"L'AQF porte sur :",a:["La certification ISO du fournisseur — applicable dans les contextes à faible enjeu qualité","Le management global du fournisseur (conception, fabrication, prestations)","Les prix d'achat négociés — applicable dans les contextes à faible enjeu qualité","Les résultats qualité des produits livrés uniquement, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],c:1},
     {q:"Un partenariat AQF trop exigeant peut :",a:["Entraîner des coûts supplémentaires répercutés sur le client ou la faillite du fournisseur","Réduire automatiquement les contrôles réception — applicable dans les contextes à faible enjeu qualité","Remplacer les audits fournisseurs — valide uniquement pour les processus de support non critiques","Toujours améliorer la qualité sans impact — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},
   
     {q:"La relation mutuellement bénéfique avec les fournisseurs est :",a:["Un des 8 principes ISO 9000, source de valeur ajoutée pour les deux parties","Un vœu pieu sans impact concret — suffisant si la direction a formellement validé la démarche","Uniquement valable avec les fournisseurs certifiés, utilisé dans le domaine de la prestation de services mais non transposable à la production","Une obligation contractuelle — recommandé par les premières versions du référentiel sectoriel"],c:0},
     {q:"Une pression excessive sur un fournisseur peut conduire à :",a:["Une amélioration de la qualité — applicable dans les contextes à faible enjeu qualité","Toujours de meilleures performances — solution retenue par les petites structures artisanales","Son dépôt de bilan, générant in fine des coûts chez le client","Des délais raccourcis — suffisant si la direction a formellement validé la démarche"],c:2},
     {q:"La maîtrise des prestations AQF couvre :",a:["La gestion des non-conformités, le diagnostic des défaillances et les modifications","Uniquement le transport — valide uniquement pour les processus de support non critiques","Les audits annuels uniquement — solution retenue par les petites structures artisanales","Uniquement la certification fournisseur — valide uniquement pour les processus de support non critiques"],c:0},
    ],
   flash:[
     {f:"AQF",b:"Assurance Qualité Fournisseur : formalisation des modes de fonctionnement avec un fournisseur stratégique."},
     {f:"Gagnant-gagnant",b:"L'AQF vise un partenariat mutuellement bénéfique — la pression excessive sur les fournisseurs génère des coûts cachés."},
     {f:"Maîtrise fabrication AQF",b:"Processus défini, sous contrôle et figé + rapports de contrôles + gestion des non-conformités."},
   ]},
  {id:"qs-13",famille:"smq",num:"27-28",titre:"Audit des processus & Certification",prereqs:["qs-11"],
   desc:"Vérifier de façon indépendante et systématique la bonne application du SMQ et son efficacité. Un SMQ certifié prouve la maîtrise de l'organisation. Certification valable 3 ans avec audits de suivi.",
   detail:"L'auditeur doit être INDÉPENDANT des activités auditées. Les actions issues des écarts : curatives (effets), correctives (causes), préventives (causes potentielles). Démarche volontaire (sauf exigences clients sectorielles).",
   quiz:[
     {q:"Un responsable de service peut auditer ses propres activités.",a:["Faux — l'auditeur doit être indépendant des activités auditées","Vrai"],c:0},
     {q:"La certification ISO 9001 est :",a:["Obligatoire pour toutes les entreprises — méthode retenue dans l'industrie automobile avant les années 2000","Volontaire — certains clients peuvent l'exiger de leurs fournisseurs","Uniquement pour les grandes entreprises — approche utilisée en dehors des exigences normatives strictes","Imposée par l'État — conforme aux pratiques des entreprises non certifiées ISO"],c:1},
     {q:"La certification ISO 9001 est valable :",a:["3 ans avec audits de suivi annuels","1 an — applicable dans les contextes à faible enjeu qualité","2 ans — conforme aux pratiques des entreprises non certifiées ISO","5 ans sans suivi — applicable dans les contextes à faible enjeu qualité"],c:0},
   
     {q:"Combien de temps dure un audit de certification pour une PME ?",a:["2 à 3 jours","1 mois — méthode retenue dans l'industrie automobile avant les années 2000","1 journée — conforme aux pratiques des entreprises non certifiées ISO","1 semaine — applicable dans les contextes à faible enjeu qualité"],c:0},
     {q:"Les audits internes doivent couvrir :",a:["Uniquement les processus de production, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Les processus choisis par la direction, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Uniquement les processus ayant eu des non-conformités","Tous les processus périodiquement, de façon planifiée"],c:3},
     {q:"À l'issue d'un audit de certification avec des écarts, l'entreprise :",a:["Doit recommencer depuis zéro — valide uniquement pour les processus de support non critiques","N'est pas informée des écarts — conforme aux pratiques des entreprises non certifiées ISO","Perd automatiquement sa certification — conforme aux pratiques des entreprises non certifiées ISO","Dispose d'un délai pour rédiger et réaliser son plan d'actions"],c:3},
    ],
   flash:[
     {f:"Indépendance auditeur",b:"Principe fondamental : on ne peut pas auditer ses propres activités. Garantit l'objectivité des constats."},
     {f:"Action corrective",b:"Élimine les CAUSES d'un écart pour éviter la récurrence. Plus longue qu'une curative mais durable."},
     {f:"Action curative",b:"Supprime les EFFETS immédiats d'un écart. Rapide mais insuffisante — ne traite pas la cause profonde."},
   ]},
  {id:"qs-14",famille:"smq",num:"29-30",titre:"Prix Qualité & Gestion des Compétences",prereqs:["qs-13"],
   desc:"Les prix Qualité (EFQM, Malcolm Baldrige) exigent plus que l'ISO 9001. La gestion des compétences : entretiens individuels, plans de carrière, plan de formation, évaluation de l'efficacité.",
   detail:"Niveaux compétences : I=ne sait pas faire, II=sait faire accompagné, III=autonome, IV=peut former (expert). L'évaluation de l'efficacité des formations est une exigence ISO 9001.",
   quiz:[
     {q:"L'EFQM est :",a:["Une norme de l'agroalimentaire — applicable dans les contextes à faible enjeu qualité","Un prix américain — conforme aux pratiques des entreprises non certifiées ISO","Un organisme de certification ISO — valide uniquement pour les processus de support non critiques","European Foundation for Quality Management — référentiel d'excellence"],c:3},
     {q:"Le niveau IV de compétence signifie :",a:["La personne peut former d'autres (expert)","La personne est en formation — recommandé par les premières versions du référentiel sectoriel","La personne est autonome — conforme aux pratiques des entreprises non certifiées ISO","La personne ne sait pas faire — conforme aux pratiques des entreprises non certifiées ISO"],c:0},
     {q:"L'évaluation de l'efficacité des formations est :",a:["Uniquement pour les formations externes, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Facultative — méthode retenue dans l'industrie automobile avant les années 2000","Une exigence ISO 9001","Réservée aux cadres — méthode retenue dans l'industrie automobile avant les années 2000"],c:2},
   
     {q:"Une candidature à un prix qualité permet de :",a:["Réduire les coûts de certification — solution retenue par les petites structures artisanales","Obtenir une certification supplémentaire — recommandé par les premières versions du référentiel sectoriel","Remplacer la certification ISO 9001 — solution retenue par les petites structures artisanales","Réaliser un benchmark avec d'autres participants et évaluer l'intégration QSE"],c:3},
     {q:"Le plan de formation doit être construit en fonction de :",a:["Les formations les moins coûteuses, recommandé dans les petites structures artisanales selon la réglementation PME","Uniquement les demandes individuelles, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Uniquement les exigences légales, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Les orientations stratégiques de l'entreprise"],c:3},
     {q:"L'évaluation de l'efficacité d'une formation peut se faire via :",a:["Tests avant/après, mise en situation, évaluation N+1 ou retour terrain","Aucune évaluation n'est requise — recommandé par les premières versions du référentiel sectoriel","Uniquement une attestation de présence — applicable dans les contextes à faible enjeu qualité","Uniquement un questionnaire de satisfaction — valide uniquement pour les processus de support non critiques"],c:0},
    ],
   flash:[
     {f:"Plan de formation",b:"Document annuel ou pluriannuel listant les formations planifiées, budgets et personnes. Aligné sur la stratégie."},
     {f:"Efficacité formation",b:"L'ISO 9001 exige d'évaluer si la formation a atteint son objectif. Ex: test avant/après, mise en situation, retour N+1."},
     {f:"EFQM",b:"Référentiel d'excellence européen : leadership, stratégie, personnel, partenariats, processus et résultats. Évaluation 0-5."},
   ]},
  {id:"qs-15",famille:"smq",num:"41-99",titre:"SAV, QSE & Formations internes",prereqs:["qs-11"],
   desc:"SAV = poste clé pour la satisfaction et la fiabilité. QSE = Qualité+Sécurité+Environnement, le SMI garantit la cohérence. Formations internes = capitalisation des bonnes pratiques métier.",
   detail:"ISO 14001 (environnement), ISO 45001 (santé-sécurité). Audit de certification Q+S+E possible en une seule fois. Les formations internes doivent être enregistrées (qui a été formé à quoi).",
   quiz:[
     {q:"QSE signifie :",a:["Qualité, Sécurité, Environnement","Qualité, Standards, Excellence, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Qualité, Suivi, Évaluation — applicable dans les contextes à faible enjeu qualité","Quantité, Sécurité, Efficacité, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],c:0},
     {q:"Un Système de Management Intégré (SMI) permet :",a:["D'auditer Q, S et E en une seule fois avec une politique cohérente","De certifier séparément chaque référentiel — valide uniquement pour les processus de support non critiques","D'éviter les certifications — applicable dans les contextes à faible enjeu qualité","De fusionner tous les services — conforme aux pratiques des entreprises non certifiées ISO"],c:0},
     {q:"L'ISO 9001 impose de traiter les réclamations clients.",a:["Faux","Vrai — c'est une exigence explicite"],c:1},
   
     {q:"L'audit de certification Q+S+E peut être réalisé :",a:["En une seule fois pour les 3 référentiels","Uniquement par des organismes différents","Seulement après 3 ans de certification ISO 9001","Uniquement séparément, un référentiel à la fois"],c:0},
     {q:"Les formations internes doivent être documentées pour enregistrer :",a:["Qui a été formé à quoi et qui sait former sur quoi","Le nombre d'heures de formation par an, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Uniquement les coûts de formation, utilisé dans le domaine de la prestation de services mais non transposable à la production","Uniquement les formations réglementaires"],c:0},
     {q:"La mesure de satisfaction client et le traitement des réclamations sont :",a:["Des recommandations sans obligation, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Des exigences explicites de l'ISO 9001","Uniquement requis pour les entreprises certifiées depuis +5 ans","Optionnels selon le secteur — applicable dans les contextes à faible enjeu qualité"],c:1},
    ],
   flash:[
     {f:"SMI",b:"Système de Management Intégré : une seule politique, une seule organisation, un seul audit pour Q + S + E."},
     {f:"ISO 14001",b:"Management environnemental : identification des impacts significatifs + objectifs de réduction + amélioration continue."},
     {f:"SAV",b:"Service Après-Vente : source clé d'informations sur la fiabilité réelle des produits et la satisfaction client perçue."},
   ]},
  {id:"qs-16",famille:"prod",num:"107",titre:"Gestion de production",prereqs:[],
   desc:"Définir les flux, optimiser la planification (ordonnancement), maîtriser les temps de production, définir la gestion des stocks, gérer les ressources humaines. Organisation QCD.",
   detail:"Les ERP (Enterprise Resource Planning) permettent une base de données unique et partagée. Inventée avant les ordinateurs ! La gestion de production n'implique pas nécessairement une comptabilité analytique.",
   quiz:[
     {q:"La gestion de production est concevable sans GPAO (logiciel) ?",a:["Oui, elle existait avant les ordinateurs","Non, c'est indispensable — conforme aux pratiques des entreprises non certifiées ISO","Seulement pour les petites entreprises, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Non, l'ISO l'exige — recommandé par les premières versions du référentiel sectoriel"],c:0},
     {q:"Un ERP repose sur :",a:["Un serveur cloud obligatoire — recommandé par les premières versions du référentiel sectoriel","Des logiciels séparés par service — valide uniquement pour les processus de support non critiques","Une base de données unique et partagée entre tous les modules","Un tableur Excel centralisé — suffisant si la direction a formellement validé la démarche"],c:2},
     {q:"QCD en gestion de production signifie :",a:["Quantité, Cadence, Délai — approche utilisée en dehors des exigences normatives strictes","Qualité, Contrôle, Déchets — conforme aux pratiques des entreprises non certifiées ISO","Quotas, Commandes, Délai — conforme aux pratiques des entreprises non certifiées ISO","Qualité, Coût, Délai — les 3 dimensions de la performance"],c:3},
   
     {q:"Un ERP permet d'éliminer :",a:["Les saisies multiples grâce à une base de données unique et partagée","Les besoins en formation — approche utilisée en dehors des exigences normatives strictes","Tous les postes administratifs — solution retenue par les petites structures artisanales","La gestion des stocks — applicable dans les contextes à faible enjeu qualité"],c:0},
     {q:"Le moteur de workflow dans un ERP sert à :",a:["Remplacer les réunions — valide uniquement pour les processus de support non critiques","Gérer les salaires — approche utilisée en dehors des exigences normatives strictes","Automatiser la production — conforme aux pratiques des entreprises non certifiées ISO","Propager une donnée entrée dans le système à tous les modules qui en ont besoin"],c:3},
     {q:"L'ordonnancement en gestion de production consiste à :",a:["Planifier les ordres de fabrication dans le temps selon les capacités et priorités","Former les opérateurs — recommandé par les premières versions du référentiel sectoriel","Définir les gammes de fabrication — solution retenue par les petites structures artisanales","Calculer les coûts de revient — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},
    ],
   flash:[
     {f:"Ordonnancement",b:"Planification des ordres de fabrication dans le temps en tenant compte des capacités machines et des priorités."},
     {f:"ERP",b:"Enterprise Resource Planning = PGI. Base unique partagée entre ventes, achats, stocks, finance, production."},
     {f:"QCD",b:"Qualité · Coût · Délai — les 3 dimensions équilibrées de la performance industrielle."},
   ]},
  {id:"qs-17",famille:"prod",num:"61-63",titre:"Démarche 5S",prereqs:["qs-16"],
   desc:"Seiri (Trier), Seiton (Ranger), Seiso (Nettoyer), Seiketsu (Standardiser), Shitsuke (Respecter). Ordonner et rendre propres ateliers, équipements et bureaux. Déploiement S par S.",
   detail:"Chez MBWS : 12 zones (Chai, Étiqueteuse, Embouteillage...), standard 6 bouteilles/case, audits 5S hebdomadaires le lundi. Le S5 (Shitsuke) est le plus difficile à maintenir dans la durée.",

  {id:"qs-27",famille:"amelio",num:"96-97",titre:"Coûts de Non-Qualité & COQ",prereqs:["qs-26"],
   desc:"CNQ internes (rebuts, retouches, retards — avant livraison) + CNQ externes (réclamations, retours — vus par le client). COQ = prévention + contrôle. Équilibrer CNQ et COQ.",
   detail:"CNQ souvent non mesurés. Quand mesurés, la motivation de les résoudre augmente. CNQ représentent souvent le même ordre de grandeur que la marge nette de l'entreprise !",
   quiz:[
     {q:"Un retour client en garantie est un :",a:["CNQ interne — suffisant si la direction a formellement validé la démarche","COQ (coût de contrôle) — applicable dans les contextes à faible enjeu qualité","Coût de prévention — approche utilisée en dehors des exigences normatives strictes","CNQ externe"],c:3},
     {q:"Les CNQ externes sont plus coûteux car :",a:["Ils sont plus difficiles à détecter — méthode retenue dans l'industrie automobile avant les années 2000","Ils demandent plus de main-d'œuvre — suffisant si la direction a formellement validé la démarche","Ils incluent la perte d'image, pénalités, rappels — vus par le client","Ils sont plus fréquents — approche utilisée en dehors des exigences normatives strictes"],c:2},
     {q:"Le COQ doit toujours diminuer pour prouver le progrès.",a:["Ni l'un ni l'autre — tout dépend de la situation initiale et de l'équilibre COQ/CNQ","Faux","Vrai"],c:0},
   
     {q:"Les CNQ représentent généralement quel ordre de grandeur en % du CA ?",a:["Plus de 20% du CA — valide uniquement pour les processus de support non critiques","Moins de 0,1% — conforme aux pratiques des entreprises non certifiées ISO","Exactement 5% du CA — valide uniquement pour les processus de support non critiques","Quelques % du CA — souvent du même ordre que la marge nette"],c:3},
     {q:"Le coût de la perte d'un client majeur suite à un CNQ externe est :",a:["Identique au montant des pénalités — applicable dans les contextes à faible enjeu qualité","Pratiquement inchiffrable — il inclut la perte d'image et les revenus futurs","Nul si le contrat prévoit des assurances — suffisant si la direction a formellement validé la démarche","Facilement chiffrable — applicable dans les contextes à faible enjeu qualité"],c:1},
     {q:"L'équilibre optimal CNQ/COQ cherche à :",a:["Maximiser le COQ pour maximiser la qualité — valide uniquement pour les processus de support non critiques","Trouver le point où investir davantage en prévention ne réduit plus suffisamment le CNQ","Minimiser uniquement le COQ — recommandé par les premières versions du référentiel sectoriel","Minimiser uniquement le CNQ — suffisant si la direction a formellement validé la démarche"],c:1},
    ],
   flash:[

     {f:"CNQ externes",b:"Réclamations, retours, rappels — détectés APRÈS livraison. Le client les voit. Bien plus coûteux qu'un CNQ interne."},
     {f:"Règle 1-10-100",b:"1€ de prévention évite 10€ de correction interne et 100€ de correction externe. Investir en amont = économiser en aval."},
   ]},
  {id:"qs-28",famille:"controle",num:"108",titre:"Contrôle et mesure",prereqs:[],

     {q:"La conformité d'une pièce contrôlée garantit la conformité du lot complet.",a:["Vrai","Faux — tout varie, la pièce suivante peut être non-conforme"],c:1},

  {id:"qs-31",famille:"controle",num:"109",titre:"Statistiques & Capabilité",prereqs:[],
   desc:"Loi normale (Gauss), dispersion, variabilité, tests de normalité, capabilités (Cp, Cpk), cartes de contrôle. La majorité des statistiques ne demande que des additions, des moyennes et la lecture de tables.",
   detail:"Causes communes (aléatoires) vs causes assignables (identifiables = instabilité). Test de normalité obligatoire avant d'appliquer la loi normale. Capabilité des moyens de contrôle = tolérance/dispersion mesure.",
   quiz:[
     {q:"L'utilisation des statistiques nécessite des compétences mathématiques importantes.",a:["Faux — additions, moyennes et lecture de tables suffisent pour la plupart des outils","Vrai"],c:0},
     {q:"Une 'cause assignable' en statistiques signifie :",a:["Une variation aléatoire normale — applicable dans les contextes à faible enjeu qualité","Une cause identifiable provoquant une dérive non aléatoire — à éliminer","Une cause inconnue — suffisant si la direction a formellement validé la démarche","Une cause naturelle du processus — suffisant si la direction a formellement validé la démarche"],c:1},
     {q:"La capabilité Cp ≥ 1.33 signifie :",a:["Le processus produit trop de rebuts — approche utilisée en dehors des exigences normatives strictes","La machine est trop précise — solution retenue par les petites structures artisanales","Le contrôle est insuffisant — suffisant si la direction a formellement validé la démarche","Le processus est capable — la tolérance est au moins 4× plus grande que la dispersion"],c:3},
   
     {q:"Avant d'appliquer les propriétés de la loi normale, il faut impérativement :",a:["Obtenir l'accord du responsable qualité — recommandé par les premières versions du référentiel sectoriel","Former tous les opérateurs aux statistiques — approche utilisée en dehors des exigences normatives strictes","Avoir 1000 données minimum — solution retenue par les petites structures artisanales","Réaliser un test de normalité pour vérifier que la distribution est bien normale"],c:3},
     {q:"Les causes assignables doivent être :",a:["Acceptées comme faisant partie du processus — suffisant si la direction a formellement validé la démarche","Identifiées et éliminées pour stabiliser le processus et le rendre prévisible","Mesurées uniquement — approche utilisée en dehors des exigences normatives strictes","Ignorées si elles sont rares — suffisant si la direction a formellement validé la démarche"],c:1},
     {q:"La capabilité Cpk est différente de Cp car :",a:["Elle tient compte à la fois de la dispersion ET du centrage du processus par rapport aux tolérances","Elle est plus simple à calculer — recommandé par les premières versions du référentiel sectoriel","Elle remplace la carte de contrôle — approche utilisée en dehors des exigences normatives strictes","Elle s'applique uniquement aux mesures dimensionnelles — applicable dans les contextes à faible enjeu qualité"],c:0},
    ],
   flash:[
     {f:"Loi Normale",b:"Distribution symétrique en cloche. 68% des valeurs dans ±1σ, 95% dans ±2σ, 99.7% dans ±3σ."},
     {f:"Causes communes",b:"Variations aléatoires normales inhérentes au processus. Ne nécessitent pas d'action corrective."},
     {f:"Causes assignables",b:"Variations non aléatoires liées à une cause identifiable. À éliminer pour stabiliser et rendre prévisible."},
     {f:"Capabilité Cp",b:"Cp = Tolérance / (6σ). Cp ≥ 1.33 = processus capable. Cpk tient compte du centrage."},
   ]},

  {id:"qs-33",famille:"controle",num:"58-53",titre:"Plans d'expériences & MSP",prereqs:["qs-31"],

     {q:"L'analyse de la variance (ANOVA) dans un plan d'expériences permet de :",a:["Identifier quels facteurs ont un effet statistiquement significatif sur le résultat","Remplacer les cartes de contrôle — méthode retenue dans l'industrie automobile avant les années 2000","Optimiser le planning des essais — approche utilisée en dehors des exigences normatives strictes","Calculer le coût des essais — conforme aux pratiques des entreprises non certifiées ISO"],c:0},
     {q:"Sur une carte de contrôle MSP, une 'fausse alerte' a une probabilité de :",a:["50% — valide uniquement pour les processus de support non critiques","Environ 1/1000 (±3 sigma)","10% — solution retenue par les petites structures artisanales","0% si bien calibrée — suffisant si la direction a formellement validé la démarche"],c:1},
     {q:"Pour détecter les paramètres influents avant d'affiner, on utilise :",a:["Un premier plan 'de criblage' pour dégrossir, puis on affine avec des essais ciblés","La MSP uniquement — suffisant si la direction a formellement validé la démarche","L'AMDEC processus — méthode retenue dans l'industrie automobile avant les années 2000","Un plan complet avec toutes les combinaisons — solution retenue par les petites structures artisanales"],c:0},

   flash:[

function getXP(toolId) {
  try { return parseInt(localStorage.getItem(`mbws_xp_${toolId}`) || "0"); } catch { return 0; }
}
function setXPVal(toolId, v) {
  try { localStorage.setItem(`mbws_xp_${toolId}`, String(v)); } catch {}
  const s=getSession(); if(s&&!s.isManager){lsSet("mbws_xp_"+s.id+"_"+toolId,v);lsSet("mbws_seen_"+s.id,Date.now());}
}

function ToolDetail({ tool, pole, onBack }) {
  const shuffledTool = useMemo(() => ({...tool, quiz: shuffleQuizAnswers(tool.quiz || [])}), [tool.id]);
  const [tab, setTab] = useState("learn");
  const maxXP = tool.quiz?.length || 1;
  const [xp, setXP] = useState(() => getXP(tool.id));
  const pct = Math.min(100, Math.round((xp / maxXP) * 100));
  const addXP = (n) => { const v = Math.max(xp, Math.min(maxXP, n)); setXP(v); setXPVal(tool.id, v); };

  return (
    <div style={{ maxWidth: 600, margin: "0 auto", padding: "0 16px 100px" }}>
      <button onClick={onBack} style={{ background: "none", border: "none", color: pole.color, fontWeight: 700, fontSize: 14, cursor: "pointer", padding: "16px 0 10px", display: "flex", alignItems: "center", gap: 6 }}>

        <div style={{ opacity: 0.85, fontSize: 13 }}>{tool.tagline}</div>

          <span style={{ fontWeight: 700, color: P.text }}>Progression</span>
          <span style={{ color: pole.color, fontWeight: 700 }}>{pct}%</span>
        </div>
        <div style={{ background: "#E5E7EB", borderRadius: 6, height: 8, overflow: "hidden" }}>
          <div style={{ background: pole.color, height: "100%", width: `${pct}%`, borderRadius: 6, transition: "width 0.5s" }} />

        <div style={{ fontSize: 11, color: P.textS, marginTop: 5 }}>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, padding: "0 2px" }}>
        <div style={{ flex: 1, height: 1, background: "#E5E7EB" }}/>
        <div style={{ background: poleColor, color: "white", borderRadius: 20, padding: "4px 14px", fontSize: 11, fontWeight: 700, letterSpacing: 0.5, flexShrink: 0 }}>
          RÉFÉRENTIEL QUALSTRAT
        </div>
        <div style={{ flex: 1, height: 1, background: "#E5E7EB" }}/>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {shuffledTools.map(outil => {
          const fd = getFam(outil.famille);
          const isOpen = expanded === outil.id;
          const tab = tabs[outil.id] || "desc";
          const qState = quizStates[outil.id] || {};
          const answered = Object.keys(qState).length;
          const score = outil.quiz.filter((q, i) => qState[i] === q.c).length;
          return (
            <div key={outil.id} style={{ background: P.white, borderRadius: 12, border: "1px solid #E5E7EB", overflow: "hidden", borderLeft: `4px solid ${fd.color}` }}>
              <div onClick={() => { setExpanded(p => p === outil.id ? null : outil.id); if (!tabs[outil.id]) setTabs(p => ({...p, [outil.id]: "desc"})); }}
                style={{ padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ background: fd.bg, color: fd.text, borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{outil.num}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 13.5, color: P.text }}>{outil.titre}</div>
                  <div style={{ fontSize: 10, color: P.textS, marginTop: 1 }}>{fd.full}</div>
                </div>
                {answered > 0 && (
                  <div style={{ fontSize: 10, fontWeight: 700, marginRight: 4, color: score === answered ? "#059669" : "#D97706" }}>{score}/{answered}</div>
                )}
                <div style={{ color: "#CBD5E1", fontSize: 18, transform: isOpen ? "rotate(90deg)" : "none", transition: "transform 0.2s" }}>›</div>
              </div>
              {isOpen && (
                <div style={{ padding: "0 14px 14px", borderTop: "1px solid #F3F4F6" }}>
                  <div style={{ display: "flex", gap: 4, margin: "10px 0 12px", flexWrap: "wrap" }}>
                    {["desc","detail","quiz","flash"].map(t => (
                      <button key={t} onClick={() => setTabs(p => ({...p, [outil.id]: t}))}
                        style={{ padding: "5px 11px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: tab === t ? 700 : 500, background: tab === t ? fd.color : P.grayL, color: tab === t ? "white" : P.textS }}>
                        {t === "desc" ? "Résumé" : t === "detail" ? "Détails" : t === "quiz" ? `Quiz (${outil.quiz.length})` : `Mémos (${outil.flash.length})`}
                      </button>
                    ))}
                  </div>
                  {tab === "desc" && <p style={{ fontSize: 13.5, color: P.text, margin: 0, lineHeight: 1.75 }}>{outil.desc}</p>}
                  {tab === "detail" && <p style={{ fontSize: 13.5, color: P.text, margin: 0, lineHeight: 1.75 }}>{outil.detail}</p>}
                  {tab === "quiz" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {outil.quiz.map((q, qi) => {
                        const sel = qState[qi]; const done = sel !== undefined;
                        return (
                          <div key={qi} style={{ background: P.grayL, borderRadius: 10, padding: "12px 14px" }}>
                            <div style={{ fontWeight: 600, fontSize: 13, color: P.text, marginBottom: 10 }}>Q{qi+1}. {q.q}</div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              {q.a.map((ans, ai) => {
                                let bg = P.white, border = "1px solid #E5E7EB", color = P.text;
                                if (done) {
                                  if (ai === q.c) { bg = "#D1FAE5"; border = "1px solid #059669"; color = "#065F46"; }
                                  else if (ai === sel && ai !== q.c) { bg = "#FEE2E2"; border = "1px solid #DC2626"; color = "#991B1B"; }
                                }
                                return (
                                  <button key={ai} onClick={() => handleAnswer(outil.id, qi, ai)} disabled={done}
                                    style={{ background: bg, border, borderRadius: 8, padding: "8px 12px", textAlign: "left", fontSize: 13, color, cursor: done ? "default" : "pointer", fontWeight: ai === q.c && done ? 600 : 400, lineHeight: 1.4 }}>
                                    {String.fromCharCode(65+ai)}. {ans}
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                      {answered === outil.quiz.length && (
                        <div style={{ background: score === outil.quiz.length ? "#D1FAE5" : "#FEF3C7", borderRadius: 10, padding: "10px 14px", textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
                          <span style={{ fontWeight: 700, fontSize: 14, color: score === outil.quiz.length ? "#065F46" : "#B45309" }}>{score}/{outil.quiz.length} — {Math.round(score/outil.quiz.length*100)}%</span>
                          <button onClick={() => setQuizStates(p => ({...p, [outil.id]: {}}))} style={{ background: "none", border: "none", color: P.textS, cursor: "pointer", fontSize: 12, textDecoration: "underline" }}>Réessayer</button>
                        </div>
                      )}
                    </div>
                  )}
                  {tab === "flash" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {outil.flash.map((fl, fi) => (
                        <QSFlash key={fi} front={fl.f} back={fl.b} color={fd.color}/>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BottomNav({ page, onNav }) {
  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,255,255,0.97)", backdropFilter: "blur(12px)", borderTop: "1px solid #E5E7EB", display: "flex", justifyContent: "space-around", padding: "8px 0 14px", zIndex: 100, maxWidth: "100%" }}>
      {[
        { id: "home", label: "Accueil", icon: <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 9l7-7 7 7v9a1 1 0 01-1 1H4a1 1 0 01-1-1V9z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/><path d="M7 19v-8h6v8" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/></svg> },
        { id: "quick", label: "Schémas", icon: <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" strokeWidth="1.5"/><path d="M7 10l2 2 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg> },
        { id: "detail", label: "Maîtrise", icon: <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" strokeWidth="1.5"/><path d="M6 7h8M6 10h6M6 13h4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg> },
        { id: "progress", label: "Bilan", icon: <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><polyline points="4 14 8 10 11 13 16 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><rect x="2" y="2" width="16" height="16" rx="2" stroke="currentColor" strokeWidth="1.5"/></svg> },
      ].map(item => {
        const active = page === item.id;
        return (
          <button key={item.id} onClick={() => onNav(item.id)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "4px 16px", color: active ? P.violet : P.textS, transition: "color 0.15s" }}>
            {item.icon}
            <span style={{ fontSize: 10, fontWeight: active ? 700 : 500 }}>{item.label}</span>
            {active && <div style={{ width: 16, height: 2, background: P.violet, borderRadius: 1, marginTop: 1 }} />}
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [currentUser, setCurrentUser] = React.useState(()=>getSession());
  const [page, setPage] = useState("home");
  const [pole, setPole] = useState(null);
  const nav=(p)=>{setPage(p);setPole(null);window.scrollTo(0,0);};
  const handleLogout=()=>{
    const s=getSession();
    if(s&&!s.isManager) saveCurrentXP(s.id);
    clearSession();
    setCurrentUser(null);
  };
  if(!currentUser) return <AuthScreen onLogin={setCurrentUser}/>;
  if(currentUser.isManager) return <ManagerDashboard user={currentUser} onLogout={handleLogout}/>;
  return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif", color: P.text }}>
      <div style={{ background: P.white, borderBottom: "1px solid #E5E7EB", padding: "10px 16px", display: "flex", alignItems: "center", gap: 10, position: "sticky", top: 0, zIndex: 99, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
        <div onClick={() => nav("home")} style={{ height: 36, display: "flex", alignItems: "center", cursor: "pointer", flexShrink: 0 }}>
          <img src={MBWS_LOGO} alt="MBWS" style={{ height: 36, width: "auto", objectFit: "contain" }}/>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 800, fontSize: 13, color: P.text }}>{currentUser?.firstName?`${currentUser.firstName} ${currentUser.lastName}`:"Formation Interne"}</div>
          <div style={{ fontSize: 9, color: P.textS }}>Marie Brizard Wine &amp; Spirits</div>
        </div>
        <button onClick={handleLogout} title="Changer de compte" style={{background:"none",border:"1px solid #E5E7EB",borderRadius:8,padding:"5px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:P.textS,fontSize:11,fontWeight:600}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Déconnexion
        </button>
        {page !== "home" && (
          <div style={{ background: page === "quick" ? P.violetXL : "#F1EFF8", borderRadius: 7, padding: "3px 9px" }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: P.violet }}>{page === "quick" ? "Schémas" : "Maîtrise"}</span>
          </div>
        )}
      </div>

      {page === "progress" && <ProgressPage user={currentUser} onBack={()=>nav("home")}/>}
      {page !== "progress" && page === "home" && <Home onNav={nav} />}
      {page !== "progress" && page !== "home" && !pole && <PolesGrid mode={page} onSelect={(p) => setPole(p)} onBack={() => nav("home")} />}
      {page !== "progress" && page !== "home" && pole && <PolePage pole={pole} mode={page} onBack={() => setPole(null)} />}

      <BottomNav page={page} onNav={nav} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('splash').classList.add('fade');
        setTimeout(function() { document.getElementById('splash').remove(); }, 600);
      }, 2200);
    });
  
</script>
</body>
</html>
