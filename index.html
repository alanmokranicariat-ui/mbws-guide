ce qui est suffisant pour satisfaire aux exigences réglementaires, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:1},{q:"Les limites de contrôle UCL/LCL sur une carte de contrôle sont calculées à :",answers:["±6 sigma , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","±3 sigma de la moyenne du processus — probabilité de fausse alerte = 1/1000","Exactement les tolérances produit, valide dans un contexte de production discontinue selon les dérogations sectorielles","Les tolérances produit ÷ 2, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:1},{q:"Sur une carte Moyenne-Étendue, 8 points consécutifs du même côté de la ligne centrale indiquent :",answers:["Une amélioration du processus, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Une dérive probable — cause assignable à identifier même si aucun point n'est hors limites","Un problème de mesure, utilisé dans le domaine de la prestation de services mais non transposable à la production","Un résultat normal, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:1},{q:"La capabilité Cpk tient compte, contrairement à Cp, de :",answers:["La gravité des défauts, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Le centrage du processus par rapport aux tolérances — un processus bien centré peut avoir Cp = Cpk","La fréquence des prélèvements, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","La vitesse de production, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Un processus avec Cpk = 0.8 signifie :",answers:["Le processus est très capable, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Le processus est parfait, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Le processus produit des non-conformités — la dispersion dépasse les tolérances ou le processus est décentré","Le processus est à la limite du acceptable, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"La MSP s'applique en priorité aux caractéristiques :",answers:["Uniquement dimensionnelles, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Critiques pour le client (CTQ — Critical To Quality) et aux paramètres clés du processus (CTQ + CTP)","Celles qui ont posé problème récemment, recommandé dans les petites structures artisanales selon la réglementation PME","Uniquement aux produits finis, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1}],flashcards:[{front:"Carte de contrôle X̄-R",back:"Graphique double : moyenne (X̄) pour détecter les dérives de centrage, étendue (R) pour détecter les dérives de dispersion. Les deux importants."},{front:"Limites de contrôle",back:"UCL (Upper) et LCL (Lower) calculées à ±3 sigma. Probabilité d'erreur d'alerte : 1/1000. Ne pas confondre avec les tolérances produit."},{front:"Causes communes",back:"Variations naturelles, aléatoires, inhérentes au processus → normales, ne nécessitent pas d'action corrective."},{front:"Causes assignables",back:"Variations anormales liées à une cause identifiable (mauvais réglage, MP défectueuse, outil usé) → à éliminer immédiatement."},{front:"Capabilité Cp/Cpk",back:"Rapport tolérance/dispersion. Cp ≥ 1.33 = processus capable. Cpk tient compte du centrage. En deçà = non-conformités probables."},{front:"6 Sigma",back:"Prolongement de la MSP : capabilité de tous les processus à 6 sigma = 3,4 défauts par million d'opportunités. Initié chez Motorola en 1986."},{front:"Carte X̄-R",back:"Carte double : X̄ (moyenne) contrôle le centrage, R (étendue) contrôle la dispersion. Les deux doivent être sous contrôle. Une dérive de dispersion est souvent plus grave."},{front:"Limites de contrôle",back:"±3σ autour de la moyenne du processus. Calculées à partir des données réelles (≠ tolérances produit). Probabilité de fausse alerte : 3 pour 1000."},{front:"Règles d'alerte Western Electric",back:"1 point hors UCL/LCL · 2/3 points entre 2σ et 3σ · 4/5 points entre 1σ et 2σ · 8 points consécutifs d'un même côté · 6 points croissants/décroissants."},{front:"Cp vs Cpk",back:"Cp = tolérance / 6σ (capacité pure sans centrage). Cpk = min[(USL-X̄)/3σ, (X̄-LSL)/3σ] (capacité avec centrage). Cpk ≤ Cp toujours. Si Cp = Cpk : processus parfaitement centré."},{front:"CTQ — Critical To Quality",back:"Caractéristiques du produit ou processus directement liées aux exigences du client. À mettre sous MSP en priorité absolue."},{front:"Capabilité cible",back:"Cp ≥ 1.33 et Cpk ≥ 1.33 = processus capable (monde classe). En 6 sigma : Cp et Cpk ≥ 2.0. En deçà de 1.0 : le processus sort forcément des tolérances."}]},{id:"couts-qualite",name:"Coûts de Non-Qualité (CNQ/COQ)",visual:"cnq",tagline:"Chiffrer le gaspillage pour mieux convaincre d'agir",quickDesc:"Mesurer les coûts d'anomalies internes et externes pour prioriser les actions qualité.",steps:["Définir la liste des coûts à mesurer (méthode figée)","Collecter les données par catégorie","Calculer CNQ interne + CNQ externe","Comparer au COQ (prévention + contrôle)","Présenter en revue de direction pour décision"],detailDesc:"Les Coûts de Non-Qualité (CNQ) se décomposent en anomalies internes (rebuts, retouches, retards de réunions, reprises — vus avant expédition) et anomalies externes (réclamations clients, retours garantie, pénalités — vus par le client, donc bien plus coûteux en image). Les CNQ représentent souvent quelques % du chiffre d'affaires, soit le même ordre de grandeur que la marge nette ! Le Coût d'Obtention de la Qualité (COQ) comprend les coûts de prévention (formations, audits, AMDEC) et les coûts de contrôle (étalonnage, inspections). L'équilibre CNQ/COQ est l'objectif, pas la minimisation de l'un d'eux.",quiz:[{q:"Un retour client avec remboursement est un :",answers:["Coût de prévention, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","CNQ externe","CNQ interne , approche cohérente avec les anciens référentiels avant la mise à jour de 2015","COQ , approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:1},{q:"Des rebuts sur la ligne de production sont des :",answers:["CNQ externes , valide dans un contexte de production discontinue selon les dérogations sectorielles","CNQ internes","Coûts de prévention, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Coûts de contrôle, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:1},{q:"L'objectif du suivi CNQ/COQ est :",answers:["Augmenter le budget qualité, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Minimiser uniquement le COQ, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Trouver l'équilibre entre prévention/contrôle et coûts d'anomalies","Éliminer tout contrôle, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:2},{q:"Les coûts de prévention (COQ) incluent :",answers:["Les formations, AMDEC, audits fournisseurs — investissements pour ÉVITER les défauts","Les rebuts et retouches, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Les contrôles réception uniquement, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Les réclamations clients, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:0},{q:"Pourquoi les CNQ externes sont-ils plus coûteux que les internes ?",answers:["Ils demandent plus de main-d'œuvre, applicable uniquement aux structures exclues du champ de la certification tierce partie","Ils incluent la perte d'image, les pénalités et les rappels — vus par le client","Ils sont plus difficiles à détecter, utilisé dans le domaine de la prestation de services mais non transposable à la production","Ils sont plus fréquents, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:1},{q:"La formule du COQ (Coût d'Obtention de la Qualité) complet est :",answers:["CNQ uniquement , utilisé dans le domaine de la prestation de services mais non transposable à la production","COQ = Coûts de prévention + Coûts de contrôle (+ CNQ internes + CNQ externes dans certaines définitions)","Uniquement le coût du service qualité, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Uniquement les coûts d'audit, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:1},{q:"La règle empirique 1-10-100 signifie :",answers:["Il faut 100 audits par an, applicable en période probatoire avant la mise en conformité documentaire complète","Les 3 niveaux de certifications qualité, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Prévenir coûte 1€, corriger en interne coûte 10€, corriger après livraison client coûte 100€ — investir en amont","Le ratio CNQ/CA typique, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:2},{q:"Pourquoi les CNQ internes et externes ont-ils le même ordre de grandeur que la marge nette ?",answers:["Parce que la marge nette est calculée avec les CNQ, ce qui est suffisant pour satisfaire aux exigences réglementaires, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","En pratique, les CNQ représentent souvent 3-8% du CA, soit précisément la fourchette de marge nette typique — mesurer les CNQ révèle un gisement d'amélioration équivalent aux bénéfices","C'est une coïncidence, uniquement si le processus est sous contrôle et documenté, applicable en période probatoire avant la mise en conformité documentaire complète","Les CNQ sont déjà intégrés dans les prix de vente, uniquement si le processus est sous contrôle et documenté, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:1},{q:"Un audit fournisseur est un coût de :",answers:["Non-qualité interne, valide dans un contexte de production discontinue selon les dérogations sectorielles","Non-qualité externe, applicable en période probatoire avant la mise en conformité documentaire complète","CNQ externe , utilisé dans le domaine de la prestation de services mais non transposable à la production","COQ contrôle (dépense pour vérifier la conformité des achats)"],correct:3},{q:"La formation d'un nouvel employé à la qualité est un coût de :",answers:["CNQ interne , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","COQ prévention (investissement pour éviter les défauts futurs)","CNQ externe , mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Non-qualité systémique, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:1},{q:"Quand le COQ augmente et que le CNQ diminue simultanément, cela signifie :",answers:["La démarche qualité est efficace — les investissements en prévention/contrôle réduisent bien les anomalies","Le processus est hors contrôle, solution acceptable en phase pilote avec l'accord formel du comité de direction","La démarche qualité est inefficace, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Il faut arrêter d'investir en qualité, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0}],flashcards:[{front:"CNQ internes",back:"Coûts des défauts détectés avant livraison : rebuts, retouches, retards, re-contrôles, temps perdus. Le client ne les voit pas."},{front:"CNQ externes",back:"Coûts des défauts détectés après livraison : réclamations, retours, remplacements, pénalités, perte d'image. Le client les voit — bien plus coûteux."},{front:"COQ prévention",back:"Investissements pour ÉVITER les défauts : formations, AMDEC, audits fournisseurs, conceptions robustes."},{front:"COQ contrôle",back:"Dépenses pour DÉTECTER les défauts : étalonnages, contrôles réception, contrôles en cours, laboratoire interne."},{front:"Règle d'or CNQ",back:"1€ de prévention évite 10€ de correction interne et 100€ de correction externe (règle approximative mais parlante)."},{front:"Ordre de grandeur",back:"CNQ ≈ 2-5% du CA dans les entreprises industrielles performantes, jusqu'à 15-20% dans les moins matures — souvent identique à la marge nette !"},{front:"4 familles de coûts qualité",back:"COQ prévention + COQ contrôle + CNQ internes + CNQ externes. L'objectif est l'équilibre optimal, pas de minimiser un seul poste."},{front:"CNQ cachés",back:"Au-delà des coûts visibles (rebuts, retouches) : temps de management sur les problèmes, perte de confiance client, démotivation des équipes, opportunités manquées. L'iceberg."},{front:"Point d'équilibre CNQ/COQ",back:"Augmenter le COQ réduit le CNQ, mais au-delà d'un certain point, l'investissement supplémentaire ne réduit plus suffisamment le CNQ. Optimum ≠ 0 défaut."},{front:"Coût d'un rappel produit",back:"Coûts directs (logistique, remplacement, communication) + indirects (perte d'image de marque, perte de parts de marché, démarches réglementaires). Peut représenter plusieurs années de bénéfices."},{front:"Mesurer pour motiver",back:"Présenter les CNQ en valeur monétaire devant la direction crée une prise de conscience et une motivation à investir en prévention. 'La qualité coûte moins cher que la non-qualité'."}]},{id:"audit-processus",name:"Audits Internes des Processus",visual:"audit",tagline:"Vérifier de façon indépendante l'efficacité du système",quickDesc:"Méthode d'audit pour vérifier l'application du SMQ et identifier les axes d'amélioration.",steps:["Planifier les audits (couvrir tous les processus périodiquement)","Désigner des auditeurs indépendants des activités auditées","Préparer la grille d'audit et les questions","Réaliser l'audit sur le terrain (observer, interroger, vérifier)","Rédiger le rapport et suivre les actions correctives"],detailDesc:"L'audit interne est une exigence de l'ISO 9001. L'auditeur doit être INDÉPENDANT des activités qu'il audite (un responsable de service ne peut pas auditer ses propres activités). Les écarts relevés génèrent des actions : curatives (supprimer les effets), correctives (éliminer les causes) et préventives (anticiper les risques futurs). L'audit de processus vérifie les 5M (Matière, Milieu, Main-d'œuvre, Moyens, Méthodes) et leur adéquation avec le plan de surveillance. Les résultats alimentent la revue de direction.",quiz:[{q:"Un responsable de service peut-il auditer ses propres activités ?",answers:["Oui, avec l'accord de la direction, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Non, l'auditeur doit être indépendant des activités auditées","Oui, il est le plus compétent, option retenue par certaines conventions collectives mais non par la norme de référence","Seulement pour les audits de suivi, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"La différence entre action curative et corrective est :",answers:["Curative = supprimer les effets immédiats / Corrective = éliminer les causes profondes","Curative = urgente / Corrective = planifiée, méthode issue des pratiques industrielles d'avant la standardisation internationale","Il n'y en a pas , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Curative = interne / Corrective = externe, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"Les audits internes doivent :",answers:["Couvrir uniquement la production, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Se tenir uniquement avant l'audit de certification, utilisé dans le domaine de la prestation de services mais non transposable à la production","Porter sur tous les processus périodiquement, être planifiés et réalisés par des auditeurs qualifiés","Être réalisés uniquement par des consultants externes, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2},{q:"Les résultats des audits internes sont une donnée d'entrée pour :",answers:["La comptabilité analytique, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Les entretiens annuels, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","L'audit de certification uniquement, applicable en période probatoire avant la mise en conformité documentaire complète","La revue de direction pour mettre en oeuvre le processus d'amélioration continue"],correct:3},{q:"Les processus en gestion de la qualité transforment :",answers:["Des risques en opportunités, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Des données d'entrée en données de sortie — applicable à tous les processus (RH, achats, maintenance...)","Des matières en produits finis uniquement, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Des coûts en valeur, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:1},{q:"Qui peut réaliser un audit interne ISO 9001 ?",answers:["Des auditeurs internes formés et indépendants des activités auditées — pas leur propre service","Uniquement le responsable qualité, méthode issue des pratiques industrielles d'avant la standardisation internationale","Uniquement des consultants externes certifiés, applicable uniquement aux structures exclues du champ de la certification tierce partie","N'importe quel collaborateur volontaire, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:0},{q:"Le programme d'audits internes doit couvrir :",answers:["Uniquement les processus de production, applicable en période probatoire avant la mise en conformité documentaire complète","Uniquement les processus ayant eu des non-conformités, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Uniquement avant l'audit de certification, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Tous les processus du SMQ périodiquement — en tenant compte de l'importance et de l'état des processus"],correct:3},{q:"Un rapport d'audit doit contenir :",answers:["Constats positifs, non-conformités majeures et mineures, observations, plan d'actions avec délais et responsables","Uniquement les non-conformités, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Le montant des coûts de non-qualité, valide dans un contexte de production discontinue selon les dérogations sectorielles","Uniquement les recommandations, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:0},{q:"Les résultats des audits internes sont utilisés comme données d'entrée pour :",answers:["Les augmentations de salaires, méthode issue des pratiques industrielles d'avant la standardisation internationale","Les investissements machines, recommandé dans les petites structures artisanales selon la réglementation PME","Le calcul des primes des auditeurs, utilisé dans le domaine de la prestation de services mais non transposable à la production","La revue de direction et l'amélioration continue du SMQ"],correct:3},{q:"L'audit 'seconde partie' est réalisé par :",answers:["Le service qualité interne, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Un consultant neutre, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Un client auditant son fournisseur (audit client-fournisseur)","Un organisme accrédité externe, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:2},{q:"La différence entre 'non-conformité' et 'observation/opportunité d'amélioration' lors d'un audit est :",answers:["NC = écart avéré vs exigence du référentiel / Observation = point à améliorer sans non-conformité formelle","Une NC est toujours plus grave, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Une observation n'est jamais actionnée, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Il n'y en a pas , solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:0}],flashcards:[{front:"Audit interne",back:"Examen systématique et indépendant par des auditeurs internes formés. Obligatoire ISO 9001. Données d'entrée pour la revue de direction."},{front:"Indépendance de l'auditeur",back:"L'auditeur ne peut pas auditer ses propres activités. Principe fondamental garantissant l'objectivité."},{front:"Plan de surveillance",back:"Document décrivant la maîtrise de chaque opération du processus : machine, paramètres, caractéristiques contrôlées, fréquences, responsabilités."},{front:"Action curative",back:"Supprime les EFFETS d'un écart (ex : bloquer les pièces non-conformes, rappel produit). Rapide mais non suffisante."},{front:"Action corrective",back:"Élimine les CAUSES de l'écart pour éviter la récurrence. Basée sur analyse 5 Pourquoi / Ishikawa. Efficacité vérifiée."},{front:"Action préventive",back:"Élimine les causes de NON-CONFORMITÉS POTENTIELLES avant qu'elles se produisent. Basée sur les risques identifiés (AMDEC, retours d'expérience)."},{front:"3 types d'audits",back:"1ère partie = audit interne (entreprise audite ses propres processus). 2ème partie = audit client-fournisseur. 3ème partie = audit de certification par organisme accrédité."},{front:"Compétences auditeur",back:"Formation aux techniques d'audit + connaissance du référentiel + indépendance. En ISO 19011 : aptitudes relationnelles, écoute, observation, questionnement ouvert."},{front:"Plan d'audit",back:"Programme définissant : périmètre, objectifs, référentiels, processus audités, calendrier, auditeurs. Communiqué à l'audité à l'avance."},{front:"Audit de processus vs audit de conformité",back:"Conformité : le référentiel est-il appliqué ? Processus : le système est-il efficace ? Atteint-il ses objectifs ? L'audit processus est plus riche d'enseignements."},{front:"Clôture des écarts",back:"NC majeure : plan d'actions dans les délais imposés + vérification de l'efficacité par l'auditeur avant clôture. NC mineure : plan d'actions à soumettre. Observation : optionnel."}]},{id:"traitement-reclamations",name:"Réclamations Clients & Satisfaction",visual:"reclamations",tagline:"Transformer une insatisfaction en opportunité d'amélioration",quickDesc:"Traiter chaque réclamation avec rigueur pour satisfaire le client et éviter la récurrence.",steps:["Accuser réception et qualifier la réclamation","Mettre en place l'action curative immédiate (protéger le client)","Analyser les causes racines (8D, 5 Pourquoi)","Définir et mettre en oeuvre les actions correctives","Valider l'efficacité et clôturer avec le client"],detailDesc:"Le traitement des réclamations clients est une exigence ISO 9001. La satisfaction client est subjective : un même niveau de qualité peut être perçu très différemment selon le contexte du client, l'importance de la pièce pour lui, et son niveau d'exigence habituel. Une réclamation bien traitée peut renforcer la relation client plus qu'une livraison sans problème. Le processus 8D est particulièrement adapté au traitement structuré des réclamations. La mesure de satisfaction (enquêtes, scoring NPS) permet de détecter les insatisfactions latentes avant qu'elles deviennent des réclamations.",quiz:[{q:"La satisfaction client selon l'ISO 9001 est :",answers:["Uniquement mesurée par le nombre de réclamations reçues","La perception du client sur le respect de ses exigences (subjective)","Le délai moyen de traitement des réclamations, recommandé dans les petites structures artisanales selon la réglementation PME","Le taux de conformité des produits livrés, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:1},{id:"haccp",name:"HACCP & Sécurité Alimentaire",visual:"haccp",tagline:"Identifier et maîtriser les dangers alimentaires tout au long de la chaîne",quickDesc:"Le HACCP (Hazard Analysis Critical Control Points) est la méthode internationale de gestion des risques alimentaires. Chez MBWS Lormont, il définit les PRP, PRPO et CCP qui garantissent la sécurité de chaque bouteille produite.",steps:["Identifier tous les dangers potentiels : biologiques, chimiques, physiques, allergènes","Évaluer la probabilité et la gravité de chaque danger","Classer les mesures de maîtrise : PRP / PRPO / CCP","Définir les limites critiques pour chaque CCP","Mettre en place la surveillance, la validation et la vérification","Documenter et former tous les opérateurs concernés"],detailDesc:"Le HACCP est exigé par le règlement européen CE 852/2004. Il repose sur l'analyse de 4 familles de dangers : Biologiques (bactéries, virus, champignons), Chimiques (produits de nettoyage, maintenance), Physiques (verre, métal, plastique) et Allergènes (14 allergènes européens réglementés). Les mesures de maîtrise sont hiérarchisées en 3 niveaux : PRP (Prérequis) = conditions d'hygiène de base (infrastructure, personnel, environnement). PRPO = mesure de maîtrise renforcée pour réduire la probabilité d'introduction d'un danger — nécessite validation, surveillance et vérification. CCP (Point Critique de Contrôle) = mesure appliquée à une étape critique pour éliminer/réduire à un niveau acceptable un danger — nécessite des limites critiques strictes, une surveillance permanente et des actions correctives définies. Chez MBWS Lormont, le verre est l'ennemi n°1 : insufflage 100% des bouteilles, contrôle des buvants, enregistrement des casses. Les PRPO et CCP sont appliqués, surveillés et enregistrés par les ATP, vérifiés par le team leader pour les postes avant sertissage.",quiz:[{q:"HACCP signifie :",answers:["Hygiène Alimentaire et Contrôle des Contaminations Potentielles","Hazard Analysis Critical Control Points — analyse des dangers et points critiques de contrôle","Haute Assurance de Contrôle et de Certification des Produits","Hygiène et Analyse des Contaminations en Circuit de Production"],correct:1},{q:"Les 4 familles de dangers alimentaires chez MBWS sont :",answers:["Microbes, Chimiques, Mécaniques, Humains","Biologiques, Chimiques, Physiques et Allergènes — chacun pouvant avoir un effet nocif sur la santé","Bactéries, Virus, Champignons et Parasites uniquement","Température, Humidité, Pression et Contamination"],correct:1},{q:"Un PRP (Prérequis) correspond à :",answers:["Une limite critique stricte sur un CCP","Les conditions et activités de base appliquées à l'infrastructure, au personnel et à l'environnement pour maintenir l'hygiène","Une surveillance permanente avec action corrective immédiate","Un point de contrôle documenté par le laboratoire"],correct:1},{q:"La différence entre un PRPO et un CCP est :",answers:["Il n'y en a pas — ce sont des synonymes","Le PRPO réduit la probabilité d'introduction d'un danger / le CCP élimine ou réduit à un niveau acceptable un danger critique avec limite critique et surveillance permanente","Le PRPO est plus contraignant que le CCP","Le CCP ne nécessite pas de surveillance"],correct:1},{q:"Un CCP nécessite obligatoirement :",answers:["Uniquement une procédure écrite","Des limites critiques + surveillance permanente + action corrective définie + validation + vérification","Uniquement l'accord du responsable qualité","Une certification externe annuelle"],correct:1},{q:"Chez MBWS Lormont, l'ennemi n°1 dans les ateliers est :",answers:["Les produits chimiques de nettoyage","Le verre — risque physique critique nécessitant l'insufflage 100% des bouteilles et des procédures strictes en cas de casse","Les bactéries de contamination croisée","Les allergènes non déclarés"],correct:1},{q:"L'insufflage à 100% des bouteilles chez MBWS vise à :",answers:["Vérifier la contenance des bouteilles","Détecter et éliminer tout débris de verre ou corps étranger à l'intérieur de la bouteille avant remplissage","Contrôler la pression interne des bouteilles","Mesurer la qualité du verre"],correct:1},{q:"En cas de casse de bouteille en production, la règle est :",answers:["Nettoyer rapidement et reprendre la production","STOP PRODUCTION — éliminer tous débris, respecter la procédure de casse, enregistrer l'incident","Continuer si les débris sont éloignés de la ligne","Alerter uniquement si la casse touche des produits ouverts"],correct:1},{q:"Les PRPO et CCP chez MBWS Lormont sont enregistrés et vérifiés par :",answers:["Uniquement le responsable qualité","Les ATP (Agents de Terrain de Production) pour l'enregistrement, vérifiés par le team leader pour les postes avant sertissage","Le laboratoire qualité uniquement","Un auditeur externe hebdomadaire"],correct:1},{q:"Les allergènes dans le HACCP MBWS concernent :",answers:["Uniquement les noix et le lait","Les 14 allergènes européens réglementés ainsi que les allergènes Export selon les destinations","Uniquement les produits utilisés en production","Les allergènes déclarés volontairement par MBWS"],correct:1},{q:"La validation d'un CCP ou PRPO consiste à :",answers:["Signer le document de procédure","Démontrer scientifiquement que la mesure de maîtrise est capable d'atteindre son objectif de contrôle du danger","Vérifier que les opérateurs ont bien suivi la formation","Soumettre le CCP à l'audit annuel"],correct:1},{q:"Un défaut critique verrier nécessite :",answers:["Un simple enregistrement","L'application des règles de décision (MBL-PR-Hygiène-01) qui peuvent mener à un STOP PRODUCTION","Une information verbale au superviseur","Un contrôle supplémentaire en fin de ligne uniquement"],correct:1}],flashcards:[{front:"Les 4 familles de dangers HACCP",back:"Biologiques (bactéries, virus, champignons) · Chimiques (nettoyage, maintenance) · Physiques (verre ⚠️, métal, plastique) · Allergènes (14 réglementés EU + Export)"},{front:"PRP — Prérequis",back:"Conditions de base pour maintenir l'hygiène : infrastructure, personnel, environnement. Base obligatoire sans laquelle HACCP ne peut fonctionner."},{front:"PRPO",back:"Mesure de maîtrise renforcée réduisant la probabilité d'un danger. Exige : Validation + Surveillance + Vérification + limites de surveillance + action corrective."},{front:"CCP — Point Critique de Contrôle",back:"Étape où une mesure élimine/réduit un danger à un niveau acceptable. Exige : Limites critiques + Surveillance permanente + Action corrective immédiate + Validation + Vérification."},{front:"Verre chez MBWS — mesures clés",back:"Insuffler 100% des bouteilles · STOP si casse · Éliminer tous débris · Enregistrer la casse · Contrôler les buvants · Respecter le CDC Fournisseur verre · Détecter les défauts critiques verriers."},{front:"Défaut critique verrier",back:"Défaut susceptible de présenter un risque pour le consommateur (éclat, fissure, inclusion...). Règles de décision : MBL-PR-Hygiène-01. Peut mener à STOP PRODUCTION."},{front:"Règlement CE 852/2004",back:"Base légale du HACCP en Europe pour les entreprises alimentaires. Oblige à mettre en place et maintenir des procédures HACCP documentées."},{front:"Autocontrôles ATP",back:"Les ATP mènent et enregistrent les autocontrôles PRPO/CCP. Le team leader vérifie pour les postes avant sertissage de la bouteille."}]},{id:"food-safety-culture",name:"Food Safety Culture & Hygiène",visual:"fsc",tagline:"Adopter les bons comportements pour garantir la sécurité alimentaire au quotidien",quickDesc:"La Food Safety Culture est l'ensemble des valeurs et comportements partagés qui garantissent la sécurité des aliments. Chez MBWS, chaque collaborateur est acteur de la qualité par ses gestes quotidiens d'hygiène et de vigilance.",steps:["Comprendre que chaque geste individuel impacte la sécurité du produit final","Respecter les règles d'hygiène corporelle (mains, santé, bijoux...)","Respecter les règles d'hygiène vestimentaire (tenue, EPI...)","Adopter le bon comportement en atelier (no food, no drink, gestion des déchets)","Appliquer les règles de Food Defence (accès, alertes, vigilance)","Signaler immédiatement toute anomalie ou doute"],detailDesc:"La culture de la sécurité alimentaire (Food Safety Culture) fait référence à l'ensemble des valeurs, croyances et comportements qui influencent la façon dont la sécurité des aliments est gérée. C'est l'attitude collective qui détermine comment CHAQUE employé agit pour garantir que les aliments restent sûrs tout au long de la chaîne. Chez MBWS Lormont : Hygiène corporelle = lavage des mains obligatoire, pas de bijoux, coiffure couverte, signalement de toute pathologie. Hygiène vestimentaire = port de la tenue réglementaire complète en zone de production. Comportement = pas de nourriture ni boisson hors zones autorisées, gestion stricte des déchets, pas de téléphone portable sur les lignes. Food Defence = fermer toutes les portes, contrôler les accès, signaler toute personne inconnue ou situation suspecte, ne pas divulguer d'informations sensibles.",quiz:[{q:"La Food Safety Culture chez MBWS désigne :",answers:["Uniquement la formation HACCP obligatoire","L'ensemble des valeurs, comportements et pratiques partagés par tous les employés pour garantir la sécurité des aliments à chaque étape","Les procédures écrites du système qualité","Le département qualité et ses audits"],correct:1},{q:"En matière d'hygiène corporelle en production MBWS, le port de bijoux est :",answers:["Autorisé si discrets","Interdit — les bijoux sont des corps étrangers physiques potentiels et des nids à bactéries","Autorisé uniquement en zone bureau","Toléré pour les bagues de mariage"],correct:1},{q:"Le lavage des mains est obligatoire :",answers:["Uniquement en entrant dans l'atelier le matin","Avant d'entrer en zone de production, après toute pause, après contact avec un produit contaminant ou avant de changer de tâche","Une fois par heure selon planning","Uniquement si manipulation de produits nus"],correct:1},{q:"En cas de maladie ou symptôme gastro-intestinal, l'opérateur doit :",answers:["Continuer à travailler en faisant attention","Le signaler immédiatement à son responsable — certaines pathologies peuvent entraîner une exclusion temporaire de zone de production","Prendre des médicaments et continuer","Porter un masque supplémentaire"],correct:1},{q:"La Food Defence chez MBWS consiste à :",answers:["Défendre la qualité gustative des produits","Protéger les produits et le site contre toute contamination intentionnelle — contrôler les accès, signaler les personnes inconnues, fermer les portes","Former les équipes à la défense incendie","Défendre les recettes contre la concurrence"],correct:1},{q:"Face à une personne inconnue sur le site MBWS :",answers:["L'ignorer si elle semble savoir où elle va","Vous avez le droit — et le devoir — de l'interpeller pour vérifier son identité et son contact MBWS","Prévenir uniquement la sécurité par mail","L'accompagner sans poser de questions"],correct:1},{q:"Les informations sensibles sur MBWS (recettes, procédés, clients) :",answers:["Peuvent être partagées avec des fournisseurs de confiance","Ne doivent jamais être divulguées à des personnes externes à l'organisation","Peuvent être mentionnées sur les réseaux sociaux si non confidentielles","Sont librement partageables entre collaborateurs de tous sites"],correct:1},{q:"La culture sécurité alimentaire concerne :",answers:["Uniquement le service qualité et les responsables","CHAQUE employé, quel que soit son poste — chacun contribue à la sécurité du produit par ses actes quotidiens","Principalement les opérateurs en contact direct avec le produit","Les managers et chefs d'équipe uniquement"],correct:1},{q:"En cas de doute sur la conformité d'un produit ou d'une situation, l'attitude MBWS est :",answers:["Continuer et en parler lors du prochain DCS","Alerter immédiatement — maîtriser le risque en urgence si nécessaire et communiquer toutes les informations au service qualité","Attendre de voir si le problème se confirme","Décider seul si le produit est conforme ou non"],correct:1},{q:"Les règles d'hygiène vestimentaire en zone de production MBWS imposent :",answers:["La tenue de ville est acceptée avec un tablier","Le port de la tenue réglementaire complète (charlotte, blouse, chaussures de sécurité) sans exception","Uniquement le port de chaussures de sécurité","La tenue est libre si le poste ne touche pas au produit"],correct:1}],flashcards:[{front:"Food Safety Culture — définition",back:"Ensemble des valeurs, croyances et comportements partagés au sein de l'organisation qui influencent la gestion de la sécurité alimentaire. C'est l'attitude collective de CHAQUE employé."},{front:"Hygiène corporelle MBWS",back:"Lavage des mains obligatoire (entrée zone, après pause, changement de tâche) · Pas de bijoux · Coiffure couverte · Pas de faux ongles ni vernis · Signalement de toute pathologie."},{front:"Hygiène vestimentaire MBWS",back:"Tenue réglementaire complète en zone de production : charlotte, blouse, chaussures de sécurité. Tenue propre et en bon état. Pas de vêtements personnels sur les lignes."},{front:"Food Defence",back:"Protection contre la contamination intentionnelle. Règles : signaler son entrée au gardien · Fermer TOUTES les portes · Interpeller toute personne inconnue · Alerter en cas de doute · Ne pas divulguer d'infos sensibles."},{front:"Gestion des non-conformités MBWS",back:"1-Maîtriser le risque et alerter en urgence si besoin. 2-Essayer d'autres dispositions. 3-Communiquer toutes infos lors des DCS. 4-Garder les échantillons pour le service qualité. Réf: G PRAméliore03."},{front:"DCS — Démarche de Communication Sécurité",back:"Réunion terrain de communication rapide. Les opérateurs communiquent les informations sur les non-conformités et incidents. Moment clé pour remonter les problèmes qualité terrain."},{front:"Comportement en atelier",back:"Pas de nourriture ni boisson hors zones autorisées · Gestion stricte des déchets · Pas de téléphone portable sur les lignes · Pas de médicaments en zone sans autorisation."}]},{id:"pilote-processus",name:"Pilote de Processus & Approche Processus",visual:"processus",tagline:"Animer et améliorer un processus pour atteindre les objectifs qualité",quickDesc:"L'approche processus est au cœur du SMQ MBWS. Chaque processus a un pilote responsable de son efficacité, de ses objectifs et de son amélioration continue. La revue de direction annuelle valide la performance globale du système.",steps:["Comprendre la cartographie des processus de MBWS","Identifier les données d'entrée et de sortie de son processus","Définir et suivre les indicateurs de performance du processus","Identifier les risques et opportunités d'amélioration","S'assurer que les procédures sont respectées","Préparer et contribuer à la revue de direction annuelle"],detailDesc:"Le SMQ MBWS est développé selon une approche processus : les activités sont regroupées en processus clés, chacun dirigé par un pilote. Un pilote de processus est le garant et l'animateur principal de l'amélioration continue et de l'efficacité au sein du processus dont il a la charge. Il peut jouer son rôle directement ou par délégation en s'appuyant sur certains acteurs du processus. Ses responsabilités : définir les objectifs du processus, suivre les performances via des indicateurs, identifier les risques et opportunités, s'assurer du respect des procédures, et proposer des actions d'amélioration. La Revue de Direction annuelle (RDD) est le moment où la direction évalue l'ensemble du SMQ, examine les performances de tous les processus, et prend les décisions stratégiques d'amélioration. L'objectif est d'optimiser l'organisation et ses performances. L'audit interne QSE est complémentaire : il vérifie les pratiques terrain, s'assure du respect des règles et contribue à l'amélioration collective.",quiz:[{q:"Un pilote de processus chez MBWS est :",answers:["Uniquement le directeur qualité","Le garant et l'animateur principal de l'amélioration continue et de l'efficacité au sein du processus dont il a la charge","Un contrôleur qui vérifie le respect des procédures uniquement","Un consultant externe chargé d'auditer le processus"],correct:1},{q:"L'approche processus dans le SMQ MBWS signifie :",answers:["Que tous les processus sont identiques","Les activités clés sont regroupées en processus, chacun avec un pilote responsable de son efficacité et de ses objectifs","Que la qualité est la responsabilité exclusive du service qualité","Que les processus sont figés et ne peuvent pas évoluer"],correct:1},{q:"La Revue de Direction annuelle (RDD) a pour objectif :",answers:["Faire le point sur les salaires et augmentations","Évaluer l'ensemble du SMQ, examiner les performances des processus et prendre les décisions stratégiques d'amélioration","Valider les budgets uniquement","Présenter les résultats commerciaux de l'année"],correct:1},{q:"Le pilote de processus peut-il déléguer son rôle ?",answers:["Non, il est le seul à pouvoir exercer ce rôle","Oui, il peut s'appuyer sur certains acteurs du processus pour exercer son rôle par délégation","Uniquement pendant ses congés","Seulement avec l'accord du directeur"],correct:1},{q:"L'audit interne QSE chez MBWS vise à :",answers:["Sanctionner les équipes en cas d'écart","Vérifier les pratiques, s'assurer que les règles sont respectées et améliorer ensemble sécurité, qualité et environnement","Remplacer la revue de direction","Évaluer uniquement la performance financière"],correct:1},{q:"Les indicateurs de performance d'un processus servent à :",answers:["Justifier les coûts du service qualité","Mesurer objectivement si le processus atteint ses objectifs et identifier les dérives à corriger","Comparer MBWS avec la concurrence","Calculer les primes des pilotes"],correct:1},{q:"Un pilote de processus identifiant un risque majeur doit :",answers:["Attendre la prochaine revue de direction pour en parler","Documenter le risque, définir des actions préventives proportionnées et suivre leur efficacité","Ignorer si le risque ne s'est pas encore concrétisé","En informer uniquement son supérieur hiérarchique direct"],correct:1},{q:"La notion d'amélioration continue dans l'approche processus MBWS implique :",answers:["Des changements majeurs uniquement lors des certifications","Une démarche permanente : mesurer, analyser, agir — chaque pilote est moteur de progrès dans son périmètre","Que l'amélioration est réservée aux experts qualité","Des investissements importants uniquement"],correct:1}],flashcards:[{front:"Pilote de processus MBWS",back:"Garant et animateur principal de l'amélioration continue et de l'efficacité de son processus. Définit les objectifs, suit les KPIs, gère les risques, assure le respect des procédures, propose des améliorations."},{front:"Approche processus SMQ MBWS",back:"Activités clés regroupées en processus · 1 processus = 1 pilote · Les processus interagissent · Objectif : optimiser l'organisation et ses performances."},{front:"Revue de Direction (RDD)",back:"Réunion annuelle de la direction. Évalue le SMQ complet, les performances de tous les processus, les risques, les opportunités. Prend les décisions stratégiques d'amélioration."},{front:"Audit interne QSE MBWS",back:"Moment d'échange pour vérifier les pratiques, s'assurer que les règles QSE sont respectées et améliorer ensemble. Complémentaire à la surveillance quotidienne des processus."},{front:"Données d'entrée/sortie d'un processus",back:"Entrée = ce qui déclenche le processus (demande client, commande, besoin). Sortie = résultat produit (produit, service, information). Le pilote maîtrise cette transformation."}]},{id:"qualios",name:"Qualios — Gestion Documentaire Qualité",visual:"qualios",tagline:"Utiliser le système d'information qualité MBWS pour accéder aux bons documents",quickDesc:"Qualios est le logiciel qualité de MBWS France. Il centralise tous les documents qualité (procédures, instructions, enregistrements) et gère les workflows internes. C'est la référence unique pour avoir accès aux documents à jour.",steps:["Se connecter à Qualios avec son adresse mail et le mot de passe Windows","Naviguer dans la GED pour trouver les documents de référence","Consulter les documents classés par processus et par site","Utiliser les formulaires et workflows pour gérer les non-conformités","Vérifier que le document consulté est bien la version en vigueur","Contribuer à la mise à jour documentaire via son pilote de processus"],detailDesc:"Qualios est le logiciel de management de la qualité au service du management chez MBWS. Il offre 2 fonctionnalités principales. 1) GED (Gestion Électronique Documentaire) : met à disposition un système d'information dématérialisé, pratique et sécurisé — garantit une information à jour à tout moment. 2) Workflows et formulaires : pilote les activités grâce à des formulaires et tableaux de bord — gère rapidement les flux internes (non-conformités, actions correctives, enregistrements). Connexion : adresse mail MBWS + mot de passe Windows. Documents incontournables dans Qualios : Politique Qualité, Manuel Qualité (G ManuelQ), Manuel HACCP (MBL ManuelHACCP), Affiche règles d'hygiène, Catalogue des défauts critiques verriers (MBL-M-Hygiène-01), Règles de décision défaut verrier (MBL-PR-Hygiène-01), Procédure maîtrise des non-conformités (G PRAméliore03), Procédure Gestion de l'information documentée (G PR-QUAL-01).",quiz:[{q:"Qualios chez MBWS est :",answers:["Un logiciel de gestion des stocks","Le logiciel qualité centralisant la GED et les workflows — outil de référence pour l'information documentaire à jour","Un outil de comptabilité analytique","Une application de communication interne"],correct:1},{q:"Pour se connecter à Qualios, on utilise :",answers:["Un login et mot de passe spécifiques créés par l'IT","Son adresse mail MBWS et le même mot de passe que pour Windows","Son numéro de badge et un code PIN","Le login générique 'qualite' avec un mot de passe commun"],correct:1},{q:"L'intérêt principal de la GED Qualios est :",answers:["D'avoir tous les documents en format papier numérisé","De garantir que le document consulté est toujours la version en vigueur — plus de risque de travailler sur un document périmé","De sauvegarder les emails importants","D'archiver les résultats financiers"],correct:1},{q:"Le Manuel HACCP MBWS Lormont se trouve :",answers:["Sur le serveur partagé Windows","Dans Qualios sous la référence MBL ManuelHACCP","Dans les archives papier du laboratoire","Sur l'intranet du groupe MBWS"],correct:1},{q:"En cas de non-conformité terrain, l'outil Qualios permet de :",answers:["Uniquement de consulter la procédure","Gérer la non-conformité via le workflow dédié (formulaire, actions correctives, suivi) — réf. G PRAméliore03","Commander les pièces de rechange nécessaires","Contacter le fournisseur directement"],correct:1},{q:"Pourquoi ne jamais travailler avec une version papier imprimée d'une procédure Qualios ?",answers:["Pour des raisons environnementales uniquement","Le document papier peut être périmé — seule la version dans Qualios est garantie à jour à tout moment","Les documents papier sont acceptables s'ils ont moins d'un an","Par économie d'encre et de papier"],correct:1},{q:"Les workflows dans Qualios servent à :",answers:["Automatiser la comptabilité","Gérer rapidement les flux internes : non-conformités, actions correctives, enregistrements de production","Planifier les congés des équipes","Gérer les commandes fournisseurs"],correct:1},{q:"Le document de référence pour la maîtrise des non-conformités chez MBWS est :",answers:["ISO 9001:2015 directement","G PRAméliore03 — Maîtrise des non-conformités et des incidents, disponible dans Qualios","Le manuel du formateur","La procédure de l'usine parente"],correct:1}],flashcards:[{front:"Qualios — 2 fonctions clés",back:"1) GED : documents à jour en permanence, accès sécurisé. 2) Workflows/formulaires : gestion des flux internes (NC, actions correctives, enregistrements)."},{front:"Connexion Qualios",back:"Login = adresse mail MBWS · Mot de passe = même que Windows. Accessible depuis tous les postes connectés au réseau MBWS."},{front:"Les 10 documents essentiels Qualios MBWS",back:"Politique Qualité · Manuel Qualité · Manuel HACCP · Règles d'hygiène · Défauts verriers critiques · Règles de décision verre · Consignes casse · NC et incidents · Gestion documentaire · Pilotage processus"},{front:"GED — Gestion Électronique Documentaire",back:"Système dématérialisé garantissant l'accès à la version en vigueur de chaque document. Interdit de travailler sur une version papier non vérifiée — risque de procédure périmée."},{front:"Réf. verre dans Qualios",back:"MBL-M-Hygiène-01 = Catalogue des défauts critiques verriers. MBL-PR-Hygiène-01 = Règles de décision suite à identification d'un défaut critique. MBL C-Hygiène-01/02 = Consignes en cas de casse."}]},{q:"Le traitement des réclamations clients est :",answers:["Facultatif si les volumes sont faibles, solution acceptable en phase pilote avec l'accord formel du comité de direction","Seulement requis pour les clients grands comptes","Une exigence ISO 9001 avec processus formalisé obligatoire","Optionnel si le produit est conforme, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:2},{q:"Une réclamation bien traitée peut :",answers:["Entraîner une perte automatique du client, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Remplacer la nécessité d'actions préventives, méthode issue des pratiques industrielles d'avant la standardisation internationale","Renforcer la relation client plus qu'une livraison sans problème","Toujours être évitée avec un bon contrôle final"],correct:2},{q:"Une liste des réclamations permet de faire des synthèses sur :",answers:["Uniquement les clients concernés, utilisé dans le domaine de la prestation de services mais non transposable à la production","Uniquement les coûts, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Le nombre de livraisons, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Les coûts, produits concernés, causes fréquentes et récidives"],correct:3},{q:"Une réclamation peut exister sans non-conformité réelle car :",answers:["C'est impossible — toute réclamation indique un défaut, recommandé dans les petites structures artisanales selon la réglementation PME","Le client est toujours de mauvaise foi, méthode utilisée avant l'harmonisation des référentiels européens en 2018","L'ISO 9001 le prévoit, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Le client peut se plaindre d'une modification non communiquée ou d'une utilisation inadaptée"],correct:3},{q:"Le traitement d'une réclamation client commence par :",answers:["Convoquer une réunion de crise, à condition que le personnel ait été sensibilisé au préalable, applicable uniquement aux structures exclues du champ de la certification tierce partie","Envoyer un avoir, applicable dans les cas où la direction valide en amont, solution acceptable en phase pilote avec l'accord formel du comité de direction","Analyser finement la NATURE de la réclamation avant toute réflexion sur les causes — une réclamation peut ne pas correspondre à une vraie non-conformité","Analyser immédiatement les causes, ce qui est suffisant pour satisfaire aux exigences réglementaires, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:2},{q:"La synthèse mensuelle des réclamations sert à :",answers:["Calculer les pénalités","Identifier tendances et mesurer la non-récurrence des actions","Informer la direction","Satisfaire l'auditeur"],correct:1},{q:"La synthèse mensuelle des réclamations permet de :",answers:["Informer uniquement la direction, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Calculer les pénalités, uniquement si le processus est sous contrôle et documenté, applicable en période probatoire avant la mise en conformité documentaire complète","Uniquement satisfaire l'auditeur ISO, méthode issue des pratiques industrielles d'avant la standardisation internationale","Identifier les causes récurrentes, les produits problématiques, et mesurer la non-récurrence des actions correctives"],correct:3},{q:"Le 'Net Promoter Score' (NPS) mesure :",answers:["Le délai de traitement des réclamations, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Le nombre de réclamations, applicable lors des phases de transition mais insuffisant pour pérenniser le système","La conformité des livraisons, utilisé dans le domaine de la prestation de services mais non transposable à la production","La probabilité que le client recommande l'entreprise — sur 10, détracteurs (0-6), neutres (7-8), promoteurs (9-10)"],correct:3},{q:"Selon l'ISO 9001, le processus de traitement des réclamations doit être :",answers:["Externalisé au SAV, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Optionnel si peu de réclamations, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Formalisé et documenté — c'est une exigence explicite de la norme","Uniquement pour les grands clients, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:2}],flashcards:[{front:"Réclamation client",back:"Expression d'insatisfaction — justifiée ou non — adressant un produit ou service. Nécessite analyse avant réponse."},{front:"Action curative",back:"Première réponse : réparer, remplacer, rembourser, bloquer le stock défectueux. Protège le client immédiatement."},{front:"Action corrective",back:"Deuxième réponse (après analyse causes) : modifier le processus pour éviter la récurrence. Plus longue mais indispensable."},{front:"NPS — Net Promoter Score",back:"Question unique : 'Sur 10, recommanderiez-vous notre entreprise ?' Score 9-10 = Promoteurs, 7-8 = Neutres, 0-6 = Détracteurs."},{front:"Satisfaction ≠ Conformité",back:"Un produit conforme aux spécifications peut générer une insatisfaction si les attentes implicites ne sont pas respectées."},{front:"Yokoten",back:"Transversalisation japonaise : partager les solutions efficaces trouvées pour un problème à d'autres produits/processus similaires."},{front:"Processus de traitement — 5 étapes",back:"1-Réception et qualification · 2-Action curative immédiate (protéger le client) · 3-Analyse causes (5P/8D) · 4-Actions correctives + validation efficacité · 5-Clôture et information client."},{front:"Satisfaction vs conformité",back:"Un produit conforme peut décevoir si les attentes implicites ne sont pas satisfaites. La satisfaction est la PERCEPTION du client — subjective et différente de la mesure de conformité."},{front:"Fiche réclamation",back:"Contient : description précise + photos/preuves + actions immédiates + analyse causes + actions correctives + preuves d'efficacité + date de clôture + signature client."},{front:"Yokoten (transversalisation)",back:"Partager la solution efficace trouvée pour une réclamation à tous les sites, lignes ou produits similaires qui pourraient être concernés par la même cause racine."},{front:"NPS",back:"Net Promoter Score. Question unique : 'Sur 10, recommanderiez-vous notre entreprise ?' NPS = % Promoteurs - % Détracteurs. Benchmark industrie alimentaire : 40-60."},{front:"Réclamation = opportunité",back:"Chaque réclamation révèle une faiblesse du système. Une réclamation bien traitée : améliore le processus, renforce la relation client, évite d'autres réclamations similaires."}]}]}];function seededShuffle(arr,seed){var a=_toConsumableArray(arr);var h=seed|0;for(var i=a.length-1;i>0;i--){h=Math.imul(h^h>>>16,0x45d9f3b);h=Math.imul(h^h>>>16,0x45d9f3b);h=(h^h>>>16)>>>0;var j=h%(i+1);var _ref9=[a[j],a[i]];a[i]=_ref9[0];a[j]=_ref9[1];}return a;}function shuffleQuizAnswers(quiz){return quiz.map(function(q){var answers=q.answers||q.a||[];var correctIdx=q.correct!==undefined?q.correct:q.c;var seed=0;for(var i=0;i<q.q.length;i++){seed=Math.imul(31,seed)+q.q.charCodeAt(i)|0;}var indexed=answers.map(function(text,i){return{text:text,isCorrect:i===correctIdx};});var shuffled=seededShuffle(indexed,seed);return _objectSpread(_objectSpread({},q),{},{answers:shuffled.map(function(a){return a.text;}),a:shuffled.map(function(a){return a.text;}),correct:shuffled.findIndex(function(a){return a.isCorrect;}),c:shuffled.findIndex(function(a){return a.isCorrect;})});});}function Quiz(_ref0){var quiz=_ref0.quiz,onComplete=_ref0.onComplete;var shuffled=useMemo(function(){return shuffleQuizAnswers(quiz);},[]);var _useState=useState(0),_useState2=_slicedToArray(_useState,2),idx=_useState2[0],setIdx=_useState2[1];var _useState3=useState(null),_useState4=_slicedToArray(_useState3,2),sel=_useState4[0],setSel=_useState4[1];var _useState5=useState(0),_useState6=_slicedToArray(_useState5,2),score=_useState6[0],setScore=_useState6[1];var _useState7=useState(false),_useState8=_slicedToArray(_useState7,2),done=_useState8[0],setDone=_useState8[1];var handle=function handle(i){if(sel!==null)return;setSel(i);var ok=i===shuffled[idx].correct;if(ok)setScore(function(s){return s+1;});setTimeout(function(){if(idx+1>=quiz.length){setDone(true);onComplete&&onComplete(score+(ok?1:0));}else{setIdx(function(v){return v+1;});setSel(null);}},1300);};if(done){var pct=Math.round(score/quiz.length*100);retur  de la certification tierce partie","Une méthode de développement"],c:3},{q:"L'équipe projet type comprend :",a:["Chef de projet + RH + Finance — valide uniquement pour les processus de support non critiques","Chef de projet seul — valide uniquement pour les processus de support non critiques","Chef de projet + Clients uniquement — applicable dans les contextes à faible enjeu qualité","Chef de projet + BE + Qualité + Labo + Commercial + Industrialisation"],c:3},{q:"Un diagramme GANTT permet de :",a:["Calculer le coût de revient — suffisant si la direction a formellement validé la démarche","Analyser les risques produit — suffisant si la direction a formellement validé la démarche","Mesurer la satisfaction client — recommandé par les premières versions du référentiel sectoriel","Planifier les tâches dans le temps avec durées et dépendances"],c:3},{q:"Le chef de projet a généralement une autorité hiérarchique sur son équipe.",a:["Faux — il manage sans autorité hiérarchique directe, ce qui rend son rôle délicat","Vrai"],c:0},{q:"Un jalon de projet permet de :",a:["Valider la fin d'une phase avant de passer à la suivante","Nommer les responsables — approche utilisée en dehors des exigences normatives strictes","Lister les risques — suffisant si la direction a formellement validé la démarche","Calculer le budget — approche utilisée en dehors des exigences normatives strictes"],c:0},{q:"Un diagramme PERT sert à :",a:["Affecter les coûts par tâche — méthode retenue dans l'industrie automobile avant les années 2000","Mesurer la satisfaction client — recommandé par les premières versions du référentiel sectoriel","Identifier le chemin critique et les dépendances entre tâches","Cartographier les processus — approche utilisée en dehors des exigences normatives strictes"],c:2}],flash:[{f:"Chef de projet",b:"Responsable QCD du projet. Manage sans autorité hiérarchique directe. Coordonne toutes les parties prenantes."},{f:"GANTT",b:"Planning visuel des tâches : durées, dépendances, chemin critique. Outil de pilotage quotidien du chef de projet."},{f:"Jalon",b:"Point de validation clé marquant la fin d'une phase. Sans jalon validé, on ne passe pas à la phase suivante."}]},{id:"qs-2",famille:"rcd",num:"2-4",titre:"Analyse fonctionnelle",prereqs:["qs-1"],desc:"Définit les fonctions remplies par le produit dans son environnement. FP = Fonctions Principales (raison d'être), FC = Fonctions Contraintes (limites à respecter). Chaque fonction est caractérisée par des critères et des niveaux.",detail:"Capitalise l'expérience : les fonctions génériques se retrouvent sur tous les produits. Le CdCF (Cahier des Charges Fonctionnel) est le livrable. L'AF est prérequis de l'AMDEC, de l'Analyse de la valeur et de la Cotation fonctionnelle.",quiz:[{q:"L'AF permet avant tout :",a:["De chiffrer les coûts de fabrication, valide dans un contexte de production discontinue selon les dérogations sectorielles","De structurer l'équipe projet — approche utilisée en dehors des exigences normatives strictes","D'analyser les risques potentiels, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","D'élaborer des cahiers des charges précis"],c:3},{q:"Une Fonction Principale est :",a:["Une fonction secondaire optionnelle — solution retenue par les petites structures artisanales","La fonction pour laquelle le produit est fabriqué (ex: produire une flamme)","Une exigence de sécurité — valide uniquement pour les processus de support non critiques","Une contrainte légale — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"Le livrable de l'Analyse Fonctionnelle est :",a:["Le Cahier des Charges Fonctionnel (CdCF)","L'AMDEC produit — approche utilisée en dehors des exigences normatives strictes","Le diagramme GANTT — valide uniquement pour les processus de support non critiques","Le plan de surveillance — approche utilisée en dehors des exigences normatives strictes"],c:0},{q:"L'analyse fonctionnelle est utile pour réaliser :",a:["Le plan de surveillance — approche utilisée en dehors des exigences normatives strictes","L'AMDEC, l'Analyse de la valeur et la Cotation fonctionnelle","L'AMDEC Produit uniquement — valide uniquement pour les processus de support non critiques","L'audit des processus — méthode retenue dans l'industrie automobile avant les années 2000"],c:1},{q:"Un critère de fonction est :",a:["Le coût de la fonction — suffisant si la direction a formellement validé la démarche","L'indicateur permettant d'apprécier le niveau d'accomplissement de la fonction","Le délai de réalisation — solution retenue par les petites structures artisanales","Le mode de défaillance associé — suffisant si la direction a formellement validé la démarche"],c:1},{q:"L'AF capitalise l'expérience car :",a:["Elle génère automatiquement des données — recommandé par les premières versions du référentiel sectoriel","Elle remplace les essais — méthode retenue dans l'industrie automobile avant les années 2000","Elle est informatisée — suffisant si la direction a formellement validé la démarche","Les fonctions génériques se retrouvent sur tous les produits de l'entreprise"],c:3}],flash:[{f:"FP — Fonction Principale",b:"Raison d'être du produit. Ex: briquet → 'produire une flamme'. C'est ce pour quoi le client achète."},{f:"FC — Fonction Contrainte",b:"Conditions à respecter. Ex: briquet → 'être étanche au gaz'. Imposées par l'environnement d'utilisation."},{f:"CdCF",b:"Cahier des Charges Fonctionnel : liste toutes les fonctions avec leurs critères (indicateurs) et niveaux (valeurs cibles)."}]},{id:"qs-3",famille:"rcd",num:"5-7",titre:"Benchmarking",prereqs:["qs-2"],desc:"Analyser les produits du marché pour déceler les meilleures solutions technico-économiques. Comparer fonction par fonction. Force à prendre du recul par rapport aux habitudes.",detail:"Choisir les bons critères ET les bons concurrents. Ne pas adopter une solution concurrente sans analyser ses défaillances. Interdit : copier des solutions brevetées.",quiz:[{q:"Le Benchmarking permet :",a:["Uniquement de faire du rétro-engineering — valide uniquement pour les processus de support non critiques","Uniquement de copier les concurrents — approche utilisée en dehors des exigences normatives strictes","Définir des voies d'amélioration, concevoir de nouveaux produits, se situer vs concurrence","D'éliminer les coûts de R&D — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"Le principal risque du benchmarking est :",a:["Adopter une solution concurrente sans analyser ses défaillances cachées","De partager ses données internes — suffisant si la direction a formellement validé la démarche","De trop bien connaître les concurrents — valide uniquement pour les processus de support non critiques","D'impliquer trop de personnes — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"Le benchmarking s'appuie sur l'AF pour :",a:["Former l'équipe projet — recommandé par les premières versions du référentiel sectoriel","Comparer les solutions techniques fonction par fonction","Rédiger le plan de surveillance — suffisant si la direction a formellement validé la démarche","Calculer les coûts — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"Le benchmarking peut porter sur :",a:["Uniquement les procédés de fabrication, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Uniquement les produits concurrents — méthode retenue dans l'industrie automobile avant les années 2000","Uniquement les prix de vente — suffisant si la direction a formellement validé la démarche","Tout ou partie de l'organisation de l'entreprise également"],c:3},{q:"Lors d'un benchmarking produit, on compare :",a:["Les solutions techniques fonction par fonction, en s'appuyant sur l'AF","Les organigrammes — méthode retenue dans l'industrie automobile avant les années 2000","Les marges des concurrents — recommandé par les premières versions du référentiel sectoriel","Les effectifs — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"Adopter la solution d'un concurrent sans analyser ses défaillances peut :",a:["Réduire les coûts sans risque — solution retenue par les petites structures artisanales","Reproduire les problèmes de qualité cachés du concurrent","Raccourcir les délais de R&D — valide uniquement pour les processus de support non critiques","Toujours améliorer le produit — approche utilisée en dehors des exigences normatives strictes"],c:1}],flash:[{f:"Benchmarking produit",b:"Analyse des produits concurrents pour identifier les meilleures solutions technico-économiques, fonction par fonction."},{f:"Benchmarking orga",b:"Comparer son organisation avec des entreprises similaires (pas forcément concurrentes) pour identifier de bonnes pratiques."},{f:"Risque brevets",b:"Le benchmarking ne doit jamais conduire à copier des solutions brevetées ou protégées. Vérifier la PI avant toute adoption."}]},{id:"qs-4",famille:"rcd",num:"8-10",titre:"QFD — Quality Function Deployment",prereqs:["qs-3"],desc:"Formalisation matricielle des réponses techniques (colonnes) aux besoins (lignes). Visualise les conflits ou contradictions. Pondère chaque choix et étudie la compatibilité des réponses techniques.",detail:"Aussi appelé 'maison de la qualité'. Complémentaire de l'AF. Intègre le positionnement concurrentiel (benchmarking). Permet d'objectiver les compromis de conception.",quiz:[{q:"Le QFD est aussi appelé :",a:["Maison de la qualité","Carte de contrôle — conforme aux pratiques des entreprises non certifiées ISO","Matrice de pondération — suffisant si la direction a formellement validé la démarche","Tableau de Pareto — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"Le QFD permet (cocher les bonnes réponses) :",a:["Hiérarchiser des risques de défaillance, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Se positionner par rapport à la concurrence","Définir et sélectionner des solutions techniques","Remplacer l'AMDEC — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"Le QFD est avant tout un outil de :",a:["Résolution de problèmes — méthode retenue dans l'industrie automobile avant les années 2000","Décision et visualisation des compromis de conception","Gestion des fournisseurs — méthode retenue dans l'industrie automobile avant les années 2000","Contrôle qualité en production — conforme aux pratiques des entreprises non certifiées ISO"],c:1},{q:"Dans la matrice QFD, les besoins clients sont en :",a:["Colonnes — solution retenue par les petites structures artisanales","Toit de la maison — applicable dans les contextes à faible enjeu qualité","Fondations — applicable dans les contextes à faible enjeu qualité","Lignes"],c:3},{q:"Le QFD permet de détecter :",a:["Les conflits entre réponses techniques incompatibles","Les modes de défaillance — applicable dans les contextes à faible enjeu qualité","Les risques fournisseurs — conforme aux pratiques des entreprises non certifiées ISO","Les coûts de production — valide uniquement pour les processus de support non critiques"],c:0},{q:"Le QFD intègre systématiquement :",a:["Le plan de surveillance — approche utilisée en dehors des exigences normatives strictes","Le positionnement par rapport à la concurrence (benchmarking)","La cotation fonctionnelle — suffisant si la direction a formellement validé la démarche","L'AMDEC processus — méthode retenue dans l'industrie automobile avant les années 2000"],c:1}],flash:[{f:"QFD",b:"Matrice croisant besoins clients (lignes) et solutions techniques (colonnes) pour objectiver les choix de conception."},{f:"Conflit technique",b:"Deux réponses techniques incompatibles entre elles. Le QFD les rend visibles pour trouver un compromis raisonné."},{f:"Maison de la qualité",b:"Nom imagé du QFD — le toit de la matrice représente les corrélations entre solutions techniques."}]},{id:"qs-5",famille:"rcd",num:"11-13",titre:"Analyse de la valeur",prereqs:["qs-2"],desc:"Chiffrer le coût relatif de chaque fonction. Offrir le meilleur rapport fonctionnalité/prix. Remet en cause les solutions techniques en analysant la fonctionnalité rendue pour chaque composant.",detail:"Coût fonction = ventilation des coûts composants par fonction. Valeur d'usage / d'estime / d'échange ≠ coût. L'AV sert aussi à améliorer la conception à coût équivalent pour augmenter la valeur perçue.",quiz:[{q:"Une Analyse de la Valeur peut-elle être faite sans Analyse Fonctionnelle ?",a:["Seulement pour les produits simples — approche utilisée en dehors des exigences normatives strictes","Oui, avec un tableau de coûts standard — valide uniquement pour les processus de support non critiques","Non — l'AF est indispensable pour connaître le coût de chaque fonction","Oui, ce sont deux outils indépendants — méthode retenue dans l'industrie automobile avant les années 2000"],c:2},{q:"L'AV sert UNIQUEMENT à réduire les coûts.",a:["Faux — elle sert aussi à améliorer la conception à coût équivalent pour augmenter la valeur","Vrai"],c:0},{q:"La 'valeur d'estime' d'un produit est :",a:["Sa valeur de revente — suffisant si la direction a formellement validé la démarche","Sa performance technique mesurée — applicable dans les contextes à faible enjeu qualité","Son coût de production — suffisant si la direction a formellement validé la démarche","Ce que l'acheteur paie pour l'image, le prestige, la marque"],c:3},{q:"L'Analyse de la Valeur permet de remettre en cause :",a:["Chaque composant analysé selon la fonctionnalité rendue au client","Uniquement les matières premières — méthode retenue dans l'industrie automobile avant les années 2000","Les délais de livraison — valide uniquement pour les processus de support non critiques","Uniquement les fournisseurs — valide uniquement pour les processus de support non critiques"],c:0},{q:"Pour baisser le coût d'une fonction, l'AV consiste à :",a:["Modifier les niveaux d'acceptation des critères fonctionnels pour réviser les choix techniques","Supprimer la fonction — approche utilisée en dehors des exigences normatives strictes","Changer de fournisseur — approche utilisée en dehors des exigences normatives strictes","Augmenter les cadences — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"La valeur d'échange d'un produit correspond à :",a:["Sa valeur d'usage au quotidien, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Son prestige de marque — recommandé par les premières versions du référentiel sectoriel","Sa valeur de revente","Son coût de production — suffisant si la direction a formellement validé la démarche"],c:2}],flash:[{f:"Analyse de la Valeur",b:"Chiffre le coût de chaque fonction pour optimiser le rapport fonctionnalité/prix. Prérequis : AF réalisée."},{f:"Valeur d'usage",b:"Part du prix acceptée pour la fonction d'utilisation. Ex: la motorisation pour une voiture."},{f:"Valeur d'estime",b:"Part liée à l'image, la marque, le prestige. Prépondérante dans les produits de luxe (spiritueux premium)."},{f:"Question clé AV",b:"'Combien économiserais-je si je n'avais pas à remplir cette fonction ?' → identifie les surcoûts injustifiés."}]},{id:"qs-6",famille:"rcd",num:"14-16",titre:"AMDEC Produit",prereqs:["qs-2"],desc:"Analyse des Modes de Défaillances, Effets et Criticité. Pour chaque fonction : modes de défaillance, effets, causes, actions préventives. IPR = Gravité × Apparition × Non-Détection.",detail:"Réalisée APRÈS la 1ère définition du produit. L'aspect humain est important : critique des choix du BE par tout le groupe. Capitaliser l'expérience par fonction pour tous les produits de l'entreprise.",quiz:[{q:"G=8, A=3, D=4 : l'IPR de ce risque AMDEC est :",answers:["15 (somme)","96 — G×A×D","32","24"],correct:1},{q:"Lors d'une AMDEC, on traite en priorité :",a:["Les coûts les plus importants — approche utilisée en dehors des exigences normatives strictes","Les défauts les plus fréquents, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Les risques avec l'IPR le plus élevé","Les fonctions principales uniquement, option retenue par certaines conventions collectives mais non par la norme de référence"],c:2},{q:"L'AMDEC Produit est réalisée par :",a:["Le responsable qualité uniquement — suffisant si la direction a formellement validé la démarche","Un groupe pluridisciplinaire (BE, Qualité, Méthodes, Production, Commercial...)","Le bureau d'études seul — méthode retenue dans l'industrie automobile avant les années 2000","L'auditeur externe — méthode retenue dans l'industrie automobile avant les années 2000"],c:1},{q:"Capitaliser l'expérience AMDEC par fonction permet :",a:["De certifier le produit — recommandé par les premières versions du référentiel sectoriel","De rassembler tous les retours d'expérience relatifs à une fonction commune à tous les produits","D'éviter de réaliser les AMDEC suivantes — valide uniquement pour les processus de support non critiques","De remplacer les essais — suffisant si la direction a formellement validé la démarche"],c:1},{q:"Un mode de défaillance avec G=9, A=2, D=1 a un IPR de :",a:["9 — conforme aux pratiques des entreprises non certifiées ISO","12 — applicable dans les contextes à faible enjeu qualité","18","36 — suffisant si la direction a formellement validé la démarche"],c:2}],flash:[{f:"Mode de défaillance",b:"La façon dont un composant peut ne plus remplir sa fonction. Ex: briquet → 'ne s'allume pas'."},{f:"IPR",b:"Indice de Priorité des Risques = Gravité × Apparition × Non-Détection. Échelle 1-10 pour chaque indice. Max=1000."},{f:"Gravité G",b:"Sévérité de l'effet sur l'utilisateur ou le processus. 1=mineur, 10=catastrophique (sécurité, arrêt total)."},{f:"Non-Détection D",b:"Probabilité que la défaillance ne soit pas détectée avant le client. 1=très détectable, 10=indétectable."}]},{id:"qs-7",famille:"rcd",num:"17",titre:"Écoute client",prereqs:["qs-1"],desc:"Mieux cerner les exigences des clients pour mieux les satisfaire. Adapter le produit au couple client/marché. Techniques : Product out (fonctions du produit) et Market in (produit + services).",detail:"Un des 8 principes de management ISO 9000. Concerne TOUS les collaborateurs (production, achats, RH, maintenance). La revue de contrat = exigence ISO 9001 avant acceptation de commande.",quiz:[{q:"L'écoute client ne concerne que les services en contact direct avec le client.",a:["Vrai","Faux — elle concerne tous les collaborateurs (production, achats, RH, maintenance)"],c:1},{q:"'Market in' signifie :",a:["Faire du marketing digital — suffisant si la direction a formellement validé la démarche","S'intéresser à l'ensemble produit + services attendus par le marché","Analyser uniquement les fonctions du produit, valide dans un contexte de production discontinue selon les dérogations sectorielles","Vendre sur de nouveaux marchés — valide uniquement pour les processus de support non critiques"],c:1},{q:"La revue de contrat selon l'ISO 9001 consiste à :",a:["Relire le contrat avant signature — valide uniquement pour les processus de support non critiques","Auditer le client — applicable dans les contextes à faible enjeu qualité","Facturer le client — applicable dans les contextes à faible enjeu qualité","Vérifier AVANT d'accepter une commande que l'entreprise peut satisfaire toutes les exigences"],c:3},{q:"La 'revue de contrat' selon l'ISO 9001 s'applique :",a:["Avant d'accepter toute commande pour vérifier que les exigences sont satisfaisables","Uniquement aux grands comptes — méthode retenue dans l'industrie automobile avant les années 2000","Uniquement en cas de litige — solution retenue par les petites structures artisanales","Après la livraison — conforme aux pratiques des entreprises non certifiées ISO"],c:0},{q:"L'implication du personnel dans l'écoute client est :",a:["Un des 8 principes ISO 9000 — essentielle pour que la satisfaction client soit possible","Réservée aux managers — valide uniquement pour les processus de support non critiques","Facultative — méthode retenue dans l'industrie automobile avant les années 2000","Un bonus appréciable — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"'Product out' vs 'Market in' : laquelle est l'approche la plus complète ?",a:["Elles sont équivalentes — recommandé par les premières versions du référentiel sectoriel","Product out — elle se concentre sur les fonctions du produit","Dépend du secteur — suffisant si la direction a formellement validé la démarche","Market in — elle intègre produit + services + attentes globales du marché"],c:3}],flash:[{f:"Product out",b:"Approche centrée sur le produit et ses fonctions. Risque : produire ce qu'on sait faire, pas ce que le client veut."},{f:"Market in",b:"Approche centrée sur les attentes du marché : produit + services + expérience complète. Plus riche que Product out."},{f:"Revue de contrat",b:"Vérification avant acceptation d'une commande que l'entreprise a les moyens de satisfaire toutes les exigences (explicites ET implicites)."}]},{id:"qs-8",famille:"rcd",num:"24-26",titre:"Certification produit",prereqs:["qs-1"],desc:"Un produit est certifié lorsqu'il a passé avec succès les tests du référentiel visé. Obligatoire dans certains domaines (jouets, ceintures de sécurité). Types : Label Rouge, AOC, NF, Aérospatiale.",detail:"Veille réglementaire difficile (évolutions constantes, multiplicité des pays). 'Nul n'est censé ignorer la loi'. Les législations française et européenne sont souvent plus contraignantes.",quiz:[{q:"La certification produit est obligatoire pour vendre certains produits.",a:["Vrai, dans certains domaines (jouets, ceintures de sécurité, échafaudages...)","Faux, c'est toujours facultatif — suffisant si la direction a formellement validé la démarche"],c:0},{q:"La veille réglementaire consiste à :",a:["Étudier et intégrer constamment les évolutions législatives applicables dans tous les pays de vente","Auditer les fournisseur
