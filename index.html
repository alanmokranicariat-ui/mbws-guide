function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getSession(){return lsGet("mbws_session");}
function saveSession(u){lsSet("mbws_session",u);}
function clearSession(){try{localStorage.removeItem("mbws_session");}catch{}}
function makeId(fn,ln){return(fn.trim()+"-"+ln.trim()).toLowerCase().replace(/[^a-z0-9-]/g,"");}
function registerUser(fn,ln){
  const id=makeId(fn,ln);
  const u={id,firstName:fn.trim(),lastName:ln.trim(),isManager:false};
  const list=lsGet("mbws_users")||[];
  if(!list.includes(id)){list.push(id);lsSet("mbws_users",list);}
  lsSet("mbws_prof_"+id,u);
  lsSet("mbws_seen_"+id,Date.now());
  return u;
}

// Restaure le XP sauvegardé d'un utilisateur dans les clés actives
function restoreUserXP(userId){
  if(!window.POLES) return;
  POLES.forEach(pole=>{
    pole.tools.forEach(tool=>{
      const saved=lsGet("mbws_xp_"+userId+"_"+tool.id);
      try{
        localStorage.setItem("mbws_xp_"+tool.id, saved!==null ? String(saved) : "0");
      }catch{}
    });
  });
}

// Sauvegarde le XP actif vers le profil utilisateur (avant déconnexion)
function saveCurrentXP(userId){
  if(!window.POLES) return;
  POLES.forEach(pole=>{
    pole.tools.forEach(tool=>{
      try{
        const v=localStorage.getItem("mbws_xp_"+tool.id);
        if(v!==null) lsSet("mbws_xp_"+userId+"_"+tool.id, parseInt(v)||0);
      }catch{}
    });
  });
}

function AuthScreen({onLogin}){
  const [mode,setMode]=React.useState("user");
  const [fn,setFn]=React.useState("");
  const [returning,setReturning]=React.useState(false);
  const checkReturning=(first,last)=>{
    if(first&&last){
      const id=makeId(first,last);
      const exists=lsGet("mbws_prof_"+id);
      setReturning(!!exists);
    } else { setReturning(false); }
  };
  const [ln,setLn]=React.useState("");
  const [pw,setPw]=React.useState("");
  const [err,setErr]=React.useState("");
  const inp={padding:"12px 14px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:15,outline:"none",textAlign:"center",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
  const submit=()=>{
    setErr("");
    if(mode==="manager"){
      const mgr=MANAGERS.find(m=>m.password===pw.trim());
      if(!mgr){setErr("Mot de passe incorrect.");return;}
      const s={...mgr,isManager:true};saveSession(s);onLogin(s);
    }else{
      if(!fn.trim()||!ln.trim()){setErr("Prénom et nom requis.");return;}
      const u=registerUser(fn,ln);restoreUserXP(u.id);saveSession(u);onLogin(u);
    }
  };
  return(
    <div style={{minHeight:"100dvh",background:"#1A0A2E",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"white",borderRadius:24,padding:"36px 28px",maxWidth:360,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:46,fontWeight:900,color:"#1A0A2E",letterSpacing:"-2px",lineHeight:1}}>MBWS</div>
        <div style={{fontSize:11,color:"#9CA3AF",marginTop:4,marginBottom:28}}>Formation Interne</div>
        {FORMATEUR_VISIBLE&&(
          <div style={{display:"flex",background:"#F3F4F6",borderRadius:10,padding:3,marginBottom:24,gap:3}}>
            {["user","manager"].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setErr("");}}
                style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:mode===m?700:500,background:mode===m?"white":"transparent",color:mode===m?"#1A0A2E":"#6B7280",boxShadow:mode===m?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
                {m==="user"?"Apprenant":"Formateur"}
              </button>
            ))}
          </div>
        )}
        {(mode==="user"||!FORMATEUR_VISIBLE)?(
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            <input style={inp} value={fn} onChange={e=>{setFn(e.target.value);checkReturning(e.target.value,ln);}} placeholder="Prénom" onKeyDown={e=>e.key==="Enter"&&submit()}/>
            <input style={inp} value={ln} onChange={e=>{setLn(e.target.value);checkReturning(fn,e.target.value);}} placeholder="Nom" onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>
        ):(
          <div style={{marginBottom:16}}>
            <input style={inp} type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Mot de passe formateur" onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>
        )}
        {err&&<div style={{color:"#DC2626",fontSize:12,marginBottom:12,background:"#FEE2E2",borderRadius:8,padding:"8px 12px"}}>{err}</div>}
        {returning&&!err&&<div style={{fontSize:12,marginBottom:12,background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:8,padding:"8px 12px",color:"#166534"}}>✓ Compte reconnu — votre progression sera restaurée</div>}
        <button onClick={submit} style={{width:"100%",padding:13,background:"#1A0A2E",color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
          {returning ? "Reprendre ma formation →" : "Accéder à la formation"}
        </button>
        <div style={{marginTop:16,display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
          {["#5B2D8E","#D96A2A","#C94580","#2D7A4F","#0369A1","#7C3AED","#BE185D","#16A34A"].map((c,i)=>(
            <div key={i} style={{width:6,height:6,borderRadius:"50%",background:c}}/>
          ))}
        </div>
        <div style={{fontSize:10,color:"#9CA3AF",marginTop:8}}>8 pôles · 42 outils · 555 questions</div>
      </div>
    </div>
  );
}

function ManagerDashboard({user,onLogout}){
  const [users,setUsers]=React.useState([]);
  const [sel,setSel]=React.useState(null);
  const maxTotal=POLES.reduce((s,p)=>s+p.tools.reduce((s2,t)=>s2+(t.quiz?.length||1),0),0);
  const load=()=>{
    const list=lsGet("mbws_users")||[];
    const data=list.map(id=>{
      const prof=lsGet("mbws_prof_"+id)||{};
      const seen=lsGet("mbws_seen_"+id);
      let tot=0;const xpd={};
      POLES.forEach(p=>p.tools.forEach(t=>{const x=Math.min(lsGet("mbws_xp_"+id+"_"+t.id)||0,t.quiz?.length||1);xpd[t.id]=x;tot+=x;}));
      return{...prof,id,seen,xpd,pct:Math.round((tot/maxTotal)*100)};
    });
    setUsers(data.sort((a,b)=>(b.pct||0)-(a.pct||0)));
  };
  React.useEffect(()=>{load();const t=setInterval(load,15000);return()=>clearInterval(t);},[]);
  const fmt=ts=>{if(!ts)return"—";const d=Math.floor((Date.now()-ts)/60000);if(d<1)return"À l'instant";if(d<60)return`${d} min`;return`${Math.floor(d/60)}h`;};
  return(
    <div style={{minHeight:"100dvh",background:"#F9FAFB"}}>
      <div style={{background:"#1A0A2E",padding:"20px 16px",color:"white"}}>
        <div style={{maxWidth:600,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:900,fontSize:18}}>Tableau de bord</div><div style={{fontSize:12,opacity:.65}}>{user.displayName}</div></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={load} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:12}}>↻</button>
            <button onClick={onLogout} style={{background:"rgba(255,255,255,.1)",border:"none",color:"rgba(255,255,255,.7)",padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:12}}>Déconnexion</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"16px 16px 80px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
          {[{n:users.length,l:"Apprenants"},{n:users.filter(u=>u.pct>=50).length,l:"≥ 50%"},{n:users.filter(u=>u.pct===100).length,l:"100%"}].map((s,i)=>(
            <div key={i} style={{background:"white",borderRadius:12,padding:"14px 10px",textAlign:"center",border:"1px solid #E5E7EB"}}>
              <div style={{fontSize:26,fontWeight:900,color:"#1A0A2E"}}>{s.n}</div>
              <div style={{fontSize:10,color:"#9CA3AF"}}>{s.l}</div>
            </div>
          ))}
        </div>
        {users.length===0?(
          <div style={{textAlign:"center",padding:"3rem",background:"white",borderRadius:16,border:"1px solid #E5E7EB"}}>
            <div style={{fontSize:40,marginBottom:12}}>👥</div>
            <div style={{fontWeight:700,color:"#374151"}}>Aucun apprenant connecté</div>
          </div>
        ):users.map(u=>(
          <div key={u.id} style={{background:"white",borderRadius:14,border:"1px solid #E5E7EB",marginBottom:10,overflow:"hidden"}}>
            <div onClick={()=>setSel(sel===u.id?null:u.id)} style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"#1A0A2E",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:"white",fontWeight:800,fontSize:14}}>{(u.firstName||"?")[0]}{(u.lastName||"?")[0]}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,color:"#1A0A2E"}}>{u.firstName} {u.lastName}</div>
                <div style={{fontSize:11,color:"#9CA3AF"}}>Dernière activité : {fmt(u.seen)}</div>
                <div style={{marginTop:6,height:6,background:"#F3F4F6",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${u.pct}%`,background:u.pct>=75?"#059669":u.pct>=40?"#D97706":"#5B2D8E",borderRadius:3}}/>
                </div>
              </div>
              <div style={{fontSize:20,fontWeight:900,color:u.pct>=75?"#059669":u.pct>=40?"#D97706":"#5B2D8E",minWidth:42,textAlign:"right"}}>{u.pct}%</div>
            </div>
            {sel===u.id&&(
              <div style={{borderTop:"1px solid #F3F4F6",padding:"12px 16px",background:"#FAFAFA"}}>
                <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:10}}>Détail par pôle</div>
                {POLES.map(pole=>{
                  const pm=pole.tools.reduce((s,t)=>s+(t.quiz?.length||1),0);
                  const px=pole.tools.reduce((s,t)=>s+Math.min(u.xpd[t.id]||0,t.quiz?.length||1),0);
                  const pp=Math.round((px/pm)*100);
                  return(
                    <div key={pole.id} style={{marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:11,fontWeight:500}}><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:pole.color,marginRight:5}}/>{pole.label}</span>
                        <span style={{fontSize:11,color:pole.color,fontWeight:700}}>{pp}%</span>
                      </div>
                      <div style={{height:5,background:"#E5E7EB",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pp}%`,background:pole.color,borderRadius:3}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function ProgressPage({user,onBack}){
  const date=new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});
  const tools_data=POLES.map(pole=>({...pole,tools:pole.tools.map(t=>{const max=t.quiz?.length||1;const xp=getXP(t.id);const score=Math.min(xp,max);const pct=Math.round((score/max)*100);return{...t,score,max,pct};})}));
  const totalMax=tools_data.reduce((s,p)=>s+p.tools.reduce((s2,t)=>s2+t.max,0),0);
  const totalScore=tools_data.reduce((s,p)=>s+p.tools.reduce((s2,t)=>s2+t.score,0),0);
  const totalPct=Math.round((totalScore/totalMax)*100);

  const sendByEmail=async()=>{
    // Charge jsPDF dynamiquement
    if(!window.jspdf){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210, margin=18, cw=W-margin*2;

    // ── Palette couleurs pôles ──
    const poleColors={
      'amelioration-continue':[91,45,142],
      'supply-chain':[217,106,42],
      'securite':[201,69,128],
      'ressources-humaines':[45,122,79],
      'rse':[22,163,74],
      'maintenance':[124,58,237],
      'informatique':[3,105,161],
      'qualite':[190,24,93],
    };

    // ── HEADER ──────────────────────────────────────────────────────
    doc.setFillColor(26,10,46);
    doc.roundedRect(margin,12,cw,28,3,3,'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(22);
    doc.text('MBWS',margin+6,28);
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.setTextColor(200,190,220);
    doc.text('Formation Interne',margin+6,34);
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.setTextColor(255,255,255);
    doc.text(`${user.firstName} ${user.lastName}`,W-margin-2,26,{align:'right'});
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.setTextColor(200,190,220);
    doc.text(`Rapport généré le ${date}`,W-margin-2,32,{align:'right'});

    let y=50;

    // ── SCORE GLOBAL ─────────────────────────────────────────────────
    doc.setFillColor(245,243,255);
    doc.roundedRect(margin,y,cw,18,2,2,'F');
    const gc=totalPct>=75?[5,150,105]:totalPct>=40?[217,119,6]:[91,45,142];
    doc.setFillColor(...gc);
    doc.setFont('helvetica','bold');
    doc.setFontSize(20);
    doc.setTextColor(...gc);
    doc.text(`${totalPct}%`,margin+7,y+12);
    doc.setFontSize(9);
    doc.setTextColor(55,65,81);
    doc.text(`Progression globale — ${totalScore} / ${totalMax} questions réussies`,margin+22,y+8);
    // Barre
    doc.setFillColor(220,215,240);
    doc.roundedRect(margin+22,y+10,cw-25,4,1,1,'F');
    doc.setFillColor(...gc);
    doc.roundedRect(margin+22,y+10,Math.max(2,(cw-25)*totalPct/100),4,1,1,'F');
    y+=28;

    // ── DÉTAIL PAR PÔLE ──────────────────────────────────────────────
    tools_data.forEach((pole,pi)=>{
      const pm=pole.tools.reduce((s,t)=>s+t.max,0);
      const ps=pole.tools.reduce((s,t)=>s+t.score,0);
      const pp=Math.round((ps/pm)*100);
      const pc=poleColors[pole.id]||[91,45,142];

      // Saut de page si besoin
      if(y>260){doc.addPage();y=18;}

      // En-tête pôle
      doc.setFillColor(250,249,255);
      doc.roundedRect(margin,y,cw,9,1,1,'F');
      doc.setFillColor(...pc);
      doc.roundedRect(margin,y,3,9,1,1,'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(...pc);
      doc.text(pole.label,margin+7,y+6);
      doc.setTextColor(...pc);
      doc.text(`${pp}%`,W-margin-2,y+6,{align:'right'});
      y+=11;

      // Outils
      pole.tools.forEach(t=>{
        if(y>275){doc.addPage();y=18;}
        // Nom outil
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor(55,65,81);
        const name=t.name.length>42?t.name.substring(0,42)+'...':t.name;
        doc.text(name,margin+4,y+4);
        // Score
        const sc=t.pct>=75?[5,150,105]:t.pct>=40?[217,119,6]:[156,163,175];
        doc.setFont('helvetica','bold');
        doc.setTextColor(...sc);
        doc.text(`${t.score}/${t.max}`,W-margin-18,y+4,{align:'right'});
        // Mini barre
        doc.setFillColor(243,244,246);
        doc.roundedRect(W-margin-15,y+1,13,3,1,1,'F');
        if(t.pct>0){
          doc.setFillColor(...sc);
          doc.roundedRect(W-margin-15,y+1,Math.max(1,13*t.pct/100),3,1,1,'F');
        }
        doc.setFont('helvetica','normal');
        doc.setFontSize(7);
        doc.setTextColor(156,163,175);
        doc.text(`${t.pct}%`,W-margin-1,y+4,{align:'right'});
        y+=7;
      });
      y+=3;
    });

    // ── FOOTER ───────────────────────────────────────────────────────
    const pages=doc.internal.getNumberOfPages();
    for(let i=1;i<=pages;i++){
      doc.setPage(i);
      doc.setDrawColor(229,231,235);
      doc.line(margin,287,W-margin,287);
      doc.setFont('helvetica','normal');
      doc.setFontSize(7);
      doc.setTextColor(156,163,175);
      doc.text('MBWS Formation Interne — Marie Brizard Wine & Spirits',margin,291);
      doc.text(`${i}/${pages}`,W-margin,291,{align:'right'});
    }

    // ── ENVOI ────────────────────────────────────────────────────────
    const fileName=`Bilan-MBWS-${user.firstName}-${user.lastName}.pdf`;
    const pdfBlob=doc.output('blob');
    const pdfFile=new File([pdfBlob],fileName,{type:'application/pdf'});

    // Mobile : partage natif (ouvre l'app mail avec PDF attaché)
    if(navigator.canShare&&navigator.canShare({files:[pdfFile]})){
      try{
        await navigator.share({
          files:[pdfFile],
          title:`Bilan Formation MBWS — ${user.firstName} ${user.lastName}`,
        });
        return;
      }catch(e){ if(e.name!=='AbortError') console.log(e); }
    }

    // Desktop fallback : télécharge le PDF + ouvre le mail
    const url=URL.createObjectURL(pdfBlob);
    const a=document.createElement('a');
    a.href=url; a.download=fileName; a.click();
    URL.revokeObjectURL(url);
    setTimeout(()=>{
      const subject=encodeURIComponent(`Bilan Formation MBWS — ${user.firstName} ${user.lastName} — ${totalPct}%`);
      const body=encodeURIComponent(`Bonjour,\n\nVeuillez trouver en pièce jointe le bilan de formation de ${user.firstName} ${user.lastName} (${totalPct}%).\n\nCordialement`);
      window.open(`mailto:${FORMATEUR_EMAIL}?subject=${subject}&body=${body}`,'_blank');
    },500);
  };

  const printPage=()=>{
    const w=window.open("","_blank","width=800,height=900");
    const rows=tools_data.map(pole=>`<div class="pb"><div class="pt" style="border-left:4px solid ${pole.color};padding-left:10px;color:${pole.color}">${pole.label}</div><table><thead><tr><th>Outil</th><th>Score</th><th>%</th></tr></thead><tbody>${pole.tools.map(t=>`<tr><td>${t.name}</td><td style="text-align:center;font-weight:700;color:${t.pct>=75?"#059669":t.pct>=40?"#D97706":"#6B7280"}">${t.score}/${t.max}</td><td><div style="background:#F3F4F6;border-radius:4px;height:8px;overflow:hidden"><div style="width:${t.pct}%;height:100%;background:${pole.color};border-radius:4px"></div></div><span style="font-size:10px;color:#6B7280">${t.pct}%</span></td></tr>`).join("")}</tbody></table></div>`).join("");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Bilan MBWS — ${user.firstName} ${user.lastName}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;padding:32px;color:#1A0A2E;font-size:13px}.hd{display:flex;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid #E5E7EB}.brand{font-size:32px;font-weight:900;color:#1A0A2E;letter-spacing:-1px}.gb{display:flex;align-items:center;gap:12px;background:#F5F3FF;border-radius:10px;padding:14px 18px;margin-bottom:24px}.gp{font-size:36px;font-weight:900;color:#5B2D8E}.pb{margin-bottom:22px;page-break-inside:avoid}.pt{font-size:13px;font-weight:700;margin-bottom:8px}table{width:100%;border-collapse:collapse}th{background:#F9FAFB;padding:6px 8px;font-size:10px;font-weight:600;color:#6B7280;text-transform:uppercase;text-align:left;border-bottom:1px solid #E5E7EB}td{padding:6px 8px;border-bottom:1px solid #F3F4F6;vertical-align:middle;font-size:12px}.ft{margin-top:32px;padding-top:16px;border-top:1px solid #E5E7EB;font-size:10px;color:#9CA3AF;display:flex;justify-content:space-between}@media print{body{padding:20px}.pb{page-break-inside:avoid}}</style></head><body><div class="hd"><div><div class="brand">MBWS</div><div style="font-size:11px;color:#9CA3AF">Formation Interne</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800">${user.firstName} ${user.lastName}</div><div style="font-size:12px;color:#6B7280">Rapport généré le ${date}</div></div></div><div class="gb"><div class="gp">${totalPct}%</div><div style="flex:1"><div style="font-size:12px;color:#6B7280;margin-bottom:6px">Progression globale — ${totalScore} / ${totalMax} questions réussies</div><div style="background:#E9D5FF;border-radius:5px;height:10px;overflow:hidden"><div style="width:${totalPct}%;height:100%;background:#5B2D8E;border-radius:5px"></div></div></div></div>${rows}<div class="ft"><span>MBWS Formation Interne</span><span>${user.firstName} ${user.lastName} — ${date}</span></div></body></html>`);
    w.document.close();setTimeout(()=>w.print(),500);
  };

  return(
    <div style={{minHeight:"100dvh",background:"#F9FAFB",paddingBottom:80}}>
      <div style={{background:"#1A0A2E",padding:"16px 16px 14px",color:"white",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"white",width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:15}}>Ma progression</div>
            <div style={{fontSize:10,opacity:0.65}}>{user.firstName} {user.lastName}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={printPage} title="Exporter PDF"
              style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",padding:"7px 10px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              PDF
            </button>
            <button onClick={sendByEmail}
              style={{background:"#5B2D8E",border:"none",color:"white",padding:"7px 14px",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              Envoyer PDF au formateur
            </button>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{background:"white",borderRadius:16,padding:"18px 20px",marginBottom:16,border:"1px solid #E5E7EB",display:"flex",alignItems:"center",gap:14}}>

function SVGPareto() {
  const data = [
    {label:"Pannes",val:38,col:"#5B2D8E"},
    {label:"Réglages",val:22,col:"#7B4DB5"},
    {label:"Micro-arrêts",val:16,col:"#C94580"},
    {label:"Défauts qual.",val:13,col:"#D96A2A"},
    {label:"Autres",val:11,col:"#94A3B8"},
  ];
  const total = data.reduce((s,d)=>s+d.val,0);
  const max = data[0].val;
  const BW=52, GAP=6, ox=38, oy=155, H=110;
  let cumPct = 0;
  return (
    <svg width="100%" viewBox="0 0 380 210" role="img" style={{display:"block"}}>
      <title>Diagramme de Pareto</title>
      <text x={ox} y={12} fill="#374151" fontSize={10} fontWeight={700}>Diagramme de Pareto — causes de pertes</text>
      <line x1={ox} y1={oy-H} x2={ox} y2={oy} stroke="#CBD5E1" strokeWidth={1}/>
      <line x1={ox} y1={oy} x2={ox+data.length*(BW+GAP)} y2={oy} stroke="#CBD5E1" strokeWidth={1}/>
      {[0,25,50,75,100].map(v=>(
        <g key={v}>
          <line x1={ox} y1={oy-v*H/100} x2={ox+data.length*(BW+GAP)} y2={oy-v*H/100} stroke="#F3F4F6" strokeWidth={0.8}/>
          <text x={ox-4} y={oy-v*H/100+4} textAnchor="end" fill="#9CA3AF" fontSize={8}>{v}%</text>
        </g>
      ))}
      {data.map((d,i)=>{
        const rH = (d.val/max)*H;
        const bx = ox+i*(BW+GAP);
        cumPct += (d.val/total)*100;
        const cy = oy - (cumPct/100)*H;
        const ppx = bx + BW/2;
        return (
          <g key={i}>
            <rect x={bx} y={oy-rH} width={BW} height={rH} rx={3} fill={d.col}/>
            <text x={bx+BW/2} y={oy-rH-4} textAnchor="middle" fill={d.col} fontSize={9} fontWeight={700}>{d.val}%</text>
            <text x={bx+BW/2} y={oy+13} textAnchor="middle" fill="#374151" fontSize={8}>{d.label}</text>
          </g>
        );
      })}
      {/* Pareto line */}
      {(() => {
        let cum = 0;
        const pts = data.map((d,i) => {
          cum += (d.val/total)*100;
          return `${ox+i*(BW+GAP)+BW/2},${oy-(cum/100)*H}`;
        });
        return <polyline points={pts.join(" ")} fill="none" stroke="#EF4444" strokeWidth={1.5} strokeDasharray="4 2"/>;
      })()}
      <text x={ox+data.length*(BW+GAP)+4} y={oy-H} fill="#EF4444" fontSize={8}>Cum.</text>
    </svg>
  );
}

        flashcards:[
          {front:"RCA",back:"Root Cause Analysis — méthode structurée pour identifier la CAUSE PROFONDE d'un problème et garantir qu'il ne se reproduit plus. Question clé : 'Qu'avons-nous mis en place pour que cela ne se reproduise plus jamais ?'"},
          {front:"Cause primaire vs Cause racine",back:"Cause primaire = symptôme visible (ex: panne électrique visible). Cause racine = cause profonde sous-jacente (ex: manque de maintenance préventive). Traiter uniquement le symptôme → récidive assurée."},
          {front:"QQOQCCP",back:"Qui · Quoi · Où · Quand · Comment · Combien · Pourquoi. Sert à cadrer et décrire précisément le problème avant toute analyse de causes."},
          {front:"Les 6M (Ishikawa)",back:"Main d'œuvre · Méthodes · Mesures · Matières · Milieu · Machine. Permet d'explorer TOUTES les causes possibles d'un problème complexe ou multifactoriel."},
          {front:"5 Pourquoi",back:"Poser 'Pourquoi ?' 5 fois de suite pour remonter du symptôme à la cause racine. S'arrêter à la 1ère réponse = traiter le symptôme. Limite : risque de mauvaise piste."},
          {front:"Une bonne action RCA",back:"TOUJOURS : pilote nommé + date d'échéance. Sans ces deux éléments, une action reste une intention. La définition c'est bien, mais sans date ni pilote, rien ne se passe."},
          {front:"Critères de déclenchement RCA",back:"• Sécurité/environnement : systématique (near-miss inclus) • Récurrence : ≥ 2 occurrences • Non-conformité client : dès le 1er signalement • Perte significative : selon seuil site • Panne critique • Audit/exigence réglementaire"},
          {front:"OPI — Instruction Opérationnelle",back:"Document simple expliquant comment réaliser une tâche correctement : ordre des opérations, outil à utiliser, couple de serrage, photo du bon résultat. Outil de pérennité RCA."},
          {front:"L1P — Leçon en 1 Point",back:"Petit support visuel très court (1 page max) expliquant un point clé, une erreur fréquente ou une bonne pratique. Affichable au poste. Exemple : comment positionner un joint pour éviter les fuites."},
          {front:"NILs",back:"Nettoyage · Inspection · Lubrification. Actions TPM/terrain garantissant l'état du poste. L'opérateur signale les anomalies AVANT qu'elles provoquent un défaut produit."},
          {front:"Poka-Yoké en pérennité RCA",back:"Dispositif empêchant l'erreur ou la rendant immédiatement visible. Exemple : gabarit empêchant de monter une pièce inversée. L'outil de pérennité le plus robuste."},
          {front:"Cas Mémorial Jefferson",back:"Chaîne causale : lumières allumées dès l'aube (réglage défaut) → insectes attirés → araignées → oiseaux → fientes → nettoyage agressif → dégradation. Solution : retarder l'allumage d'1h. Coût : quasi nul."},
          {front:"Description précise d'un problème",back:"Ancrer dans les faits mesurables. ❌ 'La vitesse est incorrecte' ✅ 'La vitesse V1=5m/s est inférieure au standard Vstd=6m/s'. Éviter les expressions vagues."},
          {front:"6 étapes du document RCA MBWS",back:"1-Définir/Mesurer (QQOQCCP) · 2-Analyser écarts vs conditions de base (6M) · 3-Identifier causes potentielles (5P) · 4-Gérer les actions · 5-Vérifier la pérennité · 6-Clôturer la RCA"},
        
          {front:"RCA — Question fondamentale",back:"'Qu'avons-nous mis en place pour que cela ne se reproduise PLUS JAMAIS ?' — pas seulement 'que s'est-il passé ?'"},
          {front:"Cause primaire vs Cause racine",back:"Cause primaire = symptôme visible (panne électrique). Cause racine = cause profonde (manque maintenance préventive). Traiter uniquement le symptôme → récidive garantie."},
          {front:"Critères RCA MBWS",back:"Systématique : sécurité (tout near-miss), NC client (dès le 1er), récurrence (≥2), perte significative (seuil site), panne critique. En cas de doute : déclencher."},
          {front:"QQOQCCP dans la RCA",back:"Étape 1 : cadrer le problème. Qui / Quoi / Où / Quand / Comment / Combien / Pourquoi. Description précise et mesurable (faits, pas opinions)."},
          {front:"6M dans la RCA",back:"Étape 2 : explorer toutes les causes par famille. Main-d'oeuvre, Méthode, Machine, Matière, Milieu, Mesure. Vérifier conditions de base avant d'aller plus loin."},
          {front:"5 Pourquoi dans la RCA",back:"Étape 3 : remonter de la cause directe à la cause racine en posant 'Pourquoi ?' 5 fois. S'arrêter quand la réponse est une décision systémique."},
          {front:"Bonne action RCA",back:"OBLIGATOIRE : pilote nommé + date d'échéance. Sans ces 2 éléments = intention, pas action."},
          {front:"Outils de pérennité RCA",back:"OPI · L1P (Leçon 1 Point) · NILs (Nettoyage/Inspection/Lubrification) · Standard + Check-list · Plan de contrôle · Gammes maintenance · Poka-Yoké."},
          {front:"Cas Jefferson — leçon",back:"Lumières allumées trop tôt → insectes → araignées → oiseaux → fientes → nettoyage agressif. Solution : retarder l'allumage d'1h. Coût : quasi nul."},
          {front:"6 étapes document RCA MBWS",back:"1-Définir/Mesurer (QQOQCCP) · 2-Analyser écarts (6M) · 3-Causes potentielles (5P) · 4-Gérer actions · 5-Vérifier pérennité · 6-Clôturer avec sponsor."},
        ]

      ,{ id:"lean-principes", name:"Les 5 Principes du Lean", visual:"leanprincipes",
        tagline:"Créer de la valeur pour le client en éliminant tout ce qui n'en crée pas",
        quickDesc:"Le Lean (Womack & Jones, 1996) repose sur 5 principes fondamentaux issus du Toyota Production System : définir la valeur, cartographier le flux, créer le flux continu, tirer les flux, et viser la perfection.",

        ],

// Deterministic seeded shuffle for quiz answers
// Same question always gets same order — but correct answer position varies by question
function seededShuffle(arr, seed) {
  const a = [...arr];
  let h = seed | 0;
  for (let i = a.length - 1; i > 0; i--) {
    h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
    h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
    h = (h ^ (h >>> 16)) >>> 0;
    const j = h % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleQuizAnswers(quiz) {
  return quiz.map(q => {
    const answers = q.answers || q.a || [];
    const correctIdx = q.correct !== undefined ? q.correct : q.c;
    // Seed from question text hash
    let seed = 0;
    for (let i = 0; i < q.q.length; i++) {
      seed = Math.imul(31, seed) + q.q.charCodeAt(i) | 0;
    }
    const indexed = answers.map((text, i) => ({ text, isCorrect: i === correctIdx }));
    const shuffled = seededShuffle(indexed, seed);
    return {
      ...q,
      answers: shuffled.map(a => a.text),
      a: shuffled.map(a => a.text),
      correct: shuffled.findIndex(a => a.isCorrect),
      c: shuffled.findIndex(a => a.isCorrect),
    };
  });
}

function Quiz({ quiz, onComplete }) {
  const shuffled = useMemo(() => shuffleQuizAnswers(quiz), []);
  const [idx, setIdx] = useState(0);
  const [sel, setSel] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const handle = (i) => {
    if (sel !== null) return;
    setSel(i);
    const ok = i === shuffled[idx].correct;
    if (ok) setScore(s => s + 1);
    setTimeout(() => {
      if (idx + 1 >= quiz.length) { setDone(true); onComplete && onComplete(score + (ok ? 1 : 0)); }
      else { setIdx(v => v + 1); setSel(null); }
    }, 1300);
  };

  if (done) {
    const pct = Math.round((score / quiz.length) * 100);
    return (
      <div style={{ textAlign: "center", padding: "24px 16px" }}>
        <div style={{ width: 72, height: 72, borderRadius: "50%", background: pct >= 75 ? "#D1FAE5" : "#FEF3C7", margin: "0 auto 16px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32 }}>
          {pct >= 75 ? "✓" : "↻"}
        </div>
        <div style={{ fontWeight: 700, fontSize: 22, color: pct >= 75 ? "#065F46" : "#B45309", marginBottom: 6 }}>{score}/{quiz.length} — {pct}%</div>
        <div style={{ color: P.textS, marginBottom: 20, fontSize: 14 }}>
          {pct >= 80 ? "Excellent — vous maîtrisez ce sujet." : pct >= 60 ? "Bien joué — quelques points à consolider." : "Repassez le module et réessayez."}
        </div>
        <button onClick={() => { setIdx(0); setSel(null); setScore(0); setDone(false); }} style={{ background: P.violet, color: "white", border: "none", borderRadius: 10, padding: "10px 28px", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>
          Recommencer
        </button>
      </div>
    );
  }

  const q = shuffled[idx];
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, fontSize: 12, color: P.textS }}>
        <span style={{ fontWeight: 600 }}>Question {idx + 1} / {quiz.length}</span>
        <span>{score} correcte{score > 1 ? "s" : ""}</span>
      </div>
      <div style={{ width: "100%", height: 4, background: "#E5E7EB", borderRadius: 2, marginBottom: 16 }}>
        <div style={{ height: 4, background: P.violet, borderRadius: 2, width: `${(idx / quiz.length) * 100}%`, transition: "width 0.4s" }} />
      </div>
      <div style={{ background: P.grayL, borderRadius: 10, padding: "14px 16px", marginBottom: 14, fontWeight: 600, fontSize: 14, color: P.text, lineHeight: 1.5 }}>{q.q}</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {q.answers.map((a, i) => {
          let bg = P.white, border = "1.5px solid #E5E7EB", color = P.text;
          if (sel !== null) {
            if (i === q.correct) { bg = "#D1FAE5"; border = "1.5px solid #059669"; color = "#065F46"; }
            else if (i === sel && i !== q.correct) { bg = "#FEE2E2"; border = "1.5px solid #DC2626"; color = "#991B1B"; }
          }
          return (
            <button key={i} onClick={() => handle(i)} style={{ background: bg, border, borderRadius: 10, padding: "12px 14px", textAlign: "left", fontWeight: 500, fontSize: 13, color, cursor: sel !== null ? "default" : "pointer", transition: "all 0.2s", lineHeight: 1.4 }}>
              {a}
            </button>
          );
        })}
      </div>
    </div>
  );
}
