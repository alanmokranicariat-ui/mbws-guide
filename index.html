et aux statistiques avancées","Un responsable qualité — valide uniquement pour les processus de support non critiques","Un auditeur certifié ISO — suffisant si la direction a formellement validé la démarche","Un expert en arts martiaux industriels — approche utilisée en dehors des exigences normatives strictes"],c:0},{q:"6 Sigma est un prolongement de la MSP car :",a:["Il étend la logique statistique à TOUS les processus de l'entreprise, pas seulement la production","Il utilise les mêmes cartes de contrôle — valide uniquement pour les processus de support non critiques","Il est plus simple à mettre en oeuvre — méthode retenue dans l'industrie automobile avant les années 2000","Il remplace la MSP — applicable dans les contextes à faible enjeu qualité"],c:0}],flash:[{f:"DMAIC",b:"Define → Measure → Analyze → Improve → Control. Démarche structurée pour les projets d'amélioration 6 Sigma."},{f:"6 Sigma",b:"3,4 défauts par million d'opportunités. Niveau de qualité quasi-parfait. Initié chez Motorola (1986)."},{f:"Black Belt",b:"Expert 6 Sigma formé à la conduite de projets complexes DMAIC, statistiques avancées et management de projet."}]}];return React.createElement("div",null,React.createElement("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:P.textS,marginBottom:12}},React.createElement("span",null,idx+1," / ",cards.length),React.createElement("span",{style:{color:"#059669"}},"\u2713 ",known.length," ma\xEEtris\xE9e",known.length>1?"s":"")),React.createElement("div",{onClick:function onClick(){return setFlipped(function(f){return!f;});},style:{background:flipped?P.violet:P.white,border:"2px solid ".concat(flipped?P.violet:"#E5E7EB"),borderRadius:16,padding:"28px 20px",minHeight:140,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",cursor:"pointer",transition:"background 0.25s, border 0.25s"}},React.createElement("div",{style:{fontSize:10,color:flipped?"rgba(255,255,255,0.55)":P.textS,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}},flipped?"Réponse":"Question — tapez pour révéler"),React.createElement("div",{style:{fontWeight:700,fontSize:15,color:flipped?"white":P.text,lineHeight:1.6}},flipped?card.back:card.front)),flipped&&React.createElement("div",{style:{display:"flex",gap:10,marginTop:12}},React.createElement("button",{onClick:handleReview,style:{flex:1,background:"#FEF3C7",border:"1.5px solid #F59E0B",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,color:"#B45309",cursor:"pointer"}},"Revoir"),React.createElement("button",{onClick:handleKnow,style:{flex:1,background:"#D1FAE5",border:"1.5px solid #059669",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,color:"#065F46",cursor:"pointer"}},"Ma\xEEtris\xE9")));}function getXP(toolId){try{return parseInt(localStorage.getItem("mbws_xp_".concat(toolId))||"0");}catch(_unused6){return 0;}}function setXPVal(toolId,v){try{localStorage.setItem("mbws_xp_".concat(toolId),String(v));}catch(_unused7){}var s=getSession();if(s&&!s.isManager){lsSet("mbws_xp_"+s.id+"_"+toolId,v);lsSet("mbws_seen_"+s.id,Date.now());}}var SVG_ZONE_INFOS={"5s":[{id:"s1",label:"S1 — Seiri (Trier)",emoji:"🗑️",simple:"Supprimer tout ce qui est inutile au poste. Si un objet n'a pas été utilisé depuis 30 jours, il n'a pas sa place ici.",detail:"Technique pratique : apposer une étiquette rouge sur chaque objet dont l'utilité est douteuse. Les étiquettes rouges non justifiées sous 48h = élimination. En zone MBWS : 6 bouteilles max par case, aucun outil non assigné sur les étagères."},{id:"s2",label:"S2 — Seiton (Ranger)",emoji:"📐",simple:"Une place pour chaque chose, chaque chose à sa place. Visualiser chaque emplacement pour que n'importe qui trouve n'importe quoi en moins de 30 secondes.",detail:"Outils visuels : silhouettes d'outils peintes sur les panneaux, marquages au sol colorés (jaune = circulation, vert = stock OK, rouge = zone interdite), étiquettes standardisées."},{id:"s3",label:"S3 — Seiso (Nettoyer)",emoji:"🧹",simple:"Nettoyer = inspecter. En nettoyant, on détecte fuites, usures, visseries desserrées, corps étrangers — avant qu'ils causent des problèmes.",detail:"En zone alimentaire MBWS : le nettoyage est critique pour la sécurité (HACCP). Un poste sale peut générer une contamination physique (corps étranger) ou biologique. Le Seiso est aussi un moment d'audit : anomalie détectée = RCA (Root Cause Analysis — analyse des causes racines) déclenchée."},{id:"s4",label:"S4 — Seiketsu (Standardiser)",emoji:"📋",simple:"Formaliser l'état de référence pour que les 3 premiers S soient maintenus. Photo standard au poste, check-list de démarrage, règles affichées.",detail:"Le standard devient la référence visuelle. Chez MBWS : photo plastifiée du bon état au poste, standard de rangement des outils signé par l'équipe, grille d'audit 5S affichée en salle de réunion."},{id:"s5",label:"S5 — Shitsuke (Respecter)",emoji:"🏆",simple:"Le plus difficile : maintenir les 4 premiers S dans la durée. Cela nécessite des rituels, des audits et une culture d'équipe.",detail:"Rituels MBWS : audit 5S chaque lundi matin avec notation chiffrée, défi mensuel inter-équipes (photo avant/après), brief 5 min vendredi en fin de poste. Sans Shitsuke, les 5S reviennent à l'état initial en 3 mois."}],"kaizen":[{id:"gemba",label:"Gemba — Le terrain",emoji:"👣",simple:"Aller sur le lieu réel où la valeur est créée avant de décider quoi que ce soit. On ne résout pas un problème depuis un bureau.",detail:"Gemba Walk : manager ou équipe qui observe le terrain pendant 15-30 min sans juger, uniquement pour comprendre. Questions : qu'est-ce qui ralentit le travail ? Qu'est-ce qui est répété sans valeur ? Qu'est-ce qui est risqué ?"},{id:"muda",label:"Muda — Les 8 gaspillages",emoji:"❌",simple:"Toute activité qui consomme des ressources sans créer de valeur pour le client. Il en existe 8 types.",detail:"1-Surproduction 2-Attentes 3-Transport inutile 4-Surtraitement 5-Stocks excessifs 6-Mouvements inutiles 7-Défauts/rebuts 8-Sous-utilisation des talents. À MBWS : chercher notamment les attentes entre postes et les transports inutiles de bouteilles."},{id:"mura",label:"Mura — L'irrégularité",emoji:"〰️",simple:"Variation dans le rythme de production créant alternativement surcharge et sous-charge. Cause de stress et d'erreurs.",detail:"Exemple : une ligne qui produit vite puis attend un poste en aval surchargé. Solution : équilibrer les cadences entre postes (time balancing)."},{id:"muri",label:"Muri — La surcharge",emoji:"💪",simple:"Pousser un opérateur ou une machine au-delà de ses limites normales. Cause directe de pannes, accidents et TMS (Troubles Musculo-Squelettiques).",detail:"TMS = 1ère maladie professionnelle en France. Prévention : ergonomie des postes, rotation des équipes, aide à la manutention."},{id:"pdca-k",label:"PDCA dans le Kaizen",emoji:"🔄",simple:"Chaque amélioration Kaizen suit le cycle Plan-Do-Check-Act. Tester d'abord en petit, mesurer, puis standardiser si ça marche.",detail:"Ne jamais standardiser avant d'avoir vérifié l'efficacité (étape Check obligatoire). Une bonne idée non mesurée peut créer de nouveaux problèmes."}],"pdca":[{id:"plan",label:"Plan — Planifier",emoji:"📊",simple:"Analyser le problème, identifier les causes, définir l'objectif SMART (Spécifique, Mesurable, Atteignable, Réaliste, Temporel) et planifier les actions.",detail:"Erreurs fréquentes : définir des actions avant d'analyser les causes (on traite le symptôme), fixer des objectifs vagues ('améliorer la qualité'), ne pas nommer de responsable. Outils : QQOQCCP, Ishikawa, 5 Pourquoi, Pareto."},{id:"do",label:"Do — Réaliser",emoji:"🔨",simple:"Mettre en œuvre les actions planifiées — d'abord en pilote sur un périmètre réduit pour tester sans risquer l'ensemble.",detail:"Règle d'or : tester avant de déployer. Un pilote sur une ligne permet de valider sans mettre en risque toute la production. Former les équipes impactées AVANT la mise en œuvre."},{id:"check",label:"Check — Vérifier",emoji:"✅",simple:"Mesurer les résultats obtenus et les comparer aux objectifs définis dans le Plan. Données factuelles uniquement, pas d'impressions.",detail:"C'est l'étape la plus souvent sautée (80% des équipes passent directement à Act). Sans Check rigoureux, on standardise des actions inefficaces ou on rate une amélioration réelle. Utiliser les mêmes indicateurs que dans Plan."},{id:"act",label:"Act — Agir",emoji:"🚀",simple:"Si le résultat est atteint : standardiser et déployer. Si non atteint : analyser l'écart et relancer un nouveau cycle PDCA.",detail:"La standardisation = la cale de la roue de Deming. Sans cale, la roue redescend. Outils de standardisation : procédure opératoire (OPI), leçon en 1 point (L1P), formation, check-list de démarrage."},{id:"cale",label:"La cale — Standardisation",emoji:"⚓",simple:"Sans standardisation après un PDCA réussi, les bonnes pratiques s'érodent et le problème revient. La standardisation 'cale' la roue pour qu'elle ne redescende pas.",detail:"Formes de standardisation : procédure écrite signée, photo standard au poste, OPI (Instruction Opérationnelle), formation de tous les opérateurs concernés, mise à jour du plan de surveillance."}],"8d":[{id:"d1",label:"D1 — Équipe",emoji:"👥",simple:"Former une équipe pluridisciplinaire avec un pilote désigné. Inclure les personnes proches du problème, pas uniquement les experts.",detail:"4 à 8 personnes max. Inclure : opérateur concerné, responsable qualité, méthodes, maintenance si équipement. Le D1 est souvent négligé — une équipe mal formée conduit à une analyse biaisée."},{id:"d2",label:"D2 — Description",emoji:"🔍",simple:"Décrire précisément le problème en répondant à QQOQCCP (Qui, Quoi, Où, Quand, Comment, Combien, Pourquoi). Être factuel et chiffré.",detail:"Mauvaise description : 'problème de qualité sur la ligne'. Bonne description : '12 bouteilles étiquettes décalées de +3mm sur la ligne 2, lot n°4521, détectées le 15/06 à 14h, taux 0.8%'. La précision du problème détermine la qualité de l'analyse."},{id:"d3",label:"D3 — Mesures conservatoires",emoji:"🚨",simple:"Action IMMÉDIATE pour protéger le client AVANT même d'analyser les causes. Bloquer, trier, alerter. Ce n'est pas la solution définitive.",detail:"Exemples : bloquer tout le stock suspect, prévenir le client, mettre en place un tri 100%, rappeler un lot. Le D3 doit être réalisé dans l'heure, pas dans la semaine. Sa rapidité conditionne la satisfaction du client."},{id:"d4",label:"D4 — Causes racines",emoji:"🌱",simple:"Utiliser les 5 Pourquoi successifs jusqu'à la cause profonde. Ne pas s'arrêter à la première réponse — c'est presque toujours un symptôme.",detail:"Piège fréquent : s'arrêter à 'erreur opérateur' ou 'panne machine'. La vraie cause racine est souvent systémique : absence de procédure, formation insuffisante, détection défaillante. Valider chaque cause par des données terrain."},{id:"d5d6",label:"D5-D6 — Actions définitives",emoji:"🛠️",simple:"D5 = choisir les meilleures actions correctives (coût, délai, efficacité) et les tester. D6 = déployer à grande échelle et mesurer l'efficacité.",detail:"La différence avec D3 : D3 traite les effets (urgent), D5-D6 éliminent les causes (durable). Une action corrective sans mesure de son efficacité ne prouve rien."},{id:"d7",label:"D7 — Prévenir la récurrence",emoji:"🛡️",simple:"Mettre à jour les standards, l'AMDEC (Analyse des Modes de Défaillance, de leurs Effets et de leur Criticité), les procédures et les formations pour que le problème ne puisse jamais réapparaître.",detail:"Le D7 est souvent bâclé — c'est l'étape la plus importante. Mettre à jour : AMDEC (Analyse des Modes de Défaillance), gammes de contrôle, modes opératoires, plan de formation. Planifier un audit de suivi à 3 mois."},{id:"d8",label:"D8 — Capitaliser",emoji:"🏅",simple:"Valoriser l'équipe, communiquer les résultats et alimenter la base de REX (Retours d'Expérience). Partager la solution aux autres lignes/sites (Yokoten).",detail:"D8 n'est pas anecdotique : la reconnaissance crée la culture de résolution de problèmes. Une équipe non valorisée s'impliquera moins dans le prochain 8D. Yokoten = transversalisation japonaise."}],"pareto":[{id:"donnees",label:"Collecter les données",emoji:"📊",simple:"Lister tous les types de problèmes ou causes et mesurer leur fréquence, leur coût ou leur impact client sur une période définie.",detail:"Période recommandée : minimum 3 mois de données pour avoir une image représentative. Moins de données = risque de se tromper de priorité. Choisir un seul indicateur à la fois (fréquence OU coût OU impact client)."},{id:"tri",label:"Trier et classer",emoji:"🔢",simple:"Trier les causes par ordre décroissant d'impact. La cause la plus importante est en premier.",detail:"Toujours utiliser un tableau avant de tracer le diagramme. Calculer les % individuels et cumulés pour chaque cause."},{id:"courbe",label:"La courbe cumulative",emoji:"📈",simple:"La courbe reliant les % cumulés permet de lire visuellement le seuil 80%. Les causes à gauche de ce seuil sont les priorités absolues.",detail:"Si 3 causes représentent 78% des problèmes : traiter ces 3 causes en priorité donne 78% des gains. Les causes à droite du seuil 80% sont à traiter ensuite, dans un second temps."},{id:"seuil",label:"Le seuil 80%",emoji:"🎯",simple:"Concentrer les ressources sur les 20% de causes qui génèrent 80% des effets. Ne pas traiter tout en parallèle — c'est inefficace.",detail:"Règle de Pareto (Vilfredo Pareto, économiste italien, 1896) : observée d'abord sur la distribution des richesses, appliquée ensuite à tous les phénomènes naturels et industriels."},{id:"axes",label:"Multi-Pareto",emoji:"🔄",simple:"Construire un Pareto par fréquence ET un par coût ET un par impact client. Les priorités changent selon l'axe choisi.",detail:"Exemple : la cause la plus fréquente peut être peu coûteuse, tandis qu'une cause rare peut être catastrophique. Toujours croiser les axes avant de décider de la priorité."}],"ishikawa":[{id:"mo",label:"M1 — Main-d'œuvre",emoji:"👤",simple:"Tout ce qui est lié aux personnes : compétences, formation, fatigue, motivation, erreur humaine.",detail:"Questions clés : L'opérateur a-t-il été formé ? La procédure est-elle connue et comprise ? Y a-t-il du turn-over qui dilue les compétences ? La charge de travail est-elle excessive (→ Muri) ?"},{id:"methode",label:"M2 — Méthode",emoji:"📋",simple:"Les procédures, modes opératoires, standards, gammes de fabrication. Sont-ils définis ? Appliqués ? À jour ?",detail:"Questions clés : Existe-t-il une procédure ? Est-elle à jour ? Est-elle respectée ? Le séquençage des opérations est-il optimal ? Les paramètres de réglage sont-ils documentés ?"},{id:"machine",label:"M3 — Machine/Matériel",emoji:"⚙️",simple:"Les équipements, outillages, instruments de mesure. Leur état, leur réglage, leur maintenance.",detail:"Questions clés : La machine est-elle capable (Cpk ≥ 1.33) ? Les réglages sont-ils documentés ? La maintenance préventive est-elle réalisée ? Les outils sont-ils usés ou inadaptés ?"},{id:"matiere",label:"M4 — Matière",emoji:"📦",simple:"Les composants, matières premières, emballages. Leur qualité, leur conformité, leur stockage.",detail:"Questions clés : La matière est-elle conforme ? Les conditions de stockage sont-elles respectées (température, humidité) ? Y a-t-il des lots défectueux ? Le fournisseur a-t-il changé ?"},{id:"milieu",label:"M5 — Milieu",emoji:"🌡️",simple:"L'environnement physique : température, humidité, bruit, éclairage, organisation de l'espace de travail.",detail:"Questions clés : Les conditions climatiques sont-elles maîtrisées ? L'espace de travail est-il organisé (5S) ? L'éclairage est-il suffisant pour le contrôle visuel ? Y a-t-il des vibrations perturbant les mesures ?"},{id:"mesure",label:"M6 — Mesure",emoji:"📏",simple:"Les instruments de contrôle et de mesure. Leur fiabilité, leur étalonnage, la méthode de mesure utilisée.",detail:"Questions clés : Les instruments sont-ils étalonnés ? L'incertitude de mesure est-elle connue ? La méthode de mesure est-elle standardisée ? Les opérateurs mesurent-ils tous de la même façon (R&R) ?"},{id:"effet",label:"L'effet — Le problème",emoji:"🎯",simple:"Le problème à analyser, décrit précisément à droite du diagramme. Plus la description est précise, plus l'analyse est efficace.",detail:"Bonne description : fait mesurable, chiffré, localisé, daté. Mauvaise description : vague, subjective. Exemple bon : 'Taux de bouteilles décalées = 0.8% sur ligne 2 depuis le 15/06'. Mauvais : 'problème de qualité'."}],"rca":[{id:"qqoqccp",label:"QQOQCCP — Cadrer",emoji:"❓",simple:"Répondre à Qui ? Quoi ? Où ? Quand ? Comment ? Combien ? Pourquoi ? pour décrire le problème de façon précise et mesurable.",detail:"C'est la fondation de toute analyse. Un problème mal cadré conduit à une analyse biaisée. Ancrer dans les faits : 'V=5m/s < V_std=6m/s' plutôt que 'vitesse incorrecte'."},{id:"6m",label:"6M — Explorer les causes",emoji:"🌐",simple:"Explorer toutes les familles de causes possibles (Main-d'œuvre, Méthode, Machine, Matière, Milieu, Mesure) avant de creuser une piste.",detail:"Erreur fréquente : creuser immédiatement la première cause qui semble évidente sans vérifier les autres. Le 6M oblige à explorer systématiquement toutes les pistes. Réaliser sur le terrain (Gemba), pas en salle de réunion."},{id:"5p",label:"5 Pourquoi — Creuser",emoji:"⛏️",simple:"Poser 'Pourquoi ?' 5 fois de suite pour remonter du symptôme à la cause profonde. S'arrêter à la 1ère réponse = traiter un symptôme.",detail:"La règle des 5 est indicative : parfois 3 suffisent, parfois il en faut 7. S'arrêter quand la réponse est une décision systémique (manque de procédure, formation absente, détection défaillante). Limite : risque de suivre une mauvaise piste sans s'en apercevoir."},{id:"actions",label:"Actions + Pilote + Date",emoji:"✅",simple:"Chaque action doit avoir un pilote nommé et une date d'échéance. Sans ces deux éléments, une action est une intention, pas un engagement.",detail:"Erreur classique : lister des actions sans responsable ni délai. Résultat : rien ne se passe. Une bonne fiche d'action contient : action précise, pilote nommé, date cible, indicateur de succès."},{id:"perennite",label:"Vérifier la pérennité",emoji:"🛡️",simple:"S'assurer que les solutions mises en place sont robustes et que le problème ne peut pas se reproduire. OPI, L1P, NILs, Poka-Yoké.",detail:"OPI (Instruction Opérationnelle) = document expliquant comment faire correctement. L1P (Leçon en 1 Point) = support visuel simple affiché au poste. NILs = Nettoyage, Inspection, Lubrification. Poka-Yoké = dispositif rendant l'erreur impossible."}],"kaikaku":[{id:"rupture",label:"Rupture vs amélioration",emoji:"⚡",simple:"Le Kaikaku est une transformation radicale (bond de +30 à +50%) vs le Kaizen qui avance par petits pas (+1% chaque jour).",detail:"Analogie : Kaizen = marcher chaque jour. Kaikaku = prendre un bus (bond immédiat). Les deux sont nécessaires. Sans Kaikaku périodique, le Kaizen atteint un plateau et stagne."},{id:"vsm-k",label:"VSM — État actuel",emoji:"📸",simple:"La VSM (Value Stream Mapping — cartographie des flux de valeur) révèle les gaspillages structurels qui ne peuvent pas être éliminés par le Kaizen seul.",detail:"La VSM montre où sont les stocks dormants, les délais d'attente, les transports inutiles. Si le ratio Valeur Ajoutée / Lead Time est < 10%, un Kaikaku s'impose."},{id:"futur",label:"État futur ambitieux",emoji:"🎯",simple:"Concevoir l'état futur sans se limiter à ce qui existe. Supprimer des étapes entières, réimplanter des lignes, passer d'un flux poussé à un flux tiré.",detail:"Le risque : concevoir un état futur trop timide (amélioration de 10% au lieu de 50%). Se poser la question : 'Si on recommençait de zéro, comment organiserait-on ce processus ?'"},{id:"pilote-k",label:"Chantier pilote",emoji:"🏗️",simple:"3 à 5 jours intensifs sur le terrain : observer, concevoir, mettre en œuvre, mesurer. Résultats visibles à la fin de la semaine.",detail:"Équipe type : 6-10 personnes transverses (production + méthodes + qualité + maintenance) + un sponsor de direction. Le sponsor est indispensable : le Kaikaku remet en cause l'organisation existante."},{id:"kaizen-k",label:"Kaizen après Kaikaku",emoji:"🔄",simple:"Après la transformation radicale, le Kaizen améliore en continu le nouvel état. La séquence naturelle est : Kaikaku → Standardisation → Kaizen.",detail:"Erreur : faire du Kaizen sans jamais faire de Kaikaku → plateau local. Autre erreur : faire du Kaikaku sans Kaizen ensuite → les gains s'érodent sans amélioration continue."}],"management-visuel":[{id:"principe",label:"Principe : visible = géré",emoji:"👁️",simple:"Ce qui est visible est géré, ce qui est caché est ignoré. Un problème non visible n'existe pas pour le manager.",detail:"Exemple : un stock qui dépasse l'emplacement prévu est visible immédiatement et déclenche une action. Sans marquage, personne ne sait que le stock est excessif."},{id:"andon",label:"Andon — Alerte immédiate",emoji:"🚨",simple:"Signal lumineux ou sonore permettant à l'opérateur d'alerter immédiatement en cas de problème, sans quitter son poste.",detail:"Inventé chez Toyota : l'opérateur tire un cordon → lumière orange = besoin d'aide, rouge = arrêt de ligne. Chez MBWS : bouton d'arrêt d'urgence, signaux lumineux de ligne. L'Andon élimine le délai entre le problème et la détection."},{id:"kpi",label:"KPI (Indicateurs Clés) terrain",emoji:"📊",simple:"Indicateurs affichés au poste en temps réel : TRS (Taux de Rendement Synthétique), taux de qualité, nombre d'arrêts. Permettent à l'opérateur de piloter lui-même.",detail:"Différence KPI terrain vs KPI direction : terrain = temps réel (chaque heure), direction = mensuel/trimestriel. Un opérateur qui voit son TRS en temps réel peut agir immédiatement."},{id:"standard-v",label:"Standard visuel au poste",emoji:"📷",simple:"Photo du bon état de référence plastifiée et affichée au poste. N'importe quel opérateur peut vérifier instantanément sans lire de procédure.",detail:"C'est l'outil 5S fondamental (Seiketsu). La photo montre : rangement des outils, état de propreté attendu, niveau de stock correct. Mise à jour lors de chaque modification."},{id:"obeya",label:"Obeya — Salle de pilotage",emoji:"🏢",simple:"Grande salle où toutes les informations clés (planning, risques, indicateurs, plans d'action) sont affichées physiquement pour l'équipe projet.",detail:"Obeya (大部屋) = 'grande salle' en japonais. Rend les réunions plus courtes et plus efficaces. Toutes les décisions se prennent en 30 min devant les données réelles. S'oppose au slide show PowerPoint déconnecté du terrain."},{id:"brief",label:"Brief quotidien (Stand-up)",emoji:"☕",simple:"Réunion de 5 à 15 minutes debout devant les indicateurs visuels. Hier : qu'est-il arrivé ? Aujourd'hui : qu'est prévu ? Obstacles : quels problèmes ?",detail:"Format strict : debout (évite les débordements), même heure et même lieu, 3 questions seulement. Un brief qui dépasse 15 min est un problème d'animation, pas de contenu."}],"lean-principes":[{id:"valeur",label:"1 — Valeur (point de vue client)",emoji:"💎",simple:"Définir ce que le client est prêt à payer. Tout le reste est un gaspillage à éliminer, qu'il soit une habitude ou une tradition.",detail:"Erreur classique : définir la valeur du point de vue du producteur ('ce que je sais faire') plutôt que du client ('ce dont j'ai besoin'). À MBWS : la valeur = qualité du produit, disponibilité, expérience de marque."},{id:"flux-v",label:"2 — Flux de valeur (VSM)",emoji:"🗺️",simple:"Cartographier toutes les étapes du processus pour visualiser ce qui crée de la valeur et ce qui est gaspillage.",detail:"La VSM (Value Stream Mapping) révèle que dans la plupart des entreprises, seulement 1 à 5% du temps est passé à créer de la valeur. Les 95-99% restants sont des attentes, stocks, transports."},{id:"flux-c",label:"3 — Flux continu",emoji:"➡️",simple:"Éliminer les arrêts, les files d'attente et les lots entre les étapes pour que le produit avance sans interruption.",detail:"L'idéal Lean est le flux 'pièce à pièce' (one piece flow). En pratique, réduire la taille des lots divise les délais par le même facteur et réduit les stocks intermédiaires."},{id:"pull",label:"4 — Flux tiré (Pull)",emoji:"⬅️",simple:"Ne produire que ce que le client demande, quand il le demande. S'oppose au flux poussé (production selon prévisions).",detail:"Outil : Kanban. Le flux tiré élimine la surproduction (le pire des gaspillages). En flux poussé, on produit en espérant vendre. En flux tiré, on produit parce qu'on a déjà vendu."},{id:"perfection",label:"5 — Perfection (amélioration continue)",emoji:"♾️",simple:"L'amélioration n'a pas de fin. Chaque cycle d'optimisation révèle de nouveaux gaspillages. La perfection est une direction, pas une destination.",detail:"C'est le principe qui lie les 4 autres. En éliminant les gaspillages, on rend d'autres gaspillages visibles qui étaient cachés. La Toyota Production System (TPS) est en amélioration continue depuis 1950."},{id:"muda-l",label:"Les 8 Muda (gaspillages)",emoji:"❌",simple:"Surproduction, Attentes, Transport, Surtraitement, Stocks, Mouvements, Défauts, Sous-utilisation des talents. Tout ce qui consomme sans créer de valeur.",detail:"La surproduction est le pire : elle génère et cache tous les autres gaspillages. Les stocks cachent les problèmes de qualité, les pannes, les délais. Produire juste ce qu'il faut, quand il le faut."}],"kanban":[{id:"signal",label:"La carte Kanban — signal",emoji:"🏷️",simple:"La carte Kanban (看板 = étiquette en japonais) est le signal déclenchant la production ou l'approvisionnement. Pas de carte = pas de production.",detail:"Règle absolue sans exception. Si une production démarre sans Kanban, c'est une surproduction. Le Kanban peut être physique (carte papier), coloré (rack 3 couleurs), ou électronique (e-Kanban via ERP)."},{id:"flux-k",label:"Flux tiré vs flux poussé",emoji:"↔️",simple:"Flux tiré (Pull) : on produit ce qui a été consommé. Flux poussé (Push) : on produit selon des prévisions. Le Kanban est l'outil du flux tiré.",detail:"Dans un flux poussé, les prévisions sont toujours fausses. Résultat : stocks excessifs sur certains produits, ruptures sur d'autres. Le flux tiré réagit à la demande réelle et élimine ce problème."},{id:"calcul-k",label:"Calculer le nombre de Kanbans",emoji:"🔢",simple:"N = (Demande journalière × Délai de réapprovisionnement × facteur de sécurité) ÷ Quantité par conteneur.",detail:"Trop de Kanbans = stock excessif. Trop peu = rupture. Le calcul est théorique : l'ajuster régulièrement selon la réalité terrain. Appliquer en priorité aux articles A (20% des références = 80% de la valeur)."},{id:"3couleurs",label:"Kanban 3 couleurs",emoji:"🚦",simple:"Vert = stock OK, ne pas réapprovisionner. Orange = lancer le réapprovisionnement. Rouge = urgence, stock critique.",detail:"Mise en œuvre sans étiquette physique : emplacements colorés sur des racks inclinés. Aussi simple qu'un feu tricolore. L'opérateur ou le responsable logistique voit l'état du stock en un coup d'œil."},{id:"supermarche",label:"Supermarché Kanban",emoji:"🏪",simple:"Zone de stock tampon organisée entre deux processus. Le client interne se sert librement et sa consommation déclenche automatiquement la production amont.",detail:"Comme un supermarché : les rayons se vident → le fournisseur réapprovisionne. Exactement ce principe appliqué entre postes de production. Élimine la coordination manuelle entre postes."}],"vsm":[{id:"famille",label:"Famille de produits",emoji:"📦",simple:"La VSM s'applique à une famille de produits partageant des étapes de fabrication similaires. Commencer par la famille la plus importante en volume ou en valeur.",detail:"Erreur : vouloir cartographier toute l'usine en une seule VSM. La VSM est un outil focalisé. Choisir une famille et la cartographier en profondeur."},{id:"actuel",label:"État actuel — observer",emoji:"📸",simple:"Aller sur le terrain avec un crayon et observer le flux réel. Chronométrer, compter les stocks, mesurer les délais. Les données réelles surprennent toujours.",detail:"Règle : ne jamais s'appuyer sur les données du système d'information pour la VSM. Aller mesurer sur le terrain. Les données ERP reflètent ce qui devrait se passer, pas ce qui se passe réellement."},{id:"ratiovs",label:"Ratio VA / Lead Time",emoji:"⏱️",simple:"La Valeur Ajoutée (VA) est le temps passé à transformer le produit. Le Lead Time est le temps total. Dans la plupart des entreprises, VA/LT < 5%.",detail:"Exemple : Lead Time = 7 jours, VA réelle = 45 minutes. Ratio = 0.5%. Les 99.5% restants sont des attentes, des stocks, des transports. La VSM rend ce choc visible."},{id:"gaspillages-v",label:"Identifier les gaspillages",emoji:"❌",simple:"Les triangles sur la VSM représentent les stocks intermédiaires — le principal gaspillage visible. Les délais d'attente entre postes sont la deuxième priorité.",detail:"Autres gaspillages visibles : flux d'information complexes (trop de systèmes, re-saisies), changements de priorité fréquents, déplacements de matière inutiles."},{id:"futur-v",label:"État futur — concevoir",emoji:"🎯",simple:"Concevoir le flux idéal après élimination des gaspillages. Ambitieux mais atteignable en 12 à 18 mois. L'état futur devient le plan d'action Lean.",detail:"Questions clés pour concevoir l'état futur : Quel est le Takt Time (rythme de la demande client) ? Où implanter des flux tirés (Kanban) ? Où créer un flux continu ? Comment réduire les tailles de lots ?"}],"trs-trg-tre":[{id:"to",label:"TO — Temps d'Ouverture",emoji:"⏱️",simple:"Durée totale de présence de l'équipe ou d'ouverture de l'atelier. C'est le point de départ de l'arbre des temps. Exemple : un poste de 8h = 480 minutes de TO.",detail:"Le TO inclut tout : les pauses, les réunions, la maintenance planifiée. C'est la base du TRG (Taux de Rendement Global) = TU / TO. Le TRG est toujours inférieur ou égal au TRS (Taux de Rendement Synthétique) car son dénominateur est plus grand."},{id:"tr",label:"TR — Temps Requis",emoji:"🎯",simple:"TO moins les arrêts planifiés et organisationnels. C'est le temps où la machine est CENSÉE produire. Base de calcul du TRS (Taux de Rendement Synthétique).",detail:"Arrêts planifiés déduits : pauses contractuelles, réunions d'équipe, maintenance préventive planifiée, nettoyages programmés, formations. Si le TO = 480 min et les pauses = 30 min → TR = 450 min."},{id:"tf",label:"TF — Temps de Fonctionnement",emoji:"⚙️",simple:"TR moins les arrêts non planifiés subis. La machine tourne mais ne produit peut-être pas à la bonne vitesse ni avec la bonne qualité.",detail:"Arrêts déduits : pannes, changements de série et réglages dépassant le standard, manque matière, manque opérateur, attentes. Taux de Disponibilité (D) = TF / TR. La panne est visible et enregistrée — c'est la perte la plus facile à mesurer."},{id:"tn",label:"TN — Temps Net",emoji:"⚡",simple:"TF moins les pertes de vitesse. La machine tourne mais pas à sa cadence nominale : micro-arrêts de moins de 5 minutes et ralentissements volontaires.",detail:"Taux de Performance (P) = TN / TF. Les micro-arrêts (<5 min) sont souvent non enregistrés mais cumulés représentent 10 à 20% du temps perdu. Sur une ligne à 600 bouteilles/heure, un micro-arrêt de 3 min = 30 bouteilles perdues — multiplié par 10 par poste = 300 bouteilles invisibles."},{id:"tu",label:"TU — Temps Utile",emoji:"✅",simple:"Le seul temps où des pièces BONNES sont produites à la BONNE cadence. TN moins les pertes qualité (rebuts, retouches, déchets de démarrage).",detail:"Taux de Qualité (Q) = TU / TN. TRS = TU / TR = D × P × Q. Le TU est ce qu'on cherche à maximiser. Tout l'arbre des temps sert à décomposer les pertes entre TO et TU pour identifier les priorités d'action."},{id:"trs-z",label:"TRS = TU / TR",emoji:"📊",simple:"Taux de Rendement Synthétique. Mesure la performance sur le temps requis. TRS = Disponibilité × Performance × Qualité. Monde classe : ≥ 85%.",detail:"TRS 78% = D 85% × P 88% × Q 96% — les pertes se répartissent sur les 3 dimensions. Pour agir, décomposer d'abord le TRS en ses 3 taux, puis identifier la priorité avec un Pareto des 6 grandes pertes."},{id:"trg-z",label:"TRG = TU / TO",emoji:"🌍",simple:"Taux de Rendement Global. Intègre aussi les arrêts planifiés dans les pertes. Toujours ≤ TRS. Typiquement 60 à 75% dans l'industrie.",detail:"TRG est utilisé pour comparer l'utilisation du capital machines (décisions d'investissement). Si TRS = 82% et TRG = 68%, cela signifie que 14% du temps d'ouverture est en arrêts planifiés — peut-on les réduire ?"},{id:"tre-z",label:"TRE = Production bonne × Cadence std / TO",emoji:"💶",simple:"Taux de Rendement Économique. Le plus exigeant des trois indicateurs. Il valorise économiquement chaque heure perdue en comparant à la cadence standard théorique.",detail:"TRE intègre aussi les écarts entre cadence réelle et cadence standard contractuelle. Si on produit à 90% de la cadence nominale, le TRE reflète cette perte économique que le TRS ne capture pas."}],"trs":[{id:"disponibilite",label:"Disponibilité — D",emoji:"⚙️",simple:"Temps de fonctionnement réel ÷ Temps planifié. Impacté par les pannes et les changements de série.",detail:"Un TRS de 78% avec une Disponibilité de 70% signifie que 30% du temps planifié, la machine est en panne ou en changement de série. C'est la première priorité d'amélioration."},{id:"performance",label:"Performance — P",emoji:"⚡",simple:"Vitesse réelle ÷ Vitesse nominale. Impacté par les micro-arrêts de moins de 5 minutes et les ralentissements volontaires.",detail:"Les micro-arrêts sont souvent invisibles (non enregistrés) mais cumulés représentent 10 à 20% du temps perdu. Un opérateur qui règle manuellement des petits problèmes toutes les 5 minutes = performance faible."},{id:"qualite-t",label:"Qualité — Q",emoji:"✅",simple:"Pièces conformes ÷ Pièces produites totales. Impacté par les rebuts, retouches et déchets de démarrage.",detail:"Les déchets de démarrage (premières pièces non-conformes au lancement) sont une perte qualité significative. Sur une ligne à haute cadence, 5 minutes de démarrage défectueux = 500 bouteilles perdues."},{id:"formule-t",label:"TRS = D × P × Q",emoji:"📐",simple:"Le TRS (Taux de Rendement Synthétique) est le produit des 3 taux. 85% × 90% × 97% = 74%. Chaque taux multiplie les autres.",detail:"La formule montre qu'améliorer un seul taux a un impact limité. Pour passer de 74% à 85%, il faut améliorer les 3 simultanément. C'est pourquoi la TPM (Total Productive Maintenance) travaille sur les 6 grandes pertes en parallèle."},{id:"benchmark-t",label:"Benchmarks",emoji:"🏆",simple:"TRS monde classe en production de masse : ≥ 85%. La plupart des entreprises démarrent entre 40 et 60%. TRG (Taux de Rendement Global) = TU ÷ TO, typiquement 60 à 75%.",detail:"TRS = TU ÷ TR (base = temps requis). TRG (Taux de Rendement Global) = TU ÷ TO (base = temps d'ouverture). TRG toujours ≤ TRS. TRE (Taux de Rendement Économique) = le plus exigeant des 3."}],"poka-yoke":[{id:"prevention",label:"Prévention — rendre l'erreur impossible",emoji:"🛡️",simple:"Le vrai Poka-Yoké empêche physiquement la non-conformité. La forme asymétrique d'un connecteur qui ne peut rentrer que dans le bon sens en est l'exemple parfait.",detail:"C'est le niveau le plus robuste. Aucune dépendance vis-à-vis de l'opérateur ou d'un capteur. Exemples : détrompeur de forme, gabarit de positionnement, guide empêchant un assemblage inversé."},{id:"detection",label:"Détection — détecter et arrêter",emoji:"🔍",simple:"Un capteur détecte une anomalie et arrête le cycle ou déclenche une alarme. Moins robuste que la prévention (le capteur peut tomber en panne).",detail:"Exemples : capteur de présence bloquant le cycle si un composant manque, caméra de vision artificielle rejetant les pièces non-conformes, détecteur de métaux sur ligne alimentaire."},{id:"temoin",label:"Pièces témoins — vérification périodique",emoji:"🔬",simple:"Tester périodiquement le Poka-Yoké avec une pièce conforme ET une pièce non-conforme. C'est la seule façon de prouver qu'il fonctionne encore.",detail:"Un Poka-Yoké non testé peut être inefficace depuis des mois sans que personne ne s'en aperçoive. La pièce non-conforme témoin est conservée avec la pièce conforme. Résultat de test enregistré."},{id:"invention",label:"Idées venant du terrain",emoji:"💡",simple:"Les meilleures idées de Poka-Yoké viennent des opérateurs qui vivent les problèmes. Les chantiers Kaizen et groupes de résolution de problèmes sont les incubateurs.",detail:"Certaines entreprises récompensent les inventeurs des meilleurs Poka-Yoké (primes, reconnaissance, mise en avant). Un Poka-Yoké trouvé par un opérateur est aussi la preuve de sa maîtrise du processus."},{id:"impact",label:"Impact sur les coûts",emoji:"💰",simple:"Un Poka-Yoké réduit les coûts de contrôle : si l'erreur est impossible, les vérifications associées peuvent être allégées ou supprimées.",detail:"Calcul ROI (Retour sur Investissement) simple : (taux de défaut actuel × coût d'un défaut) × volume annuel = coût de non-qualité. Si le Poka-Yoké coûte moins, il est rentable immédiatement."}]};function LearnSectionItem(_ref10){var id=_ref10.id,emoji=_ref10.emoji,title=_ref10.title,content=_ref10.content,color=_ref10.color,defaultOpen=_ref10.defaultOpen;var _useState17=useState(defaultOpen||false),_useState18=_slicedToArray(_useState17,2),open=_useState18[0],setOpen=_useState18[1];var isReact=_typeof(content)==='object'&&content!==null&&!Array.isArray(content);return React.createElement("div",{style:{marginBottom:8,border:"1px solid ".concat(color,"20"),borderRadius:10,overflow:"hidden"}},React.createElement("button",{onClick:function onClick(){return setOpen(function(o){return!o;});},style:{width:"100%",padding:"11px 14px",background:open?color+"18":"white",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:13,color:open?colo
