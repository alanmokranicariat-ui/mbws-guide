te."},{front:"Avantages Kanban",back:"Réduction des stocks · Élimination des ruptures · Intégration automatique de l'approvisionnement à la production · Réduction des surfaces de stockage."},{front:"Limite du Kanban",back:"Ne fonctionne bien qu'avec des consommations relativement régulières. Difficile pour les produits à forte saisonnalité ou à commandes exceptionnelles."}]},{id:"vsm",name:"VSM — Value Stream Mapping",visual:"vsm",tagline:"Cartographier pour mieux améliorer",quickDesc:"Visualiser tous les flux (matière + information) d'une famille de produits pour repérer les gaspillages.",steps:["Choisir la famille de produits à cartographier","Mesurer et dessiner l'état actuel avec données réelles","Calculer le ratio VA / Lead Time total","Identifier et quantifier les gaspillages","Concevoir l'état futur et le plan d'action"],detailDesc:"La VSM est l'outil stratégique du Lean : elle donne une vision bout-en-bout avant d'agir localement. Elle distingue les flux physiques (matières en mouvement) et les flux d'information (commandes, plannings, signaux). Un lead time de 7 jours avec 58 min de valeur ajoutée réelle = 98% de gaspillage caché ! La VSM révèle les vraies priorités. L'état futur doit être ambitieux (supprimer les stocks inutiles, synchroniser les flux, introduire les flux tirés) mais atteignable en 12-18 mois.",learnSections:{but:"La VSM (Value Stream Mapping — Cartographie des flux de valeur) révèle les gaspillages cachés dans un flux de production en visualisant simultanément les flux physiques (matières) et les flux d'information. Elle transforme ce que tout le monde 'savait' en preuves chiffrées.",comprendre:"Dans la plupart des entreprises, le ratio Valeur Ajoutée / Lead Time est inférieur à 5%. 7 jours de Lead Time pour 45 minutes de valeur ajoutée réelle = 99.7% de gaspillage. Sans la VSM, ce fait est invisible. La VSM, développée par Mike Rother et John Shook (Toyota, 1998), est l'outil stratégique du lean : elle donne une vision bout-en-bout avant d'agir localement.",comment:"Choisir une famille de produits → mesurer l'état actuel sur le terrain (chronométrer, compter) → dessiner la VSM actuelle avec ses données → calculer le ratio VA/Lead Time → identifier les gaspillages → concevoir la VSM état futur → construire le plan d'action.",etapes:[{titre:"Choisir la famille de produits",role:"La VSM s'applique à une famille de produits partageant les mêmes étapes de fabrication. Commencer par la famille la plus importante en volume ou valeur.",detail:"Erreur fréquente : vouloir cartographier toute l'usine. La VSM est un outil focalisé. Une VSM pour toute l'usine n'est pas lisible et n't pas actionnable."},{titre:"Dessiner l'état actuel sur le terrain",role:"Aller mesurer sur le terrain. Chronométrer, compter les stocks, noter les délais. Ne jamais s'appuyer sur les données du système d'information.",detail:"Les données ERP (Enterprise Resource Planning) reflètent ce qui devrait se passer, pas ce qui se passe réellement. Un opérateur connaît mieux le temps de cycle réel que n'importe quel système."},{titre:"Calculer le ratio VA / Lead Time",role:"Additionner les temps de valeur ajoutée (transformation réelle du produit) et diviser par le Lead Time total. Le résultat choque toujours.",detail:"Exemple usine MBWS : Lead Time de commande à livraison = 5 jours. Temps de remplissage + étiquetage + encaissage = 35 minutes. Ratio = 35 min / 7200 min = 0.5%."},{titre:"Identifier les gaspillages",role:"Les triangles sur la VSM = stocks intermédiaires (gaspillages). Les délais entre postes = attentes. Les lignes pointillées = flux d'information complexes.",detail:"Les flux d'information sont souvent plus gaspilleurs que les flux physiques. Re-saisies, plannings multiples, confirmations manuelles = gaspillages d'information."},{titre:"Concevoir l'état futur",role:"Concevoir le flux idéal en répondant : quel est le Takt Time ? Où créer un flux continu ? Où implanter des boucles Kanban ? Comment réduire les lots ?",detail:"Le Takt Time (temps disponible ÷ demande client) est le métronome du futur. Toutes les opérations doivent s'aligner sur ce rythme."}],quand:"Avant tout projet d'amélioration majeur pour choisir les bons chantiers. Quand les délais sont trop longs et les stocks trop importants sans que l'équipe ne sache pourquoi. Pour justifier un projet de réimplantation (Kaikaku). Pour présenter le potentiel d'amélioration à la direction de façon chiffrée. À renouveler tous les 12 à 18 mois pour mesurer les progrès.",limites:"La VSM donne une photo à un instant t — elle ne capture pas la variabilité ni les événements rares. Elle est difficile à appliquer aux flux très variés (production unitaire) ou aux services. La VSM actuelle peut être décourageante (ratio VA/LT = 1% choque les équipes) — l'accompagnement est essentiel. L'état futur sans plan d'action détaillé reste un rêve.",avance:"La VSM étendue cartographie le flux jusqu'aux fournisseurs et aux clients (niveau Scope 3 de la chaîne de valeur). En lean digital (Industrie 4.0), la Digital Value Stream Map intègre les flux de données et les algorithmes de décision. La VSM combinée à la simulation dynamique (logiciels Arena, Witness) permet de tester l'état futur avant de l'implémenter."},quiz:[{q:"La VSM cartographie :",answers:["Uniquement les machines et équipements, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Les compétences des opérateurs, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Les flux matières ET les flux d'information simultanément","Les coûts de production détaillés, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"Le ratio VA/Lead Time dans une entreprise typique est :",answers:["100% dans l'idéal, utilisé dans le domaine de la prestation de services mais non transposable à la production","20-30% , applicable uniquement aux structures exclues du champ de la certification tierce partie","50-70% , méthode issue des pratiques industrielles d'avant la standardisation internationale","Souvent inférieur à 5%"],correct:3},{q:"Le Takt Time représente :",answers:["Le temps de changement de série, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","La vitesse maximale de la machine, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Le délai de livraison fournisseur, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Le rythme auquel le client commande (temps disponible / demande)"],correct:3},{q:"La VSM (Value Stream Mapping) sert à :",answers:["Visualiser les flux de valeur et de matière pour identifier les gaspillages","Mesurer la valeur financière de l'entreprise, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Cartographier les compétences, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Planifier la production, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"Un gaspillage (Muda) dans un flux est :",answers:["Une activité consommant des ressources sans créer de valeur pour le client","Une valeur ajoutée pour le client, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Un défaut de production, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Un coût de matière première, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"La VSM (Value Stream Mapping) correspond au 2ème principe Lean :",answers:["Définir la valeur, recommandé dans les petites structures artisanales selon la réglementation PME","Créer le flux continu, méthode issue des pratiques industrielles d'avant la standardisation internationale","Cartographier le flux de valeur pour visualiser les gaspillages sur tout le flux","Tirer les flux , approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:2},{q:"Sur une VSM, les triangles représentent :",answers:["Les flux d'informations, utilisé dans le domaine de la prestation de services mais non transposable à la production","Les stocks intermédiaires (gaspillages à réduire)","Les opérateurs , approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Les machines , conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:1},{q:"La différence entre Lead Time et Valeur Ajoutée (VA) sur une VSM est :",answers:["Ils sont identiques, solution acceptable en phase pilote avec l'accord formel du comité de direction","Lead Time est toujours inférieur à la VA, utilisé dans le domaine de la prestation de services mais non transposable à la production","Lead Time = temps total du flux (VA + NVA) / VA = temps utile créant de la valeur pour le client","La NVA n'existe pas en production efficace, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:2},{q:"La VSM 'état futur' sert à :",answers:["Concevoir le flux idéal après élimination des gaspillages identifiés — la cible à atteindre","Calculer les coûts de production, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Former les nouveaux opérateurs, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Documenter l'existant, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"Dans une VSM typique d'une usine agroalimentaire, le ratio VA/LT est souvent :",answers:["Variable mais toujours supérieur à 50%, valide dans un contexte de production discontinue selon les dérogations sectorielles","Supérieur à 80% , valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Entre 1 et 10% — la majorité du temps est passée en attentes et stocks, pas en production de valeur","Exactement 50% , approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:2},{q:"Les 7 flux à cartographier dans une VSM sont :",answers:["Matière, information, et délais, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Uniquement matière et information, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Matière, information, opérateurs, équipements, énergie, qualité et flux financiers","Uniquement les flux physiques de matière, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:2}],flashcards:[{front:"Lead Time",back:"Temps total entre la commande client et la livraison — inclut attentes, stocks intermédiaires, transports, files d'attente."},{front:"Takt Time",back:"Temps disponible de production / Demande client = rythme auquel il faut produire pour satisfaire le client."},{front:"État actuel",back:"Photographie réelle et mesurée des flux aujourd'hui — révèle les gaspillages visibles ET cachés (stocks dormants, files d'attente)."},{front:"État futur",back:"Vision cible optimisée : flux tirés, lots réduits, synchronisation des postes, stock minimal, Lead Time divisé par 10."},{front:"Flux d'information",back:"Commandes, plannings, signaux Kanban, prévisions — aussi importants que les flux physiques à cartographier et optimiser."},{front:"VSM — état actuel",back:"Photographie du flux tel qu'il est aujourd'hui : étapes, stocks, Lead Times, temps VA/NVA. Révèle les gaspillages cachés que nul ne voit au quotidien."},{front:"VSM — état futur",back:"Design du flux idéal après élimination des gaspillages. Devient le plan d'action Lean. Se réalise par étapes avec jalons mesurables."},{front:"Ratio VA/LT",back:"Valeur Ajoutée / Lead Time total. Dans la plupart des entreprises : 1-10%. 90% du temps, le produit attend. La VSM rend ce gaspillage visible et choquant."},{front:"Flux d'informations (VSM)",back:"La VSM cartographie aussi les flux d'informations (commandes, plannings, EDI). Les gaspillages informationnels (re-saisies, délais, erreurs) ont le même impact que les stocks."},{front:"Symboles VSM clés",back:"Boîte processus, triangle stock, camion livraison, éclair flux push, boucle Kanban, case de données (CT, CO, TRS, FTT), ligne temps (LT/VA)."},{front:"VSM et Kanban",back:"La VSM identifie où mettre des boucles Kanban (flux tiré) vs flux poussé. L'état futur VSM intègre souvent les supermarché Kanban entre les processus clés."}]},{id:"trs",name:"TRS — Taux de Rendement Synthétique",visual:"trs",tagline:"Mesurer la vraie performance des équipements",quickDesc:"TRS = Disponibilité × Performance × Qualité. L'indicateur synthétique global de la productivité machine.",steps:["Définir le temps d'ouverture planifié (base)","Mesurer le temps de fonctionnement réel","Calculer le taux de vitesse réelle vs nominale","Compter les pièces conformes vs produites totales","Multiplier les 3 taux → TRS global à comparer au benchmark"],detailDesc:"Le TRS prend en compte TOUTES les pertes de performance. Un TRS de 78% signifie que la machine est efficace seulement 78% du temps où elle est censée produire de la valeur. Benchmark reconnu : 85% pour la production de masse, 65% pour la production unitaire/jobbing. Le TRS se suit quotidiennement sur les équipements goulots (Théorie des Contraintes). Sa décomposition en 3 taux identifie exactement où agir. Les micro-arrêts (< 5 min) sont souvent la cause principale de pertes de performance — ils sont invisibles sur les feuilles de relevé manuel.",learnSections:{but:"Le TRS (Taux de Rendement Synthétique) mesure en un seul chiffre l'efficacité globale d'un équipement en intégrant les 3 dimensions de la performance : la Disponibilité, la Performance et la Qualité. Un TRS de 78% signifie que la machine est réellement productive seulement 78% du temps où elle est censée l'être.",comprendre:"TRS = Disponibilité × Performance × Qualité. Chaque taux mesure une dimension des pertes. Un TRS de 78% ne dit pas où sont les pertes — la décomposition le révèle. TRS monde classe en production de masse : ≥ 85%. La plupart des entreprises industrielles démarrent entre 40 et 60%. Le TRS est l'indicateur de pilotage de la TPM (Total Productive Maintenance).",comment:"Définir le temps planifié (temps d'ouverture) → mesurer le temps de fonctionnement réel (disponibilité) → comparer vitesse réelle vs nominale (performance) → compter pièces conformes vs total (qualité) → calculer TRS = D × P × Q → identifier les 6 grandes pertes → agir sur les plus impactantes.",etapes:[{titre:"Définir le temps planifié (TO)",role:"Temps total de présence de l'équipe ou d'ouverture de la machine. Base de calcul du Taux de Rendement Global (TRG).",detail:"Attention : bien définir le temps de référence. Certaines méthodes utilisent le temps requis (TR = TO moins les arrêts planifiés) comme base du TRS. Choisir une méthode et la garder."},{titre:"Mesurer la Disponibilité (D)",role:"D = Temps de fonctionnement réel ÷ Temps planifié. Impacté par pannes et changements de série.",detail:"Une panne de 2 heures sur un poste de 8 heures = Disponibilité de 75%. Les changements de série comptent dans les pertes de disponibilité si supérieurs au temps standard."},{titre:"Mesurer la Performance (P)",role:"P = Vitesse réelle ÷ Vitesse nominale. Impacté par micro-arrêts (<5 min) et ralentissements volontaires.",detail:"Les micro-arrêts sont souvent non enregistrés mais cumulés représentent 10 à 20% du temps perdu. Un opérateur qui règle des petits problèmes toutes les 5 minutes sans les déclarer pèse lourd sur la performance."},{titre:"Mesurer la Qualité (Q)",role:"Q = Pièces conformes ÷ Pièces produites totales. Impacté par rebuts, retouches et déchets de démarrage.",detail:"Les déchets de démarrage (premières pièces non conformes au lancement) comptent dans les pertes qualité. Sur une ligne à haute cadence, 5 minutes de démarrage défectueux = des centaines de bouteilles."},{titre:"Calculer TRS = D × P × Q",role:"Multiplier les 3 taux. Le résultat identifie le niveau de performance global et sa décomposition révèle les priorités d'action.",detail:"Exemple : D=85% × P=88% × Q=95% = TRS = 71%. Les 29% de pertes se décomposent : 15% sur la disponibilité, 12% sur la performance, 5% sur la qualité. Priorité : disponibilité."},{titre:"Agir sur les 6 grandes pertes",role:"Disponibilité : pannes + changements de série. Performance : micro-arrêts + ralentissements. Qualité : déchets de démarrage + défauts process.",detail:"Utiliser un Pareto des 6 grandes pertes pour identifier la priorité. Toujours commencer par la perte la plus importante avant de passer à la suivante."}],quand:"En continu sur les équipements goulots (ceux dont la panne arrête toute la ligne). Quotidiennement pour le pilotage de la production. Lors du démarrage d'une démarche TPM (Total Productive Maintenance) pour mesurer l'état initial et les progrès. Pour comparer les performances entre lignes ou entre postes équivalents. Le TRS se calcule aussi pour un processus complet (pas seulement une machine).",limites:"Le TRS seul ne dit pas quoi faire — la décomposition D × P × Q est indispensable. Le TRS peut être amélioré artificiellement (réduire la vitesse nominale de référence augmente le taux de performance). La mesure manuelle du TRS est sujette à erreurs et sous-estimations des micro-arrêts. Un TRS élevé ne garantit pas que l'on produit ce que le client veut (→ aligner avec le Takt Time).",avance:"Le TRG (Taux de Rendement Global) = TU ÷ TO intègre aussi les arrêts planifiés — il est toujours inférieur au TRS. Le TRE (Taux de Rendement Économique) = production bonne × cadence standard ÷ TO valorise économiquement chaque heure perdue. En lean avancé, le TRS est intégré dans les tableaux de bord en temps réel (IoT — Internet of Things, capteurs connectés) avec alertes automatiques et analyses prédictives."},quiz:[{q:"TRS = Disponibilité × Performance × ___",answers:["Qualité","Quantité produite, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Coût unitaire , méthode issue des pratiques industrielles d'avant la standardisation internationale","Délai , applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:0},{q:"Une panne machine de 2h impacte quel taux ?",answers:["Tous les taux simultanément, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Qualité , option retenue par certaines conventions collectives mais non par la norme de référence","Performance , applicable en période probatoire avant la mise en conformité documentaire complète","Disponibilité"],correct:3},{q:"Un TRS de 85% est considéré comme :",answers:["Un niveau moyen , utilisé dans le domaine de la prestation de services mais non transposable à la production","Classe mondiale pour la production de masse","Insuffisant, il faut 95%, applicable en période probatoire avant la mise en conformité documentaire complète","Exceptionnel, rarement atteint, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Les micro-arrêts (< 5 min) impactent principalement quel taux ?",answers:["Aucun, ils sont négligeables, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Performance","Disponibilité , conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Qualité , approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:1},{q:"TRS = 92% × 88% × 97% donne approximativement :",answers:["79%","95% , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","85% , option retenue par certaines conventions collectives mais non par la norme de référence","90% , valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:0},{q:"Un TRS de 80% signifie :",answers:["La machine fonctionne 80% du temps, option retenue par certaines conventions collectives mais non par la norme de référence","80% des pièces sont conformes, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","L'entreprise gaspille 20% de son potentiel productif entre pannes, réglages, ralentissements et défauts","80% des objectifs sont atteints, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:2},{q:"Quelle perte impacte la Disponibilité ?",answers:["Les rebuts en démarrage, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Les micro-arrêts (<5 min), approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Les changements de série et les pannes (arrêts planifiés et non planifiés)","Les ralentissements de cadence, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"Le TRS 'monde classe' en production est généralement de :",answers:["Entre 50 et 70% , approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Supérieur à 85%","100% , applicable lors des phases de transition mais insuffisant pour pérenniser le système","Supérieur à 65% , applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"Pour améliorer le TRS, la TPM agit sur :",answers:["Les 6 grandes pertes impactant Disponibilité, Performance et Qualité","Uniquement les réglages, solution acceptable en phase pilote avec l'accord formel du comité de direction","Uniquement les rebuts, valide dans un contexte de production discontinue selon les dérogations sectorielles","Uniquement les pannes (Disponibilité), option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"La Performance dans le TRS mesure :",answers:["L'écart entre la vitesse réelle et la vitesse nominale — micro-arrêts et ralentissements","Le pourcentage de pièces conformes, applicable uniquement aux structures exclues du champ de la certification tierce partie","Le nombre de pièces bonnes produites, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Le temps d'ouverture de la machine, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:0},{q:"Pourquoi le TRS est-il préféré au simple taux de disponibilité ?",answers:["Il se mesure automatiquement, recommandé dans les petites structures artisanales selon la réglementation PME","Il est exigé par la norme ISO, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Il est plus facile à calculer, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Il mesure l'efficacité globale en intégrant les 3 dimensions : disponibilité + performance + qualité"],correct:3}],flashcards:[{front:"Disponibilité",back:"Temps de fonctionnement réel / Temps d'ouverture planifié. Impacté par pannes, changements de série, nettoyage."},{front:"Performance",back:"Vitesse réelle / Vitesse nominale de référence. Impacté par micro-arrêts, ralentissements volontaires, opérateur."},{front:"Qualité",back:"Pièces conformes / Pièces produites totales. Impacté par rebuts, retouches, déchets de démarrage."},{front:"TRS cible industrie",back:"≥ 85% pour la production de série (FMCG, agroalimentaire). En dessous = gisement de productivité important."},{front:"6 grandes pertes",back:"Pannes · Réglages/changements de série · Micro-arrêts · Ralentissements · Déchets de démarrage · Défauts qualité"},{front:"TRS — formule complète",back:"TRS = Disponibilité × Performance × Qualité. D = Temps fonctionnement / Temps ouverture. P = Vitesse réelle / Vitesse nominale. Q = Pièces bonnes / Pièces produites."},{front:"6 grandes pertes TRS",back:"Disponibilité : pannes + réglages/changements. Performance : micro-arrêts + ralentissements. Qualité : rebuts démarrage + défauts process."},{front:"TRS monde classe",back:"≥ 85% est considéré comme 'monde classe'. En dessous de 65% : améliorations urgentes nécessaires. La plupart des entreprises démarrent entre 40-60%."},{front:"TRS = indicateur de pilotage",back:"Le TRS se calcule en temps réel (ou quotidiennement). Il alimente le management visuel et les actions TPM. Un TRS faible révèle où investir l'effort d'amélioration."},{front:"Micro-arrêts vs pannes",back:"Micro-arrêts (<5 min) impactent la Performance. Ils sont souvent invisibles mais s'accumulent. Les pannes (>5 min) impactent la Disponibilité. Les deux se mesurent différemment."}]},{id:"abc",name:"Analyse ABC des stocks",visual:"abc",tagline:"Gérer chaque article selon son importance réelle",quickDesc:"Classifier les articles en 3 catégories A/B/C selon leur valeur et adapter la politique de gestion.",steps:["Calculer la valeur annuelle consommée par article","Trier tous les articles par valeur décroissante","Classe A = 20% des articles · 80% de la valeur","Classe B = 30% des articles · 15% de la valeur","Classe C = 50% des articles · 5% de la valeur"],detailDesc:"La gestion ABC permet d'adapter la rigueur de gestion à l'importance réelle de chaque article. Les A : suivi quotidien, réapprovisionnements fréquents en petites quantités, stock de sécurité réduit, scoring fournisseurs rigoureux. Les C : commandes groupées peu fréquentes, stock de sécurité plus élevé pour couvrir l'incertitude, moins de contrôle rigoureux. Combinée à la méthode XYZ (régularité de la demande), elle permet une politique de stock extrêmement fine.",quiz:[{q:"Les articles A représentent environ :",answers:["80% des articles et 80% de la valeur, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","50% des articles et 80% de la valeur, option retenue par certaines conventions collectives mais non par la norme de référence","20% des articles et 20% de la valeur, méthode issue des pratiques industrielles d'avant la standardisation internationale","20% des articles et 80% de la valeur"],correct:3},{q:"Pour les articles A, la politique recommandée est :",answers:["Laisser le fournisseur gérer automatiquement, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Suivi rigoureux, commandes fréquentes en petites quantités, stock minimal","Grosses commandes peu fréquentes, solution acceptable en phase pilote avec l'accord formel du comité de direction","Externaliser complètement la gestion, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:1},{q:"La méthode XYZ classe les articles selon :",answers:["Leur valeur unitaire, valide dans un contexte de production discontinue selon les dérogations sectorielles","Leur taille physique, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","La régularité et la prévisibilité de leur demande","Leur fournisseur d'origine, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:2},{q:"L'analyse ABC des stocks classe les articles en :",answers:["A = les plus récents / B = les plus anciens / C = les obsolètes","A = 20% des articles représentant 80% de la valeur / B = 30% pour 15% / C = 50% pour 5%","Alphabétique A à C, solution acceptable en phase pilote avec l'accord formel du comité de direction","A = les plus chers unitairement / B = prix moyen / C = les moins chers"],correct:1},{q:"Les articles de catégorie A méritent :",answers:["D'être gérés en flux poussé, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Un suivi mensuel uniquement, applicable uniquement aux structures exclues du champ de la certification tierce partie","La même attention que les B et C, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Un suivi rigoureux, des stocks de sécurité calculés précisément et des réapprovisionnements fréquents"],correct:3},{q:"La méthode ABC s'appuie sur :",answers:["La loi de Pareto — 80% de la valeur de stock provient de 20% des références","Le prix unitaire des articles, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","L'analyse des coûts de transport, recommandé dans les petites structures artisanales selon la réglementation PME","La date de péremption, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"Pour les articles de catégorie C (50% des articles, 5% de la valeur), la politique recommandée est :",answers:["Les sous-traiter, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Un suivi aussi rigoureux que les A, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Stock de sécurité plus important, réapprovisionnement moins fréquent, contrôle allégé","Les supprimer du catalogue, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:2},{q:"L'analyse ABC peut être croisée avec une analyse XYZ. XYZ mesure :",answers:["La régularité de la demande (X=régulière, Y=variable, Z=irrégulière/imprévisible)","L'âge des stocks, solution acceptable en phase pilote avec l'accord formel du comité de direction","La qualité des fournisseurs, applicable uniquement aux structures exclues du champ de la certification tierce partie","La rentabilité des produits, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:0},{q:"Un article A/Z (forte valeur + demande très irrégulière) est :",answers:["À traiter comme un article B, utilisé dans le domaine de la prestation de services mais non transposable à la production","À supprimer du catalogue, méthode issue des pratiques industrielles d'avant la standardisation internationale","Le plus difficile à gérer — forte valeur immobilisée + prévisions difficiles","Le plus facile à gérer, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:2},{q:"L'analyse ABC est refaite périodiquement car :",answers:["Les volumes de vente et les valeurs changent — un article A peut devenir C et vice versa","C'est une exigence légale, méthode issue des pratiques industrielles d'avant la standardisation internationale","Elle ne change jamais, applicable uniquement aux structures exclues du champ de la certification tierce partie","Pour satisfaire les auditeurs, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0}],flashcards:[{front:"Classe A",back:"20% des références, 80% de la valeur. Suivi quotidien, réappro fréquent, stock de sécurité minimal, fournisseurs audités."},{front:"Classe B",back:"30% des références, 15% de la valeur. Suivi hebdomadaire, politique intermédiaire entre A et C."},{front:"Classe C",back:"50% des références, 5% de la valeur. Commandes groupées peu fréquentes, stock de sécurité plus élevé, gestion simplifiée."},{front:"ABC × XYZ",back:"X = demande régulière / Y = demande variable / Z = demande aléatoire. Combiné à ABC = politique de stock ultra-précise."},{front:"Stock de sécurité",back:"Quantité tampon pour absorber les variations de demande et les aléas fournisseurs. Calculé selon le niveau de service cible."},{front:"Analyse ABC — principe",back:"Classification par valeur de consommation annuelle. A : 20% des références = 80% de la valeur. B : 30% = 15%. C : 50% = 5%."},{front:"Articles A — politique",back:"Suivi rigoureux, réapprovisionnements fréquents en petites quantités, stocks de sécurité calculés précisément, suivi hebdomadaire, Kanban ou point de commande."},{front:"Articles B — politique",back:"Suivi intermédiaire, réapprovisionnements périodiques, stocks de sécurité standards, suivi bimensuel ou mensuel."},{front:"Articles C — politique",back:"Suivi allégé, réapprovisionnements en grandes quantités peu fréquents, stock tampon plus important acceptable (coût faible), suivi trimestriel."},{front:"Analyse XYZ",back:"X = demande régulière et prévisible (facile à gérer). Y = demande variable (saisonnalité). Z = demande très irrégulière ou sporadique (difficile à prévoir)."},{front:"ABC × XYZ",back:"Croisement des deux analyses. A/X = idéal Kanban. A/Z = risque d'immobilisation. C/Z = candidat à la suppression du catalogue ou gestion à la commande."},{front:"Valeur de consommation annuelle",back:"= Prix unitaire × Quantité consommée sur 12 mois. Base de calcul de l'ABC. Pas le prix unitaire seul — un article peu cher mais très consommé peut être A."}]},{id:"approvisionnement",name:"Logistique & Approvisionnement",visual:"approvisionnement",tagline:"Bien approvisionner au bon moment et en bonne quantité",quickDesc:"Maîtriser les flux d'approvisionnement pour éviter ruptures et surstocks.",steps:["Définir le besoin net (prévisions - stock)","Choisir la méthode : flux tiré ou MRP","Calculer la quantité économique de commande","Gérer les relations fournisseurs (SLA, délais)","Suivre les indicateurs : taux de service, rotation"],detailDesc:"L'approvisionnement performant repose sur une bonne connaissance des délais fournisseurs, de la variabilité de la demande et des coûts de possession du stock. Le taux de rotation des stocks (TRS ≠ TRS machine) mesure l'efficacité : plus il est élevé, moins on immobilise de trésorerie. La relation fournisseur est stratégique : un SLA (Service Level Agreement) définit les engagements mutuels de qualité, délai et flexibilité.",quiz:[{q:"Le taux de rotation des stocks mesure :",answers:["La vitesse des machines, solution acceptable en phase pilote avec l'accord formel du comité de direction","La qualité des fournisseurs, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Le nombre de fois que le stock est renouvelé par an","Les coûts de transport, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:2},{q:"Un SLA fournisseur définit :",answers:["Le prix d'achat négocié, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Les engagements mutuels de service (qualité, délai, flexibilité)","La quantité minimum de commande, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Les conditions de paiement, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:1},{q:"Le taux de service client mesure :",answers:["La satisfaction des enquêtes annuelles, méthode issue des pratiques industrielles d'avant la standardisation internationale","Le ratio commandes livrées conformes (bonne quantité, bonne qualité, bon délai) / Total commandes","Le coût logistique par commande, utilisé dans le domaine de la prestation de services mais non transposable à la production","Le nombre de livraisons par jour, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Le délai de livraison client (Lead Time logistique) comprend :",answers:["Réception commande + traitement + préparation + transport + réception client","Uniquement la préparation en entrepôt, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Uniquement le temps de transport, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Uniquement le transport et la livraison, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:0},{q:"Le stock de sécurité sert à :",answers:["Alimenter les promotions, valide dans un contexte de production discontinue selon les dérogations sectorielles","Absorber les aléas de demande et de délais fournisseurs sans rupture","Éviter les audits de stock, solution acceptable en phase pilote avec l'accord formel du comité de direction","Maximiser l'occupation des entrepôts, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1},{q:"Le point de commande est le niveau de stock auquel :",answers:["On arrête les ventes, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","On fait l'inventaire annuel, applicable lors des phases de transition mais insuffisant pour pérenniser le système","On déclenche le réapprovisionnement pour recevoir la commande avant rupture","On change de fournisseur, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:2},{q:"La méthode du juste-à-temps (JAT) en logistique implique :",answers:["Des livraisons fréquentes en petites quantités synchronisées avec la production","Un seul fournisseur par référence, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Des stocks très importants pour éviter les ruptures, valide dans un contexte de production discontinue selon les dérogations sectorielles","Des commandes annuelles globales, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:0},{q:"Un Incoterm 'DDP' (Delivered Duty Paid) signifie que :",answers:["Les frais sont partagés 50/50, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Le vendeur prend en charge tous les frais jusqu'à destination finale, y compris dédouanement","L'acheteur organise le transport, valide dans un contexte de production discontinue selon les dérogations sectorielles","L'acheteur paie tous les frais de transport, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"Le coût total de possession (TCO — Total Cost of Ownership) inclut :",answers:["Prix d'achat + taxes, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Uniquement le prix d'achat, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Uniquement le prix et le transport, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Prix d'achat + transport + stockage + inspection + coût des ruptures + fin de vie"],correct:3},{q:"La traçabilité des lots en agro-industrie est obligatoire car :",answers:["Elle est exigée par la réglementation européenne (règlement CE 178/2002) pour pouvoir rappeler des lots défectueux","C'est une exigence ISO 9001, option retenue par certaines conventions collectives mais non par la norme de référence","Elle réduit les coûts logistiques, applicable en période probatoire avant la mise en conformité documentaire complète","C'est plus pratique pour les inventaires, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0}],flashcards:[{front:"Taux de service",back:"% des demandes satisfaites à temps et en quantité. Cible industrielle : 95-99% selon les secteurs."},{front:"Rotation des stocks",back:"Chiffre d'affaires / Stock moyen (ou consommation / stock). Élevé = bon. Faible = trésorerie immobilisée."},{front:"Point de commande",back:"Niveau de stock qui déclenche automatiquement une commande = consommation × délai + stock de sécurité."},{front:"MRP",back:"Material Requirements Planning : calcul des besoins en composants à partir du plan de production et des nomenclatures."},{front:"Taux de service",back:"% des commandes livrées conformes (bonne quantité + bonne qualité + bon délai) / commandes totales. Cible industrie : 95-99%. Mesure la fiabilité logistique perçue par le client."},{front:"Stock de sécurité",back:"= k × σ_demande × √Délai réappro. Absorbe les variations de demande et de délais. Trop élevé = coût de possession. Trop bas = ruptures et pénalités."},{front:"Point de commande",back:"Niveau de stock déclenchant le réapprovisionnement. = Consommation moyenne × Délai réappro + Stock de sécurité. Garantit la disponibilité continue."},{front:"Incoterms",back:"Règles internationales définissant qui supporte les coûts et risques entre vendeur et acheteur. EXW (départ usine) → DDP (livré tous frais payés). 11 Incoterms au total."},{front:"TCO — Total Cost of Ownership",back:"Coût total d'acquisition et d'utilisation. Prix achat + logistique + inspection + stockage + ruptures potentielles + fin de vie. Un fournisseur moins cher peut avoir un TCO plus élevé."},{front:"Traçabilité lots MBWS",back:"Règlement CE 178/2002 : traçabilité de 'la fourche à la fourchette'. Chaque lot de spiritueux doit être traçable de la matière première jusqu'au consommateur final. Rappel de lot en 24h."}]}]},{id:"securite",qsIds:["qs-20"],label:"Sécurité",abbr:"SEC",color:"#C94580",colorL:"#FCF0F7",tools:[{id:"tmd",name:"TMD — Transport Matières Dangereuses",visual:"tmd",tagline:"Réglementation ADR appliquée aux produits MBWS",quickDesc:"Règles ADR essentielles pour le transport des boissons alcoolisées et produits dangereux.",steps:["Identifier le code ONU de chaque produit","Vérifier la classe et le groupe d'emballage (GP)","Vérifier les seuils d'exemption (1.1.3.6 ADR)","Rédiger la DGD obligatoire pour chaque expédition","Étiqueter correctement selon les exigences ADR"],detailDesc:"L'ADR (Accord européen relatif au transport Dangereux par Route) s'applique dès que l'on expédie des produits dangereux au-dessus des seuils d'exemption. Chez MBWS, les marchandises principales : UN 3065 (boissons alcoolisées, classe 3), UN 1197 (arômes), UN 1170 (alcool neutre). La DGD (Déclaration de Marchandises Dangereuses) est obligatoire pour tout transport. La DS 145 exempte les boissons alcoolisées GP III en récipients ≤250L de certaines prescriptions. Distinction cruciale : Sécurité (accident non intentionnel) ≠ Sûreté (acte malveillant). Un conseiller ADR doit être obligatoirement désigné.",quiz:[{q:"Quel code ONU pour le whisky (boisson alcoolisée) ?",answers:["UN 3254 , valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","UN 1170 , conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","UN 1197 , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","UN 3065"],correct:3},{q:"La DGD est :",answers:["Requise seulement pour les expéditions internationales","Obligatoire pour tout transport de marchandises dangereuses","Facultative si volume inférieur à 500L, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Uniquement requise pour les citernes, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:1},{q:"Quelle est la différence entre Sécurité et Sûreté TMD ?",answers:["Sécurité = risque chimique / Sûreté = risque biologique","Aucune différence pratique, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Sécurité = accident non intentionnel / Sûreté = acte malveillant délibéré","Sécurité s'applique en route / Sûreté en entrepôt, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:2},{q:"La DS 145 exempte les boissons alcoolisées GP III :",answers:["Du transport en camion, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","De l'obligation d'étiquetage, solution acceptable en phase pilote avec l'accord formel du comité de direction","De certaines prescriptions ADR si récipients ≤250L","De la désignation d'un conseiller ADR, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:2},{q:"Les boissons alcoolisées (>24% vol) appartiennent à la classe TMD :",answers:["Classe 8 (corrosifs), recommandé dans les petites structures artisanales selon la réglementation PME","Classe 1 (explosifs), approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Classe 6 (toxiques), option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Classe 3 (liquides inflammables)"],correct:3},{q:"Le numéro UN 3065 correspond à :",answers:["Les boissons alcoolisées","Les arômes et extraits, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Les médicaments liquides, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","L'alcool neutre pur, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:0},{q:"L'ADR est :",answers:["Un système d'alarme incendie, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Un type d'emballage réglementé, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Un référentiel ISO, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","L'Accord européen relatif au transport international de marchandises Dangereuses par Route"],correct:3},{q:"Le Groupe de Packaging (GP) II pour les matières dangereuses indique :",answers:["Un danger extrême, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Un danger faible, option retenue par certaines conventions collectives mais non par la norme de référence","Un danger moyen , applicable lors des phases de transition mais insuffisant pour pérenniser le système","Un danger élevé"],correct:3},{q:"En cas de déversement accidentel de produits alcoolisés lors d'un transport :",answers:["On ignore — c'est un produit alimentaire, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","On attend les secours sans rien faire, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","On applique les procédures d'urgence TMD : alerter, baliser, confiner, ne pas fumer","On nettoie avec de l'eau uniquement, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:2},{q:"La fiche de données de sécurité (FDS/SDS) doit être :",answers:["Disponible pour les opérateurs manipulant le produit ET accessible rapidement en cas d'incident","Envoyée uniquement au client, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Stockée uniquement au bureau qualité, utilisé dans le domaine de la prestation de services mais non transposable à la production","Mise à jour tous les 10 ans, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:0}],flashcards:[{front:"UN 3065",back:"BOISSONS ALCOOLISÉES — Classe 3, liquides inflammables. GP II (>70% vol.) ou GP III (24-70% vol.)."},{front:"UN 1197",back:"ARÔMES ET EXTRAITS — arômes liquides, infusions. Classe 3. GP III dans la plupart des cas."},{front:"UN 1170",back:"ALCOOL NEUTRE (éthanol) — Classe 3. GP II si >70% vol., GP III si entre 24% et 70% vol."},{front:"DGD",back:"Déclaration de Marchandises Dangereuses : OBLIGATOIRE. Code ONU, dénomination, GP, quantité, expéditeur, destinataire."},{front:"DS 145",back:"Disposition spéciale : boissons alcoolisées GP III dans récipients ≤250L → exemptées de certaines prescriptions ADR."},{front:"Groupe d'emballage",back:"GP I = très dangereux / GP II = dangereux / GP III = peu dangereux. Détermine les prescriptions applicables."},{front:"Classe 3 — Liquides inflammables",back:"Point d'éclair < 60°C. Inclut alcools, arômes, solvants. Risque d'incendie et d'explosion au contact d'une flamme ou d'étincelles."},{front:"UN 3065 — Boissons alcoolisées",back:"GP III si 24-70% vol (alcool modéré). GP II si >70% vol (alcool fort). Symbole flamme obligatoire sur l'emballage."},{front:"ADR",back:"Accord européen Transport Marchandises Dangereuses par Route. Définit : classification, emballage, étiquetage, documentation (lettre de voiture), équipement véhicule."},{front:"FDS (Fiche de Données de Sécurité)",back:"16 rubriques obligatoires : identification, composition, premiers secours, lutte incendie, manipulation/stockage, EPI, stabilité, données toxicologiques..."},{front:"Règle des 1000 points",back:"En dessous d'un certain seuil (1000 points TMD), les règles allégées s'appliquent. Au-dessus, toutes les obligations ADR s'appliquent."},{front:"Étiquetage TMD",back:"Étiquettes de danger (picogrammes), plaque orangée avec code danger (Kemler) et numéro ONU. Obligatoires sur le véhicule et les colis au-delà des seuils ADR."}]},{id:"risques",name:"Document Unique & Analyse des Risques",visual:"risques",tagline:"Identifier, évaluer et prévenir tous les risques pro",quickDesc:"Méthode obligatoire pour évaluer les risques professionnels et définir les mesures de prévention.",steps:["Identifier tous les dangers du poste de travail","Évaluer Gravité × Fréquence = Criticité (matrice)","Classer les risques par niveau de priorité","Définir les mesures dans la hiérarchie de prévention","Mettre à jour le Document Unique annuellement"],detailDesc:"Le Document Unique d'Évaluation des Risques Professionnels (DUERP) est une obligation légale depuis le décret du 5 novembre 2001 pour tout employeur d'au moins 1 salarié. Il doit être mis à jour annuellement ET à chaque modification significative des conditions de travail. La matrice Gravité × Fréquence priorise les risques. La hiérarchie absolue de prévention : 1) Supprimer le danger, 2) Réduire à la source, 3) Protections collectives, 4) EPI, 5) Formation et consignes. Les EPI sont en DERNIER recours, jamais en premier.",quiz:[{q:"Le Document Unique doit être mis à jour :",answers:["Uniquement après un accident de travail, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Tous les 3 ans , approche retenue par certains référentiels nationaux mais absente de la norme européenne","Tous les 5 ans , option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Annuellement ET à chaque modification significative"],correct:3},{q:"Dans la hiérarchie de prévention, quelle est la priorité absolue ?",answers:["Afficher les consignes de sécurité, valide dans un contexte de production discontinue selon les dérogations sectorielles","Supprimer le danger à la source","Former tous les salariés, utilisé dans le domaine de la prestation de services mais non transposable à la production","Distribuer des EPI (casque, gants, lunettes)"],correct:1},{q:"La criticité d'un risque se calcule :",answers:["Gravité × Fréquence, option retenue par certaines conventions collectives mais non par la norme de référence","Gravité + Fréquence, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Gravité × Fréquence × Détectabilité","Fréquence / Gravité, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:2},{q:"Gravité=4, Fréquence=3 : la criticité est :",answers:["7 (somme)","12 — Gravité × Fréquence","1,3 (ratio)","Impossible à calculer"],correct:1},{q:"Un 'presqu'accident' (near-miss) doit être :",answers:["Ignoré car personne n'a été blessé, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Traité comme un accident avec arrêt de travail, utilisé dans le domaine de la prestation de services mais non transposable à la production","Signalé uniquement s'il implique un équipement, solution acceptable en phase pilote avec l'accord formel du comité de direction","Déclaré et analysé — il révèle un danger réel avant qu'un accident se produise"],correct:3},{q:"La hiérarchie des mesures de prévention des risques (principes généraux) suit l'ordre :",answers:["EPI → Formation → Procédure → Suppression, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Formation → EPI → Procédure → Suppression, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Suppression du risque → Réduction → Protection collective → Protection individuelle (EPI) en dernier recours","Toutes les mesures ont la même priorité, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:2},{q:"Les TMS (Troubles Musculo-Squelettiques) sont :",answers:["Des accidents du travail rares, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Des accidents toujours spectaculaires, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","La 1ère cause de maladie professionnelle en France — liés aux gestes répétitifs, postures contraignantes, ports de charges","Une problématique uniquement des bureaux, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:2},{q:"Le CHSCT (ou CSE avec commission santé-sécurité) doit être consulté :",answers:["Lors de tout projet modifiant les conditions de travail, d'hygiène ou de sécurité","Seulement pour les investissements > 100k€, solution acceptable en phase pilote avec l'accord formel du comité de direction","Jamais — c'est un rôle purement administratif, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Uniquement après un accident grave, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:0},{q:"Une analyse des risques par l'arbre des causes permet :",answers:["De remonter aux causes racines d'un accident en identifiant les facteurs techniques, organisationnels et humains","De calculer le budget sécurité, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","D'élaborer le plan de formation, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","De définir les EPI nécessaires, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:0}],flashcards:[{front:"Danger",back:"Propriété intrinsèque pouvant causer un dommage (hauteur, produit chimique, machine en mouvement, courant électrique)."},{front:"Risque",back:"Combinaison de la probabilité d'exposition au danger et de la gravité des effets potentiels sur la santé."},{front:"Document Unique",back:"Inventaire obligatoire de tous les risques professionnels de l'entreprise — mis à jour annuellement et à chaque changement."},{front:"Hiérarchie prévention",back:"1-Supprimer > 2-Réduire à la source > 3-Protection collective > 4-EPI > 5-Formation/consignes. Ordre OBLIGATOIRE."},{front:"EPI",back:"Équipement de Protection Individuelle (casque, gants, lunettes, bouchons) : DERNIER recours, complément — pas substitut aux protections collectives."},{front:"AT — Accident du travail",back:"Événement soudain survenant au cours du travail. Nécessite analyse des causes (arbre des causes) + plan d'actions correctrices."},{front:"DUERP",back:"Document Unique d'Évaluation des Risques Professionnels. Obligatoire ≥1 salarié. Mis à jour annuellement + après tout changement significatif + après accident grave."},{front:"Gravité × Probabilité = Criticité",back:"Cotation du risque pour prioriser les actions. Criticité élevée = traiter en urgence. La criticité résiduelle après mesures doit être acceptable."},{front:"Near-miss (presqu'accident)",back:"Événement sans blessure mais qui aurait pu en provoquer une. À déclarer et analyser systématiquement — c'est une opportunité de prévention."},{front:"Hiérarchie prévention",back:"1-Supprimer le risque à la source · 2-Réduire à la source · 3-Protection collective · 4-Signalisation/procédures · 5-EPI (dernier recours)."},{front:"TMS — prévention",back:"Ergonomie des postes · Formation gestes et postures · Rotation sur les postes · Outils d'aide à la manutention · Pauses régulières."},{front:"Arbre des causes",back:"Méthode d'analyse d'accident : remonter des faits constatés aux causes premières en identifiant tous les facteurs contributifs (technique, organisationnel, humain)."}]},{id:"incendie",name:"Prévention Incendie & Évacuation",visual:"incendie",tagline:"Réflexes et organisation en cas d'incendie",quickDesc:"Comprendre le triangle du feu et savoir réagir lors d'un incendie en entreprise.",steps:["Donner l'alarme sans délai (déclencheur manuel)","Appeler les secours : 18 (pompiers) ou 112","Évacuer selon le plan — ne pas prendre l'ascenseur","Rejoindre le point de rassemblement désigné","Ne jamais retourner dans le bâtiment en feu"],detailDesc:"Chez MBWS, le risque incendie est élevé en raison de la présence d'alcools inflammables (classe 3 ADR). Le triangle du feu (combustible + comburant + énergie d'activation) explique le mécanisme d'un incendie et comment un extincteur l'éteint. Chaque classe de feu requiert un extincteur adapté : CO2 pour les feux électriques (classe E), mousse ou CO2 pour les liquides inflammables (classe B). Les exercices d'évacuation réglementaires permettent à tous de connaître les issues et le point de rassemblement.",quiz:[{q:"Quel type d'extincteur pour un feu électrique (classe E) ?",answers:["CO2","Eau pulvérisée , option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Mousse , option retenue par certaines conventions collectives mais non par la norme de référence","Poudre ABC , conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0},{q:"En cas d'incendie, l'ascenseur est :",answers:["Autorisé si vous êtes au dernier étage, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Interdit — utiliser exclusivement les escaliers","Autorisé si accompagné d'un responsable évacuation","Autorisé pour les personnes à mobilité réduite"],correct:1},{q:"Le triangle du feu comprend :",answers:["Oxygène + eau + chaleur, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Électricité + gaz + pression, valide dans un contexte de production discontinue selon les dérogations sectorielles","Flamme + fumée + chaleur, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Combustible + comburant (O2) + énergie d'activation"],correct:3},{q:"Le triangle du feu nécessite simultanément :",answers:["Chaleur + vent + combustible, applicable uniquement aux structures exclues du champ de la certification tierce partie","Combustible + oxygène + fumée, option retenue par certaines conventions collectives mais non par la norme de référence","Combustible + comburant, applicable en période probatoire avant la mise en conformité documentaire complète","Combustible + comburant + énergie d'activation (chaleur) — retirer l'un des trois éteint le feu"],correct:3},{q:"L'extinction au CO2 est contre-indiquée :",answers:["Sur les installations électriques sous tension, méthode issue des pratiques industrielles d'avant la standardisation internationale","Dans les espaces confinés — le CO2 chasse l'oxygène et peut asphyxier","Sur les feux de classe A, solution acceptable en phase pilote avec l'accord formel du comité de direction","Sur les feux de liquides, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:1},{q:"La classe de feu F concerne :",answers:["Les feux de métaux, valide dans un contexte de production discontinue selon les dérogations sectorielles","Les feux d'huiles et graisses de cuisson végétales ou animales","Les feux électriques, applicable en période probatoire avant la mise en conformité documentaire complète","Les feux de liquides inflammables, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:1},{q:"Un extincteur à eau pulvérisée NE DOIT PAS être utilisé sur :",answers:["Les feux de classe A (solides), approche retenue par certains référentiels nationaux mais absente de la norme européenne","Les installations électriques sous tension","Les feux de classe F (huiles), mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Les feux de bois, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1},{q:"Lors d'une évacuation incendie, la règle RACE (ou similaire) impose :",answers:["Récupérer ses effets personnels avant de partir, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Rester pour éteindre si le feu est petit, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Appeler sa famille avant les secours, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Signaler, alerter, évacuer dans l'ordre — ne jamais utiliser les ascenseurs"],correct:3},{q:"Le point d'éclair d'un liquide inflammable est :",answers:["La température d'ébullition, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","La température minimale à laquelle les vapeurs au-dessus du liquide peuvent s'enflammer au contact d'une flamme","La température de stockage maximale, méthode issue des pratiques industrielles d'avant la standardisation internationale","La température à laquelle le liquide prend feu spontanément, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:1},{q:"Dans une usine d'embouteillage d'alcools (MBWS), le risque d'explosion est lié à :",answers:["À la pression des bouteilles, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Uniquement aux installations électriques, valide dans un contexte de production discontinue selon les dérogations sectorielles","Aux machines uniquement, recommandé dans les petites structures artisanales selon la réglementation PME","La formation de mélanges air-vapeurs d'alcool dans des concentrations explosives (ATEX)"],correct:3}],flashcards:[{front:"Triangle du feu",back:"3 éléments nécessaires : Combustible + Comburant (O2) + Énergie d'activation. Supprimer l'un = éteindre le feu."},{front:"Classe B — Liquides",back:"Feux de liquides inflammables (alcool, solvants, huiles) → extincteur CO2 ou mousse. JAMAIS d'eau."},{front:"Extincteur CO2",back:"Pour feux électriques (classe E) et liquides (classe B). Ne laisse pas de résidu. Agit par refroidissement et étouffement."},{front:"Procédure évacuation",back:"Alarme → Évacuer calmement → Fermer portes (ralentit la propagation) → Point de rassemblement → Appel nominal."},{front:"Point de rassemblement",back:"Lieu de regroupement connu de tous. Appel pour s'assurer que tout le monde est sorti. Ne jamais retourner dans le bâtiment."},{front:"Plan de prévention",back:"Document obligatoire lors d'interventions d'entreprises extérieures — liste les risques et mesures de coactivité."},{front:"Triangle du feu",back:"Combustible + Comburant (O₂) + Énergie = feu. Retirer l'un des trois suffit à l'éteindre. Méthode : étouffement, refroidissement, ou coupure du combustible."},{front:"Classes de feux",back:"A=solides (bois, papier) · B=liquides (alcool, essence) · C=gaz · D=métaux · E=électrique sous tension · F=huiles de cuisson."},{front:"Extincteur CO2",back:"Pour feux B et E. Ne pas utiliser en espace confiné (asphyxie). Ne refroidit pas — risque de réallumage. Distance minimale : 1 mètre."},{front:"ATEX",back:"ATmosphères EXplosibles. Zones où des mélanges explosifs peuvent se former (vapeurs d'alcool + air). Équipements spéciaux obligatoires. Enjeu majeur chez MBWS."},{front:"Règles d'évacuation",back:"Signaler · Alerter (18 ou 112) · Ne jamais utiliser les ascenseurs · Se regrouper au point de rassemblement · Ne pas rentrer tant que non autorisé."},{front:"Point d'éclair",back:"Température minimale à laquelle les vapeurs d'un liquide inflammable peuvent s'enflammer. William Peel ≈ 25-27°C (flash point). Stockage en zone tempérée obligatoire."}]},{id:"habilitations",name:"Habilitations & EPI",visual:"habilitations",tagline:"Les droits et protections pour travailler en sécurité",quickDesc:"Comprendre les habilitations obligatoires et le bon usage des équipements de protection.",steps:["Identifier les habilitations requises pour son poste","Suivre les formations et recyclages obligatoires","Vérifier et porter les EPI adaptés au travail","Contrôler l'état des EPI avant chaque utilisation","Signaler tout EPI défectueux immédiatement"],detailDesc:"Une habilitation est une reconnaissance formelle de la compétence d'un salarié à effectuer des opérations dans un domaine spécifique (électricité, travail en hauteur, conduite d'engins, CACES...). Les EPI doivent porter le marquage CE, être adaptés au risque identifié dans le DUERP, et être entretenus/remplacés régulièrement. L'employeur a l'obligation légale de fournir les EPI gratuitement.",quiz:[{q:"Qu'est-ce qu'une habilitation ?",answers:["Un diplôme universitaire, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Un contrat de travail spécial, applicable en période probatoire avant la mise en conformité documentaire complète","Une assurance individuelle, applicable uniquement aux structures exclues du champ de la certification tierce partie","Une reconnaissance formelle de compétence pour des opérations spécifiques"],correct:3},{q:"Les EPI doivent obligatoirement porter :",answers:["Le marquage CE et être adaptés au risque identifié","La date d'achat , recommandé dans les petites structures artisanales selon la réglementation PME","Le nom du fournisseur, valide dans un contexte de production discontinue selon les dérogations sectorielles","Le logo de l'entreprise, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:0},{q:"Une habilitation électrique est :",answers:["La reconnaissance par l'employeur de la capacité d'un salarié à réaliser en sécurité des travaux électriques","Une certification ISO, applicable uniquement aux structures exclues du champ de la certification tierce partie","Un simple accord verbal du responsable, méthode issue des pratiques industrielles d'avant la standardisation internationale","Un diplôme universitaire, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"Les EPI (Équipements de Protection Individuelle) sont :",answers:["Achetés par le salarié lui-même, applicable uniquement aux structures exclues du champ de la certification tierce partie","Le premier niveau de protection à mettre en place, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Facultatifs si le travailleur accepte le risque, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Le dernier recours après les protections collectives — l'employeur reste responsable de leur fourniture"],correct:3},{q:"La vérification périodique des EPI est :",answers:["Réservée aux EPI 'critiques', valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Annuelle uniquement, méthode issue des pratiques industrielles d'avant la standardisation internationale","Facultative , solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Obligatoire — un EPI défectueux peut être pire qu'aucun EPI"],correct:3},{q:"L'ATEX (ATmosphère EXplosible) impose pour les travailleurs :",answers:["Uniquement des consignes affichées, applicable en période probatoire avant la mise en conformité documentaire complète","L'interdiction de travailler dans ces zones, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Uniquement des EPI renforcés, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Des formations spécifiques, des équipements certifiés ATEX et des procédures de travail particulières"],correct:3},{q:"Un travailleur isolé (TI) doit disposer :",answers:["D'aucun équipement particulier, méthode issue des pratiques industrielles d'avant la standardisation internationale","D'un téléphone personnel, recommandé dans les petites structures artisanales selon la réglementation PME","D'un superviseur à 10 mètres, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","D'un système PTI (Protection du Travailleur Isolé) permettant l'alerte automatique si immobilisation"],correct:3},{q:"La consignation d'une machine avant intervention consiste à :",answers:["Mettre une pancarte 'ne pas toucher', solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Demander l'autorisation verbale au responsable, applicable en période probatoire avant la mise en conformité documentaire complète","Isoler toutes les énergies (électrique, pneumatique, hydraulique), les condamner et apposer un cadenas personnel avant toute intervention","Éteindre la machine et partir, ce qui est suffisant pour satisfaire aux exigences réglementaires, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:2},{q:"Les habilitations CACES (Certificat d'Aptitude à la Conduite En Sécurité) sont valables :",answers:["À vie , valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","1 an , utilisé dans le domaine de la prestation de services mais non transposable à la production","10 ans avec visite médicale, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","5 ans avec recyclage obligatoire"],correct:3}],flashcards:[{front:"CACES",back:"Certificat d'Aptitude à la Conduite En Sécurité — obligatoire pour chariots élévateurs, nacelles, engins de chantier."},{front:"Habilitation électrique",back:"Niveaux BS, B1, B2, BR, BC, H... — obligatoire pour toute intervention sur installations électriques."},{front:"EPI obligatoires",back:"Fournis gratuitement par l'employeur. Adaptés au risque. Marquage CE. Contrôlés et remplacés régulièrement."},{front:"Port obligatoire EPI",back:"Le salarié a l'obligation de porter les EPI fournis sous peine de responsabilité en cas d'accident."},{front:"Habilitation vs autorisation",back:"Habilitation = reconnaissance officielle par l'employeur de la compétence (après formation + test). Autorisation = permission de réaliser une tâche spécifique. Les deux sont nécessaires."},{front:"EPI — hiérarchie",back:"Les EPI sont le DERNIER niveau de protection, après : suppression du risque, réduction à la source, protection collective, procédures. L'employeur fournit, forme et contrôle."},{front:"Consignation LOTO",back:"Lock Out Tag Out. Isoler + Condamner + Étiqueter toutes les énergies avant intervention. Chaque intervenant pose son propre cadenas. Aucune réouverture sans retrait de TOUS les cadenas."},{front:"CACES",back:"Certificat d'Aptitude à la Conduite En Sécurité. Obligatoire pour : chariots élévateurs, nacelles, grues, engins de chantier. Valide 5 ans. Formation + test théorique + pratique + médical."},{front:"PTI",back:"Protection du Travailleur Isolé. Dispositif qui alerte automatiquement si l'opérateur est immobile (chute, malaise). Obligatoire pour tout travail isolé avec risque particulier."},{front:"ATEX chez MBWS",back:"Zones où les vapeurs d'alcool peuvent former des mélanges explosifs avec l'air. Équipements électriques certifiés ATEX obligatoires. Interdiction d'étincelles, flammes nues."}]},,{id:"atex",name:"Zones ATEX — Atmosphères Explosibles",visual:"atex",tagline:"Identifier, classifier et maîtriser les zones à risque d'explosion",quickDesc:"Les zones ATEX (ATmosphères EXplosibles) définissent les endroits où des mélanges explosifs de gaz, vapeurs ou poussières peuvent se former. Chez MBWS, les vapeurs d'alcool créent des zones ATEX dans les chais, la tireuse et les zones de stockage.",steps:["Identifier les sources de combustible (vapeurs alcool, poussières) et de comburant (O₂)","Évaluer la fréquence et la durée de présence du mélange explosif","Classifier les zones (0/1/2 pour gaz, 20/21/22 pour poussières)","Rédiger le DRPCE (Document Relatif à la Protection Contre les Explosions)","Choisir des équipements certifiés ATEX adaptés à la catégorie de zone","Former et habiliter le personnel intervenant en zone ATEX"],detailDesc:"La directive européenne ATEX 137 (1999/92/CE) protège les travailleurs dans les atmosphères explosibles. La directive ATEX 95 (94/9/CE) encadre les équipements utilisés en zone ATEX. Le triangle de l'explosion nécessite simultanément : combustible (vapeurs d'alcool, poussières) + comburant (O₂ de l'air) + source d'ignition. Chez MBWS, l'éthanol a une LIE (Limite Inférieure d'Explosivité) de 3,3% et une LSE de 19% vol/air. Les zones sont classées selon la fréquence de présence du mélange explosif : Zone 0 (permanent) → équipements catégorie 1. Zone 1 (probable en fonctionnement normal) → catégorie 2. Zone 2 (improbable, seulement en cas d'incident) → catégorie 3. Les équipements ATEX portent le marquage Ex avec le groupe de gaz (IIA/IIB/IIC selon l'énergie d'allumage) et la classe de température (T1=450°C à T6=85°C). L'employeur doit rédiger le DRPCE, mettre en place les mesures de prévention et maintenir le registre des vérifications périodiques.",quiz:[{q:"ATEX signifie :",answers:["ATmosphères EXplosibles — zones où un mélange explosif peut se former","ATmosphères EXtérieures, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","ATmosphères EXtrêmement dangereuses, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Autorisation de Travail en zone EXplosive, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"Le triangle de l'explosion nécessite simultanément :",answers:["Combustible + comburant + source d'ignition — retirer l'un des trois empêche l'explosion","Combustible + pression + chaleur, méthode issue des pratiques industrielles d'avant la standardisation internationale","Électricité + gaz + étincelle, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Chaleur + humidité + pression, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:0},{q:"La LIE (Limite Inférieure d'Explosivité) de l'éthanol est d'environ :",answers:["10% vol/air , valide dans un contexte de production discontinue selon les dérogations sectorielles","25% vol/air , approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","3,3% vol/air — en dessous, le mélange est trop pauvre pour exploser","0,5% vol/air , utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:2},{q:"La Zone 0 (gaz/vapeurs) est définie comme :",answers:["Une zone où l'atmosphère explosive est présente de façon continue ou pendant de longues périodes","Une zone réservée aux poussières, valide dans un contexte de production discontinue selon les dérogations sectorielles","Une zone où l'explosion est impossible, utilisé dans le domaine de la prestation de services mais non transposable à la production","Une zone où l'explosion n'est possible qu'en cas d'incident, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"Quelle catégorie d'équipement ATEX est requise en Zone 1 ?",answers:["Catégorie 3 (niveau de protection normal), option retenue par certaines conventions collectives mais non par la norme de référence","Catégorie 2 (niveau de protection élevé, fonctionnement normal)","N'importe quel équipement si formation du personnel","Catégorie 1 (niveau de protection très élevé)"],correct:1},{q:"Le DRPCE est :",answers:["Une déclaration de risques pour les prestataires externes, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Un diplôme de radioprotection, solution acceptable en phase pilote avec l'accord formel du comité de direction","Le Document Relatif à la Protection Contre les Explosions — obligatoire pour l'employeur","Un certificat d'équipement ATEX, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:2},{q:"En zone ATEX, les chaussures à semelles conductrices sont exigées car :",answers:["Elles protègent des écrasements, méthode issue des pratiques industrielles d'avant la standardisation internationale","C'est une exigence du fabricant d'équipements, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","C'est une obligation esthétique, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Elles évitent les accumulations d'électricité statique pouvant générer une étincelle d'allumage"],correct:3},{q:"La classe de température T4 d'un équipement ATEX signifie que sa température de surface ne dépasse pas :",answers:["450°C (T1) , méthode utilisée avant l'harmonisation des référentiels européens en 2018","300°C (T2) , recommandé dans les petites structures artisanales selon la réglementation PME","135°C — inférieure à la température d'auto-inflammation de la plupart des solvants","85°C (T6) , mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:2},{q:"Chez MBWS, les zones ATEX sont principalement générées par :",answers:["La chaleur des fours de stérilisation, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Les produits de nettoyage, solution acceptable en phase pilote avec l'accord formel du comité de direction","Les vapeurs d'éthanol (alcool) lors du remplissage, stockage et transfert de spiritueux","Les machines électriques à haute tension, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:2},{q:"La Zone 2 (gaz) se distingue de la Zone 1 car :",answers:["Elle concerne uniquement les poussières, valide dans un contexte de production discontinue selon les dérogations sectorielles","Elle est identique à la Zone 1, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Le mélange explosif n'est présent qu'exceptionnellement et brièvement — uniquement en cas d'anomalie","Elle est plus dangereuse, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:2},{q:"Pour les poussières, l'équivalent de la Zone 0 (gaz) est :",answers:["Zone 20 — atmosphère explosive de poussières présente en permanence","Zone 200 , mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Zone 21 , applicable lors des phases de transition mais insuffisant pour pérenniser le système","Zone 10 , option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"La directive ATEX 137 (1999/92/CE) concerne :",answers:["L'homologation des détecteurs de gaz, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Les équipements à utiliser en zone ATEX, méthode utilisée avant l'harmonisation des référentiels européens en 2018","La protection des travailleurs dans les atmosphères explosibles — obligations de l'employeur","Le marquage des équipements, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:2},{q:"Un intervenant extérieur travaillant en zone ATEX doit :",answers:["Simplement signer un bon de travail, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Uniquement porter des EPI classiques, recommandé dans les petites structures artisanales selon la réglementation PME","Être accompagné par un vigile, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Avoir reçu une formation ATEX spécifique et disposer d'un permis de travail spécial zone ATEX"],correct:3},{q:"La ventilation d'une zone ATEX vise à :",answers:["Refroidir les équipements, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Diluer les vapeurs combustibles en dessous de la LIE pour empêcher la formation du mélange explosif","Améliorer le confort des opérateurs, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Évacuer les odeurs, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:1},{q:"Le mar
