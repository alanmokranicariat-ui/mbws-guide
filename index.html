te + date)",role:"Chaque action doit avoir un pilote nommé ET une date d'échéance. Sans ces deux éléments, c'est une intention, pas une action.",detail:"Format minimum d'une action : 'Qui fait quoi pour quelle date ?' Vérifier l'avancement à chaque DCS (Démarche de Communication Sécurité)."},{titre:"Étape 5 — Vérifier la pérennité",role:"Vérifier que les solutions mises en place sont robustes : OPI (Instruction Opérationnelle), L1P (Leçon en 1 Point), NILs (Nettoyage, Inspection, Lubrification), Poka-Yoké.",detail:"Un audit de suivi à 3 mois vérifie que le problème ne s'est pas reproduit. La pérennité est la preuve que la cause racine a bien été éliminée."},{titre:"Étape 6 — Clôturer la RCA",role:"Valider la clôture avec le sponsor. Alimenter la base de REX (Retours d'Expérience). Partager via le Yokoten (transversalisation).",detail:"Sans clôture formelle, la RCA reste ouverte indéfiniment. La base de REX est cruciale pour ne pas refaire les mêmes analyses."}],quand:"Systématique chez MBWS pour : tout accident ou incident sécurité (même sans blessure), toute réclamation client (dès la 1ère occurrence), tout problème récurrent (≥ 2 occurrences), toute panne critique, tout audit ou exigence réglementaire. En cas de doute : déclencher. Il est toujours plus coûteux de ne pas analyser que d'analyser un faux positif.",limites:"Les 5 Pourquoi peuvent suivre une mauvaise piste sans s'en apercevoir (surtout si réalisés par une seule personne). Les RCA réalisées sous pression ou dans l'urgence identifient rarement la vraie cause racine. La tentation de s'arrêter à 'erreur humaine' est forte mais incorrecte : derrière chaque erreur humaine, il y a un facteur systémique (formation absente, procédure ambiguë, outil inadapté).",avance:"En sûreté des systèmes, on utilise l'Arbre des Défaillances (FTA — Fault Tree Analysis) pour les systèmes complexes avec causes multiples. En qualité automobile (IATF 16949 — International Automotive Task Force), la RCA est intégrée dans le 8D obligatoire. En aviation et nucléaire, la RCA est codifiée dans des référentiels stricts (Swiss Cheese Model de Reason). Les RCA rigoureuses sur plusieurs années constituent une base de données de risques qui sert directement à l'AMDEC (Analyse des Modes de Défaillance)."},quiz:[{q:"Quelle est la différence entre cause primaire et cause racine ?",answers:["Ce sont deux termes synonymes pour le même concept, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","La cause primaire est le symptôme visible (ex: panne électrique) ; la cause racine est la cause profonde sous-jacente (ex: manque de maintenance)","La cause primaire est plus importante que la cause racine, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","La cause primaire concerne les machines, la cause racine concerne les personnes, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1},{q:"Au Mémorial Jefferson, quelle était la véritable cause racine de la dégradation du monument ?",answers:["Le manque de budget pour l'entretien, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","La présence trop importante d'oiseaux, recommandé dans les petites structures artisanales selon la réglementation PME","Les lumières allumées dès l'aube selon un réglage par défaut, attirant les insectes","L'utilisation de produits de nettoyage trop agressifs, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:2},{q:"Une bonne action RCA doit obligatoirement avoir :",answers:["Uniquement une date d'échéance, option retenue par certaines conventions collectives mais non par la norme de référence","Uniquement un pilote identifié, recommandé dans les petites structures artisanales selon la réglementation PME","Un pilote identifié ET une date d'échéance — sans ces deux éléments c'est une intention, pas une action","Un budget alloué et un reporting mensuel, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:2},{q:"Quand faut-il déclencher une RCA chez MBWS pour une non-conformité client ?",answers:["Uniquement si le client demande une 8D, utilisé dans le domaine de la prestation de services mais non transposable à la production","Dès la 3ème réclamation du même client, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Dès le 1er signalement — seuil : dès la 1ère occurrence","Uniquement si la réclamation dépasse un seuil financier"],correct:2},{q:"Lors d'une RCA sur une gamme non mise à jour, quelle est généralement la cause racine profonde ?",answers:["Il n'existe pas de processus formalisé de mise à jour lors des changements produit","La gamme était trop ancienne, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Le contrôleur n'a pas fait son travail, applicable uniquement aux structures exclues du champ de la certification tierce partie","Le responsable qualité n'a pas été informé, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"Le QQOQCCP sert principalement à :",answers:["Cadrer et décrire précisément le problème (qui, quoi, où, quand, comment, combien, pourquoi)","Identifier la cause racine directement, recommandé dans les petites structures artisanales selon la réglementation PME","Évaluer la gravité d'un problème, utilisé dans le domaine de la prestation de services mais non transposable à la production","Remplacer les 5 Pourquoi, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"Quand le 6M est-il particulièrement recommandé ?",answers:["Quand la cause est déjà identifiée, applicable en période probatoire avant la mise en conformité documentaire complète","Uniquement en cas de panne machine, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Quand le problème est complexe, nouveau, multifactoriel ou transversal — plusieurs causes possibles","Pour les problèmes simples avec une cause évidente, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:2},{q:"Les 6M de la RCA sont :",answers:["Main d'œuvre, Méthodes, Mesures, Matières, Milieu, Machine","Management, Méthodes, Mesures, Moyens, Milieu, Machine","Main d'œuvre, Marketing, Mesures, Matières, Milieu, Machine","Main d'œuvre, Méthodes, Mécanismes, Matières, Milieu, Maintenance"],correct:0},{q:"Quelle est une limite connue des 5 Pourquoi ?",answers:["Ils ne s'appliquent qu'à la production, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Risque de suivre une mauvaise piste, oubli des causes parallèles, moins adapté aux problèmes complexes multifactoriels","Ils sont trop longs à mettre en oeuvre, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Ils nécessitent un logiciel spécialisé, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:1},{q:"Une description de problème PRÉCISE lors d'une RCA doit :",answers:["Être fondée sur des faits mesurables (ex: vitesse V1=5m/s < Vstd=6m/s) plutôt que vague (ex: 'vitesse incorrecte')","Contenir uniquement le nom de la machine, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Être courte et intuitive, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Être rédigée uniquement par le responsable qualité, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:0},{q:"Parmi ces solutions au problème du Mémorial Jefferson, laquelle s'attaque à la CAUSE RACINE ?",answers:["Engager du personnel de nettoyage supplémentaire","Protéger le monument avec du plexiglas, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Retarder d'une heure l'allumage des lumières","Poser des pièges à oiseaux, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:2},{q:"Dans le document RCA MBWS, combien y a-t-il de chapitres / étapes ?",answers:["6 étapes : Définir/Mesurer, Analyser écarts, Identifier causes, Gérer actions, Vérifier pérennité, Clôture","8 étapes — approche suffisante si les processus sont déjà bien maîtrisés, applicable uniquement aux structures exclues du champ de la certification tierce partie","5 étapes — valide dans les environnements à faible risque opérationnel, applicable en période probatoire avant la mise en conformité documentaire complète","4 étapes — suffisant dès lors que la politique qualité est bien définie, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:0},{q:"Qu'est-ce qu'une OPI (Instruction Opérationnelle) dans les outils de pérennité RCA ?",answers:["Un outil de mesure statistique, recommandé dans les petites structures artisanales selon la réglementation PME","Un indicateur de performance, uniquement si le processus est sous contrôle et documenté, solution acceptable en phase pilote avec l'accord formel du comité de direction","Un document simple qui explique comment réaliser une tâche correctement (ordre des opérations, outil, photo du bon résultat)","Un système informatique de traçabilité, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:2},{q:"Qu'est-ce qu'une Leçon en 1 Point (L1P / One Point Lesson) ?",answers:["Un résumé d'une réunion de 1 heure, valide dans un contexte de production discontinue selon les dérogations sectorielles","Un petit support visuel très court pour expliquer un point clé, une erreur fréquente ou une bonne pratique","Un cours de formation de 1 journée, applicable uniquement aux structures exclues du champ de la certification tierce partie","Un rapport mensuel de qualité, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:1},{q:"Les NILs dans les outils de pérennité RCA signifient :",answers:["Nettoyage, Inspection, Lubrification — actions TPM réalisées sur le poste de travail","Numérotation, Identification, Liste des défauts, applicable en période probatoire avant la mise en conformité documentaire complète","Non-conformité, Incident, Limite, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Niveau d'Indicateur Logistique, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:0},{q:"Dans le cas réel MBWS (casse du bec en PEEK, tireuse), parmi les causes identifiées en 6M, laquelle relève de la 'Méthode' ?",answers:["Absence de procédure de réglage du guide de la vis d'entrée","La forme de l'étoile non adaptée à la bouteille Cognacaise 75CL","Formation insuffisante de l'opératrice, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Mauvais alignement bec/bouteille, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:0},{q:"En cas de doute sur le déclenchement d'une RCA, la règle MBWS est :",answers:["Déclencher — il est toujours plus coûteux de ne pas analyser que d'analyser un faux positif","Ne pas déclencher pour ne pas surcharger les équipes, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Soumettre à validation de la direction avant de démarrer, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Attendre une 2ème occurrence pour confirmer, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:0},{q:"Quelle est la règle de déclenchement RCA pour un accident ou incident sécurité ?",answers:["Selon la décision du responsable de production, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Seulement pour les accidents avec arrêt de travail, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Uniquement si quelqu'un est blessé, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Systématique — tout accident, incident, near-miss ou impact environnemental, même sans blessure"],correct:3},{q:"Quel est l'objectif principal de l'étape 'Vérifier la pérennité' (étape 5) dans le document RCA ?",answers:["Calculer le coût de l'incident, solution acceptable en phase pilote avec l'accord formel du comité de direction","Informer la direction des résultats, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","S'assurer que les solutions sont robustes et que le problème ne peut pas se reproduire (OPI, Poka-Yoké, NILs, formations...)","Vérifier que les actions ont été réalisées dans les délais, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:2},{q:"La bonne attitude lors d'une analyse de cause racine est :",answers:["Appliquer immédiatement une action corrective standard, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Documenter le problème sans investigation approfondie si la solution paraît évidente","Rester curieux et critique, persévérer dans la recherche de la cause réelle, ne pas craindre de rouvrir un dossier","Trouver rapidement un coupable pour éviter les récidives, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:2}],flashcards:[{front:"RCA",back:"Root Cause Analysis — méthode structurée pour identifier la CAUSE PROFONDE d'un problème et garantir qu'il ne se reproduit plus. Question clé : 'Qu'avons-nous mis en place pour que cela ne se reproduise plus jamais ?'"},{front:"Cause primaire vs Cause racine",back:"Cause primaire = symptôme visible (ex: panne électrique visible). Cause racine = cause profonde sous-jacente (ex: manque de maintenance préventive). Traiter uniquement le symptôme → récidive assurée."},{front:"QQOQCCP",back:"Qui · Quoi · Où · Quand · Comment · Combien · Pourquoi. Sert à cadrer et décrire précisément le problème avant toute analyse de causes."},{front:"Les 6M (Ishikawa)",back:"Main d'œuvre · Méthodes · Mesures · Matières · Milieu · Machine. Permet d'explorer TOUTES les causes possibles d'un problème complexe ou multifactoriel."},{front:"5 Pourquoi",back:"Poser 'Pourquoi ?' 5 fois de suite pour remonter du symptôme à la cause racine. S'arrêter à la 1ère réponse = traiter le symptôme. Limite : risque de mauvaise piste."},{front:"Une bonne action RCA",back:"TOUJOURS : pilote nommé + date d'échéance. Sans ces deux éléments, une action reste une intention. La définition c'est bien, mais sans date ni pilote, rien ne se passe."},{front:"Critères de déclenchement RCA",back:"• Sécurité/environnement : systématique (near-miss inclus) • Récurrence : ≥ 2 occurrences • Non-conformité client : dès le 1er signalement • Perte significative : selon seuil site • Panne critique • Audit/exigence réglementaire"},{front:"OPI — Instruction Opérationnelle",back:"Document simple expliquant comment réaliser une tâche correctement : ordre des opérations, outil à utiliser, couple de serrage, photo du bon résultat. Outil de pérennité RCA."},{front:"L1P — Leçon en 1 Point",back:"Petit support visuel très court (1 page max) expliquant un point clé, une erreur fréquente ou une bonne pratique. Affichable au poste. Exemple : comment positionner un joint pour éviter les fuites."},{front:"NILs",back:"Nettoyage · Inspection · Lubrification. Actions TPM/terrain garantissant l'état du poste. L'opérateur signale les anomalies AVANT qu'elles provoquent un défaut produit."},{front:"Poka-Yoké en pérennité RCA",back:"Dispositif empêchant l'erreur ou la rendant immédiatement visible. Exemple : gabarit empêchant de monter une pièce inversée. L'outil de pérennité le plus robuste."},{front:"Cas Mémorial Jefferson",back:"Chaîne causale : lumières allumées dès l'aube (réglage défaut) → insectes attirés → araignées → oiseaux → fientes → nettoyage agressif → dégradation. Solution : retarder l'allumage d'1h. Coût : quasi nul."},{front:"Description précise d'un problème",back:"Ancrer dans les faits mesurables. ❌ 'La vitesse est incorrecte' ✅ 'La vitesse V1=5m/s est inférieure au standard Vstd=6m/s'. Éviter les expressions vagues."},{front:"6 étapes du document RCA MBWS",back:"1-Définir/Mesurer (QQOQCCP) · 2-Analyser écarts vs conditions de base (6M) · 3-Identifier causes potentielles (5P) · 4-Gérer les actions · 5-Vérifier la pérennité · 6-Clôturer la RCA"},{front:"RCA — Question fondamentale",back:"'Qu'avons-nous mis en place pour que cela ne se reproduise PLUS JAMAIS ?' — pas seulement 'que s'est-il passé ?'"},{front:"Cause primaire vs Cause racine",back:"Cause primaire = symptôme visible (panne électrique). Cause racine = cause profonde (manque maintenance préventive). Traiter uniquement le symptôme → récidive garantie."},{front:"Critères RCA MBWS",back:"Systématique : sécurité (tout near-miss), NC client (dès le 1er), récurrence (≥2), perte significative (seuil site), panne critique. En cas de doute : déclencher."},{front:"QQOQCCP dans la RCA",back:"Étape 1 : cadrer le problème. Qui / Quoi / Où / Quand / Comment / Combien / Pourquoi. Description précise et mesurable (faits, pas opinions)."},{front:"6M dans la RCA",back:"Étape 2 : explorer toutes les causes par famille. Main-d'oeuvre, Méthode, Machine, Matière, Milieu, Mesure. Vérifier conditions de base avant d'aller plus loin."},{front:"5 Pourquoi dans la RCA",back:"Étape 3 : remonter de la cause directe à la cause racine en posant 'Pourquoi ?' 5 fois. S'arrêter quand la réponse est une décision systémique."},{front:"Bonne action RCA",back:"OBLIGATOIRE : pilote nommé + date d'échéance. Sans ces 2 éléments = intention, pas action."},{front:"Outils de pérennité RCA",back:"OPI · L1P (Leçon 1 Point) · NILs (Nettoyage/Inspection/Lubrification) · Standard + Check-list · Plan de contrôle · Gammes maintenance · Poka-Yoké."},{front:"Cas Jefferson — leçon",back:"Lumières allumées trop tôt → insectes → araignées → oiseaux → fientes → nettoyage agressif. Solution : retarder l'allumage d'1h. Coût : quasi nul."},{front:"6 étapes document RCA MBWS",back:"1-Définir/Mesurer (QQOQCCP) · 2-Analyser écarts (6M) · 3-Causes potentielles (5P) · 4-Gérer actions · 5-Vérifier pérennité · 6-Clôturer avec sponsor."}]},,{id:"kaikaku",name:"Kaikaku — Transformation Radicale",visual:"kaikaku",tagline:"Quand le Kaizen ne suffit plus : changer de paradigme",quickDesc:"Transformation radicale et rapide d'un processus ou d'une organisation, par opposition au Kaizen (amélioration continue et incrémentale).",steps:["Identifier le besoin de transformation (objectif de rupture, pas d'amélioration marginale)","Constituer une équipe dédiée transverse avec un sponsor de direction","Analyser l'état actuel en profondeur (VSM, gaspillages, contraintes structurelles)","Concevoir l'état futur cible sans se limiter à l'existant","Déployer rapidement sur une zone pilote (chantier Kaikaku 3-5 jours)","Mesurer les gains, stabiliser et étendre au reste de l'organisation"],detailDesc:"Kaikaku (改革) signifie 'réforme' ou 'transformation' en japonais — par opposition à Kaizen (amélioration continue par petits pas). Le Kaikaku s'impose quand les améliorations incrémentales ne permettent pas d'atteindre l'objectif. Il s'agit d'une rupture délibérée avec l'existant : nouvelle implantation d'atelier, nouveau flux de production, réorganisation complète d'une ligne. Chez MBWS, un Kaikaku typique serait la refonte complète de la ligne d'embouteillage pour passer d'un flux poussé à un flux tiré, ou la réimplantation d'une zone pour supprimer 80% des déplacements. Le Kaikaku précède souvent le Kaizen : on transforme radicalement, puis on améliore en continu. Sans Kaikaku périodique, le Kaizen finit par stagner sur un plateau local.",learnSections:{but:"Le Kaikaku (改革 = transformation en japonais) est une transformation radicale et rapide d'un processus ou d'une organisation pour atteindre un objectif de rupture qu'une amélioration incrémentale (Kaizen) ne peut pas atteindre.",comprendre:"Kaizen = marcher chaque jour (+1% par jour). Kaikaku = prendre un bus (bond de +30 à +50% en une semaine). Les deux sont nécessaires et complémentaires. Sans Kaikaku périodique, le Kaizen atteint un plateau et stagne. Sans Kaizen après un Kaikaku, les gains s'érodent. La séquence naturelle : Kaikaku → Standardisation → Kaizen → nouveau Kaikaku.",comment:"Identifier le besoin de rupture (objectif non atteignable par le Kaizen) → former une équipe dédiée avec un sponsor de direction → analyser l'état actuel en profondeur (VSM — Value Stream Mapping) → concevoir l'état futur ambitieux → déployer sur une zone pilote en 3 à 5 jours intensifs → mesurer les gains → stabiliser → étendre.",etapes:[{titre:"Identifier le besoin de rupture",role:"Quand l'objectif est un bond de performance (×2 en productivité, ÷2 en délais), le Kaizen ne suffit plus. Le Kaikaku s'impose.",detail:"Indicateurs typiques : TRS (Taux de Rendement Synthétique) stable malgré 6 mois de Kaizen, délais de livraison structurellement trop longs, implantation obsolète générant 40% de déplacements inutiles."},{titre:"Former l'équipe et le sponsor",role:"Équipe transverse de 6 à 10 personnes (production + méthodes + qualité + maintenance). Un sponsor de direction est obligatoire.",detail:"Sans sponsor, les résistances organisationnelles bloquent la transformation. Le Kaikaku remet en cause des habitudes de travail existantes — il faut une autorité pour débloquer."},{titre:"Analyser l'état actuel (VSM)",role:"Cartographier le flux complet avec la VSM pour révéler les gaspillages structurels. Mesurer le ratio Valeur Ajoutée / Lead Time.",detail:"Si le ratio VA/LT est inférieur à 10%, il y a un gisement de Kaikaku. Les stocks dormants, les déplacements, les attentes structurelles sont les cibles."},{titre:"Concevoir l'état futur ambitieux",role:"Concevoir le flux idéal sans se limiter à ce qui existe. Supprimer des étapes entières, réimplanter des lignes, passer du flux poussé au flux tiré.",detail:"Se poser la question : si on recommençait de zéro, comment organiserait-on ce processus ? Pas comment améliorerait-on ce qui existe."},{titre:"Chantier pilote intensif (3-5 jours)",role:"Déployer la transformation sur une zone pilote en mode intensif. Résultats visibles à la fin de la semaine.",detail:"Semaine type : Lundi = observer et mesurer. Mardi = concevoir l'état futur. Mercredi-Jeudi = mettre en œuvre. Vendredi = mesurer les gains et standardiser."},{titre:"Kaizen après Kaikaku",role:"Une fois la transformation stabilisée, le Kaizen améliore en continu le nouvel état. Sans Kaizen, les gains s'érodent.",detail:"La séquence Kaikaku → standardisation → Kaizen est la plus efficace. Le Kaikaku fixe le nouveau niveau, le Kaizen l'améliore progressivement."}],quand:"Quand le Kaizen atteint un plateau et ne suffit plus à atteindre les objectifs de performance. Quand une contrainte structurelle (implantation, taille de lot, flux d'information) bloque l'amélioration. Quand l'objectif est un bond de compétitivité (doublement de la productivité, réduction de moitié des délais). Typiquement tous les 2 à 3 ans sur une ligne ou un processus.",limites:"Un Kaikaku mal conduit perturbe l'organisation sans stabiliser les gains (chaos sans résultat). Il est toujours plus risqué que le Kaizen. Sans sponsor de direction, il est bloqué par les résistances. Un Kaikaku sans Kaizen ensuite = les gains s'érodent en 6 mois. La transformation radicale peut démotiver les équipes si elle est imposée sans les impliquer.",avance:"En lean avancé, la VSM (Value Stream Mapping) est l'outil de diagnostic qui révèle où un Kaikaku s'impose. La méthode DMAIQ (Définir, Mesurer, Analyser, Innover, Quantifier) de la conception lean intègre le Kaikaku dans le cycle de conception de nouveaux processus. Dans les grandes entreprises, le Kaikaku est planifié dans la stratégie Hoshin Kanri (déploiement de la politique)."},quiz:[{q:"Kaikaku signifie :",answers:["Résolution de problèmes structurée, applicable uniquement aux structures exclues du champ de la certification tierce partie","Amélioration continue par petits pas, solution acceptable en phase pilote avec l'accord formel du comité de direction","Transformation radicale et rapide — rupture avec l'existant","Standardisation des processus, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"La différence principale entre Kaizen et Kaikaku est :",answers:["Kaizen concerne la production, Kaikaku les bureaux, utilisé dans le domaine de la prestation de services mais non transposable à la production","Kaizen = petits pas continus / Kaikaku = rupture radicale visant un bond de performance","Kaikaku est réservé aux grandes entreprises, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","La durée de mise en œuvre uniquement, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:1},{q:"Un Kaikaku s'impose quand :",answers:["On veut gagner 2% de productivité, méthode issue des pratiques industrielles d'avant la standardisation internationale","La direction demande des économies mineures, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Un audit externe est prévu, utilisé dans le domaine de la prestation de services mais non transposable à la production","Les améliorations incrémentales (Kaizen) ne permettent pas d'atteindre l'objectif de rupture"],correct:3},{q:"Dans la logique Lean, Kaikaku et Kaizen sont :",answers:["Des méthodes uniquement japonaises, valide dans un contexte de production discontinue selon les dérogations sectorielles","Complémentaires : le Kaikaku transforme radicalement, puis le Kaizen améliore en continu","Deux méthodes concurrentes — choisir l'une ou l'autre, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Identiques dans leurs résultats, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:1},{q:"Un chantier Kaikaku dure généralement :",answers:["1 journée , méthode issue des pratiques industrielles d'avant la standardisation internationale","6 à 12 mois avec une équipe projet classique, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","2 ans avec un consultant externe, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","3 à 5 jours intensifs sur le terrain avec résultats immédiats visibles"],correct:3},{q:"Le risque principal d'un Kaikaku mal conduit est :",answers:["De perturber l'organisation sans stabiliser les gains, créant du chaos","De trop impliquer les opérateurs, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","D'améliorer trop lentement, applicable lors des phases de transition mais insuffisant pour pérenniser le système","De dépenser trop en formation, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"Quelle affirmation est vraie ?",answers:["Le Kaizen suffit toujours — le Kaikaku est inutile, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Le Kaikaku remplace définitivement le Kaizen, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Sans Kaikaku périodique, le Kaizen finit par stagner sur un plateau local d'optimisation","Les deux ne peuvent pas coexister dans une même usine, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"Un exemple typique de Kaikaku dans une usine d'embouteillage serait :",answers:["Améliorer la propreté d'un poste, recommandé dans les petites structures artisanales selon la réglementation PME","Refonte complète de l'implantation de la ligne pour éliminer 80% des déplacements","Former un opérateur supplémentaire, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Ajouter une check-list de démarrage, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:1},{q:"La séquence optimale dans une démarche d'amélioration est :",answers:["Kaizen puis abandonner Kaikaku, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Kaikaku seul suffit, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Kaikaku (transformer radicalement) → Standardiser → Kaizen (améliorer en continu)","Kaizen → Kaikaku → Kaizen, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:2},{q:"Un Kaikaku nécessite un sponsor de direction car :",answers:["Il dure plus d'un an, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Il remet en cause l'organisation existante — sans mandat clair, les résistances bloquent","Il coûte toujours très cher, applicable en période probatoire avant la mise en conformité documentaire complète","C'est une exigence réglementaire, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:1}],flashcards:[{front:"Kaikaku",back:"改革 = réforme/transformation radicale. Rupture délibérée avec l'existant pour un bond de performance. S'oppose au Kaizen (petits pas continus)."},{front:"Kaizen vs Kaikaku",back:"Kaizen = marcher régulièrement (1% chaque jour). Kaikaku = prendre un bus (bond de 30-50%). Les deux sont nécessaires : sans Kaikaku, le Kaizen stagne."},{front:"Quand déclencher un Kaikaku ?",back:"Quand l'objectif est un bond de performance (×2, ÷2 des délais), quand le Kaizen a atteint ses limites, ou quand une contrainte structurelle bloque l'amélioration."},{front:"Chantier Kaikaku",back:"3-5 jours intensifs : état actuel → conception état futur → mise en œuvre immédiate sur zone pilote → mesure des gains → stabilisation."},{front:"Kaikaku précède le Kaizen",back:"On transforme d'abord radicalement (Kaikaku), puis on améliore en continu (Kaizen). La séquence naturelle est Kaikaku → Standardisation → Kaizen."},{front:"Sponsorship direction",back:"Un Kaikaku nécessite un sponsor de direction car il remet en cause l'organisation existante. Sans mandat clair, les résistances bloquent la transformation."}]},{id:"management-visuel",name:"Management Visuel",visual:"mgmtvisuel",tagline:"Rendre les problèmes visibles avant qu'ils deviennent des crises",quickDesc:"Ensemble de dispositifs visuels permettant à n'importe qui de comprendre l'état du système de production en moins de 5 minutes, sans poser de questions.",steps:["Identifier ce qui doit être visible : objectifs, performance, anomalies, standards","Concevoir les supports visuels adaptés au public (opérateurs, managers, direction)","Implanter les affichages aux bons endroits (au poste, en salle de réunion, en atelier)","Former les équipes à lire, alimenter et réagir aux indicateurs visuels","Intégrer dans les rituels : brief quotidien, réunion de performance, audit terrain","Maintenir et faire évoluer les affichages (information vivante, pas décoration)"],detailDesc:"Le management visuel repose sur un principe simple : ce qui est visible est géré, ce qui est caché est ignoré. Un bon système de management visuel permet à n'importe qui — opérateur, responsable, visiteur — de comprendre l'état du système en moins de 5 minutes : est-on dans les objectifs ? Y a-t-il un problème en cours ? Qui est responsable de quoi ? Les outils clés sont : les tableaux de bord terrain (TRS, qualité, sécurité), l'Andon (signal lumineux d'alerte immédiat), les standards visuels au poste (photos du bon état), les marquages au sol (5S), la salle Obeya (pilotage projet), et les rituels associés (brief 5 min chaque matin devant les indicateurs). Un management visuel efficace supprime les réunions inutiles et les pertes de temps à chercher l'information.",learnSections:{but:"Le management visuel rend l'état du système de production compréhensible par n'importe qui en moins de 5 minutes, sans poser de questions. Ce qui est visible est géré, ce qui est caché est ignoré.",comprendre:"Principe fondamental : un problème non visible n'existe pas pour le manager. Un stock qui déborde d'un emplacement marqué est immédiatement visible. Une machine qui a 3 heures de retard sur son plan journalier doit l'être aussi. Le management visuel élimine les réunions de reporting inutiles en rendant l'information disponible directement au bon endroit, au bon moment.",comment:"Identifier ce qui doit être visible (objectifs, performance, anomalies, standards) → concevoir des supports visuels adaptés au public → implanter aux bons endroits → former les équipes à alimenter et réagir → intégrer dans les rituels quotidiens (brief, réunion de performance, audit terrain) → maintenir vivant (information non mise à jour = pire que pas d'information).",etapes:[{titre:"Identifier ce qui doit être visible",role:"Objectifs, performance réelle vs objectifs, anomalies en cours, standards de référence, responsabilités. Chaque niveau hiérarchique a ses propres besoins visuels.",detail:"KPI (Key Performance Indicator) terrain : TRS (Taux de Rendement Synthétique), taux qualité, nombre d'arrêts. KPI direction : taux de service, marge. Deux niveaux différents, deux affichages différents."},{titre:"Concevoir les supports visuels",role:"Adapter le format au public et au contexte : tableau de management, Andon, marquages au sol, standard photo, Obeya (salle de pilotage de projet).",detail:"Règle de conception : un visiteur ignorant le processus doit comprendre l'état du système en 5 minutes. Si ce n'est pas le cas, le management visuel est insuffisant."},{titre:"Implanter aux bons endroits",role:"Au poste (pour l'opérateur), en salle de réunion (pour le manager), en atelier (pour l'équipe), en entrée de zone (pour les visiteurs).",detail:"Chaque affichage a un lecteur cible. Un indicateur affiché à 2 mètres du sol que personne ne regarde ne sert à rien."},{titre:"Intégrer dans les rituels",role:"Brief quotidien de 5 à 15 minutes devant les indicateurs. Réunion hebdomadaire de performance. Audit terrain mensuel.",detail:"Un tableau qui n'est jamais regardé lors d'une réunion structurée est un tableau inutile. Le brief quotidien est le rituel central du management visuel."},{titre:"Maintenir vivant",role:"Information non mise à jour = information fausse = perte de confiance. Un tableau périmé est pire que pas de tableau.",detail:"Règle : si un indicateur n'est pas mis à jour en temps et en heure, le retirer. La discipline de mise à jour est un indicateur de maturité du management."}],quand:"En permanence, dans tous les secteurs (production, qualité, sécurité, RH, logistique). Particulièrement crucial dans les environnements à cadence rapide (ligne d'embouteillage MBWS), les processus multi-équipes (communication entre postes), et les déploiements de projets complexes (salle Obeya). Le management visuel est le premier outil à déployer dans une démarche lean.",limites:"Un excès d'indicateurs tue le management visuel. Si tout est affiché, rien n'est piloté. Les équipes déconnectées des données (pas de brief, pas d'animation) ignorent les affichages. Le management visuel ne remplace pas le management : un tableau qui clignoте rouge sans réaction du manager perd sa crédibilité en quelques jours.",avance:"En lean manufacturing avancé, le management visuel s'intègre dans les systèmes de production connectés (IoT — Internet of Things) avec des tableaux de bord temps réel automatiques. L'Andon électronique déclenche des alertes automatisées et des escalades hiérarchiques si la réaction dépasse un délai. Les salles Obeya digitales combinent affichage physique et tableaux de bord numériques pour les projets de grande envergure."},quiz:[{q:"Le management visuel repose sur le principe :",answers:["Ce qui est visible est géré, ce qui est caché est ignoré","Plus d'indicateurs = meilleure performance","Seule la direction a besoin des indicateurs","Les tableaux de bord remplacent le management"],correct:0},{q:"Un bon système de management visuel permet :",answers:["De remplacer tous les tableaux Excel, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","À n'importe qui de comprendre l'état du système en moins de 5 minutes sans poser de questions","D'éliminer tous les problèmes, utilisé dans le domaine de la prestation de services mais non transposable à la production","Uniquement aux managers de piloter la performance, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"L'Andon est :",answers:["Un signal lumineux d'alerte immédiat permettant à l'opérateur de signaler un problème ou d'arrêter la ligne","Un document de suivi qualité, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Un outil de planification, applicable en période probatoire avant la mise en conformité documentaire complète","Un tableau de bord mensuel, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:0},{q:"Les marquages au sol font partie du management visuel car :",answers:["Ils rendent visible l'organisation de l'espace (zones de travail, stocks, allées) sans avoir à poser de questions","Ils remplacent les procédures écrites, applicable en période probatoire avant la mise en conformité documentaire complète","Ils sont imposés par la réglementation, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Ils améliorent l'esthétique de l'atelier, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"Un management visuel inefficace se reconnaît à :",answers:["Un affichage trop simple, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Trop de couleurs sur les affichages, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Des indicateurs qui ne sont jamais mis à jour — information ancienne, non fiable, ignorée par les équipes","Des opérateurs qui lisent les tableaux, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:2},{q:"La salle Obeya est :",answers:["Une salle de repos pour les opérateurs, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Une grande salle de pilotage visuel de projet où toutes les informations clés sont affichées physiquement","Un outil de formation, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Une salle de réunion classique, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:1},{q:"Le brief quotidien (stand-up meeting) devant les indicateurs dure idéalement :",answers:["Uniquement si un problème s'est produit, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","30 minutes minimum, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","5 à 15 minutes — debout, centré sur les écarts vs objectifs et les actions en cours","1 heure pour traiter tous les sujets, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:2},{q:"Un standard visuel au poste (photo du bon état) sert à :",answers:["Permettre à n'importe quel opérateur de vérifier instantanément si le poste est dans le bon état sans lire de procédure","Satisfaire l'auditeur ISO, applicable dans les cas où la direction valide en amont, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Décorer l'atelier, à condition que le personnel ait été sensibilisé au préalable, recommandé dans les petites structures artisanales selon la réglementation PME","Remplacer la formation, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"La différence entre KPI terrain et KPI direction est :",answers:["Il n'y a pas de différence, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Les KPI terrain remplacent les KPI direction, applicable uniquement aux structures exclues du champ de la certification tierce partie","Les KPI terrain sont moins importants, méthode issue des pratiques industrielles d'avant la standardisation internationale","KPI terrain = pilotage en temps réel par les opérateurs / KPI direction = pilotage mensuel ou trimestriel"],correct:3},{q:"Un tableau de bord qui n'est pas mis à jour est :",answers:["Utile comme référence historique, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Obligatoire à conserver pour les audits, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Acceptable si les données sont récentes de moins d'un mois","Pire que pas de tableau — il crée de la défiance et est ignoré par les équipes"],correct:3}],flashcards:[{front:"Management visuel",back:"Ensemble de dispositifs rendant l'état du système compréhensible en <5 min pour n'importe qui. Principe : ce qui est visible est géré."},{front:"Andon",back:"Signal lumineux (ou sonore) d'alerte immédiat. L'opérateur tire le cordon Andon pour signaler un problème → arrêt de ligne si non résolu rapidement. Inventé chez Toyota."},{front:"Standard visuel",back:"Photo ou illustration du bon état au poste. Permet de comparer instantanément le réel vs le standard sans lire de procédure. Outil 5S fondamental."},{front:"Obeya",back:"大部屋 = grande salle. Salle de pilotage visuel de projet : toutes les informations clés (planning, risques, indicateurs, plans) affichées physiquement pour l'équipe."},{front:"Brief quotidien (stand-up)",back:"Réunion de 5-15 min debout devant les indicateurs visuels. Format : hier/aujourd'hui/obstacles. Fréquence : quotidienne, même heure, même lieu."},{front:"Information vivante",back:"Un tableau de bord qui n'est pas mis à jour est pire que pas de tableau. L'information périmée crée de la défiance. Règle : pas de mise à jour = retirer l'affichage."},{front:"Marquages au sol",back:"Visualisation de l'organisation de l'espace : zones de travail, emplacements des stocks, allées de circulation, zones de danger. Composante clé du 5S Seiton."},{front:"KPI terrain vs KPI direction",back:"KPI terrain : TRS, taux de qualité, nombre d'arrêts — opérateurs pilotent en temps réel. KPI direction : EBITDA, satisfaction client — pilotage mensuel ou trimestriel."}]},{id:"lean-principes",name:"Les 5 Principes du Lean",visual:"leanprincipes",tagline:"Créer de la valeur pour le client en éliminant tout ce qui n'en crée pas",quickDesc:"Le Lean (Womack & Jones, 1996) repose sur 5 principes fondamentaux issus du Toyota Production System : définir la valeur, cartographier le flux, créer le flux continu, tirer les flux, et viser la perfection.",steps:["1. VALEUR : définir ce que le client est prêt à payer (et éliminer le reste)","2. FLUX DE VALEUR : cartographier toutes les étapes (VSM) et identifier les gaspillages","3. FLUX CONTINU : éliminer les arrêts, files d'attente et lots pour un flux pièce à pièce","4. FLUX TIRÉ : ne produire que ce que le client demande, quand il le demande (Kanban)","5. PERFECTION : amélioration continue sans fin — chaque cycle révèle de nouveaux gaspillages"],detailDesc:"Le Lean Manufacturing est issu du Toyota Production System (TPS), formalisé par Taiichi Ohno après la 2ème guerre mondiale. James Womack et Daniel Jones l'ont popularisé en Occident avec 'The Machine That Changed the World' (1990) puis 'Lean Thinking' (1996). Le Lean identifie 8 gaspillages (Muda) : Surproduction, Attentes, Transport inutile, Surtraitement, Stocks excessifs, Mouvements inutiles, Défauts/rebuts, et Sous-utilisation des talents humains. Auxquels s'ajoutent Mura (irrégularité) et Muri (surcharge). La règle d'or : tout ce qui ne crée pas de valeur aux yeux du client EST un gaspillage — peu importe si c'est une habitude, une tradition ou une contrainte perçue. En agroalimentaire (MBWS), la valeur se définit par la qualité du produit, sa disponibilité, et l'expérience de marque — pas par les contraintes internes de production.",learnSections:{but:"Le Lean crée de la valeur pour le client en éliminant systématiquement tout ce qui ne lui apporte rien. Le résultat : plus de qualité, des délais plus courts, moins de coûts, avec les mêmes ressources ou moins.",comprendre:"Le Lean Manufacturing est issu du Toyota Production System (TPS), développé par Taiichi Ohno à partir des années 1950. Formalisé en Occident par James Womack et Daniel Jones dans 'The Machine That Changed the World' (1990) et 'Lean Thinking' (1996). La règle d'or : tout ce qui ne crée pas de valeur aux yeux du client est un gaspillage — peu importe si c'est une habitude, une tradition ou une contrainte perçue.",comment:"Définir la valeur du point de vue du client → cartographier le flux de valeur (VSM — Value Stream Mapping) → créer un flux continu → tirer la production (Kanban) → viser la perfection en continu. Ces 5 principes s'appliquent dans cet ordre, de façon itérative.",etapes:[{titre:"1 — Définir la valeur",role:"Identifier ce que le client est prêt à payer. Tout le reste est un gaspillage à éliminer.",detail:"À MBWS : la valeur = qualité du produit (pas de corps étranger, bouchon correct, étiquette alignée), disponibilité (livré à temps), expérience de marque. Ce que les contraintes internes de production NOUS coûtent n'est pas de la valeur pour le client."},{titre:"2 — Cartographier le flux de valeur (VSM)",role:"Visualiser toutes les étapes (matière + information) et identifier ce qui crée de la valeur vs ce qui est gaspillage.",detail:"Dans la plupart des entreprises : seulement 1 à 5% du temps total crée de la valeur. Les 95-99% restants sont des attentes, des stocks, des transports. La VSM rend ce fait visible et choquant."},{titre:"3 — Créer le flux continu",role:"Éliminer les arrêts, les stocks intermédiaires et les files d'attente pour que le produit avance sans interruption.",detail:"L'idéal lean est le flux 'pièce à pièce'. En pratique : réduire la taille des lots de 50% divise les délais par 2 et réduit les stocks du même facteur."},{titre:"4 — Tirer les flux (Pull)",role:"Ne produire que ce que le client demande, quand il le demande. Outil principal : le Kanban.",detail:"Le flux tiré élimine la surproduction (le pire des gaspillages). Différence clé : flux poussé = produire selon des prévisions (toujours fausses). Flux tiré = produire en réponse à la consommation réelle."},{titre:"5 — Viser la perfection",role:"Amélioration continue sans fin. Chaque cycle révèle de nouveaux gaspillages qui étaient cachés. La perfection est une direction, pas une destination.",detail:"En éliminant les gaspillages, on rend d'autres gaspillages visibles qui étaient cachés derrière les premiers. Toyota s'améliore depuis 1950 et n'a pas atteint la perfection."}],quand:"Les 5 principes Lean sont un cadre stratégique permanent, pas un projet ponctuel. La définition de la valeur se fait à la conception du produit et se valide régulièrement avec les clients. La VSM s'applique quand les délais ou les coûts dérivent. Le flux tiré s'implante sur les flux les plus réguliers. La perfection s'applique à tous les processus, tout le temps.",limites:"Le Lean n'est pas une réduction des effectifs — c'est une réduction des gaspillages. Mal appliqué, il génère du stress (flux tendu = moins de stock tampon). La réduction des stocks peut augmenter la vulnérabilité aux aléas fournisseurs (risque de rupture). Le Lean ne résout pas les problèmes de conception produit (→ Design for Lean). La courbe d'apprentissage est longue : 3 à 5 ans pour une culture lean mature.",avance:"Le Toyota Production System (TPS) repose sur deux piliers : le Jidoka (自働化 = autonomation — la machine détecte un défaut et s'arrête automatiquement) et le Juste à Temps (produire ce qu'il faut, quand il le faut, en quantité voulue). Le Takt Time (temps disponible ÷ demande client) est le métronome du système. En lean avancé, le Value Stream Design intègre lean + Six Sigma + Theory of Constraints (Théorie des Contraintes) pour une optimisation globale."},quiz:[{q:"Le 1er principe Lean (Définir la valeur) signifie :",answers:["Réduire les effectifs, utilisé dans le domaine de la prestation de services mais non transposable à la production","Identifier ce que le client est prêt à payer — tout le reste est gaspillage","Améliorer la qualité des produits, recommandé dans les petites structures artisanales selon la réglementation PME","Optimiser les coûts de production, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:1},{q:"Le Toyota Production System (TPS) a été développé par :",answers:["Henry Ford , utilisé dans le domaine de la prestation de services mais non transposable à la production","W. Edwards Deming, applicable uniquement aux structures exclues du champ de la certification tierce partie","James Womack et Daniel Jones, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Taiichi Ohno après la 2ème guerre mondiale"],correct:3},{q:"Les 8 gaspillages (Muda) incluent (cocher la bonne liste) :",answers:["Pannes, Réglages, Micro-arrêts, Défauts, Surproduction, RH, Énergie, Transport","Qualité, Coût, Délai, Sécurité, Moral, Environnement, Innovation, Service, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Surproduction, Attentes, Transport, Surtraitement, Stocks, Mouvements, Défauts, Sous-utilisation des talents","Muda, Mura, Muri, Kaizen, Kaikaku, 5S, Kanban, VSM, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:2},{q:"Le flux tiré (Pull) signifie :",answers:["Remplir les stocks avant la demande, option retenue par certaines conventions collectives mais non par la norme de référence","Planifier la production selon les prévisions, solution acceptable en phase pilote avec l'accord formel du comité de direction","Produire le maximum possible pour avoir du stock, méthode issue des pratiques industrielles d'avant la standardisation internationale","Ne produire que ce que le client demande, quand il le demande — déclenché par la consommation réelle"],correct:3},{q:"La surproduction est considérée comme le pire des gaspillages car :",answers:["Elle génère et masque tous les autres gaspillages (stocks, transports, défauts cachés...)","Elle est la plus difficile à mesurer, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Elle est la plus visible, applicable uniquement aux structures exclues du champ de la certification tierce partie","Elle consomme beaucoup d'énergie, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0},{q:"Mura, Muri, Muda — Muri signifie :",answers:["Gaspillage — activité sans valeur ajoutée, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Surcharge — pousser hommes ou machines au-delà de leurs limites","Mouvement inutile, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Irrégularité — variation du rythme de production"],correct:1},{q:"Le 5ème principe Lean (Perfection) implique :",answers:["Une amélioration continue sans fin — chaque cycle d'optimisation révèle de nouveaux gaspillages","Former tous les employés au Lean, option retenue par certaines conventions collectives mais non par la norme de référence","Atteindre le zéro défaut en 1 an, applicable uniquement aux structures exclues du champ de la certification tierce partie","Certifier tous les processus ISO, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0},{q:"Dans le contexte MBWS (boissons alcoolisées), la valeur définie par le client est :",answers:["Le temps de changement de série, option retenue par certaines conventions collectives mais non par la norme de référence","Le taux d'utilisation des machines, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","La réduction des coûts de production interne, solution acceptable en phase pilote avec l'accord formel du comité de direction","La qualité du produit, sa disponibilité et l'expérience de marque — pas les contraintes internes"],correct:3},{q:"La VSM (Value Stream Mapping) correspond au principe Lean :",answers:["Cartographier le flux de valeur pour visualiser les gaspillages sur tout le flux","Tirer les flux , solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Définir la valeur, méthode issue des pratiques industrielles d'avant la standardisation internationale","Créer le flux continu, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:0},{q:"Le Lean a été popularisé en Occident par :",answers:["Taiichi Ohno avec 'Toyota Production System', approche retenue par certains référentiels nationaux mais absente de la norme européenne","W. Edwards Deming avec 'Out of the Crisis', option retenue par certaines conventions collectives mais non par la norme de référence","Shigeo Shingo avec le SMED, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Womack & Jones avec 'The Machine That Changed the World' (1990) et 'Lean Thinking' (1996)"],correct:3},{q:"Le 'Jidoka' (2ème pilier du TPS) signifie :",answers:["Juste à temps , méthode issue des pratiques industrielles d'avant la standardisation internationale","Flux tiré , valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Autonomation — la machine détecte un défaut et s'arrête automatiquement","Amélioration continue, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:2},{q:"Le Takt Time se calcule :",answers:["Coût de production / Nombre de pièces, applicable en période probatoire avant la mise en conformité documentaire complète","Temps disponible / Demande client — le rythme auquel le client achète","Vitesse nominale / Vitesse réelle, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Nombre de pièces produites / Heures travaillées, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:1}],flashcards:[{front:"5 principes Lean",back:"1-Valeur (point de vue client) · 2-Flux de valeur (VSM) · 3-Flux continu (éliminer les arrêts) · 4-Flux tiré (pull/Kanban) · 5-Perfection (amélioration continue)"},{front:"Muda",back:"無駄 = gaspillage. Les 8 Muda : Surproduction · Attentes · Transport · Surtraitement · Stocks · Mouvements · Défauts · Sous-utilisation des talents."},{front:"Mura",back:"斑 = irrégularité. Variation du rythme de production créant des pics et des creux. Cause de surproduction et d'attentes alternées."},{front:"Muri",back:"無理 = surcharge. Pousser hommes ou machines au-delà de leurs limites normales → pannes, TMS, erreurs."},{front:"Surproduction",back:"Le pire des Muda car il génère et cache tous les autres : stocks excessifs masquent les problèmes, transport supplémentaire, défauts non détectés, espace occupé."},{front:"Flux tiré (Pull)",back:"On ne produit que ce que le client demande, déclenché par la consommation réelle. S'oppose au flux poussé (production selon prévisions). Outil : Kanban."},{front:"Toyota Production System",back:"TPS développé par Taiichi Ohno (Toyota, années 1950). 2 piliers : Jidoka (autonomation — arrêt en cas de défaut) + Juste à Temps (produire ce qu'il faut, quand il faut, en quantité voulue)."},{front:"Jidoka",back:"自働化 = autonomation. Machine capable de détecter une anomalie et de s'arrêter automatiquement. Permet la supervision de plusieurs machines par un seul opérateur."},{front:"Takt Time",back:"Rythme auquel le client achète. Takt = Temps disponible / Demande client. Le Lean aligne la cadence de production sur le Takt Time pour éviter surproduction et attentes."},{front:"Womack & Jones",back:"Auteurs de 'The Machine That Changed the World' (1990) et 'Lean Thinking' (1996). Ils ont formalisé les 5 principes Lean à partir du TPS Toyota pour l'Occident."}]},{id:"trs-trg-tre",name:"TRS / TRG / TRE — L'arbre des temps",visual:"trstrgtre",tagline:"Décomposer chaque heure de production pour identifier où vont les pertes",quickDesc:"L'arbre des temps décompose le Temps d'Ouverture (TO) jusqu'au Temps Utile (TU) en soustrayant les pertes à chaque niveau. TRS (Taux de Rendement Synthétique) = TU/TR, TRG (Taux de Rendement Global) = TU/TO, TRE (Taux de Rendement Économique) = la production bonne × cadence standard / TO.",steps:["TO (Temps d'Ouverture) : durée totale de présence de l'équipe ou d'ouverture de l'atelier","TR (Temps Requis) = TO − arrêts planifiés (pauses, réunions, maintenance planifiée)","TF (Temps de Fonctionnement) = TR − arrêts subis (pannes, changements de série, manques matière)","TN (Temps Net) = TF − pertes de vitesse (micro-arrêts < 5 min, ralentissements)","TU (Temps Utile) = TN − pertes qualité (rebuts, retouches, déchets de démarrage)","TRS = TU/TR = Disponibilité × Performance × Qualité — TRG = TU/TO — TRE = Production bonne × Cadence std / TO"],detailDesc:"L'arbre des temps est le fondement de tous les indicateurs de performance machine. TO → TR → TF → TN → TU : chaque transition correspond à une famille de pertes précise. TRS (Taux de Rendement Synthétique) = TU/TR = D × P × Q. Monde classe ≥ 85%. TRG (Taux de Rendement Global) = TU/TO, toujours ≤ TRS, typiquement 60-75%. TRE (Taux de Rendement Économique) = le plus exigeant des trois. Les 6 grandes pertes : Disponibilité = pannes + changements de série. Performance = micro-arrêts + ralentissements. Qualité = rebuts de démarrage + défauts process.",learnSections:{but:"L'arbre des temps répond à une question simple : sur 8 heures de travail, combien de temps produit-on vraiment des pièces bonnes à la bonne vitesse ? En décomposant chaque perte, on sait exactement où agir pour gagner en productivité.",comprendre:"L'arbre des temps (ou cascades des pertes) structure les pertes de performance en 4 niveaux. À chaque niveau, on soustrait une famille de pertes. Le résultat final (TU — Temps Utile) est le seul temps où des pièces conformes sont produites à la cadence nominale. TRS (Taux de Rendement Synthétique) = TU / TR — il mesure l'efficacité sur le temps où la machine devait fonctionner. TRG (Taux de Rendement Global) = TU / TO — il est plus sévère car il pénalise aussi les arrêts planifiés. TRE (Taux de Rendement Économique) = Production bonne × Cadence standard / TO — il valorise économiquement chaque heure.",comment:"Mesurer les 5 niveaux de temps pour un équipement donné → calculer TRS, TRG, TRE → décomposer en D × P × Q → construire un Pareto des 6 grandes pertes → cibler la perte la plus impactante → lancer un chantier d'amélioration (TPM pour les pannes, SMED pour les changements de série, Kaizen pour les micro-arrêts).",etapes:[{titre:"Niveau 1 — TO (Temps d'Ouverture)",role:"Durée totale de présence de l'équipe. Point de départ de l'arbre. Exemple : un poste de 8h = 480 min.",detail:"Le TO est fixé par les horaires contractuels. Il ne peut pas être amélioré par la production — il faut agir sur les niveaux suivants."},{titre:"Niveau 2 — TR (Temps Requis)",role:"TO − arrêts planifiés. Pauses contractuelles, réunions d'équipe, maintenance préventive planifiée, nettoyages programmés.",detail:"Taux de Disponibilité Potentielle = TR / TO. Réduire les arrêts planifiés (réunions plus courtes, maintenance plus rapide) augmente TR. Mais attention : la maintenance planifiée réduit les pannes."},{titre:"Niveau 3 — TF (Temps de Fonctionnement)",role:"TR − arrêts non planifiés. Pannes, changements de série et réglages, manques matière ou opérateur, attentes.",detail:"Taux de Disponibilité (D) = TF / TR. Leviers d'action : TPM (Total Productive Maintenance) pour les pannes, SMED (Single Minute Exchange of Die) pour les changements de série."},{titre:"Niveau 4 — TN (Temps Net)",role:"TF − pertes de vitesse. Micro-arrêts de moins de 5 minutes et ralentissements par rapport à la cadence nominale.",detail:"Taux de Performance (P) = TN / TF. Les micro-arrêts sont souvent invisibles car non enregistrés. Leviers : démarche Kaizen sur les micro-arrêts, formation opérateurs, Poka-Yoké."},{titre:"Niveau 5 — TU (Temps Utile)",role:"TN − pertes qualité. Rebuts, retouches et déchets de démarrage. Seul niveau où des pièces bonnes sont produites à la bonne vitesse.",detail:"Taux de Qualité (Q) = TU / TN. Leviers : AMDEC (Analyse des Modes de Défaillance), Poka-Yoké, contrôle en cours de production, réduction des déchets de démarrage."},{titre:"TRS = TU / TR = D × P × Q",role:"Le TRS synthétise les 3 taux. Multiplier les pertes révèle leur effet combiné. 85% × 90% × 95% = 72.7% — une perte sur chaque taux crée une perte globale sévère.",detail:"Monde classe : TRS ≥ 85% en production de masse. Pour progresser de 72% à 82%, il faut améliorer les 3 taux simultanément. Agir sur un seul taux a un impact limité."}],quand:"En continu sur les équipements goulots (ceux dont la panne arrête toute la ligne). Quotidiennement pour le pilotage de la production en management visuel. Pour diagnostiquer une baisse de performance avant de lancer un chantier d'amélioration. Pour comparer les performances entre lignes ou équipes. Pour justifier un investissement en maintenance ou en outillage.",limites:"Le TRS ne dit pas quoi faire — il identifie où sont les pertes mais pas pourquoi elles existent (→ utiliser Ishikawa, 5 Pourquoi, AMDEC). La mesure manuelle est fastidieuse et sujette à sous-estimations (surtout les micro-arrêts). Un TRS élevé ne garantit pas qu'on produit ce que le client veut au bon moment (→ aligner avec le Takt Time). Le TRS peut être amélioré artificiellement en réduisant la vitesse nominale de référence.",avance:"TRG (Taux de Rendement Global) = TU / TO intègre les arrêts planifiés — utilisé pour les décisions d'investissement (utilisation du capital). TRE (Taux de Rendement Économique) = production bonne × cadence standard / TO — valorise chaque heure perdue en unités de valeur. En lean avancé, les tableaux de bord IoT (Internet of Things) calculent le TRS en temps réel avec décomposition automatique des 6 grandes pertes et alertes prédictives."},quiz:[{q:"Dans l'arbre des temps, le Temps Requis (TR) s'obtient en soustrayant du TO (Temps d'Ouverture) :",answers:["Les pannes et les changements de série","Les arrêts planifiés (pauses, réunions, maintenance planifiée, nettoyages)","Les micro-arrêts et ralentissements","Les rebuts et retouches"],correct:1},{q:"Les pannes et les changements de série se positionnent dans l'arbre des temps entre :",answers:["TO et TR — ce sont des arrêts planifiés","TR et TF — ce sont des arrêts subis non planifiés","TF et TN — ce sont des pertes de vitesse","TN et TU — ce sont des pertes qualité"],correct:1},{q:"Les micro-arrêts de moins de 5 minutes impactent quel passage de l'arbre des temps ?",answers:["De TO à TR (arrêts planifiés)","De TR à TF (arrêts non planifiés)","De TF à TN (pertes de performance)","De TN à TU (pertes qualité)"],correct:2},{q:"Le Taux de Disponibilité (D) dans la formule TRS = D × P × Q se calcule :",answers:["TN / TF","TU / TN","TF / TR","TU / TR"],correct:2},{q:"Le Taux de Performance (P) dans la formule TRS = D × P × Q se calcule :",answers:["TF / TR","TN / TF","TU / TN","TU / TR"],correct:1},{q:"Le Taux de Qualité (Q) dans la formule TRS = D × P × Q se calcule :",answers:["TF / TR","TU / TR","TN / TF","TU / TN"],correct:3},{q:"TRS = TU / TR signifie que le TRS mesure :",answers:["L'efficacité sur le temps d'ouverture total","L'efficacité sur le temps où la machine était censée produire (temps requis)","Uniquement les pertes qualité","La vitesse de production réelle"],correct:1},{q:"TRG (Taux de Rendement Global) = TU / TO est toujours inférieur ou égal au TRS car :",answers:["Il ne prend pas en compte la qualité","Son dénominateur TO est plus grand que TR — il pénalise aussi les arrêts planifiés","Il inclut les micro-arrêts","Il est calculé sur une période plus longue"],correct:1},{q:"Poste 8h (480 min). Pauses 30 min → pannes 40 min → micro-arrêts 25 min → rebuts 10 min équiv. Le TRS est :",answers:["73 % — TU = 375 min / TR = 450 min","80 %","88 %","65 %"],correct:0},{q:"Des déchets de démarrage (premières pièces non conformes au lancement) impactent :",answers:["Le passage de TO à TR","Le passage de TR à TF","Le passage de TF à TN","Le passage de TN à TU — ce sont des pertes qualité"],correct:3},{q:"Le TRS (Taux de Rendement Synthétique) monde classe en production de masse est :",answers:["≥ 65 %","≥ 75 %","≥ 85 %","= 100 %"],correct:2},{q:"D = 88 %, P = 91 %, Q = 96 % : le TRS est d'environ :",answers:["77 %","85 %","92 %","70 %"],correct:0},{q:"Pour améliorer le Taux de Disponibilité (D), on agit prioritairement sur :",answers:["Les micro-arrêts et ralentissements","Les rebuts et retouches","Les pannes et changements de série — via TPM et SMED","La cadence nominale de la machine"],correct:2},{q:"Le TRE (Taux de Rendement Économique) est le plus exigeant des trois indicateurs car :",answers:["Il est calculé uniquement par le service financier","Il prend pour référence la cadence standard et le TO — il valorise économiquement chaque heure perdue","Il inclut uniquement les pannes","Il remplace TRS et TRG ensemble"],correct:1},{q:"Les 6 grandes pertes TRS se répartissent en :",answers:["Disponibilité : pannes + changements de série · Performance : micro-arrêts + ralentissements · Qualité : rebuts démarrage + défauts process","Disponibilité : pannes + rebuts · Performance : changements de série + ralentissements · Qualité : micro-arrêts + défauts","Les 6 pertes sont toutes des pertes de disponibilité","Disponibilité : micro-arrêts + ralentissements · Performance : pannes + réglages · Qualité : rebuts + retouches"],correct:0}],flashcards:[{front:"L'arbre des temps — 5 niveaux",back:"TO (Temps d'Ouverture) → TR (Temps Requis) [−arrêts planifiés] → TF (Temps de Fonctionnement) [−pannes/changements] → TN (Temps Net) [−micro-arrêts/ralentissements] → TU (Temps Utile) [−rebuts/retouches]"},{front:"TO — Temps d'Ouverture",back:"Durée totale de présence de l'équipe. Base du TRG (Taux de Rendement Global). Exemple : 8h = 480 min. Fixé par les horaires — ne peut pas être amélioré par la production."},{front:"TR — Temps Requis",back:"TO − arrêts planifiés (pauses, réunions, maintenance planifiée, nettoyages). C'est le temps où la machine est CENSÉE produire. Base du TRS (Taux de Rendement Synthétique)."},{front:"TF — Temps de Fonctionnement",back:"TR − arrêts non planifiés (pannes, changements de série, manque matière). Taux de Disponibilité (D) = TF / TR. Levier : TPM (Total Productive Maintenance) + SMED (Single Minute Exchange of Die)."},{front:"TN — Temps Net",back:"TF − pertes de vitesse (micro-arrêts <5 min, ralentissements). Taux de Performance (P) = TN / TF. Les micro-arrêts souvent non enregistrés = source cachée de 10 à 20% des pertes."},{front:"TU — Temps Utile",back:"TN − pertes qualité (rebuts, retouches, déchets démarrage). Seul temps où des pièces BONNES sont produites à BONNE cadence. Taux de Qualité (Q) = TU / TN."},{front:"TRS = TU / TR = D × P × Q",back:"Taux de Rendement Synthétique. Efficacité sur le temps requis. Monde classe ≥ 85%. 85% × 90% × 97% = 74% — chaque taux multiplie les autres."},{front:"TRG = TU / TO",back:"Taux de Rendement Global. Toujours ≤ TRS car dénominateur plus grand. Pénalise aussi les arrêts planifiés. Typiquement 60 à 75%. Utilisé pour les décisions d'investissement."},{front:"TRE = Prod. bonne × Cadence std / TO",back:"Taux de Rendement Économique. Le plus exigeant : compare à la cadence standard théorique. Valorise économiquement chaque heure perdue. Utile pour les décisions d'achat de machines."},{front:"Les 6 grandes pertes TRS",back:"Disponibilité : pannes + changements de série. Performance : micro-arrêts + ralentissements. Qualité : rebuts de démarrage + défauts process. Utiliser un Pareto pour prioriser."},{front:"Exemple chiffré",back:"Poste 8h (480 min). Pauses 30 → TR=450. Pannes+changements 40 → TF=410. Micro-arrêts 25 → TN=385. Rebuts 10 équiv. → TU=375. TRS=375/450=83%. TRG=375/480=78%."},{front:"D=88%, P=91%, Q=96% → TRS=?",back:"TRS = 0.88 × 0.91 × 0.96 = 77%. La règle : chaque dixième de point perdu sur un taux coûte cher car il est multiplié par les deux autres."}]}]},{id:"supply-chain",qsIds:["qs-16","qs-17","qs-19","qs-20","qs-21","qs-22"],label:"Supply Chain",abbr:"SC",color:"#D96A2A",colorL:"#FEF3E8",tools:[{id:"kanban",name:"Système Kanban",visual:"kanban",tagline:"Produire uniquement ce qui est réellement consommé",quickDesc:"Flux tiré par la demande réelle grâce à des cartes signal circulant en sens inverse des produits.",steps:["Le client consomme un conteneur de produits","La carte Kanban attachée est libérée","La carte remonte vers le poste amont","Le poste amont reçoit l'autorisation de produire","Le conteneur rejoint le stock tampon (supermarché)"],detailDesc:"Kanban (看板 = étiquette) est un système de flux tiré : on ne produit que ce qui est consommé. Le nombre optimal de Kanbans se calcule : N = (Demande journalière × Délai de réapprovisionnement × coefficient de sécurité) / Taille du conteneur. Trop de Kanbans = surplus de stock et gaspillage. Trop peu = rupture et client insatisfait. Le Kanban physique (carte) peut être remplacé par un e-Kanban (scan, ERP, signal électronique). Règle absolue sans exception : pas de Kanban = pas de production.",learnSections:{but:"Le Kanban (看板 = étiquette en japonais) est un système de flux tiré qui déclenche la production ou l'approvisionnement uniquement quand c'est nécessaire — c'est-à-dire quand le client a consommé. Règle absolue : pas de Kanban = pas de production.",comprendre:"Inventé par Taiichi Ohno chez Toyota dans les années 1950 en s'inspirant du fonctionnement des supermarchés américains. Dans un supermarché, les rayons se vident → le fournisseur réapprovisionne. En production, un poste consomme → il libère un signal Kanban → le poste amont produit. Le Kanban élimine la surproduction, le pire des gaspillages Lean.",comment:"Définir les familles de produits à gérer en Kanban → calculer le nombre de Kanbans (N = demande × délai × sécurité ÷ taille conteneur) → matérialiser les Kanbans (cartes, racks colorés, e-Kanban) → former les équipes → surveiller et ajuster périodiquement.",etapes:[{titre:"Calculer le nombre de Kanbans",role:"N = (Demande journalière × Délai de réapprovisionnement × facteur de sécurité) ÷ Quantité par conteneur.",detail:"Trop de Kanbans = stock excessif (gaspillage). Trop peu = rupture (insatisfaction client). Le calcul est théorique : ajuster régulièrement selon la réalité terrain (variations de demande, de délais)."},{titre:"Choisir la matérialisation",role:"Carte physique (Kanban classique), rack 3 couleurs (vert/orange/rouge), ou signal électronique (e-Kanban via ERP — Enterprise Resource Planning).",detail:"Le Kanban physique est visible et tangible mais peut se perdre. L'e-Kanban est plus rapide mais dépend de l'infrastructure IT. Le rack 3 couleurs est le plus visuel et robuste."},{titre:"Respecter la règle absolue",role:"Pas de Kanban = pas de production ni d'approvisionnement. Toute exception doit être tracée, analysée et corrigée.",detail:"Si cette règle est violée régulièrement, le système Kanban s'effondre. Les exceptions doivent déclencher une analyse des causes : pourquoi avons-nous produit sans Kanban ?"},{titre:"Appliquer le Pareto (20/80)",role:"Appliquer le Kanban en priorité aux 20% des références représentant 80% des coûts de stockage (analyse ABC).",detail:"Ne pas implémenter le Kanban sur toutes les références simultanément. Commencer par les articles A (les plus importants en valeur), ajuster, puis étendre aux articles B."},{titre:"Surveiller et ajuster",role:"Recalculer les Kanbans périodiquement (changements de demande, de délais, de taille de lot). Un Kanban non ajusté génère des surstrocks ou des ruptures.",detail:"Fréquence recommandée de révision : mensuelle sur les articles A, trimestrielle sur les B, semestrielle sur les C."}],quand:"Sur les flux réguliers et prévisibles entre deux processus. En production avec des demandes relativement stables. Pour les approvisionnements répétitifs. Combiné avec le SMED (Single Minute Exchange of Die — Changement de série rapide) pour réduire les tailles de lot et le Just-in-Time pour produire exactement ce qui est demandé.",limites:"Le Kanban fonctionne mal sur les produits à forte saisonnalité ou à commandes exceptionnelles (→ analyse XYZ pour différencier). Il peut fragiliser l'approvisionnement si les fournisseurs ont des délais variables (→ augmenter le facteur de sécurité ou qualifier des fournisseurs alternatifs). La mise en œuvre nécessite une discipline absolue sur la règle 'pas de Kanban = pas de production'.",avance:"En lean avancé, le Kanban à deux bacs (two-bin system) est la forme la plus simple et la plus robuste. Le POLCA (Paired-cell Overlapping Loops of Cards with Authorization) est une évolution du Kanban pour les flux variés (job shop). En e-Kanban connecté à l'ERP, les stocks sont gérés en temps réel avec des seuils automatiques d'alerte et de déclenchement."},quiz:[{q:"Dans un flux tiré, qui donne l'autorisation de produire ?",answers:["Le chef de production, solution acceptable en phase pilote avec l'accord formel du comité de direction","Le planning informatique central, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","La consommation réelle (signal Kanban du client)","Le responsable achats, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"Si on augmente le nombre de Kanbans en circulation, le stock :",answers:["Reste stable , approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Varie aléatoirement, solution acceptable en phase pilote avec l'accord formel du comité de direction","Diminue , méthode utilisée avant l'harmonisation des référentiels européens en 2018","Augmente"],correct:3},{q:"La différence fondamentale entre flux tiré et flux poussé est :",answers:["La qualité des produits finis, solution acceptable en phase pilote avec l'accord formel du comité de direction","Tiré = basé sur la demande réelle / Poussé = basé sur des prévisions","Le coût de production, méthode utilisée avant l'harmonisation des référentiels européens en 2018","La vitesse de production, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"Que faire si un conteneur est consommé sans Kanban associé ?",answers:["Mettre à jour le planning ERP, valide dans un contexte de production discontinue selon les dérogations sectorielles","Produire quand même pour ne pas bloquer, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Attendre le prochain audit mensuel, méthode issue des pratiques industrielles d'avant la standardisation internationale","Alerter et analyser l'anomalie dans le système"],correct:3},{q:"La règle absolue du Kanban est :",answers:["Réapprovisionner selon le planning, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Pas de Kanban = pas de production ni d'approvisionnement","Produire par anticipation en période creuse","Toujours avoir du stock de sécurité, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"Le Kanban est un système de flux :",answers:["Mixte — selon les saisons, applicable en période probatoire avant la mise en conformité documentaire complète","Poussé — on produit selon les prévisions","Planifié — selon l'ERP, valide dans un contexte de production discontinue selon les dérogations sectorielles","Tiré — on produit uniquement ce qui a été consommé"],correct:3},{q:"Le Kanban 3 couleurs : vert/orange/rouge indique :",answers:["La qualité des pièces","Stock OK / Réapprovisionner / Urgence — visualisation sans étiquette","La priorité de fabrication","Le niveau de compétence"],correct:1},{q:"Le Kanban visuel sans étiquette fonctionne grâce à :",answers:["Un système de code-barres, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Un logiciel ERP , option retenue par certaines conventions collectives mais non par la norme de référence","Une réunion quotidienne de planification, valide dans un contexte de production discontinue selon les dérogations sectorielles","Des emplacements physiques colorés (vert/orange/rouge) sur des racks inclinés"],correct:3},{q:"La règle 80/20 (Pareto) appliquée au Kanban suggère :",answers:["Appliquer le Kanban aux 20% des produits représentant 80% des coûts de stockage en priorité","Ne gérer que 20% des fournisseurs en Kanban, méthode issue des pratiques industrielles d'avant la standardisation internationale","Contrôler 20% des livraisons, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Tout gérer en Kanban, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0},{q:"Le Kanban électronique (e-Kanban) par rapport au Kanban papier :",answers:["Accélère le signal de déclenchement mais nécessite une infrastructure IT fiable","Remplace toujours le Kanban physique, applicable uniquement aux structures exclues du champ de la certification tierce partie","Est obligatoire pour les grandes entreprises, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Est moins fiable, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"En cas de rupture de stock Kanban, la première action est :",answers:["Commander en urgence et augmenter tous les stocks, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Supprimer le Kanban défaillant, utilisé dans le domaine de la prestation de services mais non transposable à la production","Analyser la cause : le seuil était-il bien calculé ? Le délai fournisseur a-t-il changé ?","Abandonner le système Kanban, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:2}],flashcards:[{front:"Flux tiré",back:"On produit uniquement lorsque le client consomme → pas de surproduction, stock maîtrisé, réactivité maximale."},{front:"Flux poussé",back:"On produit selon des prévisions → risque de surstock, d'obsolescence, de saturation des entrepôts."},{front:"Calcul Kanbans",back:"N = (Demande × Délai réappro × (1 + taux sécurité)) / Taille conteneur. À recalculer périodiquement."},{front:"e-Kanban",back:"Signal numérique (scan, ERP, écran) qui remplace la carte physique — même logique, même règle absolue."},{front:"Règle d'or",back:"Pas de Kanban = pas de production. Toute exception doit être tracée, analysée et corrigée."},{front:"Supermarché Kanban",back:"Zone de stock tampon organisée entre deux processus — le client interne se sert librement, déclenche la production amont."},{front:"Flux tiré vs flux poussé",back:"Poussé (push) : on produit selon les prévisions → stock accumulé. Tiré (pull) : on produit seulement quand le client consomme → stock minimal."},{front:"Kanban — calcul du nombre de cartes",back:"N = (Consommation journalière × Délai de réappro en jours × Facteur de sécurité) / Quantité par conteneur."},{front:"Kanban 3 couleurs",back:"Vert = stock OK, ne pas réapprovisionner. Orange = lancer le réapprovisionnement. Rouge = urgence, stock critique. Visualisation sans étiquet
