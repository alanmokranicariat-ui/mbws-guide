quage 'Ex IIB T3' sur un équipement signifie :",answers:["Validité de 3 ans seulement, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Groupe IIB (gaz comme l'éthylène), classe T3 (surface max 200°C) — adapté aux vapeurs d'alcool","Équipement interdit en zone ATEX, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Équipement de catégorie 2 uniquement, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1}],flashcards:[{front:"Triangle de l'explosion",back:"Combustible (vapeurs alcool, poussières) + Comburant (O₂ de l'air) + Source d'ignition (étincelle, chaleur, statique). Retirer l'un des 3 = pas d'explosion."},{front:"LIE / LSE",back:"LIE = Limite Inférieure d'Explosivité (mélange trop pauvre en dessous). LSE = Limite Supérieure d'Explosivité (trop riche au-dessus). Entre LIE et LSE = zone dangereuse. Éthanol : LIE 3,3% — LSE 19%."},{front:"Zones gaz/vapeurs",back:"Zone 0 = présence permanente ou prolongée. Zone 1 = présence probable en fonctionnement normal. Zone 2 = présence improbable, uniquement en cas d'anomalie."},{front:"Zones poussières",back:"Zone 20 = nuage de poussières explosives présent en permanence. Zone 21 = présence probable en fonctionnement. Zone 22 = présence improbable/brève."},{front:"Catégories équipements ATEX",back:"Cat. 1 → Zone 0/20 (très haute protection, sécurité même 2 pannes simultanées). Cat. 2 → Zone 1/21 (haute protection). Cat. 3 → Zone 2/22 (protection normale en fonctionnement)."},{front:"Classes de température ATEX",back:"T1=450°C · T2=300°C · T3=200°C · T4=135°C · T5=100°C · T6=85°C. La temp. de surface de l'équipement doit rester sous la température d'auto-inflammation du combustible présent."},{front:"Groupe de gaz ATEX",back:"IIA = propane (le moins sensible). IIB = éthylène (dont l'alcool — énergie d'allumage intermédiaire). IIC = hydrogène/acétylène (le plus sensible — le plus explosif). Un équipement IIC convient partout."},{front:"DRPCE",back:"Document Relatif à la Protection Contre les Explosions. Obligatoire pour l'employeur (directive ATEX 137). Contient : classification des zones, liste des équipements, mesures de prévention, registre des vérifications."},{front:"ATEX chez MBWS",back:"Zones typiques : chais (alcool stocké), tireuse d'embouteillage, zone de transfert/pompage, cuves de fermentation, salle de dosage des arômes. L'éthanol LIE 3,3% = dès 33mL/m³ d'air."},{front:"Électricité statique en ATEX",back:"Risque majeur souvent sous-estimé. Prévention : mise à la terre des équipements et personnes (chaussures conductrices, bracelets), bonnes pratiques de transfert liquide (vitesse débit limitée)."},{front:"Permis de travail ATEX",back:"Autorisation formelle pour toute intervention en zone ATEX. Vérifie : formation du personnel, outillage certifié, absence de sources d'ignition, analyse atmosphérique préalable si besoin."},{front:"Directives ATEX",back:"ATEX 137 (1999/92/CE) = protection des travailleurs — obligations employeur (DRPCE, formation, vérifications). ATEX 95 (2014/34/UE) = équipements — certification des matériels."}]}]},{id:"rh",qsIds:["qs-14"],label:"Ressources Humaines",abbr:"RH",color:"#2D7A4F",colorL:"#ECFDF5",tools:[{id:"smart",name:"Objectifs SMART",visual:"smart",tagline:"Des objectifs qui guident vraiment l'action",quickDesc:"5 critères pour transformer une intention vague en objectif clair, mesurable et motivant.",steps:["Spécifique : définir précisément le périmètre","Mesurable : choisir un indicateur quantifiable","Atteignable : vérifier les ressources disponibles","Réaliste : aligner avec la stratégie d'entreprise","Temporel : fixer une date d'échéance précise"],detailDesc:"Un objectif non SMART est une intention, pas un engagement. 'Améliorer la qualité' n'est pas un objectif : 'Réduire le taux de rebuts de 15% à 9% sur la ligne 2 avant le 30/06/2025' l'est. Les objectifs SMART servent à l'entretien annuel, aux plans d'action, à la conduite de projets. Ils doivent être co-construits avec le collaborateur pour créer l'engagement réel. Un objectif imposé sans co-construction génère de la résistance. Le manager doit s'assurer que le collaborateur dispose des moyens nécessaires.",quiz:[{q:"Lequel de ces objectifs est SMART ?",answers:["Augmenter la production rapidement, option retenue par certaines conventions collectives mais non par la norme de référence","Améliorer la qualité produit, applicable en période probatoire avant la mise en conformité documentaire complète","Réduire les rebuts de 15% à 9% sur la ligne 2 avant le 30/06","Mieux former les équipes terrain, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:2},{q:"Le T de SMART signifie :",answers:["Traçable dans le temps, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Temporel (date d'échéance précise)","Transparent , option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Transversal aux services, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:1},{q:"Les objectifs SMART doivent être :",answers:["Fixés unilatéralement par le manager, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Identiques pour tous les membres d'une équipe","Déterminés uniquement par la DRH, option retenue par certaines conventions collectives mais non par la norme de référence","Co-construits avec le collaborateur pour créer l'engagement"],correct:3},{q:"Un objectif 'Améliorer la qualité' est un objectif SMART ?",answers:["Oui avec un indicateur quelconque, applicable dans les cas où la direction valide en amont, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Oui si tout le monde comprend, sous réserve de validation par le responsable qualité du site, utilisé dans le domaine de la prestation de services mais non transposable à la production","Oui, c'est clair, sous réserve de validation par le responsable qualité du site, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Non — il n'est ni Spécifique ni Mesurable ni Temporel. Exemple SMART : 'Réduire le taux de réclamations de 15% à 8% d'ici le 31/12'"],correct:3},{q:"Le 'R' de SMART peut signifier :",answers:["Rapide — suffisant dès lors que la politique qualité est bien définie, méthode issue des pratiques industrielles d'avant la standardisation internationale","Réaliste (atteignable) ou Rélevant (pertinent par rapport à la stratégie) — selon les référentiels","Régulier , option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Uniquement Réaliste, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Un objectif Mesurable doit avoir :",answers:["Un indicateur chiffré précis permettant de savoir sans ambiguïté si l'objectif est atteint ou non","Un graphique de suivi mensuel, solution acceptable en phase pilote avec l'accord formel du comité de direction","L'accord de toutes les parties, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Uniquement un indicateur qualitatif, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:0},{q:"L'aspect Temporel (T) dans SMART est essentiel car :",answers:["Les délais sont toujours connus d'avance, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Sans date d'échéance, un objectif reste une intention — la date crée l'urgence et la mesurabilité","La date est une obligation légale, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Pour planifier le budget, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:1},{q:"Un objectif non Atteignable est contre-productif car :",answers:["Il dépasse le budget, applicable dans les cas où la direction valide en amont, solution acceptable en phase pilote avec l'accord formel du comité de direction","Il démotive l'équipe et génère stress et désengagement — un objectif réaliste tire vers le haut sans décourager","Il mobilise trop de ressources, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Il est illégal — suffisant dès lors que la politique qualité est bien définie, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"Les objectifs SMART en entreprise sont liés à :",answers:["La stratégie de l'entreprise — chaque objectif individuel doit contribuer aux objectifs d'équipe, puis départementaux, puis de l'entreprise","Uniquement aux entretiens annuels, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Uniquement à la rémunération variable, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Uniquement aux projets d'investissement, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:0},{q:"Comment reformuler 'Devenir meilleur en communication' en objectif SMART ?",answers:["'Améliorer ma communication' avec un plan d'action, approche retenue par certains référentiels nationaux mais absente de la norme européenne","'Animer 3 réunions d'équipe par mois en utilisant un support visuel structuré d'ici le 30 juin et obtenir un retour positif de 80% des participants'","'Parler plus souvent dans les réunions', utilisé dans le domaine de la prestation de services mais non transposable à la production","'Suivre une formation communication en 2025', applicable dans les cas où la direction valide en amont, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1}],flashcards:[{front:"Spécifique",back:"Décrit précisément ce qu'on veut accomplir, sur quoi, avec qui, dans quel périmètre géographique ou organisationnel."},{front:"Mesurable",back:"Un indicateur quantifiable permet de savoir objectivement si l'objectif est atteint (taux, nombre, délai, coût, score)."},{front:"Atteignable",back:"Ambitieux mais réaliste compte tenu des ressources, compétences, temps et contraintes existants."},{front:"Réaliste",back:"Pertinent et aligné avec les priorités de l'entreprise, du service, de la stratégie annuelle."},{front:"Temporel",back:"Date d'échéance précise définie dès le départ. Sans deadline, un objectif tend à être indéfiniment repoussé."},{front:"Exemple SMART",back:"'Réduire le taux d'absentéisme de 8% à 5% sur le site de Lormont avant le 31/12/2025' — spécifique, mesurable, atteignable, réaliste, temporel."},{front:"S — Spécifique",back:"L'objectif est précis, sans ambiguïté. 'Qui fait quoi ?' est clair. Ex : 'Réduire le taux de rebuts sur la ligne A' plutôt que 'améliorer la qualité'."},{front:"M — Mesurable",back:"Un indicateur chiffré permet de savoir sans débat si l'objectif est atteint. Ex : 'de 5% à 2%' plutôt que 'significativement réduit'."},{front:"A — Atteignable",back:"Ambitieux mais réaliste avec les ressources et compétences disponibles. Ni trop facile (pas stimulant) ni impossible (démotivant)."},{front:"R — Réaliste/Relevant",back:"Pertinent par rapport à la stratégie de l'entreprise. L'objectif doit contribuer à un but plus grand. 'Pourquoi cet objectif est-il important ?'"},{front:"T — Temporel",back:"Une date d'échéance précise. Sans deadline = sans urgence = reporté indéfiniment. La date transforme un souhait en engagement."},{front:"Cascade des objectifs",back:"Objectifs entreprise → Objectifs département → Objectifs équipe → Objectifs individuels. Chaque niveau doit contribuer au niveau supérieur (alignement stratégique)."}]},{id:"entretien",name:"Entretien Annuel d'Évaluation",visual:"entretien",tagline:"Bilan structuré et cap pour l'année suivante",quickDesc:"Évaluer la performance N-1 et co-construire les objectifs N+1 avec le collaborateur.",steps:["Préparer les éléments factuels de l'année (les deux)","Bilan objectif des résultats N-1 avec données","Évaluation des compétences métier et comportementales","Co-définir les objectifs SMART pour N+1","Formaliser le plan de développement et formation"],detailDesc:"L'Entretien Annuel d'Évaluation (EAE) est distinct de l'Entretien Professionnel (EP). L'EAE évalue la performance passée et fixe les objectifs futurs. L'EP (obligatoire tous les 2 ans) se concentre sur le développement des compétences et l'évolution de carrière. L'EAE doit reposer exclusivement sur des faits observables et chiffrés, jamais sur des impressions. Le manager doit préparer des exemples concrets et précis, positifs comme négatifs. La méthode SBI (Situation-Behavior-Impact) structure le feedback de façon professionnelle.",quiz:[{q:"L'entretien professionnel est obligatoire tous les :",answers:["2 ans","5 ans , valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","3 ans , approche retenue par certains référentiels nationaux mais absente de la norme européenne","1 an , option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:0},{q:"L'entretien annuel doit reposer sur :",answers:["Les rumeurs et retours informels, applicable uniquement aux structures exclues du champ de la certification tierce partie","Les impressions générales et le ressenti du manager","Des faits précis, observables et chiffrés","La comparaison avec les collègues de même niveau"],correct:2},{q:"Quelle est la différence entre EAE et entretien professionnel ?",answers:["EAE = fait par RH / EP = fait par le manager, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","EAE = performance/objectifs / EP = développement des compétences et carrière","Il n'y en a pas, ce sont les mêmes, recommandé dans les petites structures artisanales selon la réglementation PME","EAE est facultatif / EP est obligatoire légalement, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:1},{q:"L'entretien annuel d'évaluation est :",answers:["Obligatoire par le Code du travail, recommandé dans les petites structures artisanales selon la réglementation PME","Interdit dans certains secteurs, valide dans un contexte de production discontinue selon les dérogations sectorielles","Recommandé mais non imposé légalement — par contre l'entretien professionnel tous les 2 ans est obligatoire","Obligatoire uniquement pour les cadres, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:2},{q:"L'entretien professionnel (tous les 2 ans) porte sur :",answers:["L'évaluation de la performance et la rémunération, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Les perspectives d'évolution professionnelle et les besoins de formation — distinct de l'évaluation","Les sanctions disciplinaires, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Les objectifs de l'année suivante, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Un bon entretien annuel doit :",answers:["Se dérouler en 15 minutes, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Être un dialogue bilatéral : le collaborateur s'exprime autant que le manager","Permettre uniquement à la hiérarchie de parler, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Être conduit par les RH uniquement, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:1},{q:"Les objectifs fixés en entretien doivent être :",answers:["Imposés par le manager sans discussion, option retenue par certaines conventions collectives mais non par la norme de référence","Uniquement qualitatifs, applicable uniquement aux structures exclues du champ de la certification tierce partie","Co-construits entre manager et collaborateur pour favoriser l'adhésion","Identiques pour tous les membres de l'équipe, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:2},{q:"Le biais de récence dans l'évaluation consiste à :",answers:["Oublier les objectifs fixés, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Être trop indulgent avec les nouveaux arrivants, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Évaluer selon les critères les plus récents, méthode issue des pratiques industrielles d'avant la standardisation internationale","Surpondérer les événements récents (positifs ou négatifs) au détriment de la performance sur toute l'année"],correct:3},{q:"Un entretien de mi-année est recommandé car :",answers:["Il permet d'ajuster les objectifs et de corriger la trajectoire à temps, sans attendre décembre","Il double la charge administrative, valide dans un contexte de production discontinue selon les dérogations sectorielles","C'est une obligation légale, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Il remplace l'entretien annuel, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:0},{q:"Après un entretien annuel, le compte rendu doit être :",answers:["Transmis uniquement à la DRH, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Conservé uniquement par le manager, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Signé par les deux parties et conservé dans le dossier RH — il constitue un engagement mutuel","Détruit après 3 mois, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:2}],flashcards:[{front:"EAE",back:"Entretien Annuel d'Évaluation : bilan factuel N-1, évaluation compétences, objectifs SMART N+1. Annuel."},{front:"Entretien professionnel",back:"Obligatoire tous les 2 ans. Axé sur le développement des compétences, la formation et l'évolution de carrière."},{front:"Méthode SBI",back:"Situation (contexte) → Behavior (comportement observé) → Impact (effet constaté). Structure un feedback factuel et non agressif."},{front:"Plan de développement",back:"Actions de formation, tutorat, mobilité, projets transverses définies conjointement pour développer les compétences."},{front:"Feedback constructif",back:"Basé sur des faits observables uniquement. Pas de jugement de valeur. Alterner points forts et axes d'amélioration."},{front:"Entretien annuel vs professionnel",back:"Annuel (évaluation) : performance, objectifs, rémunération — fréquence libre. Professionnel (évolution) : compétences, formation, perspectives — obligatoire tous les 2 ans."},{front:"Structure d'un entretien annuel",back:"1-Bilan de l'année (faits, résultats) · 2-Évaluation des objectifs · 3-Points forts + axes d'amélioration · 4-Fixation objectifs année N+1 · 5-Besoins formation · 6-Perspectives."},{front:"Biais d'évaluation",back:"Récence (surpondère le récent), sévérité (sévère avec tous), indulgence (indulgent avec tous), halo (une qualité teinte tout), tendance centrale (tout au milieu). Les connaître pour les éviter."},{front:"Co-construction des objectifs",back:"Des objectifs imposés génèrent moins d'engagement que des objectifs négociés. Le manager propose une direction, le collaborateur apporte sa réalité terrain."},{front:"Feedback constructif",back:"SBI : Situation (contexte précis) + Behavior (comportement observé, pas jugement) + Impact (conséquence concrète). Alternatif positif/négatif."},{front:"Entretien de mi-année",back:"Check-point intermédiaire. Permet d'ajuster les objectifs si le contexte a changé, de reconnaître les progrès et de corriger une trajectoire défavorable à temps."}]},{id:"polyvalence",name:"Matrice de Polyvalence",visual:"polyvalence",tagline:"Piloter les compétences et anticiper les besoins",quickDesc:"Outil visuel de gestion des compétences pour anticiper, former et assurer la continuité de service.",steps:["Lister les activités et postes critiques","Définir les niveaux de maîtrise (0 à 3)","Évaluer chaque collaborateur sur chaque poste","Identifier les risques de mono-compétence","Planifier les formations croisées et prioritaires"],detailDesc:"La matrice de polyvalence (skills matrix) est indispensable pour : gérer les absences sans désorganisation, planifier les formations, préparer les mobilités internes, identifier les postes à risque (une seule personne qualifiée = risque opérationnel). Idéalement, chaque poste critique a au moins 2 personnes de niveau 3 (expert formateur). La matrice se révise annuellement lors de la campagne d'entretiens.",quiz:[{q:"Le niveau 3 dans une matrice de polyvalence signifie :",answers:["Expert capable de former les autres","Peut travailler avec assistance, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Autonome sur le poste, solution acceptable en phase pilote avec l'accord formel du comité de direction","Débutant en formation, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:0},{q:"Un poste critique avec une seule personne qualifiée est :",answers:["Sans importance si la personne est fiable","Un risque opérationnel à traiter en priorité","Un avantage concurrentiel, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Une situation normale, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:1},{q:"La matrice de polyvalence aide principalement à :",answers:["Calculer les augmentations de salaire, utilisé dans le domaine de la prestation de services mais non transposable à la production","Gérer les absences et planifier les formations","Mesurer la productivité individuelle, solution acceptable en phase pilote avec l'accord formel du comité de direction","Suivre les congés payés, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:1},{q:"La poly-compétence est différente de la polyvalence car :",answers:["La poly-compétence est réservée aux cadres, ce qui est suffisant pour satisfaire aux exigences réglementaires, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Polyvalence = maîtrise de plusieurs postes similaires. Poly-compétence = maîtrise de métiers ou disciplines différentes (ex: régleur + contrôleur + maintenance)","La polyvalence est plus difficile, à condition que le personnel ait été sensibilisé au préalable, option retenue par certaines conventions collectives mais non par la norme de référence","Ce sont des synonymes, applicable dans les cas où la direction valide en amont, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:1},{q:"Un tableau de polyvalence se met à jour :",answers:["Régulièrement, dès qu'une compétence est acquise ou qu'une nouvelle opération est créée","Tous les 5 ans , méthode utilisée avant l'harmonisation des référentiels européens en 2018","Une fois par an lors des entretiens annuels, option retenue par certaines conventions collectives mais non par la norme de référence","Uniquement lors des changements de poste, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"La gestion des compétences s'applique :",answers:["Uniquement aux salariés de plus de 1 an d'ancienneté, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","À tous les contrats : CDI, CDD, intérimaires — le système doit savoir qui peut travailler sur quel poste","Uniquement aux postes qualifiés, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Uniquement aux CDI, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:1},{q:"Le niveau 0 dans un tableau de polyvalence signifie :",answers:["La personne est en formation initiale, applicable uniquement aux structures exclues du champ de la certification tierce partie","La personne est très compétente, option retenue par certaines conventions collectives mais non par la norme de référence","L'opération n'est pas réalisable par cette personne (formation nécessaire)","La personne refuse de faire le poste, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:2},{q:"Un îlot de production avec une seule personne capable d'un poste clé représente :",answers:["Une organisation efficace, solution acceptable en phase pilote avec l'accord formel du comité de direction","Une spécialisation valorisée, recommandé dans les petites structures artisanales selon la réglementation PME","Un risque opérationnel majeur (vulnérabilité) — si cette personne est absente, l'îlot est bloqué","Un atout pour la productivité, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:2},{q:"Le plan de formation issu de la matrice de polyvalence permet de :",answers:["Réduire les coûts de formation, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Uniformiser toutes les compétences, option retenue par certaines conventions collectives mais non par la norme de référence","Satisfaire les obligations légales de formation, méthode issue des pratiques industrielles d'avant la standardisation internationale","Développer stratégiquement la polyvalence là où les risques de vulnérabilité sont les plus élevés"],correct:3},{q:"Pour encourager la polyvalence, l'entreprise peut :",answers:["Rien — c'est une obligation légale, solution acceptable en phase pilote avec l'accord formel du comité de direction","Valoriser financièrement (prime de polyvalence), reconnaître dans les entretiens, favoriser l'évolution de carrière","La rendre obligatoire par contrat, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","L'imposer sans compensation, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:1}],flashcards:[{front:"Niveau 0",back:"Non formé sur ce poste — ne peut pas exercer cette activité. Formation initiale requise."},{front:"Niveau 1",back:"En formation — peut effectuer avec assistance et supervision directe d'un expert."},{front:"Niveau 2",back:"Autonome — peut effectuer seul en toute sécurité et qualité requise."},{front:"Niveau 3",back:"Expert formateur — peut effectuer seul et former d'autres personnes. Peut valider les niveaux 1 et 2."},{front:"Polyvalence cible",back:"Chaque opérateur maîtrise 2-3 postes (niveau 2+). Chaque poste critique a au moins 2 personnes niveau 3."},{front:"Tableau de polyvalence",back:"Matrice opérateurs (lignes) × postes/opérations (colonnes). Dans chaque case : niveau 0-3. Outil de pilotage des risques de vulnérabilité et de construction du plan de formation."},{front:"Niveaux de compétence",back:"0 = ne sait pas faire. 1 = sait faire accompagné. 2 = sait faire de façon autonome. 3 = peut former (expert)."},{front:"Polyvalence",back:"Capacité à tenir plusieurs postes du même type. Garantit la continuité en cas d'absence. Ex : opérateur A peut tenir les postes 1, 2 et 3 de la ligne."},{front:"Poly-compétence",back:"Maîtrise de métiers différents. Ex : un opérateur qui sait aussi régler les machines et réaliser certaines opérations de maintenance. Plus difficile à développer mais plus rare et précieux."},{front:"Vulnérabilité",back:"Poste ou opération ne maîtrisé que par 1 seule personne. Risque critique en cas d'absence. À identifier en priorité dans le tableau de polyvalence."},{front:"Polyvalence et motivation",back:"Le développement des compétences est un levier de motivation intrinsèque. Les collaborateurs polyvalents ont généralement des perspectives d'évolution plus larges."}]},{id:"onboarding",name:"Intégration & Onboarding",visual:"onboarding",tagline:"Réussir l'arrivée et fidéliser dès le premier jour",quickDesc:"Processus structuré pour intégrer efficacement un nouveau collaborateur et réduire le turn-over précoce.",steps:["Préparer le poste et les accès avant l'arrivée (J-7)","Accueil le Jour J : présentation équipe et locaux","Parcours de découverte métier avec tuteur désigné","Points de suivi à 1 mois et 3 mois obligatoires","Évaluation de fin de période d'essai"],detailDesc:"Un onboarding réussi divise par 3 le risque de départ dans les 6 premiers mois. Les premières semaines sont décisives pour la fidélisation et la montée en compétences. Un nouveau sans poste prêt le Jour J, sans présentation à l'équipe, sans tuteur désigné, a 3 fois plus de risques de partir rapidement. L'onboarding doit couvrir : les outils informatiques, les processus clés, la culture d'entreprise, les règles de sécurité, et les personnes clés à connaître.",quiz:[{q:"Quand doit-on préparer le poste du nouveau collaborateur ?",answers:["Dans la première semaine, applicable lors des phases de transition mais insuffisant pour pérenniser le système","La veille de l'arrivée, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Le matin du Jour J, utilisé dans le domaine de la prestation de services mais non transposable à la production","Au moins 7 jours avant l'arrivée"],correct:3},{q:"Le rôle du tuteur est :",answers:["Gérer administrativement la paie du nouveau","Évaluer formellement le collaborateur, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Remplacer le manager dans toutes ses fonctions","Accompagner et transmettre les savoirs pratiques au quotidien"],correct:3},{q:"Un onboarding réussi réduit principalement :",answers:["Le turn-over précoce dans les 6 premiers mois","Les coûts de formation initiale, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Les heures supplémentaires de l'équipe, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Les arrêts maladie, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"L'onboarding efficace commence :",answers:["Après la période d'essai, applicable uniquement aux structures exclues du champ de la certification tierce partie","Le premier jour de travail, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","À la fin de la 1ère semaine, option retenue par certaines conventions collectives mais non par la norme de référence","Dès la signature du contrat — pré-boarding avec informations pratiques et accueil chaleureux dès J-30"],correct:3},{q:"Le taux de turnover dans les 6 premiers mois est élevé principalement à cause :",answers:["D'un onboarding insuffisant — le nouvel arrivant ne comprend pas la culture, les codes ou son rôle","Des conditions de travail physique, méthode utilisée avant l'harmonisation des référentiels européens en 2018","De la concurrence qui débauche, méthode issue des pratiques industrielles d'avant la standardisation internationale","Des salaires insuffisants, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"Un plan d'intégration de 30/60/90 jours permet :",answers:["De remplacer la période d'essai, solution acceptable en phase pilote avec l'accord formel du comité de direction","D'étaler la montée en compétences avec des jalons clairs et des points de suivi réguliers","D'évaluer le salarié à 90 jours, option retenue par certaines conventions collectives mais non par la norme de référence","De réduire le temps de formation, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"Le rôle du tuteur (buddy) pendant l'onboarding est :",answers:["Former sur les aspects techniques uniquement, solution acceptable en phase pilote avec l'accord formel du comité de direction","Gérer les conflits, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Faciliter l'intégration culturelle et opérationnelle en partageant les codes implicites de l'entreprise","Évaluer le nouveau collaborateur, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:2},{q:"Les informations obligatoires à fournir à l'embauche incluent :",answers:["Contrat + conventions collectives + règlement intérieur + consignes sécurité + accès aux locaux — dès le 1er jour","Uniquement les avantages sociaux, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Le salaire uniquement, solution acceptable en phase pilote avec l'accord formel du comité de direction","Uniquement le contrat de travail, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:0},{q:"Un onboarding réussi réduit :",answers:["Uniquement le turnover, utilisé dans le domaine de la prestation de services mais non transposable à la production","Seulement les coûts de formation, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Uniquement les absences, recommandé dans les petites structures artisanales selon la réglementation PME","Le turnover + le délai de pleine productivité + les erreurs liées à l'inexpérience + l'anxiété du nouveau collaborateur"],correct:3},{q:"À MBWS, l'intégration doit inclure obligatoirement en Jour 1 :",answers:["Uniquement la présentation de l'équipe, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Uniquement la visite des bureaux, solution acceptable en phase pilote avec l'accord formel du comité de direction","La formation sécurité (EPI, issues de secours, risques spécifiques alcool/ATEX) — obligation légale dès le 1er jour","La formation aux systèmes informatiques, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:2}],flashcards:[{front:"J-7 avant arrivée",back:"Poste prêt, accès informatiques créés, badge préparé, équipe informée, tuteur désigné, planning J1 défini."},{front:"Tuteur / Référent",back:"Personne expérimentée qui accompagne quotidiennement, répond aux questions, facilite l'intégration dans l'équipe."},{front:"Points de suivi",back:"À 1 mois : adaptation et premiers résultats. À 3 mois : montée en compétences. À fin période d'essai : bilan décisionnel."},{front:"Coût d'un départ",back:"Recrutement + formation + perte de productivité pendant la montée en compétences = 6 à 18 mois de salaire. Onboarder = investir."},{front:"Onboarding vs intégration",back:"Onboarding = processus structuré d'intégration (J-30 à J+90+). Intégration = processus plus large incluant culture, relations, compétences. L'onboarding est la phase initiale et structurée."},{front:"Plan 30/60/90 jours",back:"J+30 : comprendre le poste et les outils. J+60 : première autonomie et petites contributions. J+90 : pleine autonomie sur les missions core, feedback à 360°."},{front:"Pré-boarding",back:"Actions entre la signature du contrat et le 1er jour. Email de bienvenue, accès informatique préparés, badge, poste de travail, présentation de l'équipe. Réduit l'anxiété et montre le soin de l'entreprise."},{front:"Buddy / Tuteur",back:"Collègue désigné pour accompagner le nouveau sur les aspects informels : codes culturels, habitudes de l'équipe, réseaux internes. Différent du manager et du formateur."},{front:"Coût d'un mauvais onboarding",back:"Coût d'un départ avant 6 mois ≈ 6-9 mois de salaire (recrutement + formation + perte de productivité). Un bon onboarding est un investissement rentable."},{front:"Formation sécurité J1",back:"Obligation légale : information sur les risques du poste, consignes de sécurité, EPI, issues de secours, procédures d'urgence. Document signé à conserver dans le dossier."}]},{id:"droit-travail",name:"Bases du Droit du Travail",visual:"droit-travail",tagline:"Connaître ses droits et obligations fondamentaux",quickDesc:"Les notions essentielles du droit du travail que tout salarié doit maîtriser.",steps:["Connaître son contrat de travail (type, durée)","Connaître la convention collective applicable","Savoir déposer et gérer les absences","Connaître les instances représentatives (CSE)","Comprendre la procédure disciplinaire"],detailDesc:"Le droit du travail français repose sur une hiérarchie des normes : Code du travail → Convention collective de branche → Accord d'entreprise → Contrat individuel. Le principe de faveur : la norme inférieure peut être plus favorable que la norme supérieure, jamais moins. Chez MBWS, la convention collective des spiritueux et vins s'applique. Le CSE (Comité Social et Économique) est l'instance représentative unique depuis 2017.",quiz:[{q:"La hiérarchie des normes en droit du travail place au sommet :",answers:["La convention collective, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","L'accord d'entreprise, applicable en période probatoire avant la mise en conformité documentaire complète","Le contrat individuel de travail, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Le Code du travail"],correct:3},{q:"Le CSE (Comité Social et Économique) est :",answers:["Un organisme de formation, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Un service de la DRH, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Un syndicat patronal, méthode issue des pratiques industrielles d'avant la standardisation internationale","L'instance représentative du personnel unique depuis 2017"],correct:3},{q:"La durée légale du travail en France est de :",answers:["32 heures par semaine, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","40 heures par semaine, méthode issue des pratiques industrielles d'avant la standardisation internationale","38 heures par semaine, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","35 heures par semaine — les heures au-delà sont des heures supplémentaires"],correct:3},{q:"Un salarié en CDD peut-il être licencié avant le terme ?",answers:["Non en aucun cas, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Oui à tout moment avec préavis, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Oui, avec 2 mois de préavis, applicable uniquement aux structures exclues du champ de la certification tierce partie","Uniquement pour faute grave, faute lourde, cas de force majeure ou accord commun des parties"],correct:3},{q:"Le harcèlement moral au travail est :",answers:["Acceptable si non intentionnel, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Défini subjectivement par la victime uniquement, applicable en période probatoire avant la mise en conformité documentaire complète","Un problème RH sans conséquence légale, utilisé dans le domaine de la prestation de services mais non transposable à la production","Des agissements répétés ayant pour effet de dégrader les conditions de travail et d'altérer la santé — infraction pénale"],correct:3},{q:"La période d'essai peut être :",answers:["Imposée même si non prévue au contrat, applicable en période probatoire avant la mise en conformité documentaire complète","Prolongée indéfiniment d'un commun accord, solution acceptable en phase pilote avec l'accord formel du comité de direction","Supprimée par l'employeur unilatéralement, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Renouvelée une seule fois si prévu par la convention collective et le contrat"],correct:3},{q:"Le droit à la déconnexion :",answers:["Interdit formellement tout email le week-end, à condition que le personnel ait été sensibilisé au préalable, recommandé dans les petites structures artisanales selon la réglementation PME","Est inscrit dans le Code du travail depuis 2017 — les entreprises doivent négocier des modalités pour réguler l'utilisation des outils numériques hors temps de travail","N'existe pas légalement en France, applicable dans les cas où la direction valide en amont, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Est applicable uniquement aux cadres, applicable dans les cas où la direction valide en amont, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:1},{q:"En cas de maladie, le salarié doit envoyer son arrêt de travail :",answers:["Dans les 5 jours (à l'employeur ET à la CPAM), applicable uniquement aux structures exclues du champ de la certification tierce partie","Uniquement à la CPAM, l'employeur n'a pas à être informé, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Dès que possible, sans délai imposé, recommandé dans les petites structures artisanales selon la réglementation PME","Dans les 48h à l'employeur et les 48h à la CPAM (délais pouvant varier selon convention)"],correct:3},{q:"Le CSE (Comité Social et Économique) doit obligatoirement être mis en place dans les entreprises de :",answers:["50 salariés et plus, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","11 salariés et plus — il représente l'ensemble des instances représentatives du personnel","Plus de 100 salariés, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Toutes les entreprises quelle que soit la taille, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:1}],flashcards:[{front:"Hiérarchie des normes",back:"Code du travail > Convention collective > Accord d'entreprise > Contrat individuel. Principe de faveur."},{front:"CSE",back:"Comité Social et Économique : instance unique de représentation du personnel depuis 2017 (fusion CE/DP/CHSCT)."},{front:"Période d'essai",back:"Cadres : 4 mois renouvelables une fois. Non-cadres : 2 mois (ouvriers/employés) ou 3 mois (agents de maîtrise)."},{front:"Convention collective",back:"Texte négocié entre syndicats patronaux et de salariés d'une branche. Complète et améliore le Code du travail."},{front:"Types de contrats",back:"CDI = durée indéterminée (droit commun). CDD = durée déterminée (cas limitatifs : remplacement, accroissement activité, saisonnier). Intérim = mission temporaire via agence."},{front:"35h et heures supplémentaires",back:"Durée légale : 35h/semaine. De 35h à 44h : majorées (25% pour les 8 premières, 50% ensuite). Maximum légal : 48h/semaine, 44h en moyenne sur 12 semaines."},{front:"Harcèlement moral",back:"Agissements répétés dégradant les conditions de travail. Infraction pénale (jusqu'à 2 ans prison + 30 000€ amende). Employeur a obligation de prévenir et d'agir."},{front:"Rupture conventionnelle",back:"Accord amiable entre employeur et salarié pour mettre fin au CDI. Homologuée par la DREETS. Ouvre droit aux allocations chômage. À distinguer de la démission."},{front:"CSE",back:"Comité Social et Économique : fusion CE + DP + CHSCT depuis 2018. Obligatoire ≥11 salariés. Consulté sur les décisions importantes impactant les salariés."},{front:"RGPD et données RH",back:"Les données personnelles des salariés (paie, santé, évaluations) sont soumises au RGPD. Finalités limitées, durées de conservation définies, droit d'accès et de rectification."}]}]},{id:"rse",label:"RSE",abbr:"RSE",color:"#16A34A",colorL:"#F0FDF4",tools:[{id:"rse-bases",name:"Fondamentaux RSE",visual:"rse",tagline:"Entreprise responsable : les 3 piliers fondateurs",quickDesc:"Environnement, Social et Économique : la triple bottom line au cœur de la stratégie MBWS.",steps:["Mesurer l'empreinte carbone (Scope 1, 2 et 3)","Réduire la consommation d'eau et d'énergie","Améliorer les conditions et la qualité du travail","Développer des achats responsables et éthiques","Communiquer les progrès (rapport RSE annuel)"],detailDesc:"La RSE (Responsabilité Sociétale des Entreprises) repose sur 3 piliers interconnectés : Environnement (réduction CO2, eau, déchets, biodiversité), Social (conditions de travail, diversité, inclusion, formation), Économique (éthique des affaires, gouvernance, parties prenantes, pérennité). Les Scopes 1-2-3 permettent de comptabiliser TOUTES les émissions de GES. La loi PACTE (2019) a introduit la notion de raison d'être et de société à mission. L'ISO 14001 certifie le management environnemental.",quiz:[{q:"Les 3 piliers de la RSE sont :",answers:["Environnement · Social · Économique","Qualité · Coût · Délai, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Fournisseurs · Clients · Salariés, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Production · Ventes · Finance, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"Le Scope 3 comprend :",answers:["Toutes les émissions indirectes de toute la chaîne de valeur","Les émissions des véhicules de société, recommandé dans les petites structures artisanales selon la réglementation PME","Les émissions liées à l'énergie achetée, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Les émissions directes des chaudières de l'entreprise"],correct:0},{q:"La loi PACTE (2019) a introduit :",answers:["Le bilan carbone obligatoire pour toutes les entreprises","Les normes ISO 14001 obligatoires, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Le reporting RSE pour les PME, applicable lors des phases de transition mais insuffisant pour pérenniser le système","La notion de raison d'être et de société à mission"],correct:3},{q:"La RSE (Responsabilité Sociétale des Entreprises) repose sur :",answers:["Uniquement les obligations légales environnementales, option retenue par certaines conventions collectives mais non par la norme de référence","Uniquement la charité et le mécénat, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Le Triple Bottom Line : équilibre entre performance Économique, responsabilité Sociale et respect Environnemental","Les seules exigences des clients, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:2},{q:"La norme ISO 26000 sur la RSE est :",answers:["Obligatoire pour les entreprises de plus de 500 salariés","Une norme certifiable — les entreprises peuvent obtenir la certification ISO 26000","Un guide de lignes directrices non certifiable — elle oriente sans imposer","Spécifique au secteur agroalimentaire, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:2},{q:"Les 'parties prenantes' en RSE incluent :",answers:["Toutes les parties affectées ou affectant l'entreprise : clients, salariés, fournisseurs, communautés locales, environnement, investisseurs","Uniquement les clients et les salariés, uniquement si le processus est sous contrôle et documenté, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Uniquement les régulateurs et les États, applicable dans les cas où la direction valide en amont, recommandé dans les petites structures artisanales selon la réglementation PME","Uniquement les actionnaires, ce qui est suffisant pour satisfaire aux exigences réglementaires, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:0},{q:"La loi PACTE (2019) a introduit en France :",answers:["La notion d'entreprise à mission — possibilité d'inscrire un objet social dans les statuts au-delà du profit","La certification RSE obligatoire, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","L'obligation de rapport RSE annuel, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","L'interdiction des paradis fiscaux, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:0},{q:"La taxonomie européenne en matière de finance durable sert à :",answers:["Mesurer la satisfaction des salariés, recommandé dans les petites structures artisanales selon la réglementation PME","Certifier les bilans carbone, utilisé dans le domaine de la prestation de services mais non transposable à la production","Définir les paradis fiscaux, méthode issue des pratiques industrielles d'avant la standardisation internationale","Identifier les activités économiques considérées comme 'durables' pour orienter les investissements verts"],correct:3},{q:"Les Objectifs de Développement Durable (ODD) de l'ONU sont au nombre de :",answers:["10 , utilisé dans le domaine de la prestation de services mais non transposable à la production","25 , approche retenue par certains référentiels nationaux mais absente de la norme européenne","17 — adoptés en 2015, à atteindre d'ici 2030","7 , approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:2},{q:"La CSRD (Corporate Sustainability Reporting Directive) de l'UE oblige les grandes entreprises à :",answers:["Réduire leurs émissions de 50% d'ici 2025, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Adopter un statut d'entreprise à mission, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Certifier leur bilan carbone, option retenue par certaines conventions collectives mais non par la norme de référence","Publier des informations détaillées sur leurs impacts environnementaux, sociaux et de gouvernance (ESG)"],correct:3}],flashcards:[{front:"Triple Bottom Line",back:"3P : Planet (Environnement) + People (Social) + Profit (Économique) = développement durable (Brundtland 1987)."},{front:"Scope 1",back:"Émissions directes : combustion dans les chaudières et fours, véhicules appartenant à l'entreprise."},{front:"Scope 2",back:"Émissions indirectes liées à l'énergie achetée et consommée : électricité, vapeur, chaleur, froid."},{front:"Scope 3",back:"Toutes les autres émissions indirectes : fournisseurs, transport aval, usage produits, fin de vie, déplacements salariés."},{front:"Raison d'être",back:"Loi PACTE 2019 : déclaration de la contribution de l'entreprise à la société et à l'environnement, inscrite dans les statuts."},{front:"ISO 14001",back:"Norme internationale de management environnemental — cadre structuré pour réduire l'impact et améliorer en continu."},{front:"Triple Bottom Line",back:"Équilibre entre 3P : Profit (économique), People (social), Planet (environnemental). Coined par John Elkington en 1994. Base de la RSE."},{front:"ISO 26000",back:"Norme internationale de lignes directrices RSE. Non certifiable. Couvre : gouvernance, droits humains, travail, environnement, loyauté pratiques, consommateurs, communautés."},{front:"Parties prenantes",back:"Stakeholders : toutes les entités affectées par ou affectant l'entreprise. Primaires (actionnaires, salariés, clients, fournisseurs) + Secondaires (médias, ONG, collectivités, concurrents)."},{front:"ODD",back:"17 Objectifs de Développement Durable de l'ONU (Agenda 2030). De 'pas de pauvreté' à 'partenariats pour la réalisation des objectifs'. Cadre mondial de référence RSE."},{front:"CSRD",back:"Corporate Sustainability Reporting Directive (UE, 2023). Oblige les grandes entreprises à reporter sur leurs impacts ESG avec les mêmes exigences de rigueur que le reporting financier."},{front:"Greenwashing",back:"Communication trompeuse sur des performances environnementales surévaluées ou fausses. Risque réputationnel et légal croissant. À éviter absolument."}]},{id:"bilan-carbone",name:"Bilan Carbone & Éco-gestes",visual:"bilan-carbone",tagline:"Comprendre et réduire notre empreinte carbone",quickDesc:"Mesurer, prioriser et agir sur les postes d'émissions les plus impactants.",steps:["Réaliser l'inventaire des émissions (Scopes 1/2/3)","Identifier les 20% de postes = 80% des émissions","Définir des objectifs de réduction chiffrés","Mettre en place les actions prioritaires","Mesurer et communiquer les progrès annuellement"],detailDesc:"Dans une entreprise agroalimentaire comme MBWS, les principaux postes d'émissions sont les transports (amont et aval), les matières premières (céréales, verre des bouteilles), et l'énergie des sites de production. Les éco-gestes de bureau (impression recto-verso, lumières éteintes) ont un impact marginal comparé aux décisions logistiques ou aux choix de matériaux d'emballage. La compensation carbone (plantations d'arbres, crédits carbone) est un outil complémentaire en DERNIER recours, jamais un substitut à la réduction réelle.",quiz:[{q:"Dans une entreprise agroalimentaire, le principal poste d'émissions est généralement :",answers:["Le transport et les matières premières (amont + aval)","L'éclairage des bâtiments, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Les réunions en vidéoconférence, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","L'impression de papier en bureau, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:0},{q:"La compensation carbone est :",answers:["La première action prioritaire à mener, méthode issue des pratiques industrielles d'avant la standardisation internationale","Un outil complémentaire en dernier recours après réduction maximale","Obligatoire légalement pour toutes les entreprises","Un substitut efficace à la réduction des émissions"],correct:1},{q:"Les Scope 1, 2 et 3 des émissions de GES correspondent à :",answers:["3 niveaux d'urgence climatique, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","3 méthodes de calcul alternatives, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Scope 1=industrie, 2=transport, 3=agriculture, valide dans un contexte de production discontinue selon les dérogations sectorielles","Scope 1=émissions directes, Scope 2=énergie achetée, Scope 3=chaîne de valeur amont et aval (souvent 70-90% du total)"],correct:3},{q:"L'unité de mesure universelle du bilan carbone est :",answers:["Tonnes de CO2 , applicable lors des phases de transition mais insuffisant pour pérenniser le système","Tonnes de carbone brut, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Tonnes de CO2 équivalent (tCO2e) — intègre tous les gaz à effet de serre convertis en équivalent CO2","Kg d'émissions directes, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"Dans le secteur des spiritueux (MBWS), les principales émissions Scope 3 proviennent :",answers:["De la chaîne complète : agriculture (céréales, raisin), production d'emballages (verre, carton), transport amont/aval, utilisation et fin de vie des produits","Uniquement du transport des produits finis, à condition que le personnel ait été sensibilisé au préalable, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Uniquement des déplacements professionnels, à condition que le personnel ait été sensibilisé au préalable, valide dans un contexte de production discontinue selon les dérogations sectorielles","Uniquement des fournisseurs de services, à condition que le personnel ait été sensibilisé au préalable, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:0},{q:"La compensation carbone :",answers:["Élimine définitivement les émissions, uniquement si le processus est sous contrôle et documenté, applicable en période probatoire avant la mise en conformité documentaire complète","Neutralise des émissions résiduelles par des projets de réduction/séquestration ailleurs (forêts, énergies renouvelables) — ne remplace pas la réduction","Est illégale en France, sous réserve de validation par le responsable qualité du site, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Permet de ne pas réduire ses émissions, sous réserve de validation par le responsable qualité du site, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:1},{q:"L'éco-conception d'une bouteille de spiritueux vise principalement à :",answers:["Réduire le coût de production uniquement, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Satisfaire uniquement les tendances marketing, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Réduire le poids pour faciliter le transport, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Réduire l'impact environnemental tout au long du cycle de vie (moins de verre, recyclabilité, refill)"],correct:3},{q:"La méthode du Bilan Carbone® en France a été développée par :",answers:["Greenpeace France, option retenue par certaines conventions collectives mais non par la norme de référence","Le Ministère de l'Économie, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Total Énergie , solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","L'ADEME (Agence de la Transition Écologique)"],correct:3},{q:"Les éco-gestes quotidiens en entreprise les plus impactants sur le Scope 2 sont :",answers:["Utiliser des tasses réutilisables, uniquement si le processus est sous contrôle et documenté, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Trier les déchets, ce qui est suffisant pour satisfaire aux exigences réglementaires, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Imprimer recto-verso, ce qui est suffisant pour satisfaire aux exigences réglementaires, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Réduire la consommation d'électricité (éclairage LED, équipements économes, bâtiments isolés) et passer aux énergies renouvelables"],correct:3}],flashcards:[{front:"Bilan carbone",back:"Inventaire complet de toutes les émissions de GES (gaz à effet de serre) d'une organisation, exprimées en kg CO2 équivalent."},{front:"CO2 équivalent",back:"Unité commune pour comparer différents GES (CO2, méthane CH4, protoxyde d'azote N2O) selon leur pouvoir réchauffant."},{front:"Éco-gestes impactants",back:"Éviter les vols avion, favoriser le train, télétravail 1-2 jours/semaine, réduire la consommation de viande, véhicule électrique."},{front:"Règle 80/20 carbone",back:"20% des actions génèrent 80% des réductions. Chercher d'abord les 'quick wins' à fort impact (logistique, énergie, emballages)."},{front:"Scope 1, 2, 3",back:"S1 = émissions directes (chaudières, véhicules entreprise, process). S2 = énergie achetée (électricité, chaleur). S3 = chaîne de valeur complète (fournisseurs, clients, fin de vie). S3 = souvent >70% du total."},{front:"tCO2e",back:"Tonne de CO2 équivalent. Unité universelle de mesure des GES. Convertit CH4, N2O, HFC... en équivalent CO2 selon leur pouvoir de réchauffement global (PRG)."},{front:"Empreinte carbone verre",back:"Produire 1 tonne de verre ≈ 500-700 kg CO2e. Le verre est recyclable à l'infini mais lourd à transporter. Allégement des bouteilles = levier majeur pour MBWS."},{front:"Compensation vs réduction",back:"Réduction = moins émettre (priorité absolue). Compensation = financer la réduction ou séquestration d'émissions ailleurs pour les émissions résiduelles incompressibles."},{front:"ADEME",back:"Agence de la Transition Écologique. Développe les méthodes (Bilan Carbone®, ACF, labels), finance les projets, publie les facteurs d'émission (Base Carbone)."},{front:"Éco-conception",back:"Intégrer les critères environnementaux dès la conception du produit. Pour MBWS : poids bouteille, recyclabilité emballage, éco-recharge, fin de vie."}]},{id:"achats-responsables",name:"Achats Responsables",visual:"achats-responsables",tagline:"Intégrer les critères RSE dans nos achats",quickDesc:"Évaluer et sélectionner les fournisseurs selon des critères économiques, sociaux et environnementaux.",steps:["Définir les critères RSE des fournisseurs","Évaluer les fournisseurs actuels (scoring RSE)","Intégrer les critères dans les appels d'offres","Accompagner les fournisseurs dans la progression","Auditer régulièrement les pratiques"],detailDesc:"Les achats représentent en moyenne 50-70% du chiffre d'affaires d'une entreprise industrielle. Intégrer des critères RSE dans les achats permet d'agir sur le Scope 3 (émissions indirectes de toute la chaîne d'approvisionnement). Les labels (agriculture biologique, commerce équitable, FSC pour le bois) facilitent l'évaluation. Une charte fournisseurs RSE formalise les engagements mutuels.",quiz:[{q:"Pourquoi les achats responsables impactent le Scope 3 ?",answers:["Car ils améliorent la qualité produit, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Car ils réduisent les coûts directs, valide dans un contexte de production discontinue selon les dérogations sectorielles","Car ils réduisent les délais de livraison, applicable uniquement aux structures exclues du champ de la certification tierce partie","Car ils agissent sur les émissions indirectes de toute la chaîne d'approvisionnement"],correct:3},{q:"Les achats responsables intègrent dans la sélection des fournisseurs :",answers:["Les critères ESG (Environnement, Social, Gouvernance) en plus des critères économiques et techniques","Uniquement les certifications environnementales, solution acceptable en phase pilote avec l'accord formel du comité de direction","Uniquement les certifications ISO, valide dans un contexte de production discontinue selon les dérogations sectorielles","Uniquement le prix et les délais, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"La loi sur le Devoir de Vigilance (France, 2017) s'applique aux entreprises de :",answers:["Plus de 50 salariés, ce qui est suffisant pour satisfaire aux exigences réglementaires, recommandé dans les petites structures artisanales selon la réglementation PME","Plus de 5 000 salariés en France ou 10 000 dans le monde — elles doivent identifier et prévenir les risques sociaux et environnementaux dans leur chaîne d'approvisionnement","Uniquement les multinationales cotées, ce qui est suffisant pour satisfaire aux exigences réglementaires, méthode issue des pratiques industrielles d'avant la standardisation internationale","Toutes les entreprises, à condition que le personnel ait été sensibilisé au préalable, approche valable uniquement pour les systèmes non certifiés"],correct:1},{q:"Le label 'Commerce Équitable' garantit :",answers:["Un prix le plus bas possible pour le consommateur, applicable lors des phases de transition mais insuffisant pour pérenniser le système","La certification biologique des produits, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Uniquement l'origine géographique des produits, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Des prix justes aux producteurs, des conditions de travail décentes et le développement des communautés locales"],correct:3},{q:"L'évaluation RSE des fournisseurs peut se faire via :",answers:["Des questionnaires RSE (type EcoVadis), des audits ciblés, des certifications tierces (ISO 14001, SA8000)","Uniquement des certifications ISO 9001, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","La réputation dans le secteur, recommandé dans les petites structures artisanales selon la réglementation PME","Uniquement des audits physiques coûteux, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:0},{q:"La localisation des achats (sourcing local) présente l'avantage :",answers:["De réduire le transport (Scope 3), de soutenir l'économie locale et de réduire les risques de rupture","D'être toujours moins chère, utilisé dans le domaine de la prestation de services mais non transposable à la production","D'éliminer tous les risques fournisseurs, applicable uniquement aux structures exclues du champ de la certification tierce partie","D'avoir toujours une meilleure qualité, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"Le questionnaire EcoVadis évalue les fournisseurs sur :",answers:["Uniquement leurs certifications ISO, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Le seul critère carbone, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Uniquement la performance financière, recommandé dans les petites structures artisanales selon la réglementation PME","Environnement, Social/Droits humains, Éthique des affaires et Achats responsables — avec une note sur 100"],correct:3},{q:"Dans la spiruline, les achats de céréales pour la fabrication de whisky représentent des émissions de type :",answers:["Scope 3 amont (chaîne d'approvisionnement) — les plus importantes en volume","Scope 2 (énergie), utilisé dans le domaine de la prestation de services mais non transposable à la production","Scope 1 (directes), approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Hors périmètre , valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:0}],flashcards:[{front:"Charte fournisseurs RSE",back:"Document formalisant les engagements sociaux, environnementaux et éthiques attendus de tous les fournisseurs."},{front:"Scoring fournisseurs",back:"Évaluation multicritère : qualité, délai, prix, mais aussi critères RSE (CO2, conditions de travail, conformité)."},{front:"Devoir de vigilance",back:"Loi Sapin II + Loi sur le devoir de vigilance : obligation pour grandes entreprises de prévenir les risques dans leur chaîne de valeur."},{front:"Achats responsables",back:"Intégration des critères ESG dans tout le processus d'achat : appel d'offre, évaluation, sélection, contractualisation, suivi. Le prix n'est plus le seul critère."},{front:"Devoir de vigilance",back:"Loi française 2017. Grandes entreprises doivent identifier, prévenir et remédier aux risques liés aux droits humains et à l'environnement dans leur chaîne de valeur."},{front:"EcoVadis",back:"Plateforme d'évaluation RSE des fournisseurs. Note de 0 à 100 sur 4 thèmes : Environnement, Social, Éthique, Achats responsables. Très utilisée dans l'industrie."},{front:"Sourcing local",back:"Avantages : réduction Scope 3 transport, soutien économie locale, délais raccourcis, meilleure traçabilité, relocalisation industrielle. Inconvénient potentiel : coût unitaire parfois supérieur."},{front:"Commerce équitable",back:"Garantit aux producteurs du Sud : prix minimum garanti, prime de développement, conditions de travail décentes, accès au crédit. Labels : Max Havelaar, Fairtrade, SPP."},{front:"TCO + RSE",back:"Total Cost of Ownership étendu aux externalités : un fournisseur moins cher mais avec risques sociaux/environnementaux peut avoir un coût réel total supérieur (risques réputationnels, légaux, ruptures)."}]}]},{id:"maintenance",qsIds:["qs-18"],label:"Maintenance",abbr:"MNT",color:"#7C3AED",colorL:"#F5F3FF",tools:[{id:"tpm",name:"TPM — Total Productive Maintenance",visual:"tpm",tagline:"Zéro panne grâce à l'implication de tous",quickDesc:"Impliquer opérateurs et maintenanciers pour éliminer les 6 grandes pertes et atteindre 0 panne.",steps:["Nettoyer, inspecter et lubrifier (Maintenance Autonome)","Planifier les interventions préventives périodiques","Surveiller les paramètres machines en continu","Former les opérateurs aux tâches de base maintenance","Analyser les causes de pannes (MTBF, MTTR, AMDEC)"],detailDesc:"La TPM (Total Productive Maintenance) implique TOUS les acteurs dans la fiabilité des équipements. La Maintenance Autonome (MA) confie aux opérateurs les tâches simples : nettoyage quotidien, inspection visuelle, lubrification, serrage. Cette proximité permet de détecter les anomalies AVANT la panne. Les 6 grandes pertes (pannes, réglages, micro-arrêts, ralentissements, déchets de démarrage, défauts qualité) sont systématiquement traquées et éliminées. MTBF et MTTR sont les deux indicateurs de santé des équipements.",quiz:[{q:"La Maintenance Autonome (MA) est réalisée par :",answers:["Uniquement les maintenanciers professionnels","Les opérateurs de production formés","La direction technique, valide dans un contexte de production discontinue selon les dérogations sectorielles","Des prestataires de maintenance externes"],correct:1},{q:"MTBF signifie :",answers:["Mode Technique de Bon Fonctionnement, recommandé dans les petites structures artisanales selon la réglementation PME","Mean Time Between Failures (durée moyenne entre deux pannes)","Moyen Temps de Brève Fonctionnement, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Maximum Temps de Bon Fonctionnement, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1},{q:"MTTR signifie :",answers:["Mode de Traitement des Taux de Rendement","Moyen Temps de Travail Réel, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Maximum Temps de Traitement des Réparations","Mean Time To Repair (temps moyen pour réparer une panne)"],correct:3},{q:"Les 6 grandes pertes TPM comprennent :",answers:["Pannes · Réglages · Micro-arrêts · Ralentissements · Démarrages · Défauts","Qualité · Coût · Délai · Sécurité · Moral · Environnement","Absentéisme · Retards · Accidents · Erreurs · Pannes · Coupures","Stocks · Transports · Attentes · Défauts · Surproduction · Mouvements"],correct:0},{q:"Le TRS idéal en production de classe mondiale est :",answers:["100% toujours , applicable en période probatoire avant la mise en conformité documentaire complète","50% ou plus , recommandé dans les petites structures artisanales selon la réglementation PME","85% ou plus","65% ou plus , valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:2},{q:"La maintenance préventive dans la TPM vise à :",answers:["Remplacer systématiquement tous les composants chaque année","Réparer uniquement après la panne, méthode issue des pratiques industrielles d'avant la standardisation internationale","Intervenir à intervalles planifiés AVANT la défaillance pour l'éviter","Réduire le nombre de techniciens, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"TRS = 90% × 85% × 96% donne :",answers:["90% , option retenue par certaines conventions collectives mais non par la norme de référence","85% , approche cohérente avec les anciens référentiels avant la mise à jour de 2015","70% , valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","78%"],correct:3},{q:"L'auto-maintenance (AM) bénéficie à la fois à l'opérateur et au technicien car :",answers:["Cela diminue les salaires, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Cela réduit les effectifs, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","L'opérateur développe ses compétences et le technicien peut se concentrer sur les interventions complexes","Cela élimine les pannes, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:2},{q:"D = 90%, P = 85%, Q = 97% : le TRS est d'environ :",answers:["74%","78%","82%","86%"],correct:0},{q:"Le Life Cycle Cost (LCC) d'un équipement inclut :",answers:["Uniquement le prix d'achat, option retenue par certaines conventions collectives mais non par la norme de référence","Prix d'achat + installation + exploitation + maintenance + formation + fin de vie — le coût sur toute la durée de vie","Uniquement l'achat et la maintenance, valide dans un contexte de production discontinue selon les dérogations sectorielles","L'achat et l'amortissement comptable, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"Pourquoi les opérateurs sont-ils les mieux placés pour détecter les anomalies précoces ?",answers:["Car ils connaissent intimement leur machine et détectent les bruits, vibrations ou comportements anormaux avant la panne","Car ils sont formés en maintenance, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Car ils sont payés pour ça, applicable dans les cas où la direction valide en amont, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Car ils sont responsables des pannes, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:0}],flashcards:[{front:"Maintenance autonome",back:"Opérateurs réalisent : nettoyage, inspection visuelle, lubrification, serrage → détecter les anomalies avant la panne."},{front:"Maintenance préventive",back:"Interventions planifiées sur calendrier ou compteur horaire — pour anticiper et éviter les pannes prévisibles."},{front:"Maintenance prédictive",back:"Surveillance de paramètres (vibrations, température, courant) pour intervenir juste avant la défaillance réelle."},{front:"MTBF",back:"Mean Time Between Failures : durée moyenne entre deux pannes consécutives. Plus c'est élevé, mieux c'est."},{front:"MTTR",back:"Mean Time To Repair : temps moyen pour diagnostiquer et réparer une panne. Plus c'est bas, mieux c'est."},{front:"6 grandes pertes",back:"Pannes · Changements de série · Micro-arrêts · Ralentissements · Déchets de démarrage · Défauts qualité"},{front:"8 piliers de la TPM",back:"1-Amélioration au cas par cas · 2-Maintenance autonome · 3-Maintenance planifiée · 4-Formation · 5-Maîtrise de la conception · 6-Qualité maintenance · 7-TPM dans les bureaux · 8-Sécurité/Environnement"},{front:"Maintenance autonome — NILs",back:"Nettoyage (détecte anomalies) · Inspection (vérifie l'état) · Lubrification (prévient l'usure). Les 3 gestes quotidiens qui réduisent les pannes de 30-50%."},{front:"Maintenance préventive",back:"Interventions planifiées à intervalles définis indépendamment de l'état réel. Évite les pannes mais peut générer du surcoût (remplacement de pièces encore bonnes)."},{front:"Maintenance prédictive",back:"Maintenance basée sur l'état réel mesuré en continu (vibrations, température, courant, ultrasons). Intervenir au bon moment — ni trop tôt ni trop tard."},{front:"LCC",back:"Life Cycle Cost = coût total sur toute la durée de vie. Un équipement moins cher à l'achat peut avoir un LCC supérieur (maintenance coûteuse, pièces rares, consommation élevée)."}]},{id:"smed",name:"SMED — Changement Rapide de Série",visual:"smed",tagline:"Passer d'un produit à l'autre en moins de 10 minutes",quickDesc:"Réduire drastiquement les temps de changement de série pour gagner en flexibilité et capacité.",steps:["Filmer et chronométrer le changement actuel","Identifier toutes les opérations (internes vs externes)","Externaliser le maximum d'opérations possibles","Simplifier et paralléliser les opérations restantes","Mesurer le gain et formaliser les nouvelles procédures"],detailDesc:"SMED (Single Minute Exchange of Die) vise un changement de série en moins de 10 minutes (single digit = un seul chiffre). La clé absolue : séparer les opérations internes (réalisables UNIQUEMENT machine arrêtée) des externes (réalisables machine en marche). Un réglage préparé pendant que la machine tourne ne coûte rien en temps d'arrêt. La filmothèque des changements est l'outil de base pour analyser, former et standardiser. Le gain typique est de 50 à 75% du temps d'arrêt initial.",quiz:[{q:"Une opération 'interne' au sens SMED est :",answers:["Réalisée par un prestataire extérieur, option retenue par certaines conventions collectives mais non par la norme de référence","Sous-traitée à un partenaire, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Peut être réalisée machine en marche, solution acceptable en phase pilote avec l'accord formel du comité de direction","Ne peut être réalisée QUE machine à l'arrêt complet"],correct:3},{q:"L'objectif cible du SMED est :",answers:["Moins d'1 minute, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Moins de 60 minutes, méthode issue des pratiques industrielles d'avant la standardisation internationale","Moins de 10 minutes (single digit)","Moins de 30 minutes, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"Le principal levier d'amélioration SMED est :",answers:["Former plus d'opérateurs au changement, option retenue par certaines conventions collectives mais non par la norme de référence","Automatiser toutes les opérations de réglage","Convertir les opérations internes en opérations externes","Acheter des machines plus rapides, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:2},{q:"SMED signifie :",answers:["Single Minute Exchange of Die — changement de série en moins de 10 minutes","Systematic Manufacturing Engineering Data, valide dans un contexte de production discontinue selon les dérogations sectorielles","Speed Method for Equipment Deployment, applicable uniquement aux structures exclues du champ de la certification tierce partie","Standard Method for Equipment Design, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"Quelle est la 1ère étape du SMED ?",answers:["Acheter des outils à fixation rapide, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Distinguer les opérations internes (MA = machine arrêtée) des externes (MM = machine en marche)","Former les opérateurs, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Filmer et chronométrer le changement, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Convertir une opération MA en MM consiste à :",answers:["Supprimer l'opération, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Automatiser l'opération, solution acceptable en phase pilote avec l'accord formel du comité de direction","Former un opérateur supplémentaire, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Préparer cette opération PENDANT que la machine tourne encore, pour ne plus avoir à faire pendant l'arrêt"],correct:3},{q:"Pourquoi filmer le changement de série est plus efficace que le chronométrage simple ?",answers:["Permet d'analyser plusieurs fois en groupe la même séquence pour identifier toutes les pistes d'amélioration","Pour satisfaire l'ISO, recommandé dans les petites structures artisanales selon la réglementation PME","Pour la preuve légale, applicable en période probatoire avant la mise en conformité documentaire complète","Pour former les nouveaux, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:0},{q:"Le SMED doit être appliqué en priorité sur :",answers:["Les machines les moins chères, utilisé dans le domaine de la prestation de services mais non transposable à la production","Les goulots du processus — les machines pénalisantes dont le temps d'arrêt impacte toute la ligne","Les machines les plus récentes, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Les machines les plus simples, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Les 4 étapes SMED dans l'ordre sont :",answers:["Former → Standardiser → Mesurer → Améliorer, option documentée dans les guides de bonnes pratiques sectorie
