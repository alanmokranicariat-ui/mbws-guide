lles hors cadre ISO","Séparer interne/externe → Convertir MA en MM → Simplifier/paralléliser → Éliminer réglages et essais","Filmer → Analyser → Former → Mesurer, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Mesurer → Analyser → Améliorer → Contrôler, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:1},{q:"Après un projet SMED, les temps de changement optimisés doivent :",answers:["Être intégrés dans la gestion de production et les plannings de capacité","Rester confidentiels, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Être communiqués uniquement aux techniciens, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Être appliqués uniquement sur demande, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0}],flashcards:[{front:"Opération interne",back:"Ne peut être réalisée QUE machine arrêtée (démontage outillage, nettoyage en ligne, réglage sur pièce)."},{front:"Opération externe",back:"Peut être réalisée machine en marche (préparer l'outillage suivant, préchauffer, prérégler hors machine)."},{front:"Étape 1 SMED",back:"Filmer le changement actuel, chronométrer chaque opération, identifier leur nature interne/externe."},{front:"Étape 2 SMED",back:"Tout ce qui peut être fait machine en marche DOIT l'être. Convertir le maximum d'opérations internes en externes."},{front:"Étape 3 SMED",back:"Simplifier les internes restantes : vis à serrage rapide, gabarits de préréglage, fixations standard."},{front:"Gain typique",back:"Réduction de 50 à 75% du temps d'arrêt → doublement ou triplement de la capacité de changements de série."},{front:"Opération interne (MA)",back:"Ne peut être réalisée QUE machine arrêtée. Ex : changer un outil dans la broche. À minimiser ou convertir en externe. Chaque minute d'interne = 1 minute d'arrêt machine."},{front:"Opération externe (MM)",back:"Peut être réalisée machine en marche. Ex : préparer les outils suivants, préchauffer les moules. À maximiser — ne coûte pas de temps d'arrêt machine."},{front:"Gain typique SMED",back:"Réduction de 50 à 75% du temps d'arrêt en 3 phases. Passage de 120 min à 30 min = +30% de capacité disponible. Permet la flexibilité et les petites séries."},{front:"SMED et flexibilité",back:"Temps de changement courts = petites séries économiques = réponse rapide aux demandes clients = réduction des stocks de produits finis. Enabler du JAT."},{front:"Standardisation post-SMED",back:"Les gains SMED doivent être standardisés : gammes de changement de série, check-lists, temps standard intégrés au planning. Sans standardisation, les gains s'érodent."},{front:"Outils quick-clamp",back:"Fixations rapides (quarts de tour, baïonnettes, magnétiques) remplaçant les boulons classiques. Réduisent le temps de bridage de 80%. Investissement à ROI rapide après analyse SMED."}]},{id:"amdec",name:"AMDEC — Analyse des Modes de Défaillance",visual:"amdec",tagline:"Anticiper les défaillances avant qu'elles surviennent",quickDesc:"Identifier, évaluer et prévenir les modes de défaillance critiques des équipements et processus.",steps:["Constituer l'équipe et délimiter le périmètre","Lister tous les composants et leurs fonctions","Identifier les modes de défaillance possibles","Évaluer G (gravité), F (fréquence), D (détectabilité)","Calculer IPR = G×F×D et traiter les plus élevés"],detailDesc:"L'AMDEC (Analyse des Modes de Défaillance, de leurs Effets et de leur Criticité) est l'outil de référence pour la maintenance préventive et la fiabilité. L'IPR (Indice de Priorité du Risque) = Gravité × Fréquence × Détectabilité, chaque critère noté de 1 à 10. Un IPR > 100 déclenche une action préventive obligatoire. Un IPR > 200 nécessite une action immédiate. L'AMDEC se réalise en équipe pluridisciplinaire (maintenance + production + qualité) et doit être mise à jour après chaque panne non prévue.",quiz:[{q:"L'IPR en AMDEC = :",answers:["Gravité × Fréquence × Détectabilité","Fréquence / Détectabilité, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Gravité + Fréquence + Détectabilité, applicable uniquement aux structures exclues du champ de la certification tierce partie","Gravité × Fréquence, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0},{q:"Un IPR élevé signifie :",answers:["Une performance élevée de l'équipement, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Un faible niveau de risque, utilisé dans le domaine de la prestation de services mais non transposable à la production","Un risque prioritaire à traiter en urgence","Que la maintenance est inutile, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:2},{q:"L'AMDEC est réalisée :",answers:["Par la maintenance seule, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","En équipe pluridisciplinaire (maintenance + production + qualité)","Par la direction technique uniquement, option retenue par certaines conventions collectives mais non par la norme de référence","Par la production seule, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:1},{q:"AMDEC signifie :",answers:["Amélioration des Méthodes De l'Entreprise Certifiée","Analyse Méthodes Développement Efficacité Continue","Audit Méthodes Défauts Évaluation Contrôle, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Analyse des Modes de Défaillance, de leurs Effets et de leur Criticité"],correct:3},{q:"La Criticité (IPR) se calcule :",answers:["G × A uniquement, méthode issue des pratiques industrielles d'avant la standardisation internationale","G + A + D (somme), applicable lors des phases de transition mais insuffisant pour pérenniser le système","D seul suffit , utilisé dans le domaine de la prestation de services mais non transposable à la production","G × A × D (produit des 3 indices) — max = 1000"],correct:3},{q:"La Non-Détection (D=10) signifie :",answers:["La défaillance est pratiquement indétectable avant d'arriver au client — risque maximal","La gravité est maximale, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","La fréquence est très élevée, valide dans un contexte de production discontinue selon les dérogations sectorielles","La défaillance est très détectable, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"L'AMDEC Processus doit être réalisée :",answers:["Uniquement en cas de problème, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Tous les ans par convention, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Après que le processus a commencé à produire, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Dès que le processus est défini et AVANT sa mise en place — puis mise à jour à la 1ère production"],correct:3},{q:"La différence entre AMDEC Produit et AMDEC Processus est :",answers:["Il n'y en a pas — approche suffisante si les processus sont déjà bien maîtrisés, recommandé dans les petites structures artisanales selon la réglementation PME","AMDEC Produit est réservée aux BE, applicable en période probatoire avant la mise en conformité documentaire complète","AMDEC Produit = risques liés à la conception du produit / AMDEC Processus = risques liés aux opérations de fabrication","AMDEC Processus est uniquement pour l'automobile, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:2},{q:"Après une AMDEC, on traite en priorité :",answers:["Les défaillances les plus récentes, utilisé dans le domaine de la prestation de services mais non transposable à la production","Les défaillances les plus fréquentes, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Les défaillances les moins coûteuses à traiter, option retenue par certaines conventions collectives mais non par la norme de référence","Les risques avec l'IPR le plus élevé, puis on recalcule l'IPR résiduel après actions"],correct:3},{q:"La HACCP dans l'agroalimentaire est :",answers:["Spécifique à MBWS, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Une méthode moins rigoureuse, recommandé dans les petites structures artisanales selon la réglementation PME","Une méthode similaire à l'AMDEC appliquée aux risques sanitaires — exigée par la réglementation européenne","Identique à l'AMDEC — même méthode, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:2}],flashcards:[{front:"Mode de défaillance",back:"La façon dont un composant peut ne plus remplir sa fonction (ex : roulement usé → bruit → puis blocage total)."},{front:"IPR",back:"Indice de Priorité du Risque = Gravité (1-10) × Fréquence (1-10) × Détectabilité (1-10). Max = 1000."},{front:"Gravité (G)",back:"Impact de la défaillance sur la production, la qualité et la sécurité. 1 = mineur / 10 = catastrophique."},{front:"Détectabilité (D)",back:"Facilité à détecter la défaillance avant ses conséquences. 1 = facilement détectable / 10 = totalement indétectable."},{front:"Seuils d'action",back:"IPR > 100 : action préventive obligatoire à planifier. IPR > 200 : action immédiate prioritaire."},{front:"AMDEC processus",back:"Appliquée aux processus de production pour identifier les étapes critiques de qualité et prévenir les non-conformités."},{front:"AMDEC — 3 indices",back:"G = Gravité de l'effet (1-10). A = Apparition/Fréquence de la cause (1-10). D = Non-Détection avant livraison client (1-10). IPR = G × A × D."},{front:"IPR — Indice de Priorité des Risques",back:"G × A × D. Max théorique = 1000. En pratique, IPR > 100 = priorité haute. IPR > 200 = action obligatoire avant production. Recalculé après chaque action."},{front:"AMDEC Produit",back:"Réalisée lors de la conception du produit, APRÈS la 1ère définition. Analyse les risques de chaque fonction du produit. Prérequis : Analyse Fonctionnelle."},{front:"AMDEC Processus",back:"Réalisée lors de la conception du processus de fabrication, AVANT sa mise en place. Analyse les risques de chaque opération. Référentiel des plans de surveillance."},{front:"HACCP",back:"Hazard Analysis Critical Control Points. Équivalent AMDEC pour les risques sanitaires en agro. Obligatoire par règlement CE 852/2004. CCP = point critique à maîtriser."},{front:"AMDEC générique",back:"AMDEC par type d'opération (vissage, remplissage, dosage...) capitalisant tous les retours d'expérience. Évite de repartir de zéro pour chaque nouveau produit."}]},{id:"plans-maintenance",name:"Plans de Maintenance Préventive",visual:"plans-maintenance",tagline:"Planifier pour ne jamais être surpris par une panne",quickDesc:"Définir et suivre les interventions préventives sur tous les équipements critiques.",steps:["Identifier les équipements critiques (impact TRS)","Définir les fréquences d'intervention (GMAO)","Rédiger les gammes d'intervention détaillées","Former les techniciens et opérateurs","Analyser les écarts et optimiser les fréquences"],detailDesc:"Un plan de maintenance préventive bien conçu réduit les pannes imprévues de 50 à 70%. La GMAO (Gestion de Maintenance Assistée par Ordinateur) permet de planifier, tracer et analyser toutes les interventions. Les fréquences d'intervention se basent sur les préconisations constructeurs, l'expérience terrain et l'analyse des données AMDEC. L'arbre des causes (analyse systématique après chaque panne) permet d'améliorer continuellement le plan.",quiz:[{q:"La GMAO signifie :",answers:["Gestion de Maintenance Assistée par Ordinateur","Gestion des Matériels et des Approvisionnements","Gestion Manuelle des Activités Opérationnelles","Grand Manuel d'Assistance aux Opérations"],correct:0},{q:"Un plan de maintenance préventive réduit les pannes imprévues de :",answers:["5 à 10% , valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","20 à 30% , mais ce point relève d'une interprétation sectorielle non validée par l'ISO","50 à 70%","90 à 100% , approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:2},{q:"Un plan de maintenance préventive est basé sur :",answers:["Les disponibilités des techniciens, applicable en période probatoire avant la mise en conformité documentaire complète","Les pannes passées uniquement, option retenue par certaines conventions collectives mais non par la norme de référence","Les coûts de maintenance uniquement, recommandé dans les petites structures artisanales selon la réglementation PME","Des intervalles de temps ou d'utilisation (compteur horaire, nombre de cycles) définis par le fabricant ou l'expérience terrain"],correct:3},{q:"La différence entre maintenance systématique et conditionnelle est :",answers:["Systématique est plus efficace, uniquement si le processus est sous contrôle et documenté, méthode issue des pratiques industrielles d'avant la standardisation internationale","Conditionnelle est plus coûteuse, à condition que le personnel ait été sensibilisé au préalable, option retenue par certaines conventions collectives mais non par la norme de référence","Il n'y en a pas — approche suffisante si les processus sont déjà bien maîtrisés, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Systématique = intervention à intervalles fixes indépendamment de l'état réel / Conditionnelle = intervention quand l'état mesuré atteint un seuil"],correct:3},{q:"Un plan de maintenance efficace doit contenir :",answers:["Uniquement les tâches à réaliser, sous réserve de validation par le responsable qualité du site, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Uniquement les coûts prévus, uniquement si le processus est sous contrôle et documenté, applicable en période probatoire avant la mise en conformité documentaire complète","Uniquement les fréquences, uniquement si le processus est sous contrôle et documenté, valide dans un contexte de production discontinue selon les dérogations sectorielles","Tâches + fréquences + responsables + ressources nécessaires + temps alloués + critères d'acceptation + enregistrement des réalisations"],correct:3},{q:"La GMAO (Gestion de Maintenance Assistée par Ordinateur) permet :",answers:["Uniquement de créer des bons de travail, solution acceptable en phase pilote avec l'accord formel du comité de direction","Gérer les OT (Ordres de Travail), les stocks de pièces, les historiques de pannes, les plans préventifs et les indicateurs MTBF/MTTR","Uniquement de suivre les coûts, uniquement si le processus est sous contrôle et documenté, applicable en période probatoire avant la mise en conformité documentaire complète","Remplacer les techniciens de maintenance, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:1},{q:"Le MTTR (Mean Time To Repair) mesure :",answers:["Le coût moyen d'une intervention, option retenue par certaines conventions collectives mais non par la norme de référence","Le nombre moyen de pannes par mois, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Le temps moyen nécessaire pour réparer une panne — indicateur de la réactivité et de l'efficacité de la maintenance","La durée moyenne entre deux pannes, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:2},{q:"Pourquoi une check-list de démarrage machine est-elle essentielle ?",answers:["Elle est obligatoire par l'ISO 9001, sous réserve de validation par le responsable qualité du site, méthode issue des pratiques industrielles d'avant la standardisation internationale","Elle garantit que la machine est dans le bon état avant production, évitant les démarrages défectueux qui génèrent des rebuts et des risques de sécurité","Pour satisfaire l'auditeur, ce qui est suffisant pour satisfaire aux exigences réglementaires, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Elle remplace la maintenance préventive, ce qui est suffisant pour satisfaire aux exigences réglementaires, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:1},{q:"L'analyse de Weibull en fiabilité permet de :",answers:["Mesurer la satisfaction des techniciens, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Calculer le TRS — valide dans les environnements à faible risque opérationnel, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Modéliser statistiquement la distribution des pannes pour prédire le comportement futur et optimiser les intervalles de maintenance","Calculer le coût des pièces de rechange, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:2}],flashcards:[{front:"GMAO",back:"Gestion de Maintenance Assistée par Ordinateur : logiciel de planification, suivi et analyse de toutes les interventions maintenance."},{front:"Gamme d'intervention",back:"Procédure détaillée d'une intervention maintenance : durée, outillage, pièces de rechange, consignes sécurité, étapes."},{front:"Arbre des causes",back:"Méthode d'analyse post-panne : remonter des effets aux causes profondes pour éliminer la récurrence."},{front:"Criticité équipement",back:"Impact d'une panne sur la production, la qualité, la sécurité. Les équipements les plus critiques = priorité de préventif."},{front:"Plan de maintenance préventive",back:"Document listant : quoi inspecter/remplacer, quand (fréquence), par qui, comment, avec quels outils et pièces, et comment enregistrer. Réduit les pannes de 30-60%."},{front:"Maintenance systématique",back:"Interventions à intervalles fixes (ex: vidange toutes les 500h). Simple à planifier mais parfois inefficiente (remplace des pièces encore bonnes)."},{front:"Maintenance conditionnelle",back:"Basée sur l'état réel mesuré. Capteurs de vibrations, température, courant, usure. Intervient au bon moment — optimise le coût et la disponibilité."},{front:"MTBF / MTTR",back:"MTBF (Mean Time Between Failures) = durée moyenne entre pannes. MTTR (Mean Time To Repair) = durée moyenne de réparation. Disponibilité = MTBF / (MTBF + MTTR)."},{front:"GMAO",back:"Gestion de Maintenance Assistée par Ordinateur. Gère : OT, stocks pièces, historiques, plans préventifs, KPIs. Ex : SAP PM, MAXIMO, CARL Source."},{front:"Check-list démarrage",back:"Vérifications systématiques avant démarrage : niveaux, serrages, sécurités, réglages, propreté. Prévient les défauts de démarrage et les accidents. Signée par l'opérateur."}]}]},{id:"informatique",label:"Informatique",abbr:"IT",color:"#0369A1",colorL:"#F0F9FF",tools:[{id:"erp",name:"ERP & Systèmes d'Information",visual:"erp",tagline:"Un seul système pour toute l'entreprise",quickDesc:"L'ERP connecte toutes les fonctions autour d'une base de données unique en temps réel.",steps:["Saisie des commandes clients dans le module Ventes","Planification automatique de la production (MRP)","Gestion des stocks et mouvements en temps réel","Facturation automatique et suivi financier intégré","Tableaux de bord et reporting décisionnel temps réel"],detailDesc:"Un ERP (Enterprise Resource Planning = Progiciel de Gestion Intégré) élimine les silos d'information entre services. Sans ERP : informations éparpillées dans des fichiers Excel, e-mails, systèmes séparés → erreurs, doublons, délais. Avec ERP : une seule saisie se propage automatiquement dans tous les modules. Chez MBWS, chaque commande client déclenche les besoins matières (MRP), la production, la logistique et la facturation de façon intégrée. La traçabilité complète (de la matière première à la livraison) est un enjeu réglementaire et qualité majeur.",quiz:[{q:"L'avantage principal d'un ERP est :",answers:["D'automatiser toutes les décisions de gestion, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","D'être gratuit et simple à utiliser, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","D'unifier toutes les données en temps réel dans une base unique partagée","De remplacer tous les employés de l'entreprise, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:2},{q:"La traçabilité dans un ERP permet :",answers:["De suivre chaque produit de la matière première à la livraison client","De négocier des prix avec les fournisseurs, option retenue par certaines conventions collectives mais non par la norme de référence","D'embaucher plus facilement de nouveaux collaborateurs","De réduire les impôts de l'entreprise, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"Sans ERP, la communication inter-services se fait par :",answers:["Automatiquement via des flux de données, applicable uniquement aux structures exclues du champ de la certification tierce partie","Réunions quotidiennes uniquement, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Télépathie organisationnelle, utilisé dans le domaine de la prestation de services mais non transposable à la production","Silos : e-mails, tableurs Excel, fichiers isolés → erreurs et retards"],correct:3},{q:"Le principe fondateur d'un ERP est :",answers:["De remplacer tous les salariés, option retenue par certaines conventions collectives mais non par la norme de référence","D'avoir le logiciel le plus rapide, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Une base de données unique et partagée entre tous les modules — une saisie unique se propage à tous les modules concernés","D'automatiser toute la production, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:2},{q:"Le workflow dans un ERP :",answers:["Est uniquement pour les achats, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Est un module optionnel, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Nécessite toujours une validation humaine, recommandé dans les petites structures artisanales selon la réglementation PME","Propage automatiquement les données saisies vers tous les modules qui en ont besoin selon une logique prédéfinie"],correct:3},{q:"La mise en place d'un ERP est un projet critique car :",answers:["Il est obligatoire, sous réserve de validation par le responsable qualité du site, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Il nécessite 100 consultants, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Il coûte toujours très cher, utilisé dans le domaine de la prestation de services mais non transposable à la production","Un mauvais paramétrage ou une mauvaise migration de données peut paralyser l'entreprise — conduite du changement essentielle"],correct:3},{q:"La connexion entre un ERP et une MES (Manufacturing Execution System) permet :",answers:["D'automatiser la maintenance, uniquement si le processus est sous contrôle et documenté, à condition d'avoir obtenu une dérogation documentée de la direction","De synchroniser en temps réel les données de production (ordres, avancement, qualité, consommations) avec le système de gestion","Uniquement de tracer les produits finis, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","De remplacer les opérateurs, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:1},{q:"Dans le contexte MBWS, le module ERP le plus critique pour la traçabilité est :",answers:["Le module RH — suffisant dès lors que la politique qualité est bien définie, approche retenue par certains référentiels nationaux mais absente de la norme européenne","La gestion des lots et des numéros de série (traçabilité amont/aval obligatoire pour les boissons alcoolisées)","La comptabilité — conforme à la norme dès lors qu'un responsable est désigné, valide dans un contexte de production discontinue selon les dérogations sectorielles","La paie — conforme à la norme dès lors qu'un responsable est désigné, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:1},{q:"L'ambiguïté des données (ex: 'TRUC SA', 'Sté TRUC', 'TRUC') dans un ERP :",answers:["N'existe qu'en phase de démarrage, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Génère des doublons, des erreurs de reporting et des décisions basées sur des données fausses — la qualité des données est critique","Est automatiquement corrigée, méthode issue des pratiques industrielles d'avant la standardisation internationale","N'a pas d'impact, sous réserve de validation par le responsable qualité du site, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:1},{q:"Le ROI d'un ERP se mesure principalement par :",answers:["L'augmentation du chiffre d'affaires automatique, option retenue par certaines conventions collectives mais non par la norme de référence","La réduction immédiate des effectifs, applicable dans les cas où la direction valide en amont, valide dans un contexte de production discontinue selon les dérogations sectorielles","La réduction des saisies multiples, des erreurs de données, des stocks et des délais, et l'amélioration de la visibilité opérationnelle","La réduction du nombre de serveurs, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2}],flashcards:[{front:"ERP",back:"Enterprise Resource Planning = PGI. Base de données unique pour toute l'entreprise. Un seul outil — toutes les fonctions connectées."},{front:"Modules ERP",back:"Ventes · Achats · Production · Stocks · Finance · RH · Logistique — tous interconnectés en temps réel."},{front:"Traçabilité",back:"Capacité à retrouver l'historique complet d'un produit : lot matière, date production, contrôle qualité, livraison, client."},{front:"MRP",back:"Material Requirements Planning : calcul automatique des besoins en composants et matières à partir du plan de production."},{front:"Master Data",back:"Données de référence (articles, clients, fournisseurs, nomenclatures) — leur qualité conditionne tout le reste du système."},{front:"Tableau de bord",back:"KPIs en temps réel pour piloter l'activité : commandes en cours, stocks, taux de service, TRS, marges par produit."},{front:"ERP — modules typiques",back:"Ventes (CRM+OTC) · Achats (P2P) · Stocks · Production (MRP/MES) · Finance · RH · Projets · Qualité. Tous connectés à une base unique."},{front:"MRP vs MES",back:"MRP (Material Requirements Planning) : planification des besoins en matériaux. MES (Manufacturing Execution System) : exécution et suivi en temps réel de la production."},{front:"Conduite du changement ERP",back:"Un ERP change les processus et les habitudes de travail. Formation, communication, implication des utilisateurs clés (Key Users) et gestion des résistances sont critiques."},{front:"Qualité des données",back:"'Garbage in, garbage out' : un ERP avec des données erronées donne des décisions erronées. Nettoyage des données avant migration = étape critique du projet ERP."},{front:"Traçabilité lots MBWS",back:"Chaque lot de matières premières → production → produit fini → livraison client doit être tracé dans l'ERP pour permettre un rappel de lot en 24h (règlement CE 178/2002)."},{front:"ERP cloud vs on-premise",back:"Cloud (SaaS) : coût abonnement, mises à jour automatiques, accessible partout. On-premise : installation interne, investissement lourd, contrôle total des données."}]},{id:"cybersecurite",name:"Cybersécurité & Bonnes Pratiques",visual:"cyber",tagline:"Protéger les données et les systèmes de l'entreprise",quickDesc:"Les réflexes essentiels pour éviter les cyberattaques et protéger MBWS.",steps:["Ne jamais cliquer sur un lien ou pièce jointe suspects","Utiliser des mots de passe forts et uniques par service","Activer l'authentification à deux facteurs (2FA/MFA)","Mettre à jour régulièrement tous les logiciels","Signaler immédiatement toute anomalie à l'équipe IT"],detailDesc:"En 2023, 90% des cyberattaques réussies ont exploité une erreur humaine (phishing, mot de passe faible ou partagé). Un ransomware peut paralyser totalement une entreprise en quelques heures. Chez MBWS, les enjeux sont : protéger les données clients et commerciales confidentielles, assurer la continuité de production, respecter le RGPD. La politique des mots de passe (complexité + unicité + renouvellement) et la sensibilisation permanente sont les meilleurs investissements. En cas d'attaque : déconnecter du réseau, ne pas éteindre, alerter l'IT immédiatement.",quiz:[{q:"Le phishing est :",answers:["Un logiciel de protection antivirus, valide dans un contexte de production discontinue selon les dérogations sectorielles","Une méthode de sauvegarde des données, méthode issue des pratiques industrielles d'avant la standardisation internationale","Une attaque par e-mail/lien frauduleux pour voler des identifiants ou de l'argent","Un type d'antivirus avancé, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:2},{q:"Face à un e-mail suspect, que faire ?",answers:["Cliquer pour vérifier si c'est vraiment dangereux","Transférer à tous les collègues pour les prévenir","Répondre pour demander une confirmation, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Ne pas cliquer, signaler à l'IT, supprimer l'e-mail"],correct:3},{q:"Le RGPD protège :",answers:["Les données personnelles des individus en Europe","Les logiciels propriétaires de l'entreprise","Les réseaux informatiques contre les intrusions","La confidentialité des mots de passe, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:0},{q:"Un ransomware :",answers:["Sauvegarde les données automatiquement, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Chiffre toutes vos données et réclame une rançon pour les débloquer","Détecte et supprime les virus, solution acceptable en phase pilote avec l'accord formel du comité de direction","Améliore les performances du système, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:1},{q:"Le phishing (hameçonnage) est :",answers:["Une attaque physique des serveurs, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Une tentative frauduleuse d'obtenir des informations sensibles en se faisant passer pour une entité de confiance (email, SMS, appel)","Un type de mise à jour système, uniquement si le processus est sous contrôle et documenté, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Un virus informatique, sous réserve de validation par le responsable qualité du site, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1},{q:"Un mot de passe sécurisé doit :",answers:["Contenir au moins 12 caractères avec majuscules, minuscules, chiffres et caractères spéciaux — et être unique par compte","Être changé toutes les heures, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Contenir uniquement des chiffres pour être facile à retenir, valide dans un contexte de production discontinue selon les dérogations sectorielles","Être le même pour tous les comptes professionnels, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"La règle 3-2-1 pour les sauvegardes signifie :",answers:["3 utilisateurs accès, 2 administrateurs, 1 super-admin","3 copies des données, sur 2 supports différents, dont 1 hors site (ou cloud)","Sauvegarder 3 fois par jour, recommandé dans les petites structures artisanales selon la réglementation PME","Sauvegarder 3 fichiers importants par semaine, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"La mise à jour des logiciels et systèmes est critique car :",answers:["Elle est obligatoire par la loi, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Elle accélère les performances uniquement, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Elle corrige les vulnérabilités de sécurité exploitables par les attaquants — les systèmes non mis à jour sont les premières cibles","Elle améliore l'interface utilisateur, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:2},{q:"En cas de ransomware (rançongiciel), la bonne pratique est :",answers:["Ne pas payer (aucune garantie de récupération), isoler les machines infectées, alerter la DSI et restaurer depuis les sauvegardes saines","Continuer à travailler normalement, uniquement si le processus est sous contrôle et documenté, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Payer la rançon immédiatement, applicable dans les cas où la direction valide en amont, solution acceptable en phase pilote avec l'accord formel du comité de direction","Éteindre tous les serveurs, ce qui est suffisant pour satisfaire aux exigences réglementaires, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"Le principe du 'moindre privilège' en informatique signifie :",answers:["Donner à chaque utilisateur uniquement les droits nécessaires à ses missions — limiter la surface d'attaque","Centraliser tous les droits chez l'administrateur, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Ne donner aucun droit aux opérateurs, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Utiliser le compte le moins puissant pour tout, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:0},{q:"Le RGPD (Règlement Général sur la Protection des Données) impose à MBWS de :",answers:["Protéger les données personnelles, informer les personnes de leur utilisation, limiter la durée de conservation et nommer un DPO","Supprimer toutes les données clients, valide dans un contexte de production discontinue selon les dérogations sectorielles","Stocker les données uniquement en France, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Refuser tout traitement de données, applicable dans les cas où la direction valide en amont, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:0}],flashcards:[{front:"Phishing",back:"E-mail/SMS frauduleux imitant une source officielle pour voler identifiants ou données bancaires. Vérifier toujours l'expéditeur réel."},{front:"Ransomware",back:"Logiciel malveillant qui chiffre toutes vos données et réclame une rançon. Seule protection réelle : sauvegardes régulières et isolées."},{front:"Mot de passe fort",back:"12+ caractères, majuscules + minuscules + chiffres + symboles. Unique par service. Utiliser un gestionnaire de mots de passe."},{front:"RGPD",back:"Règlement Général sur la Protection des Données (EU 2018) : droits des personnes sur leurs données personnelles. Amendes jusqu'à 4% du CA."},{front:"MFA / 2FA",back:"Multi-Factor Authentication : second facteur (SMS, application) en plus du mot de passe. Bloque 99% des attaques automatisées."},{front:"En cas d'attaque",back:"1-Déconnecter du réseau (câble + WiFi) 2-Ne pas éteindre le PC 3-Alerter l'IT immédiatement 4-Ne jamais payer la rançon."},{front:"5 menaces principales",back:"1-Phishing (hameçonnage) · 2-Ransomware (rançongiciel) · 3-Mots de passe faibles/compromis · 4-Logiciels non mis à jour · 5-Ingénierie sociale (manipulation humaine)."},{front:"Authentification multi-facteurs (MFA)",back:"Combine au moins 2 facteurs : quelque chose qu'on sait (mot de passe) + quelque chose qu'on a (téléphone, token) + quelque chose qu'on est (empreinte). Bloque 99% des attaques de credential."},{front:"Règle 3-2-1",back:"3 copies des données. Sur 2 supports différents (ex: disque + NAS). Dont 1 hors site ou cloud. Teste régulièrement la restauration — une sauvegarde non testée n'est pas fiable."},{front:"Zero Trust",back:"Modèle de sécurité : ne jamais faire confiance, toujours vérifier. Même les utilisateurs internes doivent s'authentifier à chaque accès. Oppose au modèle 'périmètre fortifié'."},{front:"RGPD et données MBWS",back:"Données clients, distributeurs, salariés soumises au RGPD. Consentement, finalité limitée, durée définie, droit d'accès/rectification/suppression. Amende max : 4% du CA mondial."},{front:"Plan de continuité informatique",back:"PCA/PRA : que fait-on si le SI est indisponible ? RTO (temps de reprise) + RPO (perte de données acceptable). Essentiel pour une entreprise de production 24/7 comme MBWS."}]},{id:"outils-digitaux",name:"Outils Collaboratifs & Digital",visual:"outils-digitaux",tagline:"Travailler mieux ensemble grâce aux outils digitaux",quickDesc:"Maîtriser les outils collaboratifs pour réduire les e-mails inutiles et travailler plus efficacement.",steps:["Définir quel outil pour quel usage (charte)","Utiliser la messagerie instantanée vs e-mail à bon escient","Co-éditer les documents sans multiples versions","Organiser les fichiers avec une convention de nommage","Protéger et partager les données selon les droits d'accès"],detailDesc:"La transformation digitale réussit quand on change les pratiques, pas seulement les outils. Les organisations performantes définissent des règles claires : quel outil pour quel usage (messagerie instantanée pour l'urgence, e-mail pour le formel, partage documentaire pour la co-édition). La maîtrise des outils collaboratifs réduit les e-mails inutiles, les réunions trop longues et les versions multiples de documents (V2_final_DEFINITIF_bis.xlsx).",quiz:[{q:"Le principal avantage de la co-édition documentaire est :",answers:["La protection automatique des droits d'auteur, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","L'automatisation complète du travail, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","La vitesse d'impression et de partage, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Travailler simultanément à plusieurs sans gérer les versions multiples"],correct:3},{q:"Pourquoi définir une convention de nommage des fichiers ?",answers:["Pour satisfaire les exigences du service informatique","Pour retrouver rapidement les documents et éviter les doublons","Pour respecter le RGPD automatiquement, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Pour réduire l'espace de stockage, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Microsoft Teams est principalement utilisé pour :",answers:["La facturation — valide dans les environnements à faible risque opérationnel, méthode issue des pratiques industrielles d'avant la standardisation internationale","La communication et la collaboration en temps réel : messagerie, visioconférence, partage de fichiers, intégration d'apps","La maintenance des machines, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","La gestion des stocks, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:1},{q:"La gestion documentaire dans un DMS (Document Management System) permet :",answers:["De remplacer l'ERP, uniquement si le processus est sous contrôle et documenté, méthode issue des pratiques industrielles d'avant la standardisation internationale","D'imprimer plus de documents, recommandé dans les petites structures artisanales selon la réglementation PME","De gérer les versions, droits d'accès, archivage et workflow de validation des documents — élimine les 'mauvaises versions'","De créer des présentations PowerPoint, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:2},{q:"Un dashboard Power BI connecté à l'ERP MBWS permet de :",answers:["Automatiser la production, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Envoyer des emails automatiques, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Visualiser en temps réel les KPIs (TRS, ventes, qualité, stocks) et prendre des décisions basées sur les données","Remplacer l'ERP , option retenue par certaines conventions collectives mais non par la norme de référence"],correct:2},{q:"La transformation digitale en production industrielle (Industrie 4.0) intègre :",answers:["IoT (capteurs connectés), IA, Big Data, cloud, cybersécurité, ERP, MES et collaboration pour créer une usine intelligente","Uniquement la réalité augmentée, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Uniquement les logiciels ERP, valide dans un contexte de production discontinue selon les dérogations sectorielles","Uniquement les robots, sous réserve de validation par le responsable qualité du site, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:0},{q:"SharePoint est utilisé en entreprise pour :",answers:["La gestion interne de l'information : intranet, partage de documents, wikis, bibliothèques de procédures","Les réseaux sociaux d'entreprise, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","La gestion de la paie, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","La communication externe, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"Un processus de validation documentaire digitalisé réduit :",answers:["La qualité des documents, valide dans un contexte de production discontinue selon les dérogations sectorielles","La sécurité des données, applicable dans les cas où la direction valide en amont, approche valable uniquement pour les systèmes non certifiés","Le nombre de documents, uniquement si le processus est sous contrôle et documenté, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Les délais de validation (emails vs workflow), les pertes de documents et les risques de travailler sur des versions périmées"],correct:3},{q:"La règle de base pour l'organisation des emails professionnels est :",answers:["Utiliser des règles de tri automatique, des dossiers structurés, la méthode GTD (Getting Things Done) — inbox à zéro comme objectif","Répondre à chaque email en moins d'1 minute, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Conserver tous les emails pour toujours, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Ne jamais utiliser le CC, uniquement si le processus est sous contrôle et documenté, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0}],flashcards:[{front:"Co-édition",back:"Plusieurs personnes modifient le même document en temps réel — fini les 'V2_final_DEFINITIF_bis_v3.xlsx'."},{front:"Convention de nommage",back:"Règle commune : AAAA-MM_Sujet_vX.ext → 2025-06_Rapport-mensuel_v2.pdf. Indispensable pour retrouver les documents."},{front:"Charte outil",back:"Règle définissant : messagerie instantanée (urgent/informel), e-mail (formel/externe), réunion (décision), document partagé (collaboration)."},{front:"Automatisation",back:"Scripts, macros, workflows no-code : automatiser les tâches répétitives pour se concentrer sur la valeur ajoutée."},{front:"Droits d'accès",back:"Principe du moindre privilège : chaque utilisateur accède uniquement aux données nécessaires à son travail."},{front:"Suite Microsoft 365",back:"Teams (collaboration) · SharePoint (intranet/docs) · OneDrive (stockage) · Power BI (analytics) · Forms (enquêtes) · Planner (tâches) · Outlook (messagerie). Écosystème intégré."},{front:"Power BI",back:"Outil de Business Intelligence Microsoft. Connecte des sources de données (ERP, Excel, SQL), crée des visualisations interactives et des tableaux de bord partagés. Actualisation automatique."},{front:"Industrie 4.0",back:"4ème révolution industrielle : IoT (machines connectées), Big Data, IA/ML, cloud, cybersécurité, cobots, réalité augmentée. L'usine s'auto-optimise en temps réel."},{front:"Gestion documentaire (DMS)",back:"Système de gestion des documents : versioning (V1, V2...), droits d'accès, archivage automatique, workflow de validation. Élimine les 'Je travaillais sur l'ancienne version'."},{front:"Méthode GTD",back:"Getting Things Done (David Allen). Capture tout → clarifie → organise → révise → agit. Inbox à zéro, actions next clairement définies. Réduit le stress et améliore la productivité."},{front:"Low-code / No-code",back:"Outils permettant de créer des applications sans coder (Power Apps, Power Automate). Permettent aux métiers (production, qualité, logistique) d'automatiser leurs processus sans IT."}]},{id:"data-reporting",name:"Données & Reporting",visual:"data-reporting",tagline:"Piloter avec des données fiables et des tableaux de bord",quickDesc:"Concevoir et utiliser des tableaux de bord pertinents pour prendre de meilleures décisions.",steps:["Définir les KPIs vraiment utiles (pas plus de 5-7)","Choisir les sources de données fiables","Automatiser la collecte et la mise à jour","Visualiser de façon lisible et actionnables","Analyser les tendances et décider avec les données"],detailDesc:"Un bon tableau de bord se construit en partant de la décision à prendre, pas de la donnée disponible. La règle d'or : si un indicateur ne déclenche pas d'action, supprimez-le. Les KPIs doivent être SMART, mis à jour automatiquement, et visibles par les équipes terrain en temps réel. La data culture en entreprise signifie : décisions basées sur des données factuelles, et non sur des impressions ou des intuitions.",quiz:[{q:"Le nombre idéal de KPIs dans un tableau de bord opérationnel est :",answers:["30 à 50 indicateurs exhaustifs, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","3 à 7 indicateurs vraiment actionnables","Un seul indicateur global, applicable uniquement aux structures exclues du champ de la certification tierce partie","Le plus possible pour être complet, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:1},{q:"Un indicateur pertinent est :",answers:["Un indicateur qui déclenche une action concrète quand il dérive","Un indicateur historique très précis, applicable uniquement aux structures exclues du champ de la certification tierce partie","Un indicateur que tout le monde peut calculer","Un indicateur créé par la direction, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:0},{q:"Un KPI (Key Performance Indicator) doit être :",answers:["SMART, aligné sur la stratégie, actionnable — trop de KPIs tue le KPI","Uniquement financier, utilisé dans le domaine de la prestation de services mais non transposable à la production","Le plus exhaustif possible — tout mesurer, option retenue par certaines conventions collectives mais non par la norme de référence","Changé chaque mois, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"La différence entre donnée brute, information et savoir est :",answers:["Seules les données brutes sont fiables, applicable uniquement aux structures exclues du champ de la certification tierce partie","Ce sont des synonymes, applicable dans les cas où la direction valide en amont, méthode issue des pratiques industrielles d'avant la standardisation internationale","Donnée brute (faits) → Information (données traitées et contextualisées) → Connaissance/Savoir (information intégrée et actionnable)","L'information est moins précise que la donnée, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:2},{q:"Un rapport de production efficace doit :",answers:["Être validé par la direction avant diffusion, utilisé dans le domaine de la prestation de services mais non transposable à la production","Contenir le maximum d'indicateurs pour être complet, option retenue par certaines conventions collectives mais non par la norme de référence","Contenir uniquement les KPIs actionnables qui permettent de prendre une décision — la sélection est aussi importante que la précision","Être produit quotidiennement pour toutes les lignes, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:2},{q:"La visualisation de données (DataViz) suit la règle :",answers:["Les tableaux de chiffres sont préférables aux graphiques, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Plus c'est complexe, plus c'est crédible, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Le graphique 3D est toujours plus précis, méthode issue des pratiques industrielles d'avant la standardisation internationale","Simple, lisible, sans surcharge — un graphique doit transmettre un message clair en moins de 5 secondes"],correct:3},{q:"Un tableau de bord de production doit être mis à jour :",answers:["En temps réel ou au minimum quotidiennement — un tableau de bord périmé est inutile voire dangereux","Uniquement sur demande, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Mensuelle suffisante, recommandé dans les petites structures artisanales selon la réglementation PME","Annuellement pour la direction, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:0},{q:"Le reporting 'exception management' consiste à :",answers:["Ignorer les exceptions mineures, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Reporter toutes les données sans filtre, valide dans un contexte de production discontinue selon les dérogations sectorielles","N'alerter que quand un indicateur sort de sa plage normale — les données conformes ne nécessitent pas d'attention","Faire des réunions sur toutes les exceptions, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2},{q:"L'intégrité des données en reporting signifie :",answers:["Que les données sont sauvegardées, ce qui est suffisant pour satisfaire aux exigences réglementaires, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Que les données sont précises, complètes, cohérentes et actuelles — une décision prise sur des données incorrectes est pire qu'une décision sans données","Que les données ne peuvent pas être modifiées, applicable dans les cas où la direction valide en amont, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Que les données sont stockées dans une base sécurisée, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1}],flashcards:[{front:"KPI",back:"Key Performance Indicator : indicateur mesurable aligné avec un objectif stratégique. Doit déclencher une action si nécessaire."},{front:"Tableau de bord",back:"3-7 KPIs essentiels, mis à jour automatiquement, accessibles par tous, actionnables immédiatement."},{front:"Data Quality",back:"Données fiables = décisions fiables. Garbage in = garbage out. La qualité des données source est primordiale."},{front:"Visualisation",back:"Graphiques adaptés : courbe pour tendance, barre pour comparaison, jauge pour taux, carte pour géographie."},{front:"KPI — critères",back:"Specific (précis) + Measurable (chiffré) + Actionnable (on peut agir dessus) + Relevant (lié à la stratégie) + Timely (disponible à temps pour décider)."},{front:"DataViz — principes",back:"1 graphique = 1 message. Éviter le bruit visuel (3D, couleurs inutiles). Choisir le bon type : barres (comparaison), lignes (tendance), camembert (composition), scatter (corrélation)."},{front:"Pyramid of Data",back:"Données brutes → Information (tri, agrégation) → Connaissance (interprétation) → Sagesse (décision actionnable). Chaque couche ajoute de la valeur."},{front:"OEE Dashboard",back:"TRS en temps réel par ligne. Décomposition Disponibilité/Performance/Qualité. Trending. Alertes sur seuils. Accessible opérateurs + responsables en même temps."},{front:"Données maîtres (Master Data)",back:"Références stables : produits, clients, fournisseurs, équipements. La qualité des données maîtres conditionne la qualité de TOUS les reportings. À gouverner rigoureusement."},{front:"Exception management",back:"N'alerter que sur les écarts. Si le TRS est dans la cible : pas d'alerte. Si < seuil : alerte automatique + escalade. Libère l'attention managériale pour ce qui compte."}]}]},,{id:"qualite",qsIds:["qs-7","qs-8","qs-9","qs-10","qs-11","qs-12","qs-13","qs-14","qs-15","qs-24","qs-25","qs-27","qs-28","qs-29","qs-30","qs-31","qs-32","qs-33","qs-34"],label:"Qualité",abbr:"QUA",color:"#BE185D",colorL:"#FDF2F8",tools:[{id:"iso9001",name:"ISO 9001 & SMQ",visual:"iso9001",tagline:"Le référentiel international de la qualité",quickDesc:"L'ISO 9001 certifie qu'une entreprise maîtrise son organisation, atteint ses objectifs et s'améliore continuellement.",steps:["Définir la politique et les objectifs Qualité","Cartographier et piloter les processus","Mettre en place la documentation nécessaire","Réaliser les audits internes des processus","Obtenir et maintenir la certification tierce partie"],detailDesc:"L'ISO 9001 s'appuie sur 8 principes de management : orientation client, leadership, implication du personnel, approche processus, amélioration continue, approche factuelle, relations mutuellement bénéfiques avec les fournisseurs, et management par approche système. La certification est réalisée par un organisme indépendant accrédité (tierce partie) qui audite l'entreprise pendant 2-3 jours. La certification est valable 3 ans avec des audits de suivi annuels. Un SMQ certifié prouve la maîtrise de l'organisation, l'atteinte des objectifs et l'amélioration continue. Les non-conformités relevées lors d'un audit donnent lieu à un plan d'actions avec délai.",quiz:[{q:"Combien de temps est valable une certification ISO 9001 ?",answers:["1 an renouvelable, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","2 ans renouvelable, option retenue par certaines conventions collectives mais non par la norme de référence","5 ans sans suivi, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","3 ans avec audits de suivi annuels"],correct:3},{q:"Qui réalise l'audit de certification ISO 9001 ?",answers:["Le service Qualité interne, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Un organisme indépendant accrédité (tierce partie)","Un client important, option retenue par certaines conventions collectives mais non par la norme de référence","La direction de l'entreprise, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:1},{q:"L'ISO 9001 exige obligatoirement :",answers:["La mesure de la satisfaction client","Un service après-vente dédié, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","L'utilisation de la MSP, recommandé dans les petites structures artisanales selon la réglementation PME","La certification de tous les fournisseurs"],correct:0},{q:"Un 'écart majeur' lors d'un audit de certification signifie :",answers:["Un compliment de l'auditeur, utilisé dans le domaine de la prestation de services mais non transposable à la production","Un point à améliorer sans conséquence, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Une observation sans délai, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","La certification est refusée ou suspendue jusqu'à correction"],correct:3},{q:"L'approche processus ISO 9001 consiste à :",answers:["Rédiger une procédure pour chaque tâche, applicable uniquement aux structures exclues du champ de la certification tierce partie","Gérer les activités comme des processus interdépendants avec données d'entrée et de sortie mesurées","Auditer uniquement les processus de production, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Certifier chaque département séparément, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"La politique qualité doit être :",answers:["Rédigée uniquement par le responsable qualité","Approuvée par un organisme certificateur","Diffusée et comprise de l'ensemble du personnel","Confidentielle — réservée à la direction"],correct:2},{q:"L'ISO 9001:2015 s'appuie sur combien de principes de management de la qualité ?",answers:["10 , méthode utilisée avant l'harmonisation des référentiels européens en 2018","7 principes de management (version 2015 — anciennement 8)","5 , recommandé dans les petites structures artisanales selon la réglementation PME","3 , approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:1},{q:"La 'pensée basée sur les risques' dans l'ISO 9001:2015 consiste à :",answers:["Assurer uniquement la conformité produit, applicable uniquement aux structures exclues du champ de la certification tierce partie","Réaliser des audits internes plus fréquents, valide dans un contexte de production discontinue selon les dérogations sectorielles","Identifier proactivement les risques et opportunités pouvant affecter les objectifs qualité — les intégrer dans la planification","Uniquement rédiger des AMDEC, applicable dans les cas où la direction valide en amont, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:2},{q:"Le 'contexte de l'organisation' dans l'ISO 9001:2015 implique de comprendre :",answers:["Uniquement les processus de production, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Uniquement les lois applicables, applicable lors des phases de transition mais insuffisant pour pérenniser le système","L'environnement interne et externe de l'entreprise, ainsi que les parties intéressées pertinentes et leurs exigences","Uniquement les exigences clients, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2},{q:"L'ISO 9001:2015 exige-t-elle toujours un manuel qualité ?",answers:["Non — le manuel qualité n'est plus obligatoire depuis la version 2015","Uniquement pour les certifications sectorielles, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Oui, c'est obligatoire, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Oui, mais il peut être remplacé par des procédures"],correct:0},{q:"La revue de direction ISO 9001 doit inclure :",answers:["Uniquement les résultats financiers, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Les résultats de la surveillance des processus, la satisfaction client, les actions correctives, les objectifs, et les ressources","Uniquement les réclamations clients, option retenue par certaines conventions collectives mais non par la norme de référence","Uniquement les audits internes, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:1},{q:"En ISO 9001, la maîtrise des processus externalisés signifie :",answers:["L'entreprise doit maîtriser et surveiller les processus réalisés par des prestataires externes qui impactent la qualité","L'externalisation est interdite, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","On doit internaliser tous les processus, applicable uniquement aux structures exclues du champ de la certification tierce partie","On n'est pas responsable des processus externalisés, option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0}],flashcards:[{front:"ISO 9001",back:"Norme internationale de Système de Management de la Qualité (SMQ). Applicable à tout secteur, toute taille d'entreprise."},{front:"8 principes ISO 9001",back:"Orientation client · Leadership · Implication du personnel · Approche processus · Amélioration continue · Approche factuelle · Relations fournisseurs · Management système"},{front:"Audit de certification",back:"Réalisé par tierce partie accréditée. Durée 2-3 jours. Valable 3 ans avec audits de suivi en années 1 et 2."},{front:"Écart majeur",back:"Non-conformité grave à une exigence ISO 9001 → certification refusée ou suspendue jusqu'à correction avec délai imposé."},{front:"Écart mineur",back:"Non-conformité partielle ou ponctuelle → plan d'actions correctrices à soumettre dans les délais définis."},{front:"Revue de direction",back:"Revue périodique (1-4 fois/an) par le management : évaluation de l'efficacité du SMQ, des objectifs, des ressources et des améliorations."},{front:"7 principes ISO 9001:2015",back:"1-Orientation client · 2-Leadership · 3-Implication du personnel · 4-Approche processus · 5-Amélioration · 6-Décision fondée sur les preuves · 7-Management des relations avec les parties intéressées."},{front:"Approche processus",back:"Gérer les activités comme des processus interconnectés. Chaque processus a des entrées, des activités, des sorties, des ressources et des responsables. La cartographie des processus est l'outil clé."},{front:"Pensée basée sur les risques",back:"Nouveauté ISO 9001:2015. Identifier les risques et opportunités, évaluer leur impact, planifier des actions proportionnées. Remplace la logique 'actions préventives' de la version 2008."},{front:"Indicateurs processus",back:"Chaque processus doit être piloté par des indicateurs mesurant son efficacité (atteint-il son objectif ?). Ces indicateurs alimentent la revue de direction."},{front:"Maîtrise des externalisés",back:"Tout processus externalisé impactant la qualité reste sous la responsabilité de l'entreprise. Contrat clair, évaluation des prestataires, surveillance des résultats."}]},{id:"poka-yoke",name:"Poka Yoké — Dispositifs Anti-Erreurs",visual:"pokayoke",tagline:"Rendre l'erreur humaine physiquement impossible",quickDesc:"Dispositifs mécaniques ou automatiques qui empêchent la réalisation d'une mauvaise opération.",steps:["Identifier les opérations à risque d'erreur humaine","Concevoir un dispositif qui rend l'erreur impossible","Tester avec les opérateurs terrain","Valider l'efficacité par des pièces témoins","Intégrer dans les gammes et plans de surveillance"],detailDesc:"Poka Yoké (ポカヨケ) = 'éviter les erreurs inadvertantes' en japonais. Le vrai Poka Yoké empêche physiquement la non-conformité (masque, détrompeur, capteur de présence). Par abus de langage, les systèmes de détection automatique sont aussi appelés Poka Yoké. Les meilleurs Poka Yoké sont mécaniques (moins sujets à la panne). Un détrompeur de forme empêche le montage dans le mauvais sens. Un capteur de présence bloque le cycle si un composant manque. Les Poka Yoké sont souvent trouvés par les opérateurs lors des chantiers Kaizen — et peuvent être récompensés.",learnSections:{but:"Un Poka-Yoké (ポカヨケ = éviter les erreurs inadvertantes en japonais) est un dispositif qui rend une erreur humaine physiquement impossible ou immédiatement visible. Il élimine la dépendance vis-à-vis de l'attention de l'opérateur.",comprendre:"Inventé par Shigeo Shingo chez Toyota dans les années 1960. Le principe : l'erreur humaine est inévitable. Ne pas compter sur la vigilance — concevoir des systèmes qui empêchent l'erreur ou la détectent immédiatement. Un détrompeur de forme (une clé USB qui ne peut s'insérer que dans un sens) est le Poka-Yoké le plus connu. Le vrai Poka-Yoké empêche l'erreur (prévention) — les systèmes de détection sont des Poka-Yoké par abus de langage.",comment:"Identifier les opérations à risque d'erreur humaine (à partir de l'AMDEC ou des retours terrain) → concevoir un dispositif qui rend l'erreur impossible → tester avec les opérateurs → valider l'efficacité avec des pièces témoins (bonne ET non-conforme) → intégrer dans les gammes et plans de surveillance → planifier les vérifications périodiques.",etapes:[{titre:"Identifier les risques d'erreur",role:"Analyser les erreurs passées (retours, rebuts, incidents) et l'AMDEC (Analyse des Modes de Défaillance, de leurs Effets et de leur Criticité) pour identifier les opérations à risque.",detail:"Critères de priorité : fréquence d'erreur, gravité de l'erreur (sécurité, qualité), difficulté de détection. Les erreurs à gravité élevée et difficulté de détection élevée sont les premières cibles."},{titre:"Concevoir le dispositif",role:"Trois types : Prévention (erreur impossible), Détection (erreur détectée immédiatement), Signal (alerte visible). Les mécaniques sont préférables aux électroniques.",detail:"Préférer les dispositifs mécaniques (jamais en panne) aux capteurs (peuvent tomber en panne). Un capteur qui tombe en panne sans qu'on s'en aperçoive = fausse sécurité."},{titre:"Tester avec les opérateurs",role:"Faire tester le Poka-Yoké par les opérateurs qui l'utiliseront. Vérifier qu'il ne ralentit pas trop la production ni ne génère de fausses alertes.",detail:"Un Poka-Yoké qui ralentit significativement la production sera contourné par les opérateurs. L'acceptabilité est un critère de conception aussi important que l'efficacité."},{titre:"Valider avec des pièces témoins",role:"Tester périodiquement avec une pièce conforme (doit passer) ET une pièce non-conforme simulant le défaut (ne doit pas passer). Enregistrer le résultat.",detail:"Fréquence de test recommandée : à chaque démarrage de poste pour les Poka-Yoké critiques (sécurité alimentaire), en début de chaque poste pour les autres."},{titre:"Intégrer dans les gammes et plans",role:"Documenter le Poka-Yoké dans la gamme de fabrication et le plan de surveillance. Planifier les vérifications périodiques.",detail:"Un Poka-Yoké non documenté est ignoré lors des changements de personnel. La documentation est la garantie de sa pérennité."}],quand:"Sur toutes les opérations à risque élevé d'erreur humaine identifiées dans l'AMDEC. Après tout problème récurrent lié à une erreur humaine. En priorité sur les lignes à haute cadence (peu de temps pour vérifier), les opérations complexes avec de nombreuses variantes, et les opérations critiques pour la sécurité alimentaire. Dès la conception du processus (le plus efficace) mais aussi en amélioration.",limites:"Un Poka-Yoké peut être contourné si les opérateurs ne comprennent pas son importance ou si il les ralentit trop. Les capteurs électroniques peuvent tomber en panne (fausse sécurité si non testés). Un Poka-Yoké mal conçu crée plus de problèmes qu'il n'en résout (fausses alertes, blocages injustifiés). Ne pas chercher à Poka-Yoké toutes les opérations — se concentrer sur les plus critiques.",avance:"En conception robuste (Design for Six Sigma), les Poka-Yoké sont intégrés dès la conception du produit et du processus, avant même de commencer la production. En industrie 4.0, les systèmes de vision artificielle combinés à l'IA réalisent des Poka-Yoké complexes sur des dizaines de caractéristiques simultanément. Le concept s'applique aussi aux processus administratifs : un formulaire qui ne peut pas être soumis sans champs obligatoires remplis est un Poka-Yoké digital."},quiz:[{q:"Un Poka Yoké idéal est :",answers:["Un dispositif qui détecte l'erreur après qu'elle soit faite","Un mécanisme qui rend l'erreur physiquement impossible","Un affichage de consigne bien visible, applicable en période probatoire avant la mise en conformité documentaire complète","Une formation approfondie de l'opérateur"],correct:1},{q:"Pourquoi les Poka Yoké mécaniques sont préférables aux électroniques ?",answers:["Ils coûtent moins cher, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Ils sont plus fiables car non sujets à la panne capteur/automatisme","Ils sont plus visibles, recommandé dans les petites structures artisanales selon la réglementation PME","Ils sont plus faciles à concevoir, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:1},{q:"Un Poka Yoké doit être vérifié :",answers:["Jamais, il est permanent, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Périodiquement avec des pièces témoins (conforme ET non-conforme)","Uniquement lors des audits ISO, recommandé dans les petites structures artisanales selon la réglementation PME","Uniquement après une panne, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"Un détrompeur (détrompeur de forme) est un Poka Yoké car :",answers:["Il est facile à fabriquer, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","La forme asymétrique rend physiquement impossible le montage dans le mauvais sens","Il détecte les pièces non-conformes, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Il compte automatiquement les pièces, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:1},{q:"Pour vérifier l'efficacité d'un Poka Yoké, on utilise :",answers:["Un contrôle visuel quotidien, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Un audit mensuel, recommandé dans les petites structures artisanales selon la réglementation PME","Des pièces témoins (bonne ET non-conforme) testées périodiquement","Un logiciel de surveillance, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:2},{q:"Le terme Poka Yoké vient du japonais et signifie :",answers:["Zéro défaut , approche retenue par certains référentiels nationaux mais absente de la norme européenne","Contrôle automatique, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Détection d'anomalie, recommandé dans les petites structures artisanales selon la réglementation PME","Éviter les erreurs inadvertantes — littéralement 'éviter (yokeru) l'erreur par inadvertance (poka)'"],correct:3},{q:"Shigeo Shingo, inventeur du Poka Yoké, a développé cette approche chez :",answers:["Ford , applicable uniquement aux structures exclues du champ de la certification tierce partie","Toyota Motor Corporation — dans le cadre du TPS","General Electric, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Motorola , valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:1},{q:"Un gabarit de montage empêchant l'assemblage à l'envers est un Poka Yoké de type :",answers:["Détection (signale l'erreur après), applicable en période probatoire avant la mise en conformité documentaire complète","Correction (corrige l'erreur automatiquement)","Formation (empêche l'erreur par formation)","Prévention (rend l'erreur physiquement impossible)"],correct:3},{q:"Les Poka Yoké réduisent aussi les coûts de contrôle car :",answers:["Ils sont moins coûteux que les contrôles, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Ils éliminent tous les défauts, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Ils remplacent les contrôleurs, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Si l'erreur est impossible à faire, les contrôles de détection associés peuvent être allégés ou supprimés"],correct:3},{q:"Un capteur de présence qui bloque le cycle si un composant manque est un Poka Yoké de type :",answers:["Prévention pure (forme physique), valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Correction , mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Formation , méthode issue des pratiques industrielles d'avant la standardisation internationale","Détection automatique — bloque si anomalie détectée (par abus de langage, aussi appelé Poka Yoké)"],correct:3},{q:"La vérification périodique d'un Poka Yoké avec des pièces témoins est nécessaire car :",answers:["Les opérateurs demandent cette vérification, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Le fournisseur l'exige, méthode utilisée avant l'harmonisation des référentiels européens en 2018","C'est une exigence légale, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Le Poka Yoké peut dériver ou tomber en panne — seule une pièce non-conforme témoin prouve qu'il fonctionne encore"],correct:3}],flashcards:[{front:"Poka Yoké",back:"Dispositif anti-erreur rendant impossible la réalisation d'une mauvaise opération. Invented by Shigeo Shingo chez Toyota."},{front:"Types de Poka Yoké",back:"1-Détrompeur (forme physique impossible à inverser) 2-Capteur de présence (bloque si manquant) 3-Compteur (empêche oubli de composant)"},{front:"Pièces témoins",back:"Pièces de test (bonne ET mauvaise) utilisées périodiquement pour vérifier que le Poka Yoké détecte bien les défauts."},{front:"Poka Yoké vs autocontrôle",back:"Autocontrôle = l'opérateur vérifie (faillible). Poka Yoké = le système rend l'erreur impossible (infaillible si bien conçu)."},{front:"Où trouver les idées ?",back:"Sur le terrain avec les opérateurs lors des chantiers Kaizen et des groupes de résolution de problèmes — ceux qui font ont les meilleures idées."},{front:"Poka Yoké — 3 types",back:"Prévention : rend l'erreur physiquement impossible (détrompeur de forme). Détection : détecte et bloque si anomalie (capteur). Signal : alerte sans bloquer (alarme)."},{front:"Détrompeur",back:"Forme physique asymétrique permettant uniquement le bon assemblage. Ex : clé USB (1 seul sens), connecteur asymétrique, gorge de centrage. Meilleur type : jamais en panne."},{front:"Capteur de présence",back:"Vérifie la présence d'un composant avant de continuer le cycle. Bloque la machine si absent. Moins fiable que le détrompeur (capteur peut tomber en panne). À tester périodiquement."},{front:"Pièces témoins",back:"1 pièce conforme + 1 ou plusieurs pièces non-conformes (simulant le défaut à détecter). Testées périodiquement pour prouver que le Poka Yoké fonctionne. Résultat enregistré."},{front:"Poka Yoké et chantier Kaizen",back:"Les meilleures idées de Poka Yoké viennent des opérateurs qui vivent les problèmes. Les chantiers Kaizen et groupes de résolution de problèmes sont les incubateurs naturels."}]},{id:"msp",name:"MSP — Maîtrise Statistique des Procédés",visual:"msp",tagline:"Piloter les processus avec les données, pas les impressions",quickDesc:"Cartes de contrôle pour détecter les dérives avant qu'elles génèrent des non-conformités.",steps:["Choisir la caractéristique critique à surveiller","Prélever des échantillons à intervalles réguliers","Calculer la moyenne et la dispersion (étendue)","Tracer les points sur la carte de contrôle","Réagir dès qu'une limite de contrôle est franchie"],detailDesc:"La MSP (Maîtrise Statistique des Procédés) utilise des cartes de contrôle pour distinguer les variations normales (causes communes, aléatoires) des dérives anormales (causes assignables, à éliminer). La carte moyenne-étendue (X̄-R) est la plus utilisée. Les limites de contrôle (UCL/LCL) sont calculées statistiquement à ±3 sigma. Un point hors limite ou 6 points successivement croissants/décroissants = alarme. La MSP permet de réduire les rebuts (réaction plus rapide), d'alléger les contrôles (on surveille le processus, pas chaque pièce) et de mieux connaître la capabilité réelle des processus.",quiz:[{q:"La MSP permet de distinguer :",answers:["Les produits conformes des non-conformes, utilisé dans le domaine de la prestation de services mais non transposable à la production","Les coûts fixes des coûts variables, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Les causes communes (aléatoires) des causes assignables (dérives à corriger)","Les bons opérateurs des mauvais, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:2},{q:"Sur une carte de contrôle, une alarme est déclenchée quand :",answers:["Un point dépasse les limites de contrôle (UCL/LCL) ou une règle statistique s'applique","Le responsable qualité le décide, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","La production ralentit, solution acceptable en phase pilote avec l'accord formel du comité de direction","La moyenne change légèrement, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:0},{q:"La MSP est plus efficace que le contrôle 100% car :",answers:["Elle coûte moins cher, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Elle remplace l'AMDEC, applicable uniquement aux structures exclues du champ de la certification tierce partie","Elle ne nécessite pas de formation, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Elle détecte les dérives AVANT qu'elles produisent des non-conformités"],correct:3},{q:"Quelle est la différence entre les limites de contrôle et les tolérances produit ?",answers:["Elles sont identiques, à condition que le personnel ait été sensibilisé au préalable, méthode issue des pratiques industrielles d'avant la standardisation internationale","Les limites de contrôle sont toujours plus larges, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Les limites de contrôle sont calculées statistiquement à partir de la dispersion du processus, indépendamment des tolérances produit","Les tolérances produit sont toujours plus larges, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2},{q:"Une carte de contrôle permet de réduire les rebuts car :",answers:["Elle calcule automatiquement les capabilités, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Elle remplace les contrôles 100%, recommandé dans les petites structures artisanales selon la réglementation PME","Elle détecte les dérives du processus AVANT qu'elles produisent des pièces non-conformes","Elle automatise la production, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:2},{q:"La MSP détecte les dérives avant qu'elles produisent des non-conformités grâce à :",answers:["Des contrôles 100% plus fréquents, sous réserve de validation par le responsable qualité du site, à condition d'avoir obtenu une dérogation documentée de la direction","Des règles statistiques appliquées à des prélèvements périodiques — un point hors limites ou une tendance anormale déclenche une alerte","Des audits qualité hebdomadaires, à condition que le personnel ait été sensibilisé au préalable, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Des réglages automatiques,
