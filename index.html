l propre, sûr et efficace.",steps:["Seiri : Trier — éliminer tout l'inutile","Seiton : Ranger — une place pour chaque chose","Seiso : Nettoyer — inspecter en nettoyant","Seiketsu : Standardiser — formaliser les règles","Shitsuke : Respecter — maintenir dans la durée"],detailDesc:"Les 5S sont le socle de toute démarche Lean. Chez MBWS, le déploiement couvre 12 zones (Chai, Dépal, Insuffleuse/Tireuse, Étiqueteuse, Encaissage, Palettisation, Box Sleeveuse, RDC+Bureau, Maintenance, Différenciation retardée...). Le standard de référence : 6 bouteilles maximum par case (William Peel, Sobieski, Manzanita), étiquetage normalisé, marquages au sol respectés. Les outils du maintien MBWS : audit 5S chaque lundi matin avec grille de notation affichée en salle de réunion, défi 5S inter-équipes mensuel (photos avant/après, vote du meilleur poste), brief de fin de poste 5 min chaque vendredi, photo standard plastifiée sur chaque poste comme référence visuelle, planning de ménage tournant signé en fin de semaine, et intégration 5S de toute nouvelle recrue dès le Jour 1.",learnSections:{but:"La méthode 5S crée un espace de travail organisé et propre où chaque personne trouve ce dont elle a besoin en moins de 30 secondes, sans chercher. Un poste 5S produit plus de qualité, génère moins d'accidents et rend les problèmes visibles immédiatement.",comprendre:"5S est une méthode japonaise née chez Toyota dans les années 1950. Son nom vient de 5 mots japonais commençant par S. Le principe fondateur : le désordre cache les problèmes. Un poste ordonné rend visible tout ce qui n'est pas normal (fuite, usure, corps étranger). Chez MBWS, les 5S sont le socle de toute démarche Lean et de la sécurité alimentaire.",comment:"On déploie les 5S dans l'ordre, un S à la fois. On commence toujours par Seiri (trier) car il est inutile de ranger des choses inutiles. Chaque S prend une à deux semaines sur un poste pilote. Le déploiement se fait par chantier : choisir un poste visible, obtenir des résultats rapides, montrer l'exemple pour entraîner les autres.",etapes:[{titre:"S1 — Seiri (Trier)",role:"Supprimer tout ce qui est inutile au poste. Si un objet n'a pas été utilisé depuis 30 jours, il n'a probablement pas sa place ici.",detail:"Méthode des étiquettes rouges : apposer une étiquette rouge sur tout objet douteux. 48h pour le justifier, sinon il quitte le poste. Chez MBWS : 6 bouteilles maximum par case — pas plus."},{titre:"S2 — Seiton (Ranger)",role:"Une place définie pour chaque chose. Visualiser les emplacements : silhouettes d'outils, marquages au sol colorés, étiquettes.",detail:"Un visiteur doit pouvoir trouver n'importe quel outil en moins de 30 secondes. Si ce n'est pas possible, le S2 n'est pas terminé."},{titre:"S3 — Seiso (Nettoyer)",role:"Nettoyer = inspecter. En nettoyant, on détecte fuites, usures, visseries desserrées, corps étrangers avant qu'ils causent une panne ou une contamination.",detail:"En zone alimentaire MBWS, le nettoyage est directement lié à la sécurité produit (HACCP — Hazard Analysis Critical Control Points). Toute anomalie détectée lors du nettoyage doit être signalée."},{titre:"S4 — Seiketsu (Standardiser)",role:"Formaliser l'état de référence pour maintenir les 3 premiers S. Photo standard plastifiée au poste, check-list de démarrage, règles affichées.",detail:"Le standard devient la référence visuelle. Chez MBWS : photo du bon état affichée au poste, grille d'audit 5S notée."},{titre:"S5 — Shitsuke (Respecter)",role:"Maintenir les 4 premiers S dans la durée. C'est le S le plus difficile car il nécessite une discipline quotidienne et des rituels d'équipe.",detail:"Chez MBWS : audit 5S chaque lundi matin, défi mensuel inter-équipes avec photos avant/après, brief de 5 min chaque vendredi."}],quand:"Toujours et en premier. Les 5S sont le prérequis de tout autre outil Lean. On ne déploie pas le Kanban sur un poste en désordre. Les 5S s'appliquent aussi bien aux ateliers, aux bureaux, aux zones de stockage qu'aux espaces numériques (ordinateurs, dossiers partagés).",limites:"Les 5S ne résolvent pas les problèmes de flux, de capabilité machine, de conception produit ou de management. Ils créent les conditions favorables pour ces améliorations. Le plus grand risque : déployer les 5S comme un 'grand nettoyage' ponctuel sans rituel de maintien (S5) — ils reviennent à l'état initial en 3 mois. Les 5S imposés sans implication de l'équipe ne durent pas.",avance:"Les 5S servent de fondation à la TPM (Total Productive Maintenance) : le S3 (nettoyage = inspection) est le premier pilier de la maintenance autonome. Dans une démarche 6 Sigma, un poste 5S réduit la variabilité des mesures et des processus. En management visuel avancé, les standards S4 sont numériques et connectés à la GMAO (Gestion de Maintenance Assistée par Ordinateur)."},quiz:[{q:"Quel S correspond à 'éliminer l'inutile' ?",answers:["Seiketsu , utilisé dans le domaine de la prestation de services mais non transposable à la production","Seiri","Seiso , méthode utilisée avant l'harmonisation des référentiels européens en 2018","Seiton , option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet"],correct:1},{q:"Quel est l'enjeu principal du 5ème S (Shitsuke) ?",answers:["Maintenir et faire durer les standards","Nettoyer quotidiennement, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Ranger chaque outil, solution acceptable en phase pilote avec l'accord formel du comité de direction","Auditer le poste, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:0},{q:"Le 5S contribue directement à :",answers:["La sécurité et la réduction des gaspillages","La complexité des procédures, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","La réduction des effectifs, méthode issue des pratiques industrielles d'avant la standardisation internationale","L'augmentation du stock, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:0},{q:"Que doit-on faire d'un objet dont on ne sait pas s'il est utile ?",answers:["Le jeter immédiatement, utilisé dans le domaine de la prestation de services mais non transposable à la production","Le donner à un collègue, option retenue par certaines conventions collectives mais non par la norme de référence","L'ignorer , méthode issue des pratiques industrielles d'avant la standardisation internationale","Le mettre en zone de quarantaine"],correct:3},{q:"Le 2ème S (Seiton) impose :",answers:["De trier l'inutile en premier, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Une place définie pour chaque chose, visualisée par marquages au sol et étiquetage","De tout ranger dans des armoires fermées, utilisé dans le domaine de la prestation de services mais non transposable à la production","D'acheter de nouvelles étagères, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"L'étape Seiso (Nettoyer) apporte une valeur qualité car :",answers:["Cela motive les équipes, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Nettoyer = inspecter → on détecte fuites, usures et desserrages en nettoyant","Cela réduit les coûts d'entretien, applicable en période probatoire avant la mise en conformité documentaire complète","L'atelier est plus beau, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:1},{q:"Dans la démarche 5S, par quel S faut-il impérativement commencer ?",answers:["Seiso (Nettoyer), conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Seiri (Trier / Supprimer l'inutile)","Shitsuke (Respecter), solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Seiketsu (Standardiser), solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Chez MBWS, le standard 5S pour les cases produit est :",answers:["Remplir au maximum, recommandé dans les petites structures artisanales selon la réglementation PME","6 bouteilles maximum par case","10 bouteilles maximum par case, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Pas de standard défini, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:1},{q:"L'audit 5S hebdomadaire chez MBWS est réalisé :",answers:["Tous les vendredis, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Une fois par mois, méthode issue des pratiques industrielles d'avant la standardisation internationale","Sur demande du responsable, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Chaque lundi matin"],correct:3},{q:"Le Seiso (nettoyage) va au-delà du simple fait de nettoyer car :",answers:["Il améliore l'esthétique de l'atelier, recommandé dans les petites structures artisanales selon la réglementation PME","Nettoyer = inspecter : on détecte anomalies, fuites et usures en nettoyant","Il remplace la maintenance préventive, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Il est obligatoire par la réglementation, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Pourquoi le Shitsuke est-il le S le plus difficile ?",answers:["Car il implique uniquement la direction, valide dans un contexte de production discontinue selon les dérogations sectorielles","Car maintenir les standards dans la durée requiert une discipline et des rituels quotidiens","Car il coûte le plus cher, solution acceptable en phase pilote avec l'accord formel du comité de direction","Car il nécessite un logiciel spécial, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:1},{q:"Un chantier pilote 5S est recommandé en premier lieu car :",answers:["C'est une obligation ISO, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Il est moins coûteux, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Il montre l'exemple, crée une référence visuelle et facilite le déploiement global","Il concerne une seule personne, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:2},{q:"La photo standard plastifiée au poste sert à :",answers:["Permettre à tout opérateur de vérifier instantanément si le poste est dans le bon état","Décorer l'atelier, recommandé dans les petites structures artisanales selon la réglementation PME","Remplacer la procédure écrite, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Satisfaire l'auditeur ISO, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:0},{q:"Les 5S contribuent directement à la sécurité car :",answers:["Un poste propre et rangé élimine les risques de chute, de confusion et d'accident","Ils réduisent le personnel, applicable en période probatoire avant la mise en conformité documentaire complète","Ils remplacent les EPI, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Ils réduisent la charge de travail, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:0}],flashcards:[{front:"5S — Seiri",back:"TRIER : Garder uniquement ce qui est nécessaire. Mettre en quarantaine ce qui est douteux. Éliminer l'inutile avec l'équipe."},{front:"5S — Seiton",back:"RANGER : Une place pour chaque chose, chaque chose à sa place. Visualiser les emplacements (marquage au sol, silhouettes d'outils)."},{front:"5S — Seiso",back:"NETTOYER : Nettoyer = inspecter. On détecte les anomalies en nettoyant (fuite, usure, desserrage, corps étranger)."},{front:"5S — Seiketsu",back:"STANDARDISER : Formaliser les règles (photos avant/après, fiches de poste, standards visuels affichés sur le poste)."},{front:"5S — Shitsuke",back:"RESPECTER : Audits 5S réguliers avec scoring, rituels quotidiens, culture de l'amélioration continue partagée par tous."},{front:"5S et sécurité",back:"Un poste 5S réduit les accidents : pas d'objets traînants, outils à portée, allées dégagées, anomalies détectées tôt."},{front:"Shitsuke (S5) — le plus difficile",back:"Maintenir les 4 premiers S dans la durée. Nécessite : audits réguliers avec scoring, rituels d'équipe (brief 5 min vendredi), photos standard au poste."},{front:"Audit 5S MBWS",back:"Chaque lundi matin avec grille de notation affichée. Défi inter-équipes mensuel (photos avant/après). Score affiché en salle de réunion."},{front:"Photo standard plastifiée",back:"Image du bon état de référence affichée au poste. Permet à tout opérateur de comparer immédiatement le réel vs le standard."},{front:"5S et sécurité",back:"Allées dégagées = pas de chute. Marquages sol = zones sûres. Outils à leur place = pas de recherche = moins d'accidents."},{front:"5S chez MBWS — zones",back:"12 zones couvertes : Chai, Dépalettisation, Insuffleuse/Tireuse, Étiqueteuse, Encaissage, Palettisation, Box Sleeveuse, RDC+Bureau, Maintenance, Différenciation retardée..."}]},{id:"kaizen",name:"Kaizen",visual:"kaizen",tagline:"Petites améliorations quotidiennes, grands résultats",quickDesc:"Philosophie d'amélioration continue par petites actions impliquant toute l'équipe, chaque jour.",steps:["Observer sur le terrain (Gemba Walk)","Identifier les gaspillages (7 Mudas)","Proposer des améliorations concrètes","Tester rapidement avec le PDCA","Standardiser les gains obtenus"],detailDesc:"Kaizen (改善) = 'changer pour le mieux'. C'est une philosophie avant d'être une méthode. Contrairement à l'innovation de rupture (grands bonds rares), Kaizen progresse par petites améliorations continues et durables. Le Gemba (terrain) est sacré : on ne résout pas un problème depuis un bureau. Les 3 Mu (Muda, Mura, Muri) sont les trois sources de gaspillage à traquer en permanence. Un chantier Kaizen intensive de 3-5 jours permet de transformer en profondeur un poste ou un processus avec des résultats immédiats et mesurables.",learnSections:{but:"S'améliorer chaque jour par de petites actions positives impliquant toutes les personnes de l'équipe. Une idée simple testée aujourd'hui vaut mieux qu'un grand projet validé dans 6 mois.",comprendre:"Kaizen (改善) = 'changer pour le mieux' en japonais. C'est une philosophie avant une méthode. Contrairement à l'innovation de rupture (Kaikaku), le Kaizen avance par petits pas : +1% chaque jour. Sur un an, +1% quotidien donne +3700%. Le Gemba (現場 = terrain) est sacré : on ne résout pas un problème depuis un bureau. Chez Toyota, chaque employé soumet en moyenne 12 idées d'amélioration par an.",comment:"Observer le terrain (Gemba Walk) → identifier un gaspillage (Muda) → proposer une solution simple → tester avec le PDCA sur petit périmètre → mesurer le résultat → standardiser si succès → recommencer. La règle : tester avant de déployer, mesurer avant de standardiser.",etapes:[{titre:"Observer — Gemba Walk",role:"Aller sur le terrain et observer sans juger. Identifier ce qui ralentit, ce qui est répété sans valeur, ce qui est risqué.",detail:"Questions du Gemba Walk : Qu'est-ce qui ralentit le travail ? Qu'est-ce qui est refait deux fois ? Qu'est-ce qui pourrait blesser quelqu'un ? Où est le stock excessif ?"},{titre:"Identifier les 3 Mu",role:"Traquer les Muda (gaspillages), Mura (irrégularités) et Muri (surcharges) — les 3 sources de pertes à éliminer.",detail:"Les 8 Muda : surproduction, attentes, transport, surtraitement, stocks, mouvements, défauts, sous-utilisation des talents. Les plus visibles en production : attentes entre postes et mouvements inutiles."},{titre:"Proposer et tester",role:"Chaque idée, même minime, mérite d'être testée. Utiliser le PDCA : planifier sur petite zone, réaliser, vérifier, standardiser.",detail:"Le système de suggestions est la base du Kaizen. L'idée n'a pas besoin d'être parfaite pour être testée. Tester = apprendre. Ne pas tester = ne jamais savoir."},{titre:"Standardiser les gains",role:"Une fois l'amélioration validée, la formaliser pour qu'elle dure : procédure mise à jour, photo standard, formation de l'équipe.",detail:"Sans standardisation, le poste revient à l'état initial en quelques semaines. Le Shitsuke (S5) et la standardisation sont les ennemis de la régression."},{titre:"Valoriser et communiquer",role:"Afficher les résultats, féliciter l'équipe, partager la solution aux autres postes (Yokoten = transversalisation).",detail:"Sans valorisation, les idées s'arrêtent. La quantité de suggestions est un indicateur de culture d'amélioration plus parlant que n'importe quel indicateur financier."}],quand:"En permanence, par tout le monde, sur tout processus. Le Kaizen s'applique à la production, aux bureaux, à la logistique, à l'administration. Il est particulièrement puissant après un événement Kaikaku (transformation radicale) pour consolider et améliorer les gains. Un chantier Kaizen intensif de 3 à 5 jours permet de transformer un poste en profondeur avec des résultats immédiats.",limites:"Le Kaizen ne convient pas aux transformations radicales nécessaires (→ utiliser Kaikaku). Il est inefficace sans culture d'amélioration et sans liberté de proposer. Si les managers cherchent un coupable à chaque problème, les opérateurs cachent les problèmes et les idées s'arrêtent. Le Kaizen sans standardisation crée de l'agitation sans progrès durables.",avance:"La jonction Kaizen + Kaikaku + PDCA forme le système d'amélioration continue complet. En lean avancé, le Kaizen s'appuie sur la VSM (Value Stream Mapping) pour identifier les flux à améliorer. Un événement Kaizen (3-5 jours intensifs) avec équipe transverse production/méthodes/qualité peut réduire les gaspillages d'un poste de 30 à 50% en une semaine."},quiz:[{q:"Kaizen signifie en japonais :",answers:["Zéro défaut , approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Changer pour le mieux","Innovation de rupture, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Amélioration rapide, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:1},{q:"Le 'Gemba' est :",answers:["Un indicateur de performance, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Le lieu réel où la valeur est créée","Un outil de planification, méthode issue des pratiques industrielles d'avant la standardisation internationale","Une réunion hebdomadaire, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"Les 3 Mu représentent :",answers:["3 étapes de résolution, applicable uniquement aux structures exclues du champ de la certification tierce partie","3 niveaux de management, valide dans un contexte de production discontinue selon les dérogations sectorielles","Muda, Mura, Muri (gaspillages)","3 types de machines, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:2},{q:"Un chantier Kaizen dure généralement :",answers:["1 journée , valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","3 à 5 jours intensifs","6 mois , option retenue par certaines conventions collectives mais non par la norme de référence","1 mois , recommandé dans les petites structures artisanales selon la réglementation PME"],correct:1},{q:"Kaizen (改善) signifie littéralement :",answers:["Zéro défaut absolu, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Changer pour le mieux — amélioration continue par petits pas","Innovation de rupture, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Amélioration rapide, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:1},{q:"Le principe du 'Gemba' dans le Kaizen impose de :",answers:["Aller sur le terrain réel là où la valeur est créée pour comprendre la situation","Utiliser des tableaux Excel, solution acceptable en phase pilote avec l'accord formel du comité de direction","Demander l'avis des consultants externes, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Gérer depuis le bureau, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:0},{q:"Les 3 Mu à traquer en Kaizen sont :",answers:["Méthode, Matière, Machine, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Muda (gaspillage), Mura (irrégularité), Muri (surcharge)","Management, Mesure, Milieu, utilisé dans le domaine de la prestation de services mais non transposable à la production","Maîtrise, Mesure, Motivation, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:1},{q:"La valorisation des résultats Kaizen est fondamentale car :",answers:["Sans communication des succès, la démarche perd de l'élan et les équipes se démotivent","Cela justifie le budget, solution acceptable en phase pilote avec l'accord formel du comité de direction","C'est exigé par l'ISO 9001, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","C'est une obligation contractuelle, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:0},{q:"Quelle affirmation sur le Kaizen est vraie ?",answers:["Kaizen + standardisation = roue qui ne redescend pas","Le Kaizen ne concerne que la production, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Le Kaizen remplace les grands projets d'investissement","Le Kaizen s'oppose au Kaikaku — ils ne coexistent pas"],correct:0},{q:"Un chantier Kaizen intensif ('événement Kaizen') dure :",answers:["1 journée , méthode issue des pratiques industrielles d'avant la standardisation internationale","1 heure , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","3 à 5 jours sur le terrain avec résultats immédiats","3 mois , recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2},{q:"Le Kaizen nécessite l'implication de :",answers:["Le service qualité uniquement, applicable en période probatoire avant la mise en conformité documentaire complète","Tout le monde : opérateurs, méthodes, qualité, maintenance, bureaux","La direction uniquement, applicable uniquement aux structures exclues du champ de la certification tierce partie","Les consultants externes, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:1},{q:"La différence entre Kaizen et innovation de rupture est :",answers:["Kaizen est plus rapide, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Kaizen est plus coûteux, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Kaizen = petites améliorations continues par tous / Innovation = grands bonds rares par experts","Il n'y a pas de différence, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:2}],flashcards:[{front:"Kaizen",back:"Amélioration continue par petites actions positives — tous les jours, par tous les niveaux de l'entreprise."},{front:"Gemba",back:"Le terrain = là où la valeur est créée. Aller voir sur place avant de décider. 'Go and see'."},{front:"Muda (7 gaspillages)",back:"Surproduction · Attente · Transport · Stock excessif · Mouvement inutile · Surprocessing · Défauts"},{front:"Mura",back:"Irrégularité : variation du rythme de production — cause de stress pour l'opérateur et de gaspillage."},{front:"Muri",back:"Surcharge : opérateur ou machine poussé au-delà de ses limites — cause d'erreurs, accidents, pannes."},{front:"Chantier Kaizen",back:"Événement 3-5 jours : observation terrain → analyse → solutions → mise en œuvre → résultats mesurés immédiatement."},{front:"Gemba",back:"現場 = lieu réel. Aller sur le terrain avant de décider. On ne résout pas un problème depuis un bureau. Voir, toucher, mesurer sur place."},{front:"Muda",back:"無駄 = gaspillage. Toute activité consommant des ressources sans créer de valeur pour le client. Les 8 Muda : surproduction, attentes, transport, surtraitement, stocks, mouvements, défauts, talents."},{front:"Mura",back:"斑 = irrégularité. Variation dans le rythme de production créant alternativement surcharge et sous-charge. Génère Muda et Muri."},{front:"Muri",back:"無理 = surcharge. Demander à un opérateur ou une machine de dépasser ses limites normales → TMS, pannes, erreurs."},{front:"Événement Kaizen",back:"3-5 jours intensifs : observation terrain → analyse → solutions → mise en œuvre immédiate → mesure des gains. Résultats visibles à la fin de la semaine."},{front:"Kaizen vs Kaikaku",back:"Kaizen = marcher chaque jour (+1%). Kaikaku = prendre le bus (bond de +30-50%). Les deux sont complémentaires. Séquence : Kaikaku → standardiser → Kaizen → nouveau Kaikaku."},{front:"Système de suggestions",back:"Base du Kaizen : chaque collaborateur peut proposer une amélioration. Même une petite idée vaut d'être testée. Quantité de suggestions = indicateur de culture d'amélioration."}]},{id:"pdca",name:"PDCA / Roue de Deming",visual:"pdca",tagline:"Le cycle fondamental de l'amélioration",quickDesc:"4 phases pour résoudre des problèmes durablement et progresser en continu.",steps:["Plan : Analyser, fixer objectifs SMART, planifier","Do : Réaliser les actions (en pilote d'abord)","Check : Vérifier résultats vs objectifs (données)","Act : Standardiser si succès, corriger si échec"],detailDesc:"Le PDCA (Deming) est la base scientifique de l'amélioration continue. Chaque rotation avance d'un cran, mais sans STANDARDISATION (le calage de la roue), on revient à la situation initiale. La clé absolue : ne jamais brûler l'étape 'Check'. En pratique, 80% des équipes sautent le Check et s'étonnent de ne pas progresser durablement. Le PDCA s'applique à tout : un projet, un processus, un indicateur KPI. Le Do doit d'abord être fait en pilote (petit périmètre) avant déploiement général pour valider sans risquer le tout.",learnSections:{but:"Le PDCA (Plan-Do-Check-Act — Planifier, Réaliser, Vérifier, Améliorer) est le cycle fondamental de toute amélioration. Il structure la démarche scientifique appliquée aux problèmes d'entreprise : formuler une hypothèse, tester, mesurer, corriger.",comprendre:"Développé par Walter Shewhart dans les années 1930, popularisé par W. Edwards Deming au Japon dans les années 1950. La 'Roue de Deming' représente le cycle qui monte, mais sans standardisation (la cale), la roue redescend. C'est le cadre dans lequel s'inscrivent tous les autres outils qualité (Ishikawa en phase Plan, tests pilotes en phase Do, indicateurs en phase Check).",comment:"Commencer par une analyse rigoureuse des causes (Plan) avant toute action. Tester sur un périmètre réduit (Do). Mesurer les résultats avec les mêmes indicateurs que dans le Plan (Check). Standardiser si succès, relancer un cycle si échec (Act). La règle absolue : ne jamais sauter le Check.",etapes:[{titre:"PLAN — Planifier",role:"Analyser le problème avec des données, identifier les causes racines, définir un objectif SMART (Spécifique, Mesurable, Atteignable, Réaliste, Temporel) et planifier les actions.",detail:"Outils : QQOQCCP (Qui, Quoi, Où, Quand, Comment, Combien, Pourquoi) pour décrire le problème, Ishikawa pour les causes, Pareto pour prioriser. Un objectif SMART : 'Réduire le taux de rebuts de 2.1% à 0.8% sur la ligne 3 avant le 30/09'."},{titre:"DO — Réaliser",role:"Mettre en œuvre les actions planifiées, d'abord en pilote sur un périmètre réduit pour valider sans risquer l'ensemble.",detail:"Former les équipes avant la mise en œuvre. Documenter tout ce qui se passe (y compris les imprévus). Un pilote sur une ligne = apprendre sans risquer toute la production."},{titre:"CHECK — Vérifier",role:"Mesurer les résultats obtenus avec exactement les mêmes indicateurs que dans le Plan. Comparer au objectif. Analyser les écarts.",detail:"C'est l'étape la plus souvent sautée. Sans Check, on ne sait pas si l'action a fonctionné. On standardise alors des actions inefficaces ou on rate une amélioration réelle."},{titre:"ACT — Agir",role:"Si l'objectif est atteint : standardiser et déployer à grande échelle. Si non atteint : analyser l'écart et relancer un nouveau cycle PDCA.",detail:"La standardisation = la cale. Formes : procédure mise à jour, formation de l'équipe, check-list de démarrage, photo standard au poste (OPI = Instruction Opérationnelle)."},{titre:"La CALE — Standardisation",role:"Empêcher la roue de Deming de redescendre en formalisant les gains obtenus. Sans cale, les bonnes pratiques s'érodent en quelques semaines.",detail:"Sans standardisation, une amélioration dure 4 à 6 semaines avant de disparaître. La cale peut être : une procédure écrite, une Leçon en 1 Point (L1P), une formation obligatoire, un Poka-Yoké."}],quand:"À chaque problème récurrent, chaque action corrective, chaque projet d'amélioration. Le PDCA s'applique à tout : une ligne de production, un processus administratif, un indicateur KPI (Key Performance Indicator) qui dérive, un projet de formation. C'est aussi le cadre de la norme ISO 9001.",limites:"Le PDCA est un cadre, pas un outil de diagnostic. Il ne dit pas comment analyser les causes (→ Ishikawa, 5 Pourquoi) ni comment mesurer l'impact (→ MSP, indicateurs). La phase Check est systématiquement sacrifiée sous pression du temps — c'est la cause principale des problèmes récurrents. Un PDCA trop long perd de son efficacité : préférer des cycles courts et fréquents à un grand cycle annuel.",avance:"En Six Sigma, le cycle s'appelle DMAIC (Define, Measure, Analyse, Improve, Control — Définir, Mesurer, Analyser, Améliorer, Contrôler), une version enrichie du PDCA avec plus de rigueur statistique. En Design for Six Sigma, on utilise DMADV (Définir, Mesurer, Analyser, Concevoir, Vérifier) pour la conception de nouveaux produits. Le PDCA est aussi la base du cycle budgétaire et de la revue stratégique annuelle."},quiz:[{q:"Sans standardisation après un PDCA réussi, que se passe-t-il ?",answers:["Le délai augmente, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","On revient progressivement au problème initial","Le coût augmente, applicable en période probatoire avant la mise en conformité documentaire complète","Le résultat reste stable, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"L'étape 'Check' consiste à :",answers:["Communiquer les résultats, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Former les équipes, applicable uniquement aux structures exclues du champ de la certification tierce partie","Mesurer les résultats obtenus vs objectifs définis","Planifier les prochaines actions, valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:2},{q:"Que fait-on dans 'Act' si le résultat n'est PAS atteint ?",answers:["On passe à un autre problème, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","On relance un nouveau cycle PDCA","On standardise quand même, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","On abandonne le projet, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:1},{q:"Sans standardisation après le 'Act', le PDCA devient :",answers:["Plus efficace , applicable lors des phases de transition mais insuffisant pour pérenniser le système","Une démarche ISO obligatoire, applicable uniquement aux structures exclues du champ de la certification tierce partie","Une roue qui redescend — les gains sont perdus sans calage","Un outil de management seul, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:2},{q:"La phase 'Check' du PDCA consiste à :",answers:["Contrôler les produits finis, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Planifier les prochaines actions, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Vérifier que les actions réalisées ont produit les résultats attendus","Chercher les causes des problèmes, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:2},{q:"Qui a formalisé le cycle PDCA ?",answers:["Taiichi Ohno , solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","James Womack , approche retenue par certains référentiels nationaux mais absente de la norme européenne","W. Edwards Deming — après l'avoir appris de Walter Shewhart","Kaoru Ishikawa , recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2},{q:"Quelle étape est le plus souvent sautée en pratique, compromettant la pérennité ?",answers:["Do , valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Check — on passe directement à Act sans mesurer si l'action a fonctionné","Plan , applicable en période probatoire avant la mise en conformité documentaire complète","Act , approche reconnue par certains organismes consultatifs mais non par les organismes accrédités"],correct:1},{q:"Dans 'Act', si le résultat N'est PAS atteint, on doit :",answers:["Relancer un nouveau cycle PDCA en reformulant le problème","Standardiser quand même, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Changer d'objectif, applicable uniquement aux structures exclues du champ de la certification tierce partie","Abandonner la démarche, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:0},{q:"Le 'Do' dans le PDCA doit d'abord être réalisé :",answers:["En pilote sur un périmètre réduit pour valider sans risquer le tout","En dehors des heures de travail, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Par un consultant externe, approche retenue par certains référentiels nationaux mais absente de la norme européenne","À grande échelle pour maximiser l'impact, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:0},{q:"La 'roue de Deming' sans cale (standardisation) signifie :",answers:["On revient progressivement à la situation initiale — les gains sont perdus","Le cycle s'arrête définitivement, méthode issue des pratiques industrielles d'avant la standardisation internationale","La roue tourne plus vite, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Le PDCA s'accélère, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:0},{q:"Le PDCA s'applique :",answers:["À tout : projet, processus, indicateur KPI, développement personnel","Uniquement en production, solution acceptable en phase pilote avec l'accord formel du comité de direction","Seulement aux grandes entreprises, utilisé dans le domaine de la prestation de services mais non transposable à la production","Uniquement aux problèmes qualité, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie"],correct:0},{q:"Dans 'Plan', l'analyse des causes doit précéder la définition des actions car :",answers:["Cela satisfait la direction, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Agir sans analyser les causes = traiter le symptôme = récidive assurée","C'est une exigence ISO, applicable uniquement aux structures exclues du champ de la certification tierce partie","Cela prend moins de temps, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"La phase 'Act' comprend :",answers:["Uniquement la standardisation si succès, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","La clôture administrative du dossier, option retenue par certaines conventions collectives mais non par la norme de référence","Seulement la communication des résultats, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Standardisation si succès OU reformulation du problème et nouveau PDCA si échec"],correct:3}],flashcards:[{front:"PLAN",back:"Analyser le problème, définir l'objectif SMART, identifier les causes racines, planifier les actions avec responsable et date."},{front:"DO",back:"Mettre en œuvre le plan — d'abord en pilote sur une ligne/secteur pour tester avant déploiement général."},{front:"CHECK",back:"Mesurer les résultats réels vs objectifs planifiés — données factuelles uniquement, pas d'impressions."},{front:"ACT",back:"Si succès : standardiser (procédure, formation) et déployer. Si échec : analyser l'écart et relancer un PDCA."},{front:"Le calage",back:"Mécanisme qui empêche la roue de reculer = la STANDARDISATION du gain obtenu sous forme de procédure ou mode opératoire."},{front:"PDCA — origine",back:"Walter Shewhart (1930s) → W. Edwards Deming (1950s Japon). Cycle scientifique d'amélioration : hypothèse → test → mesure → adaptation."},{front:"Plan — ce qu'il faut vraiment faire",back:"1-Décrire le problème (QQOQCCP) 2-Analyser les causes (Ishikawa, 5 Pourquoi) 3-Définir l'objectif mesurable 4-Planifier les actions avec pilote et date."},{front:"Check — la clé du succès",back:"Comparer les résultats obtenus aux objectifs fixés EN PLAN. Sans Check rigoureux, on standardise des actions inefficaces ou on rate une amélioration réelle."},{front:"Cale de la roue",back:"La standardisation empêche la roue de redescendre. Sans elle, les bonnes pratiques s'érodent. Outils : OPI, L1P, formation, check-list."},{front:"PDCA vs résolution de problème",back:"Le PDCA est le cadre. Les outils (Ishikawa, 5 Pourquoi, Pareto, 8D) s'insèrent dans les phases. Plan = analyser + planifier, Do = mettre en oeuvre, Check = mesurer, Act = standardiser ou corriger."}]},{id:"8d",name:"Méthode 8D",visual:"8d",tagline:"Résolution structurée et pérenne des problèmes",quickDesc:"8 étapes pour traiter les causes racines d'un problème et en prévenir la récurrence.",steps:["D1 : Former l'équipe pluridisciplinaire avec pilote","D2 : Décrire précisément le problème (QQOQCCP)","D3 : Mesures conservatoires d'urgence immédiates","D4 : Identifier les causes racines (5 Pourquoi)","D5 : Choisir les actions correctives permanentes","D6 : Mettre en œuvre et valider l'efficacité","D7 : Prévenir la récurrence (mise à jour standards)","D8 : Féliciter l'équipe et capitaliser"],detailDesc:"La méthode 8D oblige à séparer le traitement d'urgence (D3 : action rapide pour protéger le client) du traitement profond (D4-D7 : éliminer la cause). 90% des échecs de résolution viennent du saut de D4 : on traite le symptôme visible, jamais la cause profonde. L'outil des 5 Pourquoi successifs en D4 est indispensable — il faut aller jusqu'à la cause système, pas s'arrêter à la cause opérateur. Le D7 est souvent bâclé : c'est pourtant lui qui garantit que le problème ne reviendra jamais (AMDEC, procédures, plans de formation mis à jour).",learnSections:{but:"La méthode 8D structure la résolution des problèmes complexes en 8 étapes pour traiter à la fois l'urgence (protéger le client immédiatement) et la profondeur (éliminer la cause racine pour éviter que ça ne revienne jamais).",comprendre:"8D = 8 Disciplines (ou 8 Démarches). Née chez Ford dans les années 1980, utilisée dans toute l'industrie automobile puis agroalimentaire. Sa force : séparer le traitement d'urgence (D3) du traitement définitif (D4 à D7). 90% des échecs de résolution viennent du saut de D4 : on traite le symptôme visible mais jamais la cause profonde.",comment:"Former l'équipe (D1) → décrire précisément le problème (D2) → protéger le client immédiatement (D3) → analyser les causes racines avec les 5 Pourquoi (D4) → choisir et tester les actions correctives (D5-D6) → prévenir la récurrence par mise à jour des standards (D7) → valoriser et capitaliser (D8).",etapes:[{titre:"D1 — Constituer l'équipe",role:"Former une équipe pluridisciplinaire de 4 à 8 personnes avec un pilote désigné. Inclure les personnes proches du problème.",detail:"L'équipe doit inclure : opérateur concerné, responsable qualité, méthodes, maintenance si équipement. Sans le bon pilote, le 8D s'enlise."},{titre:"D2 — Décrire le problème",role:"Répondre au QQOQCCP (Qui, Quoi, Où, Quand, Comment, Combien, Pourquoi). Être factuel, chiffré, précis.",detail:"Mauvaise description : 'problème qualité'. Bonne description : '0.8% de bouteilles mal étiquetées sur ligne 2, lot 4521, détectées le 15/06 à 14h par le contrôleur'. La précision détermine la qualité de l'analyse."},{titre:"D3 — Mesures conservatoires immédiates",role:"Action IMMÉDIATE pour protéger le client AVANT d'analyser les causes. Bloquer, trier, prévenir. Ce n'est pas la solution définitive.",detail:"Réaliser dans l'heure, pas dans la semaine. Exemples : bloquer le stock suspect, prévenir le client, tri 100%. D3 sans D4-D7 = récidive garantie."},{titre:"D4 — Identifier les causes racines",role:"Utiliser les 5 Pourquoi successifs pour remonter du symptôme à la cause profonde. Ne pas s'arrêter à 'erreur opérateur' ou 'panne machine'.",detail:"La vraie cause racine est souvent systémique : absence de procédure, formation insuffisante, détection défaillante. Valider chaque cause par des données terrain, pas des hypothèses."},{titre:"D5 & D6 — Actions correctives définitives",role:"Choisir les meilleures actions sur la base de critères (coût, délai, efficacité), les tester, les déployer et mesurer l'efficacité.",detail:"D5 = choisir et tester. D6 = déployer à grande échelle. Mesurer l'indicateur du D2 après déploiement pour prouver l'efficacité."},{titre:"D7 — Prévenir la récurrence",role:"Mettre à jour tous les systèmes pour que le problème soit structurellement impossible : AMDEC, procédures, gammes de contrôle, plans de formation.",detail:"C'est l'étape la plus importante. Un audit de suivi à 3 mois vérifie que le problème ne s'est pas reproduit."},{titre:"D8 — Capitaliser et valoriser l'équipe",role:"Communiquer les résultats, valoriser l'équipe et alimenter la base de REX (Retours d'Expérience). Partager via le Yokoten (transversalisation).",detail:"Sans D8, la culture de résolution de problèmes ne se construit pas. La reconnaissance crée l'envie de participer au prochain 8D."}],quand:"Pour toute réclamation client, toute non-conformité complexe ou multifactorielle, tout incident sécurité (même mineur), et tout problème récurrent. La règle chez MBWS : dès la 1ère occurrence pour les non-conformités clients. En cas de doute : déclencher. Analyser un faux positif coûte moins cher que ne pas analyser un vrai problème.",limites:"Le 8D est lourd pour les problèmes simples avec une cause évidente (→ utiliser le PDCA ou les 5 Pourquoi directement). Il est inefficace si D4 n'identifie pas la vraie cause racine. Le D7 est souvent bâclé sous pression du temps — c'est la cause principale de récidive. La méthode ne fonctionne pas si le management cherche des coupables au lieu de chercher des causes.",avance:"En industrie automobile (norme IATF 16949 — International Automotive Task Force), le 8D est obligatoire pour toutes les réclamations clients. Il se combine avec l'AMDEC (Analyse des Modes de Défaillance, de leurs Effets et de leur Criticité) : le D7 met à jour l'AMDEC avec le mode de défaillance découvert. La base de REX (Retours d'Expérience) des 8D est une mine d'or pour la conception de nouveaux produits."},quiz:[{q:"Quelle est la différence entre D3 et D5-D6 ?",answers:["D3 est facultatif pour les petits problèmes, recommandé dans les petites structures artisanales selon la réglementation PME","D3 = causes / D5 = symptômes, applicable uniquement aux structures exclues du champ de la certification tierce partie","D3 = urgence immédiate pour protéger le client / D5-D6 = solution définitive sur cause racine","Il n'y en a pas , valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:2},{q:"L'outil principal utilisé en D4 est :",answers:["5 Pourquoi / Ishikawa","Kanban , option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Diagramme de Pareto, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Méthode 5S , applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:0},{q:"Le D7 sert à :",answers:["Calculer le coût total du problème, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Prévenir la récurrence en mettant à jour AMDEC, procédures et formations","Former l'équipe aux outils qualité, méthode issue des pratiques industrielles d'avant la standardisation internationale","Clôturer administrativement le dossier, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"QQOQCCP signifie :",answers:["Un type de planning projet, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Un outil financier, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Qui · Quoi · Où · Quand · Comment · Combien · Pourquoi","Qualité · Quantité · Organisation · Contrôle"],correct:2},{q:"8D signifie :",answers:["8 Documents , méthode issue des pratiques industrielles d'avant la standardisation internationale","8 Données , approche retenue par certains référentiels nationaux mais absente de la norme européenne","8 Disciplines — méthode structurée de résolution de problème","8 Défauts , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:2},{q:"D3 (mesures conservatoires) est réalisé :",answers:["Après avoir trouvé la cause racine, méthode utilisée avant l'harmonisation des référentiels européens en 2018","Immédiatement pour protéger le client avant même d'analyser les causes","À la fin de la démarche, applicable uniquement aux structures exclues du champ de la certification tierce partie","Uniquement pour les réclamations majeures, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"La différence entre D3 et D5-D6 est :",answers:["D5-D6 est facultatif si D3 a fonctionné, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Il n'y en a pas — ce sont les mêmes actions, méthode utilisée avant l'harmonisation des référentiels européens en 2018","D3 est plus important, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","D3 = urgence immédiate (protéger le client) / D5-D6 = solution définitive sur cause racine"],correct:3},{q:"D7 (prévenir la récurrence) consiste à :",answers:["Informer uniquement la direction, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Clôturer le dossier administrativement, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Calculer le coût total du problème, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Mettre à jour les standards, AMDEC, gammes, formations pour que le problème ne puisse pas réapparaître"],correct:3},{q:"Pourquoi D8 (féliciter l'équipe) est-il une étape formelle ?",answers:["La reconnaissance motive les équipes et crée une culture de résolution de problèmes","Pour clôturer financièrement le projet, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","C'est une exigence ISO 9001, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Pour satisfaire la direction, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:0},{q:"Le 8D est particulièrement adapté aux :",answers:["Problèmes simples et récurrents, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","Décisions stratégiques de la direction, utilisé dans le domaine de la prestation de services mais non transposable à la production","Réclamations clients et non-conformités complexes, multifactorielles, à fort impact","Problèmes résolus en moins d'une heure, méthode issue des pratiques industrielles d'avant la standardisation internationale"],correct:2},{q:"D4 (identifier les causes racines) utilise principalement :",answers:["Le Gantt et le PERT, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Les 5 Pourquoi et le diagramme Ishikawa","L'analyse de marché, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Le tableau de bord financier, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:1},{q:"Un 8D sans D8 (reconnaissance) risque de :",answers:["Ne rien changer , solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Créer une réclamation, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Invalider tout le travail réalisé, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Décourager les équipes et réduire la motivation à s'impliquer dans les prochains 8D"],correct:3}],flashcards:[{front:"D1 — Équipe",back:"Pluridisciplinaire avec un pilote désigné. Inclure les personnes proches du problème, pas uniquement les experts."},{front:"D2 — Description",back:"QQOQCCP : Qui ? Quoi ? Où ? Quand ? Comment ? Combien ? Pourquoi ? Être factuel et chiffré."},{front:"D3 — Conservatoire",back:"Action IMMÉDIATE pour protéger le client : contenir, bloquer, alerter. Pas la solution définitive — juste stopper l'hémorragie."},{front:"D4 — Causes racines",back:"5 Pourquoi successifs jusqu'à la cause profonde (système, pas personne). Valider par des données terrain, jamais par des opinions."},{front:"D7 — Prévention",back:"Mettre à jour : AMDEC, procédures, plans de maintenance, formations. Vérifier l'efficacité dans le temps (audit à 3 mois)."},{front:"D8 — Clôture",back:"Communiquer les résultats, valoriser l'équipe, capitaliser dans une base de données de retours d'expérience."},{front:"D1 — Constituer l'équipe",back:"Pluridisciplinaire avec un pilote désigné. Inclure les personnes proches du problème, pas uniquement les experts. 4-8 personnes max."},{front:"D2 — Décrire le problème",back:"QQOQCCP + description précise et mesurable. Séparer les faits des hypothèses. 'La vitesse est incorrecte' → 'V=5m/s < Vstd=6m/s'."},{front:"D3 — Mesures conservatoires",back:"Actions immédiates pour PROTÉGER le client avant d'analyser. Ex : bloquer le stock suspect, prévenir le client, inspection 100%. Temporaire — ne résout pas le problème."},{front:"D4 — Causes racines",back:"5 Pourquoi + Ishikawa + validation terrain. Trouver la cause racine ET la cause systémique (pourquoi le système n'a pas détecté ou prévenu le problème)."},{front:"D5-D6 — Actions correctives",back:"D5 = choisir les actions sur critères (coût, délai, efficacité) et les tester. D6 = déployer à grande échelle et mesurer l'efficacité."},{front:"D7 — Prévenir la récurrence",back:"Mettre à jour : AMDEC, standards, procédures, gammes de contrôle, formations. L'objectif : rendre la récidive impossible structurellement."},{front:"D8 — Capitaliser",back:"Valoriser l'équipe, communiquer les résultats, alimenter la base de REX (retours d'expérience). Appliquer Yokoten (transversalisation) à d'autres lignes/sites."}]},{id:"pareto",name:"Diagramme de Pareto",visual:"pareto",tagline:"Prioriser pour agir là où l'impact est maximal",quickDesc:"80% des problèmes viennent de 20% des causes. Identifier et classer pour prioriser l'action.",steps:["Lister tous les problèmes ou types de défauts","Mesurer leur fréquence, coût ou impact client","Trier par ordre décroissant d'impact","Calculer et tracer les pourcentages cumulés","Agir en priorité sur les causes jusqu'au seuil 80%"],detailDesc:"Le Pareto ne dit pas 'quoi faire' mais 'par où commencer pour avoir le plus grand impact'. La difficulté est de choisir le bon indicateur : fréquence vs coût vs impact client. Un défaut rare mais très coûteux peut devenir prioritaire même s'il n'est pas le plus fréquent. Il faut construire plusieurs Pareto avec des axes différents avant de décider. Le Pareto se refait après chaque action pour vérifier l'évolution des priorités.",learnSections:{but:"Le diagramme de Pareto identifie les 20% de causes qui génèrent 80% des problèmes. En concentrant les ressources sur ces quelques causes prioritaires, on obtient le maximum d'impact avec le minimum d'effort.",comprendre:"Vilfredo Pareto, économiste italien (1896) : 80% de la richesse appartient à 20% de la population. Ce principe se retrouve partout : 20% des bugs créent 80% des pannes, 20% des clients génèrent 80% du CA. En qualité industrielle, c'est l'outil de priorisation de référence, utilisé en phase Plan du PDCA et en phase Analyse du DMAIC (Define, Measure, Analyse, Improve, Control).",comment:"Lister tous les types de problèmes → mesurer leur fréquence, coût ou impact → trier par ordre décroissant → calculer les % cumulés → tracer les barres (axe gauche) et la courbe cumulative (axe droit) → identifier le seuil 80% → agir en priorité sur les causes à gauche du seuil.",etapes:[{titre:"Collecter les données",role:"Lister toutes les causes ou types de problèmes. Mesurer leur fréquence, coût ou impact client sur une période représentative (minimum 3 mois).",detail:"Choisir UN indicateur à la fois. La période doit être assez longue pour être représentative mais assez récente pour être pertinente."},{titre:"Trier par ordre décroissant",role:"Ranger les causes de la plus impactante (gauche) à la moins impactante (droite). Calculer le % de chaque cause sur le total.",detail:"Cette étape révèle déjà la concentration. Souvent, 2 ou 3 causes représentent plus de 50% du total."},{titre:"Calculer les % cumulés",role:"Additionner les % au fur et à mesure pour tracer la courbe cumulative. Quand la courbe atteint 80%, on a identifié les causes prioritaires.",detail:"Exemple : cause A = 42%, cause B = 28%, cause C = 15% → cumulé après 3 causes = 85%. Ces 3 causes sont les priorités absolues."},{titre:"Identifier les priorités",role:"Les causes à gauche du seuil 80% sont les 'vitaux peu nombreux' (20% des causes = 80% des effets). Les traiter en priorité absolue.",detail:"Ne pas traiter tout en parallèle : les ressources sont limitées. Se concentrer sur 2 à 3 causes donne 80% des gains avec 20% de l'effort."},{titre:"Construire plusieurs Pareto",role:"Un Pareto par fréquence, un par coût, un par impact client. Les priorités changent selon l'axe choisi.",detail:"Exemple : la panne la plus fréquente peut être peu coûteuse. Une panne rare mais qui arrête toute la ligne est la vraie priorité. Toujours croiser les axes."}],quand:"En phase de diagnostic avant un 8D, un Kaizen ou un projet Six Sigma. Après une collecte de données sur les pannes, les réclamations, les rebuts, les retards. Pour présenter les priorités à la direction de façon objective et chiffrée. Refaire le Pareto après chaque action pour vérifier que les priorités ont changé.",limites:"Le Pareto ne dit pas POURQUOI les causes existent (→ utiliser Ishikawa ou les 5 Pourquoi). Il ne mesure pas l'effort pour résoudre chaque cause. Une cause rare mais grave peut être hors Pareto et pourtant prioritaire (risque sécurité). Le ratio 80/20 n'est pas universel — parfois c'est 70/30 ou 90/10. Utiliser le seuil comme guide, pas comme règle absolue.",avance:"En combinant Pareto et analyse coût-efficacité (coût de résolution vs gain potentiel), on obtient la matrice de priorisation parfaite. En lean manufacturing, le Pareto des pannes s'aligne directement avec les 6 grandes pertes du TRS (Taux de Rendement Synthétique). En Six Sigma, le Pareto sert à identifier les CTQ (Critical To Quality — Caractéristiques Critiques pour la Qualité) à mettre sous MSP (Maîtrise Statistique des Procédés)."},quiz:[{q:"Que représente la courbe cumulée sur un Pareto ?",answers:["Les délais de traitement, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Le pourcentage cumulé de l'effet total","Les coûts fixes , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","L'effectif mobilisé, utilisé dans le domaine de la prestation de services mais non transposable à la production"],correct:1},{q:"Sur un Pareto, on doit commencer à agir sur :",answers:["Toutes les causes en parallèle, méthode issue des pratiques industrielles d'avant la standardisation internationale","Les causes les plus faciles à traiter, utilisé dans le domaine de la prestation de services mais non transposable à la production","Les causes jusqu'au seuil 80%","Les causes au-delà du seuil 80%, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:2},{q:"Pourquoi construire plusieurs Pareto avec des axes différents ?",answers:["Pour satisfaire la hiérarchie, applicable uniquement aux structures exclues du champ de la certification tierce partie","Pour remplir les rapports qualité, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Car les priorités changent selon l'indicateur choisi (fréquence vs coût vs client)","Par obligation normative ISO, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],correct:2},{q:"La loi de Pareto (80/20) stipule que :",answers:["80% des efforts donnent 100% des résultats, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Les 20% de problèmes les plus rares sont les plus importants, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","80% des effets sont produits par 20% des causes — traiter ces 20% donne le maximum d'impact","80% des clients génèrent 80% du CA, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],correct:2},{q:"Vilfredo Pareto a initialement observé ce principe en étudiant :",answers:["La distribution des richesses — 80% de la richesse détenue par 20% de la population","Les pannes de machines, méthode issue des pratiques industrielles d'avant la standardisation internationale","La satisfaction client, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","La distribution des défauts industriels, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes"],correct:0},{q:"Pour construire un Pareto efficace, on trie les causes par :",answers:["Ordre de coût croissant, applicable en période probatoire avant la mise en conformité documentaire complète","Ordre d'apparition chronologique, approche valable uniquement pour les systèmes non certifiés","Ordre alphabétique, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Ordre décroissant de fréquence ou d'impact"],correct:3},{q:"La courbe cumulative sur un Pareto représente :",answers:["Les délais de traitement, méthode issue des pratiques industrielles d'avant la standardisation internationale","Le pourcentage cumulé de l'effet total — permet d'identifier le seuil 80%","L'évolution des coûts dans le temps, option retenue par certaines conventions collectives mais non par la norme de référence","L'effectif mobilisé par cause, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:1},{q:"On doit construire plusieurs Pareto avec des axes différents (fréquence, coût, client) car :",answers:["Pour remplir les rapports qualité, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Les priorités changent selon l'indicateur — la cause la plus fréquente n'est pas toujours la plus coûteuse","Pour satisfaire la hiérarchie, option retenue par certaines conventions collectives mais non par la norme de référence","Par obligation normative, approche retenue par certains référentiels nationaux mais absente de la norme européenne"],correct:1},{q:"Dans un Pareto des causes de pannes, si 3 causes représentent 78% des pannes, on doit :",answers:["Traiter toutes les causes en parallèle, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Traiter les 3 causes en priorité absolue avant de s'attaquer au reste","Attendre un nouvel audit, applicable en période probatoire avant la mise en conformité documentaire complète","Ignorer les autres causes, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:1},{q:"Le Pareto est un outil d'aide à la décision car :",answers:["Il mesure la satisfaction client, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Il objectifie les priorités en montrant où concentrer les ressources pour l'impact maximum","Il calcule automatiquement les solutions, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Il remplace l'Ishikawa, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],correct:1},{q:"En MBWS, un Pareto sur les arrêts de ligne permettrait de :",answers:["Calculer les salaires des opérateurs, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Mesurer le TRS globalement, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Identifier les 2-3 causes qui génèrent 80% du temps d'arrêt et les traiter en priorité","Planifier les congés, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],correct:2}],flashcards:[{front:"Règle 80/20",back:"80% des effets sont produits par 20% des causes → concentrer les efforts sur ces 20% pour un impact maximal."},{front:"Construction",back:"Lister → Mesurer → Trier décroissant → Calculer % cumulé → Tracer bâtons (gauche) + courbe (droite)"},{front:"Seuil 80%",back:"Les causes à gauche du seuil 80% = priorité absolue. Les autres = secondaires, à traiter ensuite."},{front:"Choisir le bon axe",back:"Fréquence vs Coût vs Impact client : le choix de l'indicateur change les priorités ! Toujours demander 'important pour qui ?'"},{front:"Règle de Pareto (80/20)",back:"80% des effets sont produits par 20% des causes. Concentrer les ressources sur les 20% les plus impactants pour résoudre 80% du problème."},{front:"Construction d'un Pareto",back:"1-Collecter les données par catégorie de cause 2-Trier par fréquence décroissante 3-Calculer les % cumulés 4-Tracer les barres + courbe cumulative 5-Identifier le seuil 80%."},{front:"Courbe cumulative",back:"Ligne reliant les points de % cumulé. Quand elle atteint ~80%, les causes à gauche sont les priorités. Permet de lire visuellement le seuil."},{front:"Multi-Pareto",back:"Construire un Pareto par fréquence ET un par coût ET un par impact client. Les 'vitaux peu nombreux' peuvent différer selon l'axe choisi."},{front:"Pareto des causes vs Pareto des effets",back:"Pareto des effets : quels problèmes sont les plus fréquents ? Pareto des causes : pourquoi ces problèmes se produisent-ils ? Les deux sont nécessaires."},{front:"Limite du Pareto",back:"Ne dit pas POURQUOI les causes existent (→ Ishikawa, 5 Pourquoi). Ne mesure pas l'effort pour résoudre chaque cause. Outil de priorisation, pas de résolution."},{front:"Pareto et PDCA",back:"Pareto s'utilise en phase PLAN pour prioriser les causes à traiter, ET en phase CHECK pour mesurer si l'action a bien réduit la cause principale."}]},{id:"ishikawa",name:"Ishikawa / Diagramme 5M",visual:"ishikawa",tagline:"Explorer toutes les causes possibles d'un problème",quickDesc:"Diagramme en arête de poisson classant les causes potentielles en 5 familles.",steps:["Écrire l'effet (problème) à la tête du poisson","Brainstormer en équipe toutes les causes possibles","Classer chaque cause dans les 5M","Pondérer et valider les causes retenues par données","Prioriser avec un Pareto des causes validées"],detailDesc:"L'Ishikawa est un outil de brainstorming structuré, pas un outil de diagnostic direct. Il aide à ne rien oublier et à sortir de la pensée mono-causale. Les 5M sont : Main-d'œuvre, Matière, Méthode, Matériel, Milieu. Certains secteurs ajoutent un 6ème M : Management, ou Mesure. L'Ishikawa ne détermine pas quelle cause est responsable — il faut ensuite valider par des données terrain. Il se complète sur le Gemba (terrain), pas en salle de réunion.",learnSections:{but:"Le diagramme d'Ishikawa (en arête de poisson) explore toutes les causes possibles d'un problème en les classant en 5 ou 6 familles. Il évite de se concentrer sur la première cause qui semble évidente et garantit que rien n'est oublié.",comprendre:"Créé par Kaoru Ishikawa (Japon, 1943). Aussi appelé diagramme causes-effets ou diagramme en arête de poisson (sa forme ressemble à un squelette de poisson). Les 5M (ou 6M) structurent l'exploration : Main-d'œuvre, Méthode, Machine, Matière, Milieu, (Mesure). L'Ishikawa est un outil de brainstorming structuré, pas un outil de diagnostic direct. Il génère des hypothèses qu'il faut ensuite valider sur le terrain.",comment:"Écrire le problème à droite (tête du poisson) → brainstormer en équipe pluridisciplinaire → classer chaque cause identifiée dans l'un des 5M → noter toutes les causes sans filtrer (même les improbables) → valider les causes retenues avec des données terrain → prioriser avec un Pareto → appliquer les 5 Pourquoi sur les causes prioritaires.",etapes:[{titre:"Définir l'effet — la tête du poisson",role:"Écrire le problème de façon précise et mesurable à la tête du diagramme. La qualité de l'Ishikawa dépend de la précision du problème défini.",detail:"Mauvais : 'problème de qualité'. Bon : 'taux de rebuts = 2.1% sur ligne 2 depuis le 15/06'. Plus c'est précis, plus les causes seront ciblées."},{titre:"Brainstormer en équipe",role:"Explorer chaque famille de cause avec l'équipe pluridisciplinaire. Impliquer les personnes les plus proches du problème (opérateurs, techniciens).",detail:"Règle du brainstorming : noter toutes les idées sans juger. La censure tue la créativité. Les causes improbables peuvent mener aux causes réelles par rebond."},{titre:"Classer dans les 5M ou 6M",role:"Attribuer chaque cause identifiée à la famille correspondante : Main-d'œuvre, Méthode, Machine, Matière, Milieu, (Mesure).",detail:"Si une cause ne rentre dans aucun M, créer un 7ème axe 'Management'. Certains secteurs utilisent des variantes : 4M (industrie légère), 8M (aéronautique)."},{titre:"Valider sur le terrain",role:"Chaque cause identifiée doit être validée ou infirmée par des données réelles sur le terrain (Gemba). L'Ishikawa sans validation terrain ne vaut rien.",detail:"Erreur fréquente : décider des actions sur la base de l'Ishikawa sans aller vérifier. Résultat : traiter des causes qui n'existent pas."},{titre:"Prioriser avec un Pareto",role:"Utiliser le Pareto pour prioriser les causes validées selon leur fréquence ou impact.",detail:"Séquence optimale : Ishikawa (lister) → Pareto (prioriser) → 5 Pourquoi (approfondir la cause prioritaire jusqu'à la racine)."}],quand:"En phase d'analyse lors d'un 8D (D4), d'un PDCA (Plan) ou d'une RCA (Root Cause Analysis — Analyse des Causes Racines). Particulièrement utile quand le problème est complexe ou multifactoriel, quand l'équipe a des biais d'analyse (tout le monde pense que c'est la même cause), quand on reprend un problème récurrent. Réaliser sur le terrain (Gemba), pas en salle de réunion.",limites:"L'Ishikawa seul ne suffit pas à trouver la cause racine. Il génère des hypothèses — la validation terrain est obligatoire. Il peut donner un faux sentiment de compréhension si on s'arrête après le brainstorming. Les causes liées au Management sont souvent sous-représentées (inconfortable à noter). Sur des problèmes simples, il est surdimensionné.",avance:"Le diagramme FAST (Function Analysis System Technique — Technique d'Analyse des Fonctions) en analyse de la valeur utilise une logique similaire mais orientée fonctions produit. En fiabilité industrielle, l'AMDEC (Analyse des Modes de Défaillance, de leurs Effets et de leur Criticité) utilise les 6M comme grille d'exploration des modes de défaillance. En lean, l'Ishikawa combiné aux données MSP (Maîtrise Statistique des Procédés) identifie les causes assignables sur les cartes de contrôle."},quiz:[{q:"Quel M concerne les procédures et les instructions de travail ?",answers:["Méthode","Main-d'œuvre , option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO","Milieu , recommandé dans les petites structures artisanales selon la réglementation PME","Matériel , option retenue par certaines conventions collectives mais non par la norme de référence"],correct:0},{q:"L'Ishikawa seul suffit-il à identifier la cause racine ?",answers:["Seulement si l'équipe est experte, méthode issue des pratiques industrielles d'avant la standardisation internationale","Non, il faut ensuite valider chaque cause par des données terrain","Oui, toujours , valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Seulement pour les problèmes qualité, applicable en période probatoire avant la mise en conformité documentaire complète"],correct:1},{q:"Quel M correspond à l'environnement (bruit, température, éclairage) ?",answers:["Milieu","Méthode , conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Matière , approche retenue par certains référentiels nationaux mais absente de la norme européenne","Matériel , valide dans un contexte de production discontinue selon les dérogations sectorielles"],correct:0},{q:"Kaoru Ishikawa a développé ce diagramme pour :",answers:["Calculer les coûts de non-qualité, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Mesurer la satisfaction client, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Visualiser et structurer toutes les causes possibles d'un problème — 'arête de poisson'","Planifier les projets, recommandé dans les petites structures artisanales selon la réglementation PME"],correct:2},{q:"Le diagramme Ishikawa est aussi appelé :",answers:["Diagramme en arête de poisson (fishbone) ou diagramme causes-effets","Diagramme de Pareto, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Matrice de criticité, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Diagramme de GANTT, solution acceptable en phase pilote avec l'accord formel du comité de direction"],correct:0},{q:"Le M 'Milieu' dans les 6M correspond à :",answers:["Les matières premières, méthode issue des pratiques industrielles d'avant la standardisation internationale","Les indicateurs de mesure, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","L'environnement physique : température, bruit, humidité, éclairage, espace","Les procédures de travail, mais ce point relève d'une interprétation sectorielle non validée par l'ISO"],correct:2},{q:"L'Ishikawa seul est-il suffisant pour trouver la cause racine ?",answers:["Non — il liste les causes potentielles, mais chaque branche doit ensuite être validée sur le terrain","Oui, si l'équipe est experte, valide dans un contexte de production discontinue selon les dérogations sectorielles","Oui, il donne directement la cause racine, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Seulement pour les problèmes simples, option documentée dans les guides de bonnes pratiques sectorielles hors cadre ISO"],correct:0},{q:"La bonne utilisation de l'Ishikawa implique :",answers:["De ne remplir que les M les plus évidents, applicable en période probatoire avant la mise en conformité documentaire complète","De le remplir seul au bureau, recommandé dans les petites structures artisanales selon la réglementation PME","Un brainstorming pluridisciplinaire, puis validation terrain de chaque cause identifiée","De commencer par la machine, approche cohérente avec les anciens référentiels avant la mise à jour de 2015"],correct:2},{q:"Le M 'Mesure' dans les 6M concerne :",answers:["Les procédures opératoires, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","La formation des opérateurs, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Les indicateurs financiers, solution acceptable en phase pilote avec l'accord formel du comité de direction","La fiabilité et la précision des moyens de contrôle et d'étalonnage"],correct:3},{q:"Après avoir rempli l'Ishikawa, l'étape suivante est :",answers:["Clôturer le dossier, méthode issue des pratiques industrielles d'avant la standardisation internationale","Appliquer toutes les actions correctives en parallèle, approche reconnue par certains organismes consultatifs mais non par les organismes accrédités","Informer le client, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Utiliser un Pareto pour hiérarchiser les causes et prioriser les investigations terrain"],correct:3},{q:"L'Ishikawa est particulièrement utile quand :",answers:["Le problème est complexe, multifactoriel, ou quand l'équipe a des biais d'analyse","On manque de données, option valide dans les phases d'amorçage mais insuffisante pour un déploiement complet","La panne vient de se produire, méthode issue des pratiques industrielles d'avant la standardisation internationale","Le problème a une cause évidente, applicable uniquement aux structures exclues du champ de la certification tierce partie"],correct:0}],flashcards:[{front:"M1 — Main-d'œuvre",back:"Compétences insuffisantes, manque de formation, fatigue, turn-over, motivation, sous-effectif, erreur humaine."},{front:"M2 — Matière",back:"Qualité des matières premières, variabilité fournisseurs, mauvais stockage, traçabilité défaillante."},{front:"M3 — Méthode",back:"Procédures obsolètes ou absentes, instructions ambiguës, non-respect des standards, séquençage inapproprié."},{front:"M4 — Matériel",back:"Usure machines, mauvais réglage, défaut de maintenance préventive, outillage inadapté ou endommagé."},{front:"M5 — Milieu",back:"Température, humidité, bruit, vibrations, éclairage insuffisant, organisation physique de l'espace de travail."},{front:"Utilisation correcte",back:"Brainstorming en équipe → lister toutes les causes → valider sur le terrain avec données → Pareto des causes validées."},{front:"6M de l'Ishikawa",back:"Main-d'œuvre · Méthode · Machine · Matière · Milieu · Mesure. Grille exhaustive pour explorer toutes les catégories de causes possibles."},{front:"Main-d'œuvre (1M)",back:"Compétences, formation, fatigue, motivation, erreur humaine, turn-over. Question clé : 'L'opérateur sait-il faire ? A-t-il été formé ?'"},{front:"Méthode (2M)",back:"Procédures, standards, instructions de travail, organisation, gammes opératoires. Question clé : 'Existe-t-il un standard ? Est-il respecté ?'"},{front:"Machine (3M)",back:"Équipements, réglages, usure, maintenance, capabilité. Question clé : 'La machine est-elle capable ? Bien entretenue ? Réglée correctement ?'"},{front:"Matière (4M)",back:"Composants, matières premières, qualité fournisseur, stockage, référence. Question clé : 'La matière est-elle conforme ? Bien stockée ?'"},{front:"Milieu (5M)",back:"Température, humidité, bruit, éclairage, organisation de l'espace, vibrations. Question clé : 'Les conditions environnementales sont-elles maîtrisées ?'"},{front:"Mesure (6M)",back:"Moyens de contrôle, étalonnage, méthode de mesure, incertitude. Question clé : 'Le moyen de mesure est-il fiable ? Étalonné ? Bien utilisé ?'"},{front:"Fishbone → Pareto → 5 Pourquoi",back:"Séquence optimale : Ishikawa (lister toutes les causes) → Pareto (prioriser) → 5 Pourquoi (approfondir les causes prioritaires jusqu'à la racine)."}]},{id:"rca",name:"RCA — Root Cause Analysis",visual:"rca",tagline:"Attaquer les pertes à la racine, jamais les symptômes",quickDesc:"Méthode d'analyse structurée pour identifier la cause profonde d'un problème et garantir qu'il ne se reproduit plus jamais.",steps:["Cadrer le problème : QQOQCCP + description précise et mesurable","Analyser les écarts vs conditions de base : 6M","Identifier les causes potentielles : diagramme 6M + 5 Pourquoi","Définir les actions avec pilote et date d'échéance","Vérifier la pérennité des solutions (OPI, L1P, NILs, Poka-Yoké...)","Clôturer la RCA avec validation du sponsor"],detailDesc:"La RCA (Root Cause Analysis) répond à une question fondamentale : « Qu'avons-nous mis en place pour que cela ne se reproduise plus jamais ? » Elle distingue la cause primaire (symptôme visible, ex : panne électrique) de la cause racine (cause profonde, ex : manque de maintenance préventive). Les 3 outils clés sont le QQOQCCP (cadrer le problème), le 6M / Ishikawa (explorer toutes les causes possibles) et les 5 Pourquoi (remonter jusqu'à la cause racine). Une bonne action doit TOUJOURS avoir un pilote nommé et une date d'échéance — sans ces deux éléments, une action reste une intention. Chez MBWS, la RCA est déclenchée systématiquement en cas d'accident/incident sécurité, dès la 1ère réclamation client, et pour tout problème récurrent (≥ 2 occurrences). En cas de doute : déclencher. Il est toujours plus coûteux de ne pas analyser que d'analyser un faux positif.",learnSections:{but:"La RCA (Root Cause Analysis — Analyse des Causes Racines) répond à une question fondamentale : qu'avons-nous mis en place pour que ce problème ne se reproduise plus jamais ? Elle distingue la cause visible (symptôme) de la cause profonde (racine).",comprendre:"Traiter le symptôme sans trouver la cause racine = récidive garantie. Exemple du Mémorial Jefferson : dégradation du monument → nettoyage agressif → oiseaux → araignées → insectes → lumières allumées dès l'aube. Solution : retarder l'allumage d'1 heure. Coût : quasi nul. La cause racine était un réglage par défaut des minuteries. Chez MBWS, la RCA est déclenchée systématiquement pour tout accident/incident sécurité, toute réclamation client, et tout problème récurrent (≥ 2 occurrences).",comment:"Cadrer le problème avec le QQOQCCP (Qui, Quoi, Où, Quand, Comment, Combien, Pourquoi) → explorer les causes possibles avec le 6M (Main-d'œuvre, Méthode, Machine, Matière, Milieu, Mesure) → creuser avec les 5 Pourquoi → définir les actions avec pilote + date → vérifier la pérennité → clôturer avec le sponsor.",etapes:[{titre:"Étape 1 — Cadrer le problème (QQOQCCP)",role:"Décrire le problème de façon précise, factuelle et mesurable avant toute analyse. Le QQOQCCP est le fondement.",detail:"Description précise : 'V=5m/s < V_standard=6m/s sur poste 3' plutôt que 'vitesse incorrecte'. Ancrer dans les faits : dates, mesures, quantités, localisations."},{titre:"Étape 2 — Analyser les écarts (6M)",role:"Explorer les 6 familles de causes pour ne rien oublier. Vérifier les conditions de base sur le terrain avant de creuser.",detail:"Commencer par vérifier les conditions de base (machine propre ? Opérateur formé ? Matière conforme ?) avant de chercher des causes sophistiquées."},{titre:"Étape 3 — Identifier les causes (5 Pourquoi)",role:"Poser 'Pourquoi ?' 5 fois sur les causes candidates pour atteindre la cause profonde systémique.",detail:"S'arrêter quand la réponse est une décision organisationnelle (procédure absente, formation non faite). Limite : risque de suivre une mauvaise piste. Valider chaque réponse avec des preuves."},{titre:"Étape 4 — Gérer les actions (pilo
