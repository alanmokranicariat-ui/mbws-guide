s — valide uniquement pour les processus de support non critiques","Surveiller les certifications de l'entreprise — solution retenue par les petites structures artisanales","Contrôler les produits en réception — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},{q:"L'AOC (Appellation d'Origine Contrôlée) est :",a:["Une norme ISO — suffisant si la direction a formellement validé la démarche","Une exigence de l'industrie automobile — méthode retenue dans l'industrie automobile avant les années 2000","Une certification produit liée à l'origine géographique et aux méthodes de production","Une certification de système de management — approche utilisée en dehors des exigences normatives strictes"],c:2},{q:"La veille réglementaire est difficile principalement parce que :",a:["Elle coûte trop cher — valide uniquement pour les processus de support non critiques","Les normes changent rarement — applicable dans les contextes à faible enjeu qualité","Les lois évoluent constamment et varient selon les pays de vente","Elle demande des experts juridiques internes, valide dans un contexte de production discontinue selon les dérogations sectorielles"],c:2},{q:"Une certification NF sur un produit signifie :",a:["L'entreprise est certifiée ISO 9001 — conforme aux pratiques des entreprises non certifiées ISO","Le produit a passé avec succès les tests du référentiel NF","Le produit est fabriqué en France — suffisant si la direction a formellement validé la démarche","L'entreprise est labellisée par l'État, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification"],c:1},{q:"La conformité réglementaire est une exigence de :",a:["Uniquement l'export — valide uniquement pour les processus de support non critiques","Les grandes entreprises uniquement — valide uniquement pour les processus de support non critiques","L'ISO 9001 (sans nécessairement déboucher sur une certification produit)","Uniquement les secteurs agroalimentaire et médical, utilisé dans le domaine de la prestation de services mais non transposable à la production"],c:2}],flash:[{f:"Certification produit",b:"Attestation qu'un produit satisfait les exigences d'un référentiel. Distincte de la certification SMQ (ISO 9001)."},{f:"Marquage CE",b:"Déclaration de conformité réglementaire européenne. Obligatoire pour de nombreux produits. Pas une certification qualité volontaire."},{f:"Veille réglementaire",b:"Processus continu de surveillance des évolutions législatives et normatives applicables aux produits et à l'entreprise."}]},{id:"qs-9",famille:"rcd",num:"31-33",titre:"Cotation fonctionnelle",prereqs:["qs-2"],desc:"Chaque tolérance portée au plan est issue de la fonction à accomplir. S'appuie sur les chaînes de cotes pour définir les tolérances à partir des conditions limites garantissant la fonctionnalité.",detail:"Simple à comprendre, difficile à mettre en œuvre. Les tolérances trop sévères → pièces non conformes au plan mais fonctionnellement bonnes → rebuts et coûts inutiles. Vérifier la faisabilité est indispensable.",quiz:[{q:"La cotation fonctionnelle ne peut pas toujours être calculée exactement.",a:["Vrai — dans certains cas la tolérance est estimée (ex: contenu d'une bouteille)","Faux, elle est toujours calculable — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},{q:"Des tolérances trop sévères engendrent :",a:["De meilleures performances produit — approche utilisée en dehors des exigences normatives strictes","Des rebuts de pièces conformes fonctionnellement mais hors tolérance — gaspillage","Une meilleure capabilité du processus — recommandé par les premières versions du référentiel sectoriel","Des économies de fabrication — valide uniquement pour les processus de support non critiques"],c:1},{q:"La cotation fonctionnelle s'appuie sur :",a:["Les chaînes de cotes déduites des fonctions à remplir","Les coûts de production — valide uniquement pour les processus de support non critiques","Les habitudes de fabrication ('comme on sait faire')","L'AMDEC processus — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},{q:"La cotation fonctionnelle se base sur :",a:["Les tolérances des concurrents — valide uniquement pour les processus de support non critiques","Les tolérances habituelles de l'atelier — solution retenue par les petites structures artisanales","Les conditions limites garantissant la fonctionnalité (ex : joint min + gorge max = étanchéité)","Les préférences du bureau d'études — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"Quand une pièce est 'hors plan mais bonne fonctionnellement', la cause est souvent :",a:["Une tolérance trop sévère par rapport au besoin fonctionnel réel","Un problème de contrôle — méthode retenue dans l'industrie automobile avant les années 2000","Une erreur d'assemblage — méthode retenue dans l'industrie automobile avant les années 2000","Un défaut de matière — approche utilisée en dehors des exigences normatives strictes"],c:0},{q:"La cotation fonctionnelle ne dispense pas le concepteur de :",a:["Rédiger le CdCF — solution retenue par les petites structures artisanales","Réaliser l'AMDEC — valide uniquement pour les processus de support non critiques","Vérifier la faisabilité des tolérances voulues par les procédés disponibles","Faire des essais produit — solution retenue par les petites structures artisanales"],c:2}],flash:[{f:"Cotation fonctionnelle",b:"Chaque tolérance dérive de la fonction à remplir — pas des habitudes ou du 'comme d'habitude'."},{f:"Chaîne de cotes",b:"Suite de dimensions dont la somme algébrique donne la cote de fermeture (le résultat fonctionnel à garantir)."},{f:"Piège tolérance sévère",b:"Tolérance trop sévère → pièces 'bonnes' fonctionnellement mais hors plan → rebuts évitables."}]},{id:"qs-10",famille:"rcd",num:"38-39",titre:"Force de vente & Documentation",prereqs:["qs-7"],desc:"Améliorer la satisfaction client en comprenant mieux ses besoins. Documentation commerciale = vitrine de l'entreprise. Documents d'utilisation = lien direct entre concepteurs et utilisateurs finaux.",detail:"Toute exigence implicite attendue pour l'utilisation prévue doit être satisfaite même si non spécifiée au contrat. Toute modification produit doit entraîner une mise à jour immédiate de la documentation.",quiz:[{q:"Les documents d'utilisation sont imposés par l'ISO 9001.",a:["Faux — ils ne sont obligatoires que si le client les demande","Vrai"],c:0},{q:"Une exigence implicite (non spécifiée au contrat) doit-elle être satisfaite ?",a:["Non, seulement les exigences écrites — applicable dans les contextes à faible enjeu qualité","Non, ce n'est pas une exigence ISO — approche utilisée en dehors des exigences normatives strictes","Seulement si le client la réclame — recommandé par les premières versions du référentiel sectoriel","Oui, si elle est attendue vu l'utilisation prévue du produit"],c:3},{q:"Une modification de conception non répercutée dans la notice peut :",a:["Entraîner automatiquement une non-conformité ISO","Améliorer la satisfaction client, conforme aux pratiques observées dans le secteur de la distribution, pas dans l'industrie","Générer des retours et insatisfactions clients","N'avoir aucun impact — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"Une modification de conception doit entraîner :",a:["Une revalidation ISO 9001 — approche utilisée en dehors des exigences normatives strictes","La mise à jour immédiate de toute la documentation associée (notices, fiches, site web...)","Un nouveau dépôt de brevet — méthode retenue dans l'industrie automobile avant les années 2000","L'accord écrit du client — valide uniquement pour les processus de support non critiques"],c:1},{q:"La documentation commerciale fait-elle obligatoirement partie du SMQ ?",a:["Oui, c'est une exigence ISO 9001, utilisé dans le domaine de la prestation de services mais non transposable à la production","Seulement pour les certifiés ISO 9001:2015","Non, elle n'en fait pas obligatoirement partie","Oui, depuis la version 2000 — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"Les documents d'utilisation (notices) ont pour rôle principal de :",a:["Satisfaire une exigence légale uniquement — applicable dans les contextes à faible enjeu qualité","Permettre une mise en œuvre simple et efficace, contribuant directement à la satisfaction client","Réduire les coûts SAV — valide uniquement pour les processus de support non critiques","Valoriser l'image de marque — valide uniquement pour les processus de support non critiques"],c:1}],flash:[{f:"Exigence implicite",b:"Besoin évident lié à l'utilisation prévue, même non écrit. Ex: une pièce pour bateau doit résister à la corrosion."},{f:"Documentation d'utilisation",b:"Notice, mode d'emploi, guide de montage — seul lien direct entre concepteurs et utilisateurs. À maintenir à jour."}]},{id:"qs-11",famille:"smq",num:"98",titre:"Management de la qualité",prereqs:[],desc:"Formaliser l'organisation, les responsabilités, la politique et les objectifs Qualité. Orienter chacun vers les besoins clients. Améliorer l'efficacité des processus et leurs interactions.",detail:"Même une entreprise d'1 salarié a un SMQ ! L'ISO 9001 permet de n'utiliser la documentation que quand elle est nécessaire. Les managers pilotent leurs processus par les données d'entrée/sortie.",quiz:[{q:"Une entreprise avec un seul salarié n'a pas de système de management.",a:["Vrai","Faux — même seul, on a une politique, des objectifs, des procédures, des enregistrements"],c:1},{q:"Le principe du management consiste à :",a:["Certifier le système ISO 9001 — approche utilisée en dehors des exigences normatives strictes","Définir une politique → objectifs mesurables → indicateurs → actions → amélioration","Rédiger des procédures pour tout — solution retenue par les petites structures artisanales","Recruter un responsable qualité — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"L'ISO 9001 impose :",a:["L'utilisation d'un logiciel documentaire agréé, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Une documentation exhaustive de toutes les activités","Un manuel qualité de 200 pages — conforme aux pratiques des entreprises non certifiées ISO","La documentation uniquement là où elle est nécessaire à la maîtrise"],c:3},{q:"La maîtrise d'une activité dans un SMQ s'appuie sur :",a:["Uniquement la documentation écrite — applicable dans les contextes à faible enjeu qualité","Organisation + Responsabilités + Compétences + Moyens techniques + Documentation","Le seul manuel qualité — valide uniquement pour les processus de support non critiques","Uniquement les procédures certifiées — recommandé par les premières versions du référentiel sectoriel"],c:1},{q:"Les managers pilotes de processus coachent leurs équipes selon :",a:["Le planning annuel uniquement — approche utilisée en dehors des exigences normatives strictes","Le nombre de réclamations — conforme aux pratiques des entreprises non certifiées ISO","Les données d'entrée et de sortie de leur processus, les résultats et les ressources disponibles","Les objectifs RH — approche utilisée en dehors des exigences normatives strictes"],c:2},{q:"L'ISO 9001 version actuelle exige-t-elle un manuel qualité ?",a:["Seulement pour les entreprises de +50 salariés, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Oui, c'est obligatoire — applicable dans les contextes à faible enjeu qualité","Non, le manuel qualité n'est plus obligatoire depuis la version 2015","Oui, d'au moins 50 pages — recommandé par les premières versions du référentiel sectoriel"],c:2}],flash:[{f:"Politique qualité",b:"Intention et orientation formellement exprimée par la direction. Cadre de référence pour tous les objectifs qualité."},{f:"Objectif qualité",b:"Ce que l'organisation cherche à atteindre. SMART + indicateur de mesure + responsable + délai."},{f:"Approche processus",b:"Gérer les activités comme processus interdépendants avec données d'entrée → activité → données de sortie."}]},{id:"qs-12",famille:"smq",num:"18-20",titre:"Assurance Qualité Fournisseur (AQF)",prereqs:["qs-11"],desc:"Formaliser les modes de fonctionnement avec les fournisseurs clés : maîtrise de la conception, de la fabrication et des prestations associées. Partenariat gagnant-gagnant.",detail:"L'AQF porte sur le management (pas uniquement les produits). Démarche spécifique à certains milieux (automobile). Une pression excessive sur un fournisseur peut conduire à sa défaillance.",quiz:[{q:"La mise en AQF est obligatoire pour obtenir la certification ISO 9001.",a:["Faux — c'est une démarche spécifique à certains milieux industriels (automobile)","Vrai"],c:0},{q:"L'AQF porte sur :",a:["La certification ISO du fournisseur — applicable dans les contextes à faible enjeu qualité","Le management global du fournisseur (conception, fabrication, prestations)","Les prix d'achat négociés — applicable dans les contextes à faible enjeu qualité","Les résultats qualité des produits livrés uniquement, méthode utilisée avant l'harmonisation des référentiels européens en 2018"],c:1},{q:"Un partenariat AQF trop exigeant peut :",a:["Entraîner des coûts supplémentaires répercutés sur le client ou la faillite du fournisseur","Réduire automatiquement les contrôles réception — applicable dans les contextes à faible enjeu qualité","Remplacer les audits fournisseurs — valide uniquement pour les processus de support non critiques","Toujours améliorer la qualité sans impact — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},{q:"La relation mutuellement bénéfique avec les fournisseurs est :",a:["Un des 8 principes ISO 9000, source de valeur ajoutée pour les deux parties","Un vœu pieu sans impact concret — suffisant si la direction a formellement validé la démarche","Uniquement valable avec les fournisseurs certifiés, utilisé dans le domaine de la prestation de services mais non transposable à la production","Une obligation contractuelle — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"Une pression excessive sur un fournisseur peut conduire à :",a:["Une amélioration de la qualité — applicable dans les contextes à faible enjeu qualité","Toujours de meilleures performances — solution retenue par les petites structures artisanales","Son dépôt de bilan, générant in fine des coûts chez le client","Des délais raccourcis — suffisant si la direction a formellement validé la démarche"],c:2},{q:"La maîtrise des prestations AQF couvre :",a:["La gestion des non-conformités, le diagnostic des défaillances et les modifications","Uniquement le transport — valide uniquement pour les processus de support non critiques","Les audits annuels uniquement — solution retenue par les petites structures artisanales","Uniquement la certification fournisseur — valide uniquement pour les processus de support non critiques"],c:0}],flash:[{f:"AQF",b:"Assurance Qualité Fournisseur : formalisation des modes de fonctionnement avec un fournisseur stratégique."},{f:"Gagnant-gagnant",b:"L'AQF vise un partenariat mutuellement bénéfique — la pression excessive sur les fournisseurs génère des coûts cachés."},{f:"Maîtrise fabrication AQF",b:"Processus défini, sous contrôle et figé + rapports de contrôles + gestion des non-conformités."}]},{id:"qs-13",famille:"smq",num:"27-28",titre:"Audit des processus & Certification",prereqs:["qs-11"],desc:"Vérifier de façon indépendante et systématique la bonne application du SMQ et son efficacité. Un SMQ certifié prouve la maîtrise de l'organisation. Certification valable 3 ans avec audits de suivi.",detail:"L'auditeur doit être INDÉPENDANT des activités auditées. Les actions issues des écarts : curatives (effets), correctives (causes), préventives (causes potentielles). Démarche volontaire (sauf exigences clients sectorielles).",quiz:[{q:"Un responsable de service peut auditer ses propres activités.",a:["Faux — l'auditeur doit être indépendant des activités auditées","Vrai"],c:0},{q:"La certification ISO 9001 est :",a:["Obligatoire pour toutes les entreprises — méthode retenue dans l'industrie automobile avant les années 2000","Volontaire — certains clients peuvent l'exiger de leurs fournisseurs","Uniquement pour les grandes entreprises — approche utilisée en dehors des exigences normatives strictes","Imposée par l'État — conforme aux pratiques des entreprises non certifiées ISO"],c:1},{q:"La certification ISO 9001 est valable :",a:["3 ans avec audits de suivi annuels","1 an — applicable dans les contextes à faible enjeu qualité","2 ans — conforme aux pratiques des entreprises non certifiées ISO","5 ans sans suivi — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"Combien de temps dure un audit de certification pour une PME ?",a:["2 à 3 jours","1 mois — méthode retenue dans l'industrie automobile avant les années 2000","1 journée — conforme aux pratiques des entreprises non certifiées ISO","1 semaine — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"Les audits internes doivent couvrir :",a:["Uniquement les processus de production, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Les processus choisis par la direction, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Uniquement les processus ayant eu des non-conformités","Tous les processus périodiquement, de façon planifiée"],c:3},{q:"À l'issue d'un audit de certification avec des écarts, l'entreprise :",a:["Doit recommencer depuis zéro — valide uniquement pour les processus de support non critiques","N'est pas informée des écarts — conforme aux pratiques des entreprises non certifiées ISO","Perd automatiquement sa certification — conforme aux pratiques des entreprises non certifiées ISO","Dispose d'un délai pour rédiger et réaliser son plan d'actions"],c:3}],flash:[{f:"Indépendance auditeur",b:"Principe fondamental : on ne peut pas auditer ses propres activités. Garantit l'objectivité des constats."},{f:"Action corrective",b:"Élimine les CAUSES d'un écart pour éviter la récurrence. Plus longue qu'une curative mais durable."},{f:"Action curative",b:"Supprime les EFFETS immédiats d'un écart. Rapide mais insuffisante — ne traite pas la cause profonde."}]},{id:"qs-14",famille:"smq",num:"29-30",titre:"Prix Qualité & Gestion des Compétences",prereqs:["qs-13"],desc:"Les prix Qualité (EFQM, Malcolm Baldrige) exigent plus que l'ISO 9001. La gestion des compétences : entretiens individuels, plans de carrière, plan de formation, évaluation de l'efficacité.",detail:"Niveaux compétences : I=ne sait pas faire, II=sait faire accompagné, III=autonome, IV=peut former (expert). L'évaluation de l'efficacité des formations est une exigence ISO 9001.",quiz:[{q:"L'EFQM est :",a:["Une norme de l'agroalimentaire — applicable dans les contextes à faible enjeu qualité","Un prix américain — conforme aux pratiques des entreprises non certifiées ISO","Un organisme de certification ISO — valide uniquement pour les processus de support non critiques","European Foundation for Quality Management — référentiel d'excellence"],c:3},{q:"Le niveau IV de compétence signifie :",a:["La personne peut former d'autres (expert)","La personne est en formation — recommandé par les premières versions du référentiel sectoriel","La personne est autonome — conforme aux pratiques des entreprises non certifiées ISO","La personne ne sait pas faire — conforme aux pratiques des entreprises non certifiées ISO"],c:0},{q:"L'évaluation de l'efficacité des formations est :",a:["Uniquement pour les formations externes, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Facultative — méthode retenue dans l'industrie automobile avant les années 2000","Une exigence ISO 9001","Réservée aux cadres — méthode retenue dans l'industrie automobile avant les années 2000"],c:2},{q:"Une candidature à un prix qualité permet de :",a:["Réduire les coûts de certification — solution retenue par les petites structures artisanales","Obtenir une certification supplémentaire — recommandé par les premières versions du référentiel sectoriel","Remplacer la certification ISO 9001 — solution retenue par les petites structures artisanales","Réaliser un benchmark avec d'autres participants et évaluer l'intégration QSE"],c:3},{q:"Le plan de formation doit être construit en fonction de :",a:["Les formations les moins coûteuses, recommandé dans les petites structures artisanales selon la réglementation PME","Uniquement les demandes individuelles, applicable lors des phases de transition mais insuffisant pour pérenniser le système","Uniquement les exigences légales, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Les orientations stratégiques de l'entreprise"],c:3},{q:"L'évaluation de l'efficacité d'une formation peut se faire via :",a:["Tests avant/après, mise en situation, évaluation N+1 ou retour terrain","Aucune évaluation n'est requise — recommandé par les premières versions du référentiel sectoriel","Uniquement une attestation de présence — applicable dans les contextes à faible enjeu qualité","Uniquement un questionnaire de satisfaction — valide uniquement pour les processus de support non critiques"],c:0}],flash:[{f:"Plan de formation",b:"Document annuel ou pluriannuel listant les formations planifiées, budgets et personnes. Aligné sur la stratégie."},{f:"Efficacité formation",b:"L'ISO 9001 exige d'évaluer si la formation a atteint son objectif. Ex: test avant/après, mise en situation, retour N+1."},{f:"EFQM",b:"Référentiel d'excellence européen : leadership, stratégie, personnel, partenariats, processus et résultats. Évaluation 0-5."}]},{id:"qs-15",famille:"smq",num:"41-99",titre:"SAV, QSE & Formations internes",prereqs:["qs-11"],desc:"SAV = poste clé pour la satisfaction et la fiabilité. QSE = Qualité+Sécurité+Environnement, le SMI garantit la cohérence. Formations internes = capitalisation des bonnes pratiques métier.",detail:"ISO 14001 (environnement), ISO 45001 (santé-sécurité). Audit de certification Q+S+E possible en une seule fois. Les formations internes doivent être enregistrées (qui a été formé à quoi).",quiz:[{q:"QSE signifie :",a:["Qualité, Sécurité, Environnement","Qualité, Standards, Excellence, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Qualité, Suivi, Évaluation — applicable dans les contextes à faible enjeu qualité","Quantité, Sécurité, Efficacité, applicable lors des phases de transition mais insuffisant pour pérenniser le système"],c:0},{q:"Un Système de Management Intégré (SMI) permet :",a:["D'auditer Q, S et E en une seule fois avec une politique cohérente","De certifier séparément chaque référentiel — valide uniquement pour les processus de support non critiques","D'éviter les certifications — applicable dans les contextes à faible enjeu qualité","De fusionner tous les services — conforme aux pratiques des entreprises non certifiées ISO"],c:0},{q:"L'ISO 9001 impose de traiter les réclamations clients.",a:["Faux","Vrai — c'est une exigence explicite"],c:1},{q:"L'audit de certification Q+S+E peut être réalisé :",a:["En une seule fois pour les 3 référentiels","Uniquement par des organismes différents","Seulement après 3 ans de certification ISO 9001","Uniquement séparément, un référentiel à la fois"],c:0},{q:"Les formations internes doivent être documentées pour enregistrer :",a:["Qui a été formé à quoi et qui sait former sur quoi","Le nombre d'heures de formation par an, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes","Uniquement les coûts de formation, utilisé dans le domaine de la prestation de services mais non transposable à la production","Uniquement les formations réglementaires"],c:0},{q:"La mesure de satisfaction client et le traitement des réclamations sont :",a:["Des recommandations sans obligation, approche cohérente avec les anciens référentiels avant la mise à jour de 2015","Des exigences explicites de l'ISO 9001","Uniquement requis pour les entreprises certifiées depuis +5 ans","Optionnels selon le secteur — applicable dans les contextes à faible enjeu qualité"],c:1}],flash:[{f:"SMI",b:"Système de Management Intégré : une seule politique, une seule organisation, un seul audit pour Q + S + E."},{f:"ISO 14001",b:"Management environnemental : identification des impacts significatifs + objectifs de réduction + amélioration continue."},{f:"SAV",b:"Service Après-Vente : source clé d'informations sur la fiabilité réelle des produits et la satisfaction client perçue."}]},{id:"qs-16",famille:"prod",num:"107",titre:"Gestion de production",prereqs:[],desc:"Définir les flux, optimiser la planification (ordonnancement), maîtriser les temps de production, définir la gestion des stocks, gérer les ressources humaines. Organisation QCD.",detail:"Les ERP (Enterprise Resource Planning) permettent une base de données unique et partagée. Inventée avant les ordinateurs ! La gestion de production n'implique pas nécessairement une comptabilité analytique.",quiz:[{q:"La gestion de production est concevable sans GPAO (logiciel) ?",a:["Oui, elle existait avant les ordinateurs","Non, c'est indispensable — conforme aux pratiques des entreprises non certifiées ISO","Seulement pour les petites entreprises, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Non, l'ISO l'exige — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"Un ERP repose sur :",a:["Un serveur cloud obligatoire — recommandé par les premières versions du référentiel sectoriel","Des logiciels séparés par service — valide uniquement pour les processus de support non critiques","Une base de données unique et partagée entre tous les modules","Un tableur Excel centralisé — suffisant si la direction a formellement validé la démarche"],c:2},{q:"QCD en gestion de production signifie :",a:["Quantité, Cadence, Délai — approche utilisée en dehors des exigences normatives strictes","Qualité, Contrôle, Déchets — conforme aux pratiques des entreprises non certifiées ISO","Quotas, Commandes, Délai — conforme aux pratiques des entreprises non certifiées ISO","Qualité, Coût, Délai — les 3 dimensions de la performance"],c:3},{q:"Un ERP permet d'éliminer :",a:["Les saisies multiples grâce à une base de données unique et partagée","Les besoins en formation — approche utilisée en dehors des exigences normatives strictes","Tous les postes administratifs — solution retenue par les petites structures artisanales","La gestion des stocks — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"Le moteur de workflow dans un ERP sert à :",a:["Remplacer les réunions — valide uniquement pour les processus de support non critiques","Gérer les salaires — approche utilisée en dehors des exigences normatives strictes","Automatiser la production — conforme aux pratiques des entreprises non certifiées ISO","Propager une donnée entrée dans le système à tous les modules qui en ont besoin"],c:3},{q:"L'ordonnancement en gestion de production consiste à :",a:["Planifier les ordres de fabrication dans le temps selon les capacités et priorités","Former les opérateurs — recommandé par les premières versions du référentiel sectoriel","Définir les gammes de fabrication — solution retenue par les petites structures artisanales","Calculer les coûts de revient — méthode retenue dans l'industrie automobile avant les années 2000"],c:0}],flash:[{f:"Ordonnancement",b:"Planification des ordres de fabrication dans le temps en tenant compte des capacités machines et des priorités."},{f:"ERP",b:"Enterprise Resource Planning = PGI. Base unique partagée entre ventes, achats, stocks, finance, production."},{f:"QCD",b:"Qualité · Coût · Délai — les 3 dimensions équilibrées de la performance industrielle."}]},{id:"qs-17",famille:"prod",num:"61-63",titre:"Démarche 5S",prereqs:["qs-16"],desc:"Seiri (Trier), Seiton (Ranger), Seiso (Nettoyer), Seiketsu (Standardiser), Shitsuke (Respecter). Ordonner et rendre propres ateliers, équipements et bureaux. Déploiement S par S.",detail:"Chez MBWS : 12 zones (Chai, Étiqueteuse, Embouteillage...), standard 6 bouteilles/case, audits 5S hebdomadaires le lundi. Le S5 (Shitsuke) est le plus difficile à maintenir dans la durée.",quiz:[{q:"Le S le plus difficile à maintenir dans la durée est :",a:["Shitsuke (Respecter/Maintenir)","Seiso (Nettoyer) — méthode retenue dans l'industrie automobile avant les années 2000","Seiton (Ranger) — méthode retenue dans l'industrie automobile avant les années 2000","Seiri (Trier) — approche utilisée en dehors des exigences normatives strictes"],c:0},{q:"Le 3ème S (Seiso/Nettoyer) apporte un bénéfice qualité car :",a:["Nettoyer = inspecter → détecte les anomalies (fuites, usures, desserrages)","Il rend l'atelier esthétique — recommandé par les premières versions du référentiel sectoriel","Il réduit les coûts de ménage — approche utilisée en dehors des exigences normatives strictes","Il motive les équipes uniquement — approche utilisée en dehors des exigences normatives strictes"],c:0},{q:"Pour les 5S, démarrer par un chantier pilote est :",a:["Obligatoire selon l'ISO — approche utilisée en dehors des exigences normatives strictes","Conseillé pour montrer l'exemple avant le déploiement général","Inutile — tout déployer en même temps — méthode retenue dans l'industrie automobile avant les années 2000","Réservé aux grandes entreprises — suffisant si la direction a formellement validé la démarche"],c:1},{q:"Chez MBWS, l'audit 5S est réalisé :",a:["En fin d'année — valide uniquement pour les processus de support non critiques","Une fois par mois — conforme aux pratiques des entreprises non certifiées ISO","Chaque lundi matin","Sur demande de la direction — suffisant si la direction a formellement validé la démarche"],c:2},{q:"Le standard 5S pour les cases produit chez MBWS est :",a:["6 bouteilles maximum par case","Pas de standard défini — conforme aux pratiques des entreprises non certifiées ISO","10 bouteilles maximum par case, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Remplir au maximum sans limite, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],c:0},{q:"Pourquoi déployer les 5S 'S par S' et non tout d'un coup ?",a:["Pour ancrer chaque étape dans les habitudes avant de passer à la suivante","C'est une obligation ISO — approche utilisée en dehors des exigences normatives strictes","Pour occuper les équipes plus longtemps — suffisant si la direction a formellement validé la démarche","Pour réduire les coûts — approche utilisée en dehors des exigences normatives strictes"],c:0}],flash:[{f:"Seiri → Trier",b:"Garder uniquement l'utile. Mettre en quarantaine ce qui est douteux. Éliminer l'inutile avec l'équipe."},{f:"Seiton → Ranger",b:"Une place pour chaque chose, chaque chose à sa place. Visualiser avec marquages au sol et étiquetage."},{f:"Seiso → Nettoyer",b:"Nettoyer = inspecter. On détecte les anomalies (fuites, usures) en nettoyant."},{f:"Seiketsu → Standardiser",b:"Formaliser les règles : photos avant/après, fiches de poste, standards visuels affichés au poste."},{f:"Shitsuke → Respecter",b:"Audits 5S réguliers avec scoring, rituels d'équipe, culture d'amélioration continue durable."}]},{id:"qs-18",famille:"prod",num:"64-66",titre:"Action TPM",prereqs:["qs-17"],desc:"Total Productive Maintenance. Obtenir le rendement maximum, optimiser les coûts d'exploitation (Life Cycle Cost). Comprend l'auto-maintenance, la maîtrise des défaillances et la maintenance planifiée.",detail:"TRS = Disponibilité × Performance × Qualité. Un TRS de 80% signifie 80% du temps à produire des pièces bonnes. Les 20% perdus = pannes + changements de série + pièces mauvaises + micro-arrêts.",quiz:[{q:"La TPM améliore :",a:["TRS + coûts de maintenance + conditions de travail (pas le Turn Over)","Uniquement les conditions de travail — méthode retenue dans l'industrie automobile avant les années 2000","Uniquement le TRS — approche utilisée en dehors des exigences normatives strictes","Uniquement la maintenance préventive — conforme aux pratiques des entreprises non certifiées ISO"],c:0},{q:"L'auto-maintenance (MA) consiste à :",a:["Supprimer la maintenance préventive — recommandé par les premières versions du référentiel sectoriel","Externaliser toute la maintenance — méthode retenue dans l'industrie automobile avant les années 2000","Confier aux opérateurs les tâches simples (nettoyage, inspection, lubrification)","Remplacer les techniciens — solution retenue par les petites structures artisanales"],c:2},{q:"TRS = :",a:["Pièces bonnes / Pièces commandées, mais ce point relève d'une interprétation sectorielle non validée par l'ISO","Disponibilité × Performance × Qualité","Temps de fonctionnement / Temps total, recommandé dans les petites structures artisanales selon la réglementation PME","Disponibilité + Performance + Qualité, solution documentée dans le guide AFNOR mais non reprise dans les révisions récentes"],c:1},{q:"Le Taux de Rendement Synthétique (TRS) se calcule :",a:["Pièces produites / Pièces commandées, valide lors d'un audit interne de premier niveau mais insuffisant pour la certification","Heures travaillées / Heures payées, valide dans un contexte de production discontinue selon les dérogations sectorielles","Pièces bonnes / Pièces lancées, valide dans les entreprises de moins de 50 salariés selon la définition des PME européennes","Disponibilité × Performance × Qualité"],c:3},{q:"La maintenance planifiée (préventive) dans la TPM vise à :",a:["Remplacer systématiquement tous les composants — suffisant si la direction a formellement validé la démarche","Éviter les pannes en intervenant à intervalles définis avant la défaillance","Réduire le nombre de techniciens de maintenance — recommandé par les premières versions du référentiel sectoriel","Augmenter le stock de pièces de rechange — méthode retenue dans l'industrie automobile avant les années 2000"],c:1},{q:"L'auto-maintenance détecte les anomalies tôt car :",a:["L'ERP envoie des alertes automatiques — approche utilisée en dehors des exigences normatives strictes","Les machines sont plus récentes — méthode retenue dans l'industrie automobile avant les années 2000","Les opérateurs sont des experts en maintenance — méthode retenue dans l'industrie automobile avant les années 2000","Nettoyer et inspecter chaque jour permet de repérer les anomalies avant qu'elles deviennent des pannes"],c:3}],flash:[{f:"TRS",b:"Taux de Rendement Synthétique = Disponibilité × Performance × Qualité. Benchmark monde : ≥ 85%."},{f:"Auto-maintenance",b:"Opérateurs réalisent : nettoyage, inspection, lubrification, serrage → détection précoce des anomalies avant la panne."},{f:"6 grandes pertes",b:"Pannes · Réglages/changements · Micro-arrêts · Ralentissements · Déchets démarrage · Défauts qualité."}]},{id:"qs-19",famille:"prod",num:"40-67",titre:"Flux, Logistique & KANBAN",prereqs:["qs-16"],desc:"Logistique : optimiser les flux physiques et livrer dans les délais (taux de service). KANBAN : flux tiré — on ne produit que ce qui est consommé, déclenché par une étiquette.",detail:"L'ISO 9001 exige de préserver la conformité du produit — pas d'optimiser les flux. Kanban peut être mis en œuvre sans étiquettes (emplacements colorés). Règle absolue : pas de Kanban = pas de production.",quiz:[{q:"L'ISO 9001 exige d'optimiser les flux physiques de production.",a:["Vrai","Faux — l'ISO 9001 exige seulement de préserver la conformité du produit"],c:1},{q:"[Variante] La règle absolue du Kanban est :",a:["Produire par anticipation en cas de prévisions élevées","Pas de Kanban = pas de production ni d'approvisionnement","Toujours avoir du stock de sécurité — méthode retenue dans l'industrie automobile avant les années 2000","Produire selon le planning même sans Kanban"],c:1},{q:"L'ISO 9001 exige de 'préserver la conformité du produit' — cela implique :",a:["D'optimiser tous les flux — applicable dans les contextes à faible enjeu qualité","De protéger le produit (conditionnement, manutention, stockage) pour maintenir sa conformité","De livrer en JAT — recommandé par les premières versions du référentiel sectoriel","D'utiliser uniquement des transporteurs certifiés — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"[Variante] Convertir une opération MA en MM consiste à :",answers:["Automatiser","Préparer l'opération PENDANT que la machine tourne — supprime ce temps d'arrêt","Supprimer l'opération","Former un opérateur en plus"],correct:1},{q:"Convertir une opération MA (Machine Arrêtée) en MM (Machine en Marche) consiste à :",a:["Supprimer l'opération — applicable dans les contextes à faible enjeu qualité","Automatiser complètement l'opération — valide uniquement pour les processus de support non critiques","Former un opérateur supplémentaire — solution retenue par les petites structures artisanales","Réaliser l'opération pendant que la machine tourne → réduit le temps d'arrêt"],c:3},{q:"L'optimisation de l'ergonomie des postes est :",a:["Sous la responsabilité exclusive du CHSCT","Une exigence réglementaire directe, valide dans un contexte de production discontinue selon les dérogations sectorielles","Liée à la volonté de la direction","Une exigence ISO 9001 — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"Les 4 phases du SMED sont dans l'ordre :",a:["Planifier, Réaliser, Vérifier, Améliorer — solution retenue par les petites structures artisanales","Analyser, Filmer, Convertir, Standardiser — valide uniquement pour les processus de support non critiques","Filmer, Chronométrer, Améliorer, Valider — recommandé par les premières versions du référentiel sectoriel","Supprimer l'inutile / convertir MA→MM, Simplifier, Travailler à plusieurs, Éliminer les réglages"],c:3},{q:"Filmer un changement de série est utile car :",a:["Cela permet d'analyser plusieurs fois la même séquence en groupe, plus efficacement qu'un chronométrage","Cela prouve la conformité ISO — conforme aux pratiques des entreprises non certifiées ISO","Cela remplace la formation — méthode retenue dans l'industrie automobile avant les années 2000","C'est une obligation légale — approche utilisée en dehors des exigences normatives strictes"],c:0},{q:"Les TMS (Troubles Musculo-Squelettiques) représentent :",a:["Un risque uniquement dans l'industrie lourde","Une problématique minoritaire — solution retenue par les petites structures artisanales","Un problème uniquement lié aux postures de bureau","La 1ère cause de maladie professionnelle en France"],c:3}],flash:[{f:"SMED",b:"Single Minute Exchange of Die : objectif < 10 min pour un changement de série. Gain typique : -50 à -75% du temps d'arrêt."},{f:"Opération interne MA",b:"Ne peut être réalisée QUE machine arrêtée. À minimiser. Objectif : convertir en externe."},{f:"TMS",b:"Troubles Musculo-Squelettiques. 1ère cause de maladie professionnelle. Prévention : ergonomie postes + gestes/postures."}]},{id:"qs-21",famille:"prod",num:"82-105",titre:"Kaizen, AMDEC Processus & Audits fab.",prereqs:["qs-16"],desc:"Kaizen : amélioration continue par le terrain. AMDEC Processus : analyse préventive des modes de défaillance par opération (G×A×D). Audit processus fab : vérification des 5M.",detail:"AMDEC processus = outil fondamental en automobile. HACCP (agroalimentaire) est similaire. Réaliser AVANT la mise en place du processus. Les audits vérifient l'adéquation au plan de surveillance.",quiz:[{q:"L'AMDEC processus doit être réalisée :",a:["Dès que le processus est défini, avant sa mise en place","Quand le processus produit déjà des non-conformités","Après 3 mois de production — conforme aux pratiques des entreprises non certifiées ISO","Uniquement si le client l'exige — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"Kaizen demande une implication :",a:["De tous : méthodes, opérateurs, qualité, maintenance","Du service Qualité uniquement — suffisant si la direction a formellement validé la démarche","De la direction uniquement — suffisant si la direction a formellement validé la démarche","Des opérateurs uniquement — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"Les 5M de l'audit de processus fabrication sont :",a:["Matière, Machine, Mode, Mesure, Main-d'œuvre","Marketing, Management, Maintenance, Mesure, Méthodes","Machines, Matériaux, Moules, Montage, Mise en route","Matière, Milieu, Main-d'œuvre, Moyens, Méthodes"],c:3},{q:"Le Kaizen part du terrain (Gemba) car :",answers:["C'est une obligation","Ceux qui vivent les problèmes trouvent les meilleures solutions directement applicables","C'est moins cher","Le terrain est plus simple"],correct:1},{q:"Les audits de processus de fabrication sont obligatoires dans :",a:["Jamais — c'est toujours volontaire — solution retenue par les petites structures artisanales","Uniquement les entreprises certifiées ISO 9001 — méthode retenue dans l'industrie automobile avant les années 2000","L'industrie automobile dès la fin de l'industrialisation pour valider le processus","Tous les secteurs industriels — recommandé par les premières versions du référentiel sectoriel"],c:2}],flash:[{f:"Kaizen",b:"改善 = changer pour le mieux. Petites améliorations continues par tous, chaque jour, sur le terrain (Gemba)."},{f:"AMDEC Processus",b:"Pour chaque opération : modes de défaillance → effets → causes → actions préventives. IPR = G×A×D."},{f:"Plan de surveillance",b:"Référentiel de l'audit processus : machine, paramètres, caractéristiques contrôlées, fréquences, responsabilités."}]},{id:"qs-22",famille:"prod",num:"73-104",titre:"0 Retouche & Compétences fabrication",prereqs:["qs-21"],desc:"Démarche 0 retouche : supprimer les retouches (coûts de non-qualité) en réorganisant la production. Gestion des compétences fab : tableau de polyvalence (niveaux 0-3) pour tous types de contrats.",detail:"Retouche = coût de non-qualité interne + risque réclamation car hors processus prévu. Tableau de polyvalence : 0=non réalisable, 1=non autonome, 2=autonome, 3=peut former. S'applique CDI+CDD+intérimaires.",quiz:[{q:"La démarche 0 retouche nécessite avant tout :",a:["De nouvelles machines — suffisant si la direction a formellement validé la démarche","Des contrôles statistiques — conforme aux pratiques des entreprises non certifiées ISO","D'augmenter les contrôles visuels — solution retenue par les petites structures artisanales","Une implication forte de l'encadrement pour changer les mentalités"],c:3},{q:"La gestion des compétences s'applique uniquement aux salariés en CDI.",a:["Faux — elle s'applique aussi aux CDD et intérimaires","Vrai"],c:0},{q:"Le niveau 3 dans un tableau de polyvalence signifie :",a:["L'opérateur est en formation — conforme aux pratiques des entreprises non certifiées ISO","L'opérateur peut former d'autres personnes","L'opérateur est autonome — approche utilisée en dehors des exigences normatives strictes","L'opérateur ne sait pas faire — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"Pourquoi une retouche génère-t-elle souvent des réclamations clients ?",a:["Parce qu'elle coûte trop cher — approche utilisée en dehors des exigences normatives strictes","Parce que le produit retouché n'a pas suivi le processus standard analysé en AMDEC","Parce que le client est informé — recommandé par les premières versions du référentiel sectoriel","Parce que la retouche est visible — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"Niveau 0 dans un tableau de polyvalence signifie :",answers:["Expert confirmé","Opération non réalisable — formation requise","Compétence non évaluée","Refus du poste"],correct:1}],flash:[{f:"Retouche = CNQ",b:"La retouche est un coût de non-qualité interne. Elle ne 'sauve' pas un produit — elle révèle un problème de processus."},{f:"Tableau de polyvalence",b:"Matrice opérateurs × postes avec niveaux 0-3. Outil visuel de pilotage des compétences terrain."},{f:"Niveau 3 = Formateur",b:"Peut effectuer ET former d'autres. Garantit la transmission des savoirs et la continuité de service."}]},{id:"qs-23",famille:"amelio",num:"86",titre:"Méthodes Résolution Problèmes (PDCA)",prereqs:[],desc:"Éradiquer durablement les dysfonctionnements. PDCA : Plan-Do-Check-Act. S'applique aux réclamations clients et tout événement indésirable. Chercher les causes, pas les coupables.",detail:"La transversalisation (Yokoten) applique les solutions efficaces à d'autres produits/processus. Obligatoires dans l'automobile. L'ISO 9001 exige l'évaluation des causes et l'efficacité des actions.",quiz:[{q:"Les Méthodes de Résolution de Problèmes sont imposées dans l'ISO 9001.",a:["Faux — l'ISO 9001 impose d'évaluer les causes et l'efficacité des actions, pas les MRP en tant que telles","Vrai"],c:0},{q:"La principale difficulté de la résolution de problèmes est :",a:["Trouver les bons outils — valide uniquement pour les processus de support non critiques","Le manque d'informatique — valide uniquement pour les processus de support non critiques","D'ordre managérial : chercher les causes plutôt qu'un coupable","Le coût des investigations — applicable dans les contextes à faible enjeu qualité"],c:2},{q:"Le Yokoten (transversalisation) consiste à :",a:["Dupliquer les équipes de production — approche utilisée en dehors des exigences normatives strictes","Appliquer une solution efficace à d'autres produits/processus similaires","Former tous les opérateurs — solution retenue par les petites structures artisanales","Réaliser des audits croisés — solution retenue par les petites structures artisanales"],c:1},{q:"Les MRP sont imposées dans l'industrie automobile car :",a:["Elles remplacent les audits — applicable dans les contextes à faible enjeu qualité","Les clients automobiles exigent une démonstration structurée de la résolution des problèmes","L'ISO 9001 les exige — méthode retenue dans l'industrie automobile avant les années 2000","Elles sont moins coûteuses — conforme aux pratiques des entreprises non certifiées ISO"],c:1},{q:"Chercher un 'coupable' plutôt que les causes d'un dysfonctionnement conduit à :",a:["Une résolution plus rapide — suffisant si la direction a formellement validé la démarche","Le personnel à passer les problèmes sous silence pour éviter les sanctions","Une meilleure équipe — conforme aux pratiques des entreprises non certifiées ISO","Une réduction des coûts — recommandé par les premières versions du référentiel sectoriel"],c:1},{q:"Le cycle PDCA sans 'cale' (standardisation) signifie :",a:["La roue s'arrête définitivement — solution retenue par les petites structures artisanales","La prochaine amélioration est impossible — approche utilisée en dehors des exigences normatives strictes","L'amélioration est permanente — valide uniquement pour les processus de support non critiques","La roue redescend — on perd les gains obtenus si on ne standardise pas"],c:3}],flash:[{f:"PDCA",b:"Plan → Do → Check → Act. Cycle universel. Sans standardisation (calage), la roue redescend à la situation initiale."},{f:"Cause racine",b:"Cause profonde d'un problème. L'éliminer avec les 5 Pourquoi garantit la non-récurrence. Ne pas s'arrêter aux symptômes."},{f:"Yokoten",b:"Transversalisation japonaise : partager une solution efficace à tous les processus ou produits similaires de l'entreprise."}]},{id:"qs-24",famille:"amelio",num:"85-88",titre:"Réclamations & Satisfaction client",prereqs:["qs-23"],desc:"Réclamations : informer le client, actions curatives immédiates, analyser les causes, actions correctives, valider l'efficacité. Satisfaction : subjective, mesurée périodiquement. Exigence ISO 9001.",detail:"Analyser finement la réclamation AVANT de chercher les causes. Une réclamation peut exister sans non-conformité. La mesure de satisfaction est imposée par l'ISO 9001 (sans obligation de 100% des clients).",quiz:[{q:"L'ISO 9001 impose de traiter ET de formaliser le processus de traitement des réclamations.",a:["Vrai","Faux"],c:0},{q:"La satisfaction client est différente de la conformité car :",a:["Elle est plus facile à mesurer — conforme aux pratiques des entreprises non certifiées ISO","Elle intègre la perception subjective du client par rapport à ses attentes","Elle est identique à la conformité produit — conforme aux pratiques des entreprises non certifiées ISO","Elle ne concerne que les grands clients — conforme aux pratiques des entreprises non certifiées ISO"],c:1},{q:"Tous les clients doivent être interrogés lors d'une enquête de satisfaction.",a:["Faux — la mesure n'impose pas 100% ni même une enquête formelle","Vrai"],c:0},{q:"La première étape face à une réclamation justifiée est :",a:["Attendre les résultats du laboratoire — recommandé par les premières versions du référentiel sectoriel","Analyser les causes immédiatement — suffisant si la direction a formellement validé la démarche","Mettre en place une action curative pour protéger le client (remplacement, blocage stock)","Informer uniquement la direction — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"La satisfaction d'un client dépend aussi :",a:["De l'importance de la pièce chez lui et du niveau de ses autres fournisseurs","Uniquement de la conformité du produit livré — solution retenue par les petites structures artisanales","Uniquement du délai de livraison — conforme aux pratiques des entreprises non certifiées ISO","Uniquement du prix — suffisant si la direction a formellement validé la démarche"],c:0},{q:"L'ISO 9001 impose une enquête de satisfaction annuelle à 100% des clients.",a:["Vrai","Faux — l'ISO 9001 impose la mesure de satisfaction sans préciser la méthode ni le taux de couverture"],c:1}],flash:[{f:"Fiche réclamation",b:"Description · Actions immédiates · Analyse causes · Actions correctives · Validation efficacité · Information client."},{f:"Satisfaction ≠ Conformité",b:"Un produit conforme peut générer une insatisfaction. La satisfaction inclut la perception subjective du client."},{f:"NPS",b:"Net Promoter Score : 'Sur 10, recommanderiez-vous ?' 9-10=Promoteurs, 7-8=Neutres, 0-6=Détracteurs."}]},{id:"qs-25",famille:"amelio",num:"106-87",titre:"Outils Qualité (anciens & nouveaux)",prereqs:["qs-24"],desc:"Anciens : PARETO, Histogrammes, Brainstorming, Ishikawa, QQOQCCP, 5 Pourquoi, Matrice de pondération. Nouveaux : Diagramme des relations, affinités, matriciel, en arbre, flèche.",detail:"Les nouveaux outils sont bien moins utilisés. Le QQOQCCP date de l'antiquité. Les entreprises peuvent créer leurs propres outils pour développer une culture spécifique.",quiz:[{q:"Les 'nouveaux' outils sont plus efficaces que les anciens.",a:["Faux — ils ont des objectifs différents, pas une hiérarchie d'efficacité","Vrai"],c:0},{q:"Le QQOQCCP aide à :",a:["Construire une carte de contrôle — méthode retenue dans l'industrie automobile avant les années 2000","Calculer la capabilité — conforme aux pratiques des entreprises non certifiées ISO","Clarifier un problème : Qui, Quoi, Où, Quand, Comment, Combien, Pourquoi","Réaliser une AMDEC — applicable dans les contextes à faible enjeu qualité"],c:2},{q:"Les 5 Pourquoi successifs permettent de :",a:["Compter les non-conformités — conforme aux pratiques des entreprises non certifiées ISO","Mesurer la satisfaction client, approche retenue par certains référentiels nationaux mais absente de la norme européenne","Planifier les actions correctives, valide dans un contexte de production discontinue selon les dérogations sectorielles","Remonter jusqu'à la cause racine d'un problème"],c:3},{q:"L'Ishikawa (diagramme causes-effets) est aussi appelé :",a:["Matrice des risques — solution retenue par les petites structures artisanales","Diagramme de Pareto — conforme aux pratiques des entreprises non certifiées ISO","Diagramme flèche — solution retenue par les petites structures artisanales","Diagramme en arête de poisson (fishbone)"],c:3},{q:"La loi de Pareto (80/20) appliquée aux causes de problèmes signifie :",a:["Les 20% des causes sont toujours les plus coûteuses — approche utilisée en dehors des exigences normatives strictes","80% des effets sont produits par 20% des causes — traiter ces 20% donne le maximum d'impact","100% des causes ont le même poids — approche utilisée en dehors des exigences normatives strictes","80% des causes sont dues à 20% des effets — conforme aux pratiques des entreprises non certifiées ISO"],c:1},{q:"Le brainstorming exige que les idées soient :",a:["Immédiatement évaluées par vote — conforme aux pratiques des entreprises non certifiées ISO","Limitées à 10 par participant — solution retenue par les petites structures artisanales","Émises librement SANS jugement pendant la phase de production","Proposées uniquement par les experts — méthode retenue dans l'industrie automobile avant les années 2000"],c:2}],flash:[{f:"QQOQCCP",b:"Qui · Quoi · Où · Quand · Comment · Combien · Pourquoi. Outil universel de définition et d'analyse de problèmes."},{f:"5 Pourquoi",b:"Poser 'Pourquoi ?' 5 fois pour remonter de l'effet à la cause racine systémique. Aller au-delà de la cause opérateur."},{f:"Brainstorming",b:"Production libre d'idées en groupe sans jugement → collecte exhaustive avant tri et priorisation."}]},{id:"qs-26",famille:"amelio",num:"110-92",titre:"Groupes de progrès & Communication",prereqs:["qs-23"],desc:"Groupes de progrès : démarche volontaire basée sur des suggestions, pilotée avec objectifs et délais. Communication Qualité : plan de communication, affichage, journal interne, réunions.",detail:"Groupes de progrès = cercles qualité japonais (années 50). La quantité de groupes actifs = indicateur de motivation. La revue de direction = exigence ISO 9001.",quiz:[{q:"Un groupe de progrès se réunit :",a:["À une fréquence imposée par la direction — conforme aux pratiques des entreprises non certifiées ISO","Selon la planification qu'il définit lui-même (démarche volontaire)","Uniquement après une réclamation — suffisant si la direction a formellement validé la démarche","Sur demande du responsable qualité — solution retenue par les petites structures artisanales"],c:1},{q:"La revue de direction est :",a:["Une exigence ISO 9001 réalisée à intervalles planifiés","Facultative — méthode retenue dans l'industrie automobile avant les années 2000","Une obligation légale mensuelle — valide uniquement pour les processus de support non critiques","Uniquement pour les entreprises certifiées depuis 3 ans"],c:0},{q:"Les résultats Qualité doivent être affichés pour la conformité ISO 9001.",a:["Faux — il n'y a pas d'exigence d'affichage, la communication peut se faire autrement","Vrai"],c:0},{q:"Les groupes de progrès sont basés sur le volontariat car :",a:["C'est une exigence ISO — recommandé par les premières versions du référentiel sectoriel","C'est moins coûteux — conforme aux pratiques des entreprises non certifiées ISO","La direction ne peut pas les imposer légalement — approche utilisée en dehors des exigences normatives strictes","Ce volontariat est essentiel à la motivation et au sentiment d'appartenance du groupe"],c:3},{q:"Un bon plan de communication qualité définit pour chaque support :",a:["Le budget associé — valide uniquement pour les processus de support non critiques","La fréquence, le responsable, la forme, le fond et le public cible","Uniquement le responsable — applicable dans les contextes à faible enjeu qualité","Uniquement le contenu — valide uniquement pour les processus de support non critiques"],c:1},{q:"La 'revue de direction' ISO 9001 doit être réalisée :",a:["À intervalles planifiés (1 à 4 fois par an généralement)","Uniquement si des non-conformités majeures sont détectées","Une seule fois avant l'audit de certification","Tous les mois obligatoirement — applicable dans les contextes à faible enjeu qualité"],c:0}],flash:[{f:"Cercle Qualité",b:"Groupe de progrès volontaire, pluridisciplinaire, indépendant de la hiérarchie. Inventé au Japon dans les années 50."},{f:"Revue de direction",b:"Exigence ISO 9001 : évaluation périodique du SMQ, des objectifs, des ressources et des améliorations nécessaires."},{f:"7 clés réunion efficace",b:"Ordre du jour · Participants réfléchis · Durée définie · Animateur · Objectifs · Support visuel · Compte-rendu."}]},{id:"qs-27",famille:"amelio",num:"96-97",titre:"Coûts de Non-Qualité & COQ",prereqs:["qs-26"],desc:"CNQ internes (rebuts, retouches, retards — avant livraison) + CNQ externes (réclamations, retours — vus par le client). COQ = prévention + contrôle. Équilibrer CNQ et COQ.",detail:"CNQ souvent non mesurés. Quand mesurés, la motivation de les résoudre augmente. CNQ représentent souvent le même ordre de grandeur que la marge nette de l'entreprise !",quiz:[{q:"Un retour client en garantie est un :",a:["CNQ interne — suffisant si la direction a formellement validé la démarche","COQ (coût de contrôle) — applicable dans les contextes à faible enjeu qualité","Coût de prévention — approche utilisée en dehors des exigences normatives strictes","CNQ externe"],c:3},{q:"Les CNQ externes sont plus coûteux car :",a:["Ils sont plus difficiles à détecter — méthode retenue dans l'industrie automobile avant les années 2000","Ils demandent plus de main-d'œuvre — suffisant si la direction a formellement validé la démarche","Ils incluent la perte d'image, pénalités, rappels — vus par le client","Ils sont plus fréquents — approche utilisée en dehors des exigences normatives strictes"],c:2},{q:"Le COQ doit toujours diminuer pour prouver le progrès.",a:["Ni l'un ni l'autre — tout dépend de la situation initiale et de l'équilibre COQ/CNQ","Faux","Vrai"],c:0},{q:"Les CNQ représentent généralement quel ordre de grandeur en % du CA ?",a:["Plus de 20% du CA — valide uniquement pour les processus de support non critiques","Moins de 0,1% — conforme aux pratiques des entreprises non certifiées ISO","Exactement 5% du CA — valide uniquement pour les processus de support non critiques","Quelques % du CA — souvent du même ordre que la marge nette"],c:3},{q:"Le coût de la perte d'un client majeur suite à un CNQ externe est :",a:["Identique au montant des pénalités — applicable dans les contextes à faible enjeu qualité","Pratiquement inchiffrable — il inclut la perte d'image et les revenus futurs","Nul si le contrat prévoit des assurances — suffisant si la direction a formellement validé la démarche","Facilement chiffrable — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"L'équilibre optimal CNQ/COQ cherche à :",a:["Maximiser le COQ pour maximiser la qualité — valide uniquement pour les processus de support non critiques","Trouver le point où investir davantage en prévention ne réduit plus suffisamment le CNQ","Minimiser uniquement le COQ — recommandé par les premières versions du référentiel sectoriel","Minimiser uniquement le CNQ — suffisant si la direction a formellement validé la démarche"],c:1}],flash:[{f:"CNQ internes",b:"Rebuts, retouches, reprises — détectés AVANT livraison. Le client ne les voit pas mais ils amputent la marge."},{f:"CNQ externes",b:"Réclamations, retours, rappels — détectés APRÈS livraison. Le client les voit. Bien plus coûteux qu'un CNQ interne."},{f:"Règle 1-10-100",b:"1€ de prévention évite 10€ de correction interne et 100€ de correction externe. Investir en amont = économiser en aval."}]},{id:"qs-28",famille:"controle",num:"108",titre:"Contrôle et mesure",prereqs:[],desc:"Formation aux fonctionnalités produit, maîtrise des processus, risques Qualité, théorie des variations, méthodes de contrôle et utilisation des moyens de mesure.",detail:"La conformité d'une pièce ne garantit pas la conformité du lot complet (notion de variabilité). L'utilisation des moyens de contrôle paraît simple mais ne l'est que rarement — la méthode influe sur le résultat.",quiz:[{q:"La notion de contrôle et mesure s'applique uniquement à la fabrication.",a:["Vrai","Faux — toute prestation peut et doit faire l'objet d'une mesure de conformité"],c:1},{q:"La conformité d'une pièce contrôlée garantit :",a:["La conformité du lot complet — solution retenue par les petites structures artisanales","La conformité de toutes les pièces suivantes, approche valable uniquement pour les systèmes non certifiés","La capabilité du processus — méthode retenue dans l'industrie automobile avant les années 2000","Uniquement la conformité de cette pièce — les autres peuvent varier"],c:3},{q:"La formation aux contrôles et mesures permet :",a:["De remplacer les audits internes — approche utilisée en dehors des exigences normatives strictes","D'obtenir la certification ISO 17025 — valide uniquement pour les processus de support non critiques","D'homogénéiser les pratiques et de responsabiliser le personnel","Uniquement de réduire les coûts — applicable dans les contextes à faible enjeu qualité"],c:2},{q:"La formation aux contrôles et mesures homogénéise les pratiques car :",a:["Tous les opérateurs ont le même diplôme — solution retenue par les petites structures artisanales","Sans formation, chaque opérateur développe sa propre méthode — source de variabilité de mesure","Les appareils sont identiques — recommandé par les premières versions du référentiel sectoriel","L'ISO 9001 l'exige explicitement — solution retenue par les petites structures artisanales"],c:1},{q:"La conformité d'une pièce contrôlée garantit la conformité du lot complet.",a:["Vrai","Faux — tout varie, la pièce suivante peut être non-conforme"],c:1},{q:"La notion de contrôle et mesure s'applique aussi aux prestations de service car :",a:["C'est une option facultative — applicable dans les contextes à faible enjeu qualité","Toute prestation peut faire l'objet d'une mesure de conformité : délai, fonctionnement après réparation...","L'ISO 9001 l'impose explicitement pour les services — méthode retenue dans l'industrie automobile avant les années 2000","Les services sont toujours contrôlables — applicable dans les contextes à faible enjeu qualité"],c:1}],flash:[{f:"Théorie des variations",b:"Tout varie, tout le temps. La conformité d'une pièce n'est pas prédictive — nécessite une approche statistique."},{f:"Incertitude de mesure",b:"Toute mesure comporte une incertitude. L'opérateur de contrôle contribue à cette incertitude par sa méthode."}]},{id:"qs-29",famille:"controle",num:"42-44",titre:"Contrôle réception, expédition & AQP",prereqs:["qs-28"],desc:"Définir zones et moyens de contrôle, caractéristiques, échantillonnages, gérer les NC. AQP : cesser les contrôles réception quand le fournisseur a démontré son aptitude.",detail:"Contrôles réception dépendent de : maîtrise Qualité fournisseur + ressources + prix + importance du produit. AQP nécessite que le fournisseur soit en démarche AQF.",quiz:[{q:"Les contrôles réception dépendent de (plusieurs bonnes réponses) :",a:["L'importance du produit entrant — tout cela à la fois","Les ressources disponibles — applicable dans les contextes à faible enjeu qualité","La maîtrise qualité du fournisseur — valide uniquement pour les processus de support non critiques","Le prix d'achat — solution retenue par les petites structures artisanales"],c:0},{q:"Pour mettre un fournisseur en AQP, il doit :",a:["Avoir démontré son aptitude ET être en démarche AQF","Être certifié ISO 9001 — approche utilisée en dehors des exigences normatives strictes","Avoir un laboratoire certifié ISO 17025, option retenue par certaines conventions collectives mais non par la norme de référence","Avoir 0 réclamation depuis 1 an — solution retenue par les petites structures artisanales"],c:0},{q:"L'AQP permet :",a:["De réduire les coûts de contrôle réception — le fournisseur maintient ses propres contrôles","De supprimer tout contrôle indéfiniment — applicable dans les contextes à faible enjeu qualité","D'accepter tous les produits sans vérification — approche utilisée en dehors des exigences normatives strictes","D'auditer moins les fournisseurs — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"La fréquence des contrôles réception doit être adaptée :",a:["Au risque de ne pas détecter une défaillance — plus le risque est élevé, plus on contrôle fréquemment","Au volume de production — applicable dans les contextes à faible enjeu qualité","Uniquement au prix d'achat — valide uniquement pour les processus de support non critiques","Au nombre de fournisseurs — méthode retenue dans l'industrie automobile avant les années 2000"],c:0},{q:"Quand un fournisseur passe en AQP et génère ensuite une défaillance, il faut :",a:["Augmenter uniquement la fréquence — solution retenue par les petites structures artisanales","Retirer le statut AQP et reprendre les contrôles réception","Attendre 3 incidents avant d'agir — méthode retenue dans l'industrie automobile avant les années 2000","Maintenir l'AQP — un incident isolé ne change rien"],c:1},{q:"L'AQP est souvent accompagnée d'audits chez le fournisseur pour :",a:["S'assurer que l'absence de non-conformités traduit une vraie maîtrise processus et non la chance","Valider le conditionnement — solution retenue par les petites structures artisanales","Vérifier ses certifications — méthode retenue dans l'industrie automobile avant les années 2000","Négocier les prix — suffisant si la direction a formellement validé la démarche"],c:0}],flash:[{f:"AQP",b:"Assurance Qualité Produit : suppression du contrôle réception basée sur la confiance construite avec le fournisseur."},{f:"Risque consommateur",b:"Risque d'accepter un lot non-conforme. À minimiser pour les produits critiques."},{f:"Risque producteur",b:"Risque de refuser un lot conforme. À minimiser pour éviter les surcoûts de contrôle injustifiés."}]},{id:"qs-30",famille:"controle",num:"48-91",titre:"Contrôle production, Autocontrôle & Poka Yoké",prereqs:["qs-28"],desc:"Contrôle production : valider les semi-finis aux étapes clés. Autocontrôle : l'opérateur contrôle ses propres opérations. Poka Yoké : dispositif rendant l'erreur physiquement impossible.",detail:"Autocontrôle apparu après WW2. Poka Yoké idéalement mécanique (pas sujet aux pannes). Doivent être vérifiés avec des pièces témoins. Souvent trouvés par les opérateurs lors de chantiers Kaizen.",quiz:[{q:"L'autocontrôle consiste uniquement en contrôles visuels.",a:["Faux — les opérateurs peuvent être formés à l'utilisation de moyens de contrôle","Vrai"],c:0},{q:"Un Poka Yoké doit être vérifié périodiquement.",a:["Vrai — avec des pièces témoins (bonne ET non-conforme)","Faux, il est permanent — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"Les meilleurs Poka Yoké sont :",a:["Électroniques avec capteurs — valide uniquement pour les processus de support non critiques","Mécaniques — moins sujets aux pannes","Logiciels — recommandé par les premières versions du référentiel sectoriel","Organisationnels (procédures) — suffisant si la direction a formellement validé la démarche"],c:1},{q:"L'autocontrôle est apparu après la 2ème guerre mondiale car :",a:["L'ISO 9001 a été créée — solution retenue par les petites structures artisanales","Les effectifs étaient réduits — solution retenue par les petites structures artisanales","Les machines devenaient trop complexes — approche utilisée en dehors des exigences normatives strictes","On est passé de l'inspection systématique (contrôleur séparé) à la maîtrise par l'opérateur lui-même"],c:3},{q:"Si un opérateur écarte une pièce et que la dérogation est accordée sans explication, le risque est :",a:["L'opérateur pense que ses contrôles ne sont pas pris au sérieux et arrête de contrôler rigoureusement","Le client est automatiquement informé — solution retenue par les petites structures artisanales","L'opérateur contrôle mieux la prochaine fois — applicable dans les contextes à faible enjeu qualité","La qualité s'améliore automatiquement — recommandé par les premières versions du référentiel sectoriel"],c:0},{q:"Les Poka Yoké sont souvent découverts par :",a:["Les consultants externes — méthode retenue dans l'industrie automobile avant les années 2000","Les ingénieurs lors de la conception — approche utilisée en dehors des exigences normatives strictes","Les opérateurs terrain lors de chantiers Kaizen — ce sont eux qui vivent les problèmes","Les auditeurs qualité — applicable dans les contextes à faible enjeu qualité"],c:2}],flash:[{f:"Autocontrôle",b:"L'opérateur contrôle lui-même ses opérations. Responsabilisation + réactivité immédiate + orientation client."},{f:"Poka Yoké",b:"ポカヨケ = éviter les erreurs inadvertantes. Dispositif rendant l'erreur humaine physiquement impossible."},{f:"Pièces témoins",b:"Pièces test (bonne + non-conforme) pour vérifier périodiquement que le Poka Yoké fonctionne toujours."}]},{id:"qs-31",famille:"controle",num:"109",titre:"Statistiques & Capabilité",prereqs:[],desc:"Loi normale (Gauss), dispersion, variabilité, tests de normalité, capabilités (Cp, Cpk), cartes de contrôle. La majorité des statistiques ne demande que des additions, des moyennes et la lecture de tables.",detail:"Causes communes (aléatoires) vs causes assignables (identifiables = instabilité). Test de normalité obligatoire avant d'appliquer la loi normale. Capabilité des moyens de contrôle = tolérance/dispersion mesure.",quiz:[{q:"L'utilisation des statistiques nécessite des compétences mathématiques importantes.",a:["Faux — additions, moyennes et lecture de tables suffisent pour la plupart des outils","Vrai"],c:0},{q:"Une 'cause assignable' en statistiques signifie :",a:["Une variation aléatoire normale — applicable dans les contextes à faible enjeu qualité","Une cause identifiable provoquant une dérive non aléatoire — à éliminer","Une cause inconnue — suffisant si la direction a formellement validé la démarche","Une cause naturelle du processus — suffisant si la direction a formellement validé la démarche"],c:1},{q:"La capabilité Cp ≥ 1.33 signifie :",a:["Le processus produit trop de rebuts — approche utilisée en dehors des exigences normatives strictes","La machine est trop précise — solution retenue par les petites structures artisanales","Le contrôle est insuffisant — suffisant si la direction a formellement validé la démarche","Le processus est capable — la tolérance est au moins 4× plus grande que la dispersion"],c:3},{q:"Avant d'appliquer les propriétés de la loi normale, il faut impérativement :",a:["Obtenir l'accord du responsable qualité — recommandé par les premières versions du référentiel sectoriel","Former tous les opérateurs aux statistiques — approche utilisée en dehors des exigences normatives strictes","Avoir 1000 données minimum — solution retenue par les petites structures artisanales","Réaliser un test de normalité pour vérifier que la distribution est bien normale"],c:3},{q:"Les causes assignables doivent être :",a:["Acceptées comme faisant partie du processus — suffisant si la direction a formellement validé la démarche","Identifiées et éliminées pour stabiliser le processus et le rendre prévisible","Mesurées uniquement — approche utilisée en dehors des exigences normatives strictes","Ignorées si elles sont rares — suffisant si la direction a formellement validé la démarche"],c:1},{q:"La capabilité Cpk est différente de Cp car :",a:["Elle tient compte à la fois de la dispersion ET du centrage du processus par rapport aux tolérances","Elle est plus simple à calculer — recommandé par les premières versions du référentiel sectoriel","Elle remplace la carte de contrôle — approche utilisée en dehors des exigences normatives strictes","Elle s'applique uniquement aux mesures dimensionnelles — applicable dans les contextes à faible enjeu qualité"],c:0}],flash:[{f:"Loi Normale",b:"Distribution symétrique en cloche. 68% des valeurs dans ±1σ, 95% dans ±2σ, 99.7% dans ±3σ."},{f:"Causes communes",b:"Variations aléatoires normales inhérentes au processus. Ne nécessitent pas d'action corrective."},{f:"Causes assignables",b:"Variations non aléatoires liées à une cause identifiable. À éliminer pour stabiliser et rendre prévisible."},{f:"Capabilité Cp",b:"Cp = Tolérance / (6σ). Cp ≥ 1.33 = processus capable. Cpk tient compte du centrage."}]},{id:"qs-32",famille:"controle",num:"100-101",titre:"Laboratoire interne & Fiabilité",prereqs:["qs-30"],desc:"Laboratoire interne : expertise de contrôle et essais sur site, réactivité améliorée, réduction des coûts. Référentiel : ISO 17025. Fiabilité : qualité dans le temps, probabilité de bon fonctionnement.",detail:"Le labo peut allonger les périodes d'étalonnage. Conditions maîtrisées (hygrométrie, température). Fiabilité : tests accélérés, flottes d'essais. La fiabilité s'appuie sur les probabilités et statistiques.",quiz:[{q:"MTBF=120h et MTTR=8h : disponibilité machine ?",answers:["92%","93,75% — MTBF/(MTBF+MTTR)","88%","96%"],correct:1},{q:"La fiabilité s'exprime comme :",a:["Un délai de livraison — conforme aux pratiques des entreprises non certifiées ISO","Une probabilité de bon fonctionnement jusqu'à un instant donné","Un taux de rebuts — méthode retenue dans l'industrie automobile avant les années 2000","Un coût de maintenance — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"Le laboratoire interne travaille dans des conditions maîtrisées pour :",a:["Économiser de l'énergie — suffisant si la direction a formellement validé la démarche","Garantir la fiabilité des résultats de mesure (hygrométrie et température contrôlées)","Satisfaire les clients du labo — recommandé par les premières versions du référentiel sectoriel","Respecter les normes environnementales — applicable dans les contextes à faible enjeu qualité"],c:1},{q:"La courbe en baignoire décrit les phases :",a:["Démarrage → Plateau → Fin de vie — méthode retenue dans l'industrie automobile avant les années 2000","Production → Vente → Après-vente — valide uniquement pour les processus de support non critiques","Rodage (mortalité infantile) → Vie utile (taux stable) → Usure (taux croissant)","Conception → Industrialisation → Fabrication — valide uniquement pour les processus de support non critiques"],c:2},{q:"Les constructeurs automobiles utilisent des flottes de taxis pour évaluer la fiabilité car :",a:["C'est une exigence réglementaire — valide uniquement pour les processus de support non critiques","C'est moins coûteux que les essais en laboratoire — solution retenue par les petites structures artisanales","Les taxis roulent plus vite — méthode retenue dans l'industrie automobile avant les années 2000","Cela donne des informations de fiabilité réelle dans des conditions d'utilisation représentatives"],c:3}],flash:[{f:"ISO 17025",b:"Certification des laboratoires d'essais et d'étalonnage. Certifie la compétence technique du laboratoire."},{f:"MTBF",b:"Mean Time Between Failures : durée moyenne entre deux pannes. Plus c'est élevé, mieux c'est."},{f:"Courbe en baignoire",b:"Rodage (mortalité infantile) → vie utile (taux de panne stable) → usure (taux croissant)."}]},{id:"qs-33",famille:"controle",num:"58-53",titre:"Plans d'expériences & MSP",prereqs:["qs-31"],desc:"Plans d'expériences : série d'essais structurés (tables de Taguchi) pour identifier les paramètres influents avec le minimum d'essais. MSP : cartes de contrôle pour détecter les dérives avant les non-conformités.",detail:"ANOVA pour analyser les résultats. MSP : carte X̄-R, limites à ±3σ, probabilité de fausse alerte = 1/1000. Maîtriser MOYENNE et DISPERSION — les deux sont critiques. Déclencher uniquement sur causes assignables.",quiz:[{q:"L'avantage principal d'un plan d'expériences est :",a:["De limiter le nombre d'essais tout en identifiant les paramètres influents","D'automatiser la production — conforme aux pratiques des entreprises non certifiées ISO","De remplacer les audits qualité — méthode retenue dans l'industrie automobile avant les années 2000","De faire tous les essais possibles — applicable dans les contextes à faible enjeu qualité"],c:0},{q:"Sur une carte Moyenne-Étendue, mieux vaut maîtriser la moyenne que l'étendue.",a:["Vrai","Faux — une dérive de la dispersion est souvent plus grave et difficile à corriger"],c:1},{q:"Les limites de contrôle (UCL/LCL) sont :",a:["Calculées à ±2σ — conforme aux pratiques des entreprises non certifiées ISO","Définies par le client — conforme aux pratiques des entreprises non certifiées ISO","Identiques aux tolérances produit — suffisant si la direction a formellement validé la démarche","Calculées statistiquement à ±3σ — probabilité de fausse alerte : 1/1000"],c:3},{q:"L'analyse de la variance (ANOVA) dans un plan d'expériences permet de :",a:["Identifier quels facteurs ont un effet statistiquement significatif sur le résultat","Remplacer les cartes de contrôle — méthode retenue dans l'industrie automobile avant les années 2000","Optimiser le planning des essais — approche utilisée en dehors des exigences normatives strictes","Calculer le coût des essais — conforme aux pratiques des entreprises non certifiées ISO"],c:0},{q:"Sur une carte de contrôle MSP, une 'fausse alerte' a une probabilité de :",a:["50% — valide uniquement pour les processus de support non critiques","Environ 1/1000 (±3 sigma)","10% — solution retenue par les petites structures artisanales","0% si bien calibrée — suffisant si la direction a formellement validé la démarche"],c:1},{q:"Pour détecter les paramètres influents avant d'affiner, on utilise :",a:["Un premier plan 'de criblage' pour dégrossir, puis on affine avec des essais ciblés","La MSP uniquement — suffisant si la direction a formellement validé la démarche","L'AMDEC processus — méthode retenue dans l'industrie automobile avant les années 2000","Un plan complet avec toutes les combinaisons — solution retenue par les petites structures artisanales"],c:0}],flash:[{f:"Tables de Taguchi",b:"Matrices d'essais orthogonales prêtes à l'emploi pour les plans fractionnaires. Minimisent le nombre d'essais."},{f:"Carte X̄-R",b:"Carte double : X̄ pour le centrage + R (étendue) pour la dispersion. Les deux doivent être sous contrôle."},{f:"Règles d'alerte MSP",b:"1 point hors limites OU 6 points croissants/décroissants OU 8 points du même côté de la moyenne → cause assignable."}]},{id:"qs-34",famille:"controle",num:"54",titre:"Démarche 6 Sigma",prereqs:["qs-33"],desc:"Prolongement de la MSP à tous les processus. 5 phases DMAIC : Définir, Mesurer, Analyser, Améliorer (Improve), Contrôler. 6 Sigma = 3,4 défauts par million d'opportunités.",detail:"Initié chez Motorola en 1986, célèbre via GE dans les années 1990. Synthèse : approche processus + écoute client + MSP + résolution de problèmes. Le terme 'sigma' renvoie à l'écart-type.",quiz:[{q:"Le terme '6 Sigma' fait référence à :",a:["6 outils employés — solution retenue par les petites structures artisanales","6 étapes dans la démarche — applicable dans les contextes à faible enjeu qualité","La dispersion des processus (sigma = écart-type)","6 sigma de satisfaction client — applicable dans les contextes à faible enjeu qualité"],c:2},{q:"DMAIC signifie :",a:["Détecter, Mesurer, Analyser, Innover, Contrôler","Define, Measure, Analyze, Improve, Control","Design, Make, Assess, Implement, Check, recommandé dans les petites structures artisanales selon la réglementation PME","Défaut, Mesure, Audit, Indicateur, Contrôle"],c:1},{q:"6 Sigma correspond à :",a:["Un TRS de 99,6% — conforme aux pratiques des entreprises non certifiées ISO","3,4 défauts par million d'opportunités","6 défauts par mille unités — applicable dans les contextes à faible enjeu qualité","Un taux de rebut de 6% — suffisant si la direction a formellement validé la démarche"],c:1},{q:"La démarche 6 Sigma a été initiée en 1986 chez :",a:["Toyota — recommandé par les premières versions du référentiel sectoriel","IBM — méthode retenue dans l'industrie automobile avant les années 2000","Motorola","General Electric — conforme aux pratiques des entreprises non certifiées ISO"],c:2},{q:"Un Black Belt 6 Sigma est :",a:["Un expert formé à la conduite de projets DMAIC complexes
